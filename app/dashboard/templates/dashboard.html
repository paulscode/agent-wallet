                                        <span><span class="text-neon-pink">Admin</span> — full control, including channels and signing. Reserve for break-glass operator use.</span>
                                    </label>
                                </div>
                                <label class="block text-xs text-gray-400">
                                    Expires in (days)
                                    <input type="number" :value="apiKeyDraft.expires_in_days" @input="setFieldNum('apiKeyDraft','expires_in_days', $event.target.value)" min="1" max="3650"
                                        class="mt-1 w-32 px-2.5 py-1.5 rounded bg-navy-900 border border-navy-600 text-sm text-white focus:outline-none focus:border-neon-cyan">
                                </label>
                            </div>
                            <template x-if="apiKeyDraftError">
                                <div class="text-xs text-neon-pink" x-text="apiKeyDraftError"></div>
                            </template>
                            <div class="flex justify-end gap-2">
                                <button type="button" @click="closeApiKeyDraft()"
                                    class="px-3 py-1.5 rounded bg-navy-700 hover:bg-navy-600 text-sm text-gray-300">
                                    Cancel
                                </button>
                                <button type="button" @click="createApiKey()"
                                    :disabled="apiKeyDraftSubmitting"
                                    class="px-3 py-1.5 rounded bg-neon-cyan/20 border border-neon-cyan/40 hover:bg-neon-cyan/30 text-sm text-neon-cyan font-medium disabled:opacity-40">
                                    <span x-show="!apiKeyDraftSubmitting">Create</span>
                                    <span x-show="apiKeyDraftSubmitting">Creating…</span>
                                </button>
                            </div>
                        </div>
                    </template>

                    <!-- Toolbar -->
                    <div class="flex items-center justify-between gap-2">
                        <div class="flex items-center gap-2">
                            <select x-model="apiKeysFilter"
                                class="px-2 py-1 rounded bg-navy-900 border border-navy-600 text-sm text-gray-300 focus:outline-none focus:border-neon-cyan">
                                <option value="all">All</option>
                                <option value="active">Active</option>
                                <option value="expiring">Expiring soon</option>
                                <option value="disabled">Disabled</option>
                                <option value="expired">Expired</option>
                                <option value="revoked">Revoked</option>
                            </select>
                            <input type="text" x-model="apiKeysSearch" placeholder="Search by name…"
                                class="px-2 py-1 rounded bg-navy-900 border border-navy-600 text-sm text-gray-300 focus:outline-none focus:border-neon-cyan w-48">
                        </div>
                        <button type="button" @click="openApiKeyDraft()"
                            x-show="!apiKeyDraftOpen && !apiKeyJustCreated"
                            class="flex items-center gap-1.5 px-3 py-1.5 rounded bg-neon-cyan/10 border border-neon-cyan/30 hover:bg-neon-cyan/20 text-sm text-neon-cyan">
                            <i data-lucide="plus" class="w-3.5 h-3.5"></i>
                            <span>New Key</span>
                        </button>
                    </div>

                    <!-- Loading / Error -->
                    <template x-if="apiKeysLoading && (!apiKeys || apiKeys.length === 0)">
                        <div class="flex items-center justify-center py-10">
                            <div class="w-6 h-6 border-2 border-neon-cyan border-t-transparent rounded-full animate-spin"></div>
                        </div>
                    </template>
                    <template x-if="apiKeysError">
                        <div class="text-xs text-neon-pink p-3 rounded bg-neon-pink/10 border border-neon-pink/20" x-text="apiKeysError"></div>
                    </template>

                    <!-- Empty state -->
                    <template x-if="!apiKeysLoading && filteredApiKeys.length === 0 && !apiKeysError">
                        <div class="text-center text-sm text-gray-500 py-10">No API keys match.</div>
                    </template>

                    <!-- Bootstrap-only callout: nudge the operator to mint
                         scoped per-agent keys instead of reusing the
                         single admin key for everything. -->
                    <template x-if="isBootstrapOnly && !apiKeyDraftOpen && !apiKeyJustCreated">
                        <div class="mb-3 rounded-lg border border-neon-cyan/30 bg-neon-cyan/5 p-3 text-xs text-gray-300">
                            <div class="flex items-start gap-2">
                                <i data-lucide="info" class="w-4 h-4 text-neon-cyan shrink-0 mt-0.5"></i>
                                <div class="flex-1">
                                    <div class="font-medium text-neon-cyan mb-1">You're using a single admin key</div>
                                    <p class="text-gray-400">Create a scoped key for each agent or service so you can rotate or revoke them independently. Keep this admin key offline as a break-glass credential.</p>
                                    <button type="button" @click="openApiKeyDraft()"
                                        class="mt-2 px-2.5 py-1 rounded bg-neon-cyan/20 border border-neon-cyan/40 text-neon-cyan text-xs hover:bg-neon-cyan/30">
                                        Create a scoped key
                                    </button>
                                </div>
                            </div>
                        </div>
                    </template>

                    <!-- List -->
                    <div class="space-y-2">
                        <template x-for="k in filteredApiKeys" :key="k.id">
                            <div class="rounded-lg border border-navy-700 bg-navy-950/40 p-3.5">
                                <div class="flex items-start justify-between gap-3">
                                    <div class="min-w-0 flex-1">
                                        <div class="flex items-center gap-2 flex-wrap">
                                            <template x-if="apiKeyEditId !== k.id">
                                                <span class="font-medium text-white truncate" x-text="k.name"></span>
                                            </template>
                                            <template x-if="apiKeyEditId === k.id">
                                                <input type="text" x-model="apiKeyEditName" maxlength="128"
                                                    @keydown.enter="saveApiKeyName(k.id)"
                                                    @keydown.escape="apiKeyEditId = null"
                                                    class="px-2 py-0.5 rounded bg-navy-900 border border-navy-600 text-sm text-white focus:outline-none focus:border-neon-cyan">
                                            </template>
                                            <span class="text-[10px] uppercase tracking-wider px-1.5 py-0.5 rounded"
                                                :class="{
                                                    'bg-neon-pink/20 text-neon-pink': k.scope === 'admin',
                                                    'bg-amber-500/20 text-amber-300': k.scope === 'spend',
                                                    'bg-blue-500/20 text-blue-300': k.scope === 'monitor',
                                                }"
                                                x-text="scopePillText(k.scope)"></span>
                                            <span class="text-[10px] uppercase tracking-wider px-1.5 py-0.5 rounded"
                                                :class="{
                                                    'bg-neon-green/20 text-neon-green': k.status === 'active',
                                                    'bg-amber-500/20 text-amber-300': k.status === 'expiring',
                                                    'bg-gray-500/20 text-gray-400': k.status === 'disabled',
                                                    'bg-orange-500/20 text-orange-300': k.status === 'expired',
                                                    'bg-neon-pink/20 text-neon-pink': k.status === 'revoked',
                                                }"
                                                x-text="k.status"></span>
                                        </div>
                                        <div class="mt-1 text-[11px] text-gray-500 space-x-2">
                                            <span>created <span x-text="formatRelative(k.created_at)"></span></span>
                                            <span>·</span>
                                            <span x-show="k.last_used_at">last used <span x-text="formatRelative(k.last_used_at)"></span></span>
                                            <span x-show="!k.last_used_at" class="text-gray-600">never used</span>
                                            <template x-if="k.expires_at">
                                                <span>· <span x-text="formatExpires(k.expires_at)"></span></span>
                                            </template>
                                            <template x-if="k.status === 'revoked' && k.purge_eligible_at">
                                                <span class="text-amber-400">· purge <span x-text="formatPurgeEta(k.purge_eligible_at)"></span></span>
                                            </template>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-1 shrink-0">
                                        <template x-if="k.status !== 'revoked'">
                                            <div class="flex items-center gap-1">
                                                <template x-if="apiKeyEditId !== k.id">
                                                    <button type="button" @click="startRenameApiKey(k)"
                                                        class="p-1.5 text-gray-500 hover:text-white hover:bg-navy-700 rounded" title="Rename">
                                                        <i data-lucide="pencil" class="w-3.5 h-3.5"></i>
                                                    </button>
                                                </template>
                                                <template x-if="apiKeyEditId === k.id">
                                                    <button type="button" @click="saveApiKeyName(k.id)"
                                                        class="p-1.5 text-neon-green hover:bg-navy-700 rounded" title="Save">
                                                        <i data-lucide="check" class="w-3.5 h-3.5"></i>
                                                    </button>
                                                </template>
                                                <button type="button" @click="rotateApiKey(k)"
                                                    class="p-1.5 text-gray-500 hover:text-neon-cyan hover:bg-navy-700 rounded" title="Rotate (issue replacement)">
                                                    <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i>
                                                </button>
                                                <button type="button" @click="toggleApiKeyActive(k)"
                                                    class="p-1.5 text-gray-500 hover:text-amber-400 hover:bg-navy-700 rounded"
                                                    :title="k.is_active ? 'Disable' : 'Enable'">
                                                    <i :data-lucide="k.is_active ? 'pause' : 'play'" class="w-3.5 h-3.5"></i>
                                                </button>
                                                <select :value="k.scope"
                                                    @change="requestScopeChange(k, $event.target.value)"
                                                    :disabled="!canChangeScope(k)"
                                                    :title="canChangeScope(k) ? 'Change scope' : 'Cannot demote the last active admin key'"
                                                    class="text-[11px] bg-navy-900 border border-navy-600 rounded px-1.5 py-1 text-gray-300 focus:outline-none focus:border-neon-cyan disabled:opacity-30 disabled:cursor-not-allowed">
                                                    <option value="monitor">monitor</option>
                                                    <option value="spend">spend</option>
                                                    <option value="admin">admin</option>
                                                </select>
                                                <button type="button" @click="confirmRevokeApiKey(k)"
                                                    :disabled="!canRevoke(k)"
                                                    :title="canRevoke(k) ? 'Revoke' : 'Cannot revoke last active admin key'"
                                                    class="p-1.5 text-gray-500 hover:text-neon-pink hover:bg-navy-700 rounded disabled:opacity-30 disabled:cursor-not-allowed">
                                                    <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                                                </button>
                                            </div>
                                        </template>
                                        <template x-if="k.status === 'revoked'">
                                            <button type="button" @click="confirmPurgeApiKey(k)"
                                                :disabled="!canPurge(k)"
                                                :title="canPurge(k) ? 'Purge from database' : 'Audit retention not yet elapsed'"
                                                class="px-2 py-1 rounded bg-neon-pink/10 border border-neon-pink/30 text-neon-pink text-xs hover:bg-neon-pink/20 disabled:opacity-30 disabled:cursor-not-allowed">
                                                Purge
                                            </button>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- API Key confirm modal (revoke / purge / rotate / scope change) -->
    <template x-if="apiKeyConfirm">
        <div class="fixed inset-0 z-[60] flex items-center justify-center" @keydown.escape.window="cancelApiKeyConfirm()">
            <div class="absolute inset-0 bg-black/70 backdrop-blur-sm" @click="cancelApiKeyConfirm()"></div>
            <div class="relative w-full max-w-md mx-4 bg-navy-900 border border-navy-700 rounded-xl p-5 shadow-2xl">
                <div class="flex items-center gap-2 mb-3">
                    <i :data-lucide="apiKeyConfirm.icon || 'alert-triangle'" class="w-5 h-5"
                       :class="apiKeyConfirm.tone === 'danger' ? 'text-neon-pink' : 'text-amber-400'"></i>
                    <h3 class="text-base font-semibold text-white" x-text="apiKeyConfirm.title"></h3>
                </div>
                <p class="text-sm text-gray-300 mb-4" x-text="apiKeyConfirm.message"></p>
                <template x-if="apiKeyConfirm.requireCheckbox">
                    <label class="flex items-center gap-2 text-xs text-gray-400 mb-3 cursor-pointer">
                        <input type="checkbox" x-model="apiKeyConfirmAcknowledged">
                        <span x-text="apiKeyConfirm.requireCheckbox"></span>
                    </label>
                </template>
                <div class="flex justify-end gap-2">
                    <button type="button" @click="cancelApiKeyConfirm()"
                        class="px-3 py-1.5 rounded bg-navy-700 hover:bg-navy-600 text-sm text-gray-300">
                        Cancel
                    </button>
                    <button type="button" @click="executeApiKeyConfirm()"
                        :disabled="apiKeyConfirm.requireCheckbox && !apiKeyConfirmAcknowledged"
                        class="px-3 py-1.5 rounded text-sm font-medium disabled:opacity-30 disabled:cursor-not-allowed"
                        :class="apiKeyConfirm.tone === 'danger'
                            ? 'bg-neon-pink/20 border border-neon-pink/40 text-neon-pink hover:bg-neon-pink/30'
                            : 'bg-neon-cyan/20 border border-neon-cyan/40 text-neon-cyan hover:bg-neon-cyan/30'"
                        x-text="apiKeyConfirm.confirmLabel || 'Confirm'"></button>
                </div>
            </div>
        </div>
    </template>

    <!-- ═══ AUDIT LOG MODAL ═══ -->
    <template x-if="showAuditLog">
        <div class="fixed inset-0 z-50 flex items-center justify-center" @keydown.escape.window="closeAuditLog()">
            <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="closeAuditLog()"></div>
            <div class="relative w-full max-w-4xl mx-4 my-8 bg-gradient-to-br from-navy-800 to-navy-900 border border-neon-yellow/30 rounded-xl shadow-2xl shadow-black/40 max-h-[90vh] flex flex-col">
                <div class="flex items-center justify-between p-5 border-b border-navy-700 shrink-0">
                    <div class="flex items-center gap-2">
                        <i data-lucide="scroll-text" class="w-5 h-5 text-neon-yellow"></i>
                        <h2 class="text-lg font-semibold text-white">Audit Log</h2>
                    </div>
                    <button @click="closeAuditLog()" class="p-1.5 text-gray-500 hover:text-gray-300 hover:bg-navy-700 rounded-lg">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>

                <!-- Filter bar -->
                <div class="p-4 border-b border-navy-700 shrink-0 flex flex-wrap items-end gap-2">
                    <label class="text-xs text-gray-400">
                        Action
                        <select :value="auditFilter.action" @change="setAuditFilter('action', $event.target.value)"
                            class="block mt-0.5 px-2 py-1 rounded bg-navy-900 border border-navy-600 text-sm text-gray-300 focus:outline-none focus:border-neon-yellow w-48">
                            <option value="">All actions</option>
                            <template x-for="a in auditActions" :key="a">
                                <option :value="a" x-text="a"></option>
                            </template>
                        </select>
                    </label>
                    <label class="text-xs text-gray-400">
                        Key name
                        <input type="text" :value="auditFilter.api_key_name" @input="setField('auditFilter','api_key_name', $event.target.value)" @keydown.enter="reloadAuditLog()"
                            placeholder="substring…" maxlength="128"
                            class="block mt-0.5 px-2 py-1 rounded bg-navy-900 border border-navy-600 text-sm text-gray-300 focus:outline-none focus:border-neon-yellow w-44">
                    </label>
                    <label class="text-xs text-gray-400">
                        Range
                        <select :value="auditFilter.range" @change="setAuditFilter('range', $event.target.value)"
                            class="block mt-0.5 px-2 py-1 rounded bg-navy-900 border border-navy-600 text-sm text-gray-300 focus:outline-none focus:border-neon-yellow w-32">
                            <option value="1h">Last 1h</option>
                            <option value="24h">Last 24h</option>
                            <option value="7d">Last 7d</option>
                            <option value="30d">Last 30d</option>
                            <option value="all">All time</option>
                        </select>
                    </label>
                    <div class="grow"></div>
                    <button type="button" @click="verifyAuditChain()"
                        class="px-3 py-1.5 rounded bg-navy-700 hover:bg-navy-600 text-xs text-gray-300 flex items-center gap-1.5">
                        <i data-lucide="shield-check" class="w-3.5 h-3.5"></i>
                        <span>Verify chain</span>
                    </button>
                </div>

                <!-- Verify result -->
                <template x-if="auditVerifyResult">
                    <div class="px-4 py-2 border-b border-navy-700 text-xs"
                        :class="auditVerifyResult.ok ? 'bg-neon-green/10 text-neon-green' : 'bg-neon-pink/10 text-neon-pink'">
                        <template x-if="auditVerifyResult.ok">
                            <span><i data-lucide="check" class="w-3.5 h-3.5 inline"></i> Verified <span x-text="auditVerifyResult.checked"></span> entries — chain intact.</span>
                        </template>
                        <template x-if="!auditVerifyResult.ok">
                            <span class="flex items-center gap-2 flex-wrap">
                                <i data-lucide="x" class="w-3.5 h-3.5 inline"></i>
                                Chain broken at entry <code class="font-mono" x-text="auditVerifyResult.first_bad_id"></code>: <span x-text="auditVerifyResult.first_bad_reason"></span>
                                <button type="button" @click="reanchorAuditChain()" :disabled="auditReanchoring"
                                    class="ml-1 px-2 py-1 rounded bg-navy-700 hover:bg-navy-600 text-gray-300 disabled:opacity-50">
                                    <span x-text="auditReanchoring ? 'Re-anchoring…' : 'Re-anchor'"></span>
                                </button>
                            </span>
                        </template>
                    </div>
                </template>

                <!-- Body -->
                <div class="overflow-y-auto p-4 flex-1">
                    <template x-if="auditLoading && auditEntries.length === 0">
                        <div class="flex items-center justify-center py-10">
                            <div class="w-6 h-6 border-2 border-neon-yellow border-t-transparent rounded-full animate-spin"></div>
                        </div>
                    </template>
                    <template x-if="auditError">
                        <div class="text-xs text-neon-pink p-3 rounded bg-neon-pink/10 border border-neon-pink/20" x-text="auditError"></div>
                    </template>
                    <template x-if="!auditLoading && auditEntries.length === 0 && !auditError">
                        <div class="text-center text-sm text-gray-500 py-10">No audit entries match.</div>
                    </template>
                    <div class="space-y-1.5">
                        <template x-for="e in auditEntries" :key="e.id">
                            <div class="rounded border bg-navy-950/40 text-xs"
                                :class="e.success ? 'border-navy-700' : 'border-neon-pink/40 border-l-2 border-l-neon-pink'">
                                <button type="button" @click="toggleAuditRow(e.id)"
                                    class="w-full text-left px-3 py-2 flex items-start gap-3 hover:bg-navy-800/50">
                                    <span class="font-mono text-gray-500 shrink-0 w-32" x-text="formatTimestamp(e.created_at)"></span>
                                    <span class="font-medium text-gray-300 shrink-0 w-32 truncate" x-text="e.api_key_name"></span>
                                    <span class="text-neon-cyan shrink-0 w-44 truncate" x-text="e.action"></span>
                                    <span class="text-gray-500 grow truncate">
                                        <template x-if="e.amount_sats">
                                            <span class="text-amber-300 font-mono"><span x-text="e.amount_sats.toLocaleString()"></span> sats · </span>
                                        </template>
                                        <template x-if="e.ip_address">
                                            <span x-text="'ip ' + e.ip_address"></span>
                                        </template>
                                    </span>
                                    <span class="shrink-0" x-text="e.success ? '✓' : '✗'"
                                        :class="e.success ? 'text-neon-green' : 'text-neon-pink'"></span>
                                </button>
                                <template x-if="auditExpanded[e.id]">
                                    <div class="px-3 pb-3 pt-0 space-y-1.5 text-[11px]">
                                        <template x-if="e.error_message">
                                            <div class="text-neon-pink">Error: <span x-text="e.error_message"></span></div>
                                        </template>
                                        <div class="text-gray-500">Resource: <span class="text-gray-300" x-text="e.resource"></span></div>
                                        <template x-if="e.details">
                                            <pre class="bg-navy-950 border border-navy-700 rounded p-2 overflow-x-auto text-gray-300" x-text="formatAuditDetails(e.details)"></pre>
                                        </template>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>
                    <template x-if="auditNextCursor">
                        <div class="flex justify-center mt-4">
                            <button type="button" @click="loadMoreAuditLog()"
                                :disabled="auditLoading"
                                class="px-4 py-1.5 rounded bg-navy-700 hover:bg-navy-600 text-sm text-gray-300 disabled:opacity-40">
                                <span x-show="!auditLoading">Load more</span>
                                <span x-show="auditLoading">Loading…</span>
                            </button>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </template>

    <!-- Toast Notification -->
    <template x-if="toast">
        <div class="fixed bottom-4 right-4 z-50 bg-navy-800 border border-navy-600 rounded-lg px-4 py-3 shadow-lg text-sm text-white flex items-center gap-2"
            x-transition x-init="initToastDismiss()">
            <i data-lucide="check-circle-2" class="w-4 h-4 text-neon-green"></i>
            <span x-text="toast"></span>
        </div>
    </template>

    <!-- ═══════════════════════════════════════════════════════════════
         Tor Health Panel modal. Opens from the Settings menu;
         shows bootstrap status, active circuits, entry guards, both
         breakers' state, the watchdog's last action timestamps, and
         the event-stream counters. Read-only diagnostic surface.
         ═══════════════════════════════════════════════════════════════ -->
    <template x-if="showTorHealth">
        <div class="fixed inset-0 z-50 flex items-center justify-center p-4"
             @keydown.escape.window="showTorHealth = false">
            <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="showTorHealth = false"></div>
            <div class="relative bg-navy-900 border border-navy-700 rounded-lg shadow-2xl max-w-2xl w-full max-h-[85vh] overflow-y-auto">
                <div class="flex items-center justify-between p-4 border-b border-navy-700">
                    <h2 class="text-base font-semibold text-white flex items-center gap-2">
                        <i data-lucide="shield-check" class="w-4 h-4 text-neon-green"></i>
                        Tor Health
                    </h2>
                    <button type="button" @click="showTorHealth = false"
                            class="text-gray-500 hover:text-white">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>
                <div class="p-4 space-y-4 text-sm">
                    <template x-if="torHealthLoading">
                        <p class="text-xs text-gray-500 py-2">Loading…</p>
                    </template>
                    <template x-if="torHealthError">
                        <p class="text-xs text-red-400 py-2"
                           x-text="torHealthError"></p>
                    </template>
                    <template x-if="torHealthData">
                        <div class="space-y-4">
                            <!-- Plain-language verdict (non-technical audience). The
                                 detailed breakdown below is collapsed by default. -->
                            <template x-if="torHealthSummary">
                                <div class="rounded-lg p-3 flex items-start gap-3"
                                     :class="torHealthSummary.tone === 'ok' ? 'bg-neon-green/10 border border-neon-green/30' : (torHealthSummary.tone === 'warn' ? 'bg-neon-yellow/10 border border-neon-yellow/30' : 'bg-neon-pink/10 border border-neon-pink/30')">
                                    <i class="w-5 h-5 shrink-0 mt-0.5"
                                       :data-lucide="torHealthSummary.tone === 'ok' ? 'shield-check' : (torHealthSummary.tone === 'warn' ? 'loader' : 'shield-alert')"
                                       :class="torHealthSummary.tone === 'ok' ? 'text-neon-green' : (torHealthSummary.tone === 'warn' ? 'text-neon-yellow' : 'text-neon-pink')"></i>
                                    <div class="min-w-0">
                                        <p class="text-sm font-medium text-white" x-text="torHealthSummary.headline"></p>
                                        <p class="text-xs text-gray-400 mt-0.5" x-text="torHealthSummary.detail"></p>
                                    </div>
                                </div>
                            </template>

                            <button type="button" @click="torHealthToggleDetails()"
                                    class="w-full flex items-center justify-between text-[11px] text-gray-500 hover:text-gray-300 transition-colors">
                                <span x-text="torHealthDetailsOpen ? 'Hide technical details' : 'Show technical details'"></span>
                                <i :data-lucide="torHealthDetailsOpen ? 'chevron-up' : 'chevron-down'" class="w-3.5 h-3.5"></i>
                            </button>

                            <div x-show="torHealthDetailsOpen" class="space-y-4">
                            <!-- Bootstrap + control port -->
                            <div class="bg-navy-800 rounded p-3 space-y-1">
                                <h3 class="text-[11px] uppercase tracking-wider text-gray-500">Bootstrap</h3>
                                <div class="flex items-center justify-between">
                                    <span class="text-gray-400">Progress</span>
                                    <span class="font-mono text-white"
                                          x-text="torHealthBootstrapText"></span>
                                </div>
                                <div class="flex items-center justify-between">
                                    <span class="text-gray-400">Circuit established</span>
                                    <span class="font-mono"
                                          :class="torHealthData.circuit_established ? 'text-neon-green' : 'text-gray-500'"
                                          x-text="torHealthCircuitEstablishedText"></span>
                                </div>
                                <div class="flex items-center justify-between">
                                    <span class="text-gray-400">Control port</span>
                                    <span class="font-mono"
                                          :class="torHealthData.control_port_reachable ? 'text-neon-green' : 'text-neon-pink'"
                                          x-text="torHealthData.control_port_reachable ? 'reachable' : 'unreachable'"></span>
                                </div>
                                <div class="flex items-center justify-between">
                                    <span class="text-gray-400">Network liveness</span>
                                    <span class="font-mono text-white"
                                          x-text="torHealthData.network_liveness"></span>
                                </div>
                            </div>

                            <!-- Breakers -->
                            <div class="bg-navy-800 rounded p-3 space-y-1">
                                <h3 class="text-[11px] uppercase tracking-wider text-gray-500">Circuit breakers</h3>
                                <!- — single-mode label is "Tor"; in split
                                     mode we show distinct rows for the two pools. -->
                                <div class="flex items-center justify-between">
                                    <span class="text-gray-400"
                                          x-text="torHealthData.tor_split_mode_enabled ? 'Tor (anonymize)' : 'Tor'"></span>
                                    <span class="font-mono"
                                          :class="torHealthBreakerClass(torHealthData.tor_breaker_state)"
                                          x-text="torHealthData.tor_breaker_state + ' (' + torHealthData.tor_breaker_failures + ' fails)'"></span>
                                </div>
                                <template x-if="torHealthData.tor_split_mode_enabled">
                                    <div class="flex items-center justify-between">
                                        <span class="text-gray-400">Tor (LND)</span>
                                        <span class="font-mono"
                                              :class="torHealthBreakerClass(torHealthData.tor_lnd_breaker_state)"
                                              x-text="torHealthData.tor_lnd_breaker_state + ' (' + torHealthData.tor_lnd_breaker_failures + ' fails)'"></span>
                                    </div>
                                </template>
                                <div class="flex items-center justify-between">
                                    <span class="text-gray-400">LND</span>
                                    <span class="font-mono"
                                          :class="torHealthBreakerClass(torHealthData.lnd_breaker_state)"
                                          x-text="torHealthData.lnd_breaker_state"></span>
                                </div>
                                <template x-if="torHealthData.tor_breaker_last_error">
                                    <div class="text-[11px] text-gray-500 font-mono break-words"
                                         x-text="'Last error: ' + torHealthData.tor_breaker_last_error"></div>
                                </template>
                                <template x-if="torHealthData.tor_split_mode_enabled && torHealthData.tor_lnd_breaker_last_error">
                                    <div class="text-[11px] text-gray-500 font-mono break-words"
                                         x-text="'LND-pool last error: ' + torHealthData.tor_lnd_breaker_last_error"></div>
                                </template>
                            </div>

                            <!-- Watchdog -->
                            <div class="bg-navy-800 rounded p-3 space-y-1">
                                <h3 class="text-[11px] uppercase tracking-wider text-gray-500">Watchdog</h3>
                                <div class="flex items-center justify-between">
                                    <span class="text-gray-400">Status</span>
                                    <span class="font-mono"
                                          :class="torHealthData.watchdog_alive ? 'text-neon-green' : 'text-neon-pink'"
                                          x-text="torHealthData.watchdog_alive ? 'alive' : 'unhealthy'"></span>
                                </div>
                                <div class="flex items-center justify-between">
                                    <span class="text-gray-400">Last tick</span>
                                    <span class="font-mono text-white"
                                          x-text="torHealthAgeText(torHealthData.watchdog_last_tick_age_s)"></span>
                                </div>
                                <div class="flex items-center justify-between">
                                    <span class="text-gray-400">Last NEWNYM</span>
                                    <span class="font-mono text-white"
                                          x-text="torHealthAgeText(torHealthData.watchdog_last_newnym_age_s)"></span>
                                </div>
                            </div>

                            <!-- Circuits + guards -->
                            <div class="bg-navy-800 rounded p-3 space-y-1">
                                <h3 class="text-[11px] uppercase tracking-wider text-gray-500">Circuits + guards</h3>
                                <div class="flex items-center justify-between">
                                    <span class="text-gray-400">Active circuits</span>
                                    <span class="font-mono text-white"
                                          x-text="torHealthData.active_circuits"></span>
                                </div>
                                <div class="flex items-center justify-between">
                                    <span class="text-gray-400">Entry guards</span>
                                    <span class="font-mono text-white"
                                          x-text="torHealthData.guards_up + ' up / ' + torHealthData.guards_total + ' total'"></span>
                                </div>
                                <template x-if="torHealthData.guards.length > 0">
                                    <ul class="mt-2 space-y-0.5">
                                        <template x-for="g in torHealthData.guards"
                                                  x-bind:key="g.fingerprint">
                                            <li class="flex items-center justify-between text-[11px] font-mono">
                                                <span class="text-gray-500 truncate"
                                                      x-text="g.nickname || g.fingerprint.slice(0, 16)"></span>
                                                <span :class="g.status === 'up' ? 'text-neon-green' : 'text-neon-pink'"
                                                      x-text="g.status"></span>
                                            </li>
                                        </template>
                                    </ul>
                                </template>
                            </div>

                            <!- Per-listener probe -->
                            <template x-if="torHealthData.listeners && torHealthData.listeners.length > 0">
                                <div class="bg-navy-800 rounded p-3 space-y-1">
                                    <h3 class="text-[11px] uppercase tracking-wider text-gray-500">SOCKS listeners</h3>
                                    <ul class="space-y-0.5">
                                        <template x-for="l in torHealthData.listeners"
                                                  x-bind:key="l.name">
                                            <li class="flex items-center justify-between text-[11px] font-mono">
                                                <span class="text-gray-400"
                                                      x-text="l.name + ' (' + l.port + ')'"></span>
                                                <span :class="torHealthListenerClass(l.ok)"
                                                      x-text="torHealthListenerLabel(l)"></span>
                                            </li>
                                        </template>
                                    </ul>
                                </div>
                            </template>

                            <!-- Event stream -->
                            <div class="bg-navy-800 rounded p-3 space-y-1">
                                <h3 class="text-[11px] uppercase tracking-wider text-gray-500">Event stream</h3>
                                <div class="flex items-center justify-between">
                                    <span class="text-gray-400">Status</span>
                                    <span class="font-mono"
                                          :class="torHealthData.event_stream_connected ? 'text-neon-green' : 'text-gray-500'"
                                          x-text="torHealthData.event_stream_connected ? 'connected' : 'disconnected'"></span>
                                </div>
                                <div class="flex items-center justify-between">
                                    <span class="text-gray-400">CIRC failed</span>
                                    <span class="font-mono text-white"
                                          x-text="torHealthData.event_stream_circ_failed"></span>
                                </div>
                                <div class="flex items-center justify-between">
                                    <span class="text-gray-400">HS_DESC failed</span>
                                    <span class="font-mono text-white"
                                          x-text="torHealthData.event_stream_hs_desc_failed"></span>
                                </div>
                                <div class="flex items-center justify-between">
                                    <span class="text-gray-400">GUARD down</span>
                                    <span class="font-mono text-white"
                                          x-text="torHealthData.event_stream_guard_down"></span>
                                </div>
                            </div>

                            <!- LND HS descriptor freshness -->
                            <template x-if="torHealthData.lnd_hs_descriptor_checked">
                                <div class="bg-navy-800 rounded p-3 space-y-1">
                                    <h3 class="text-[11px] uppercase tracking-wider text-gray-500">LND HS descriptor</h3>
                                    <div class="flex items-center justify-between">
                                        <span class="text-gray-400">Status</span>
                                        <span class="font-mono"
                                              :class="torHealthData.lnd_hs_descriptor_ok ? 'text-neon-green' : 'text-neon-pink'"
                                              x-text="torHealthData.lnd_hs_descriptor_ok ? 'fresh' : ('stale (' + torHealthData.lnd_hs_descriptor_consecutive_failures + ' fails)')"></span>
                                    </div>
                                    <div class="flex items-center justify-between">
                                        <span class="text-gray-400">Last fetch</span>
                                        <span class="font-mono text-white"
                                              x-text="torHealthAgeText(torHealthData.lnd_hs_descriptor_last_fetch_attempt_age_s)"></span>
                                    </div>
                                    <template x-if="torHealthData.lnd_hs_descriptor_last_error">
                                        <div class="text-[11px] text-gray-500 font-mono break-words"
                                             x-text="'Error: ' + torHealthData.lnd_hs_descriptor_last_error"></div>
                                    </template>
                                </div>
                            </template>

                            <!-- LND Tor supervisor (stale-HS-descriptor auto-recovery) -->
                            <template x-if="torHealthData.lnd_tor_supervisor_checked">
                                <div class="bg-navy-800 rounded p-3 space-y-1">
                                    <h3 class="text-[11px] uppercase tracking-wider text-gray-500">LND Tor recovery</h3>
                                    <div class="flex items-center justify-between">
                                        <span class="text-gray-400">Supervisor</span>
                                        <span class="font-mono"
                                              :class="torHealthData.lnd_tor_supervisor_alive ? 'text-neon-green' : 'text-neon-pink'"
                                              x-text="torHealthData.lnd_tor_supervisor_alive ? 'alive' : 'stalled'"></span>
                                    </div>
                                    <!-- Incident in flight -->
                                    <template x-if="torHealthData.lnd_tor_supervisor_incident_active">
                                        <div class="flex items-center justify-between">
                                            <span class="text-gray-400">Incident</span>
                                            <span class="font-mono text-neon-yellow"
                                                  x-text="'active (step ' + torHealthData.lnd_tor_supervisor_current_step + ')'"></span>
                                        </div>
                                    </template>
                                    <!-- Cycle counters -->
                                    <div class="flex items-center justify-between">
                                        <span class="text-gray-400">Cycles</span>
                                        <span class="font-mono text-white"
                                              x-text="torHealthData.lnd_tor_supervisor_cycles_24h + ' / 24h (' + torHealthData.lnd_tor_supervisor_cycles_total + ' total)'"></span>
                                    </div>
                                    <!-- Last cycle outcome -->
                                    <template x-if="torHealthData.lnd_tor_supervisor_last_step_label">
                                        <div class="flex items-center justify-between">
                                            <span class="text-gray-400">Last cleared by</span>
                                            <span class="font-mono text-neon-green"
                                                  x-text="torHealthData.lnd_tor_supervisor_last_step_label"></span>
                                        </div>
                                    </template>
                                    <!-- Disabled-by-cap (4+ cycles in 24h) -->
                                    <template x-if="torHealthData.lnd_tor_supervisor_cycles_disabled_until_age_s">
                                        <div class="text-[11px] text-neon-pink font-mono">
                                            Auto-recovery disabled — issue likely outside this wallet.
                                            <span class="text-gray-500"
                                                  x-text="'Re-enables in ' + torHealthAgeText(torHealthData.lnd_tor_supervisor_cycles_disabled_until_age_s) + '.'"></span>
                                        </div>
                                    </template>
                                </div>
                            </template>

                            <!-- Data dir -->
                            <template x-if="torHealthData.data_dir_used_mb !== null">
                                <div class="bg-navy-800 rounded p-3 space-y-1">
                                    <h3 class="text-[11px] uppercase tracking-wider text-gray-500">DataDirectory</h3>
                                    <div class="flex items-center justify-between">
                                        <span class="text-gray-400">Used</span>
                                        <span class="font-mono text-white"
                                              x-text="torHealthData.data_dir_used_mb + ' MB'"></span>
                                    </div>
                                </div>
                            </template>
                            </div>
                        </div>
                    </template>

                    <div class="flex items-center justify-end gap-2 pt-2 border-t border-navy-700">
                        <!- — graceful SIGHUP reload. Confirmation
                             happens in torHealthReload() since the
                             @alpinejs/csp build can't call window.confirm
                             from an inline expression. -->
                        <button type="button"
                                @click="torHealthReload()"
                                :disabled="torHealthLoading || torHealthReloading"
                                class="px-3 py-1.5 rounded text-xs font-medium bg-navy-800 border border-navy-700 text-gray-300 hover:bg-navy-700 hover:text-white">
                            Reload torrc
                        </button>
                        <button type="button"
                                @click="torHealthRefresh()"
                                :disabled="torHealthLoading"
                                class="px-3 py-1.5 rounded text-xs font-medium bg-navy-800 border border-navy-700 text-gray-300 hover:bg-navy-700 hover:text-white">
                            Refresh
                        </button>
                    </div>
                    <template x-if="torHealthReloadStatus">
                        <p class="text-[11px] text-gray-400 pt-1 text-right"
                           x-text="torHealthReloadStatus"></p>
                    </template>
                </div>
            </div>
        </div>
    </template>
</div>
{% endblock %}

{% block scripts %}
<!-- CSP-safe runtime config injection. JSON-only; no script execution.
     Read by dashboard.js init() via document.getElementById(). -->
<script id="dashboard-config" type="application/json" nonce="{{ csp_nonce }}">
{"mempool_public_url": {{ mempool_public_url | tojson }},
 "braiins_deposit_enabled": {{ braiins_deposit_enabled | tojson }},
 "anonymize_enabled": {{ anonymize_enabled | tojson }},
 "tip_lightning_address": {{ tip_lightning_address | tojson }}}
</script>
<script nonce="{{ csp_nonce }}" src="/dashboard/static/dashboard.js"></script>
<!-- Pointer-safe Lucide icon renderer -->
<script nonce="{{ csp_nonce }}">
    // lucide.createIcons() REPLACES each `<i data-lucide>` placeholder with a
    // fresh <svg>. Two constraints shaped this:
    //  (1) Action buttons wrap their icon (`<button><i data-lucide></i></button>`),
    //      so swapping it between a button's mousedown and mouseup drops the
    //      click ("first click does nothing, second works"). So never render
    //      while a pointer is pressed.
    //  (2) A MutationObserver re-rendering on every DOM change fought Alpine —
    //      which re-inserts `<i data-lucide>` placeholders on reactive updates
    //      (polls/countdowns) — so every update triggered a full createIcons(),
    //      stacking "[Violation] rAF handler took …ms" warnings. So render on
    //      explicit triggers (dashboard.js initIcons(), fired when dialogs/tabs
    //      change) plus a throttled backstop poll — NOT per mutation.
    (function () {
        var pointerDown = false;
        document.addEventListener('pointerdown', function () { pointerDown = true; }, true);
        function release() { pointerDown = false; }
        document.addEventListener('pointerup', release, true);
        document.addEventListener('pointercancel', release, true);
        // If a press is abandoned without pointerup/cancel (window blur mid-hold),
        // don't let the flag stick and freeze rendering.
        window.addEventListener('blur', release);

        function render() {
            if (pointerDown) return;            // don't swap icon nodes mid-click
            if (window.lucide) window.lucide.createIcons();
        }
        window.renderIcons = render;            // explicit app-side triggers route here

        // Initial paint: alpine:initialized (after Alpine inserts its first
        // x-if/x-show content), with DOMContentLoaded / immediate as a fallback
        // so the static chrome still renders even if Alpine is slow or absent.
        document.addEventListener('alpine:initialized', render);
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', render);
        } else {
            render();
        }
        // Throttled backstop for any Alpine-inserted icons not covered by an
        // explicit initIcons() call. Pointer-guarded, so it can't cancel a click.
        setInterval(render, 1000);
    })();
</script>
{% endblock %}
