                                <button @click="rebalanceClearDest()" class="text-gray-500 hover:text-neon-cyan flex items-center gap-1 shrink-0">
                                    <i data-lucide="chevron-left" class="w-3 h-3"></i> change
                                </button>
                            </div>
                            <div class="flex justify-between items-center mt-1 text-[11px]">
                                <span class="text-neon-yellow">Local: <span class="font-mono" x-text="formatSats(rebalance.dest.local_balance || 0)"></span></span>
                                <span class="text-gray-500">After: <span class="font-mono text-gray-300" x-text="formatSats(rebalDstNewLocal) + ' sats'"></span></span>
                                <span class="text-gray-500">Inbound headroom:
                                    <span class="font-mono text-gray-300" x-text="formatSats(rebalanceMaxReceivable(rebalance.dest))"></span>
                                </span>
                            </div>
                        </div>

                        <!-- Inputs -->
                        <div class="grid grid-cols-2 gap-3 mb-3">
                            <div>
                                <label class="text-[11px] text-gray-500 block mb-1">Amount (sats)</label>
                                <div class="flex gap-1">
                                    <input type="number" x-model.number="rebalanceAmountSats" min="1"
                                           class="flex-1 bg-navy-800 border border-navy-700 rounded px-2 py-1.5 text-xs font-mono text-gray-200 focus:outline-none focus:border-neon-cyan"
                                           :class="rebalArrowOk ? '' : 'border-red-500/50'">
                                    <button type="button" @click="rebalanceSetMax()"
                                            class="px-2 py-1 rounded text-[11px] bg-neon-cyan/10 border border-neon-cyan/20 text-neon-cyan hover:bg-neon-cyan/20">Max</button>
                                </div>
                            </div>
                            <div>
                                <div class="flex items-center justify-between mb-1">
                                    <label class="text-[11px] text-gray-500"
                                           x-text="rebalance.feeLimitMode === 'percent' ? 'Max fee (% of amount)' : 'Max fee (sats)'"></label>
                                    <!-- Segmented unit toggle (% first, then sats) -->
                                    <div class="inline-flex rounded border border-navy-700 overflow-hidden text-[10px]">
                                        <button type="button"
                                                @click="rebalanceSetFeeMode('percent')"
                                                :class="rebalance.feeLimitMode === 'percent' ? 'bg-neon-cyan/15 text-neon-cyan' : 'bg-navy-800 text-gray-500 hover:text-gray-300'"
                                                class="px-1.5 py-0.5 font-mono">%</button>
                                        <button type="button"
                                                @click="rebalanceSetFeeMode('sats')"
                                                :class="rebalance.feeLimitMode === 'sats' ? 'bg-neon-cyan/15 text-neon-cyan' : 'bg-navy-800 text-gray-500 hover:text-gray-300'"
                                                class="px-1.5 py-0.5 font-mono border-l border-navy-700">sats</button>
                                    </div>
                                </div>
                                <template x-if="rebalance.feeLimitMode === 'sats'">
                                    <input type="number" x-model.number="rebalanceFeeLimitSats" min="0"
                                           class="w-full bg-navy-800 border border-navy-700 rounded px-2 py-1.5 text-xs font-mono text-gray-200 focus:outline-none focus:border-neon-cyan">
                                </template>
                                <template x-if="rebalance.feeLimitMode === 'percent'">
                                    <div>
                                        <input type="number" x-model.number="rebalanceFeeLimitPercent" min="0" step="0.01"
                                               class="w-full bg-navy-800 border border-navy-700 rounded px-2 py-1.5 text-xs font-mono text-gray-200 focus:outline-none focus:border-neon-cyan">
                                        <!-- Hint: live-resolved sats value. Sits on its own line
                                             so it can render values of any width without crowding
                                             the input or wrapping awkwardly. Driven by a reactive
                                             ``feeLimitApproxSats`` property kept in sync via
                                             $watch (chained-method reactivity is fragile in CSP). -->
                                        <div class="text-[10px] text-gray-500 font-mono mt-0.5">
                                            ≈ <span class="text-gray-300" x-text="formatSats(rebalance.feeLimitApproxSats)"></span> sats max
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>

                        <!-- Quote / live limits -->
                        <div class="bg-navy-900 border border-navy-700 rounded-lg p-3 mb-3 text-[11px] space-y-1">
                            <div class="flex justify-between text-gray-500">
                                <span>Estimated max for this rebalance</span>
                                <span class="font-mono text-gray-300" x-text="formatSats(rebalanceMaxAmount()) + ' sats'"></span>
                            </div>
                            <template x-if="rebalance.quoting">
                                <div class="text-gray-500">Probing route…</div>
                            </template>
                            <template x-if="rebalance.quote && !rebalance.quoting">
                                <div class="space-y-0.5">
                                    <div class="flex justify-between">
                                        <span class="text-gray-500">Route</span>
                                        <span class="text-gray-300">
                                            <span x-text="(rebalance.quote.route && rebalance.quote.route.hops) || 0"></span> hops ·
                                            <span class="text-neon-cyan font-mono" x-text="formatSats((rebalance.quote.route && rebalance.quote.route.total_fees_sat) || 0)"></span> sats fee
                                            <span class="text-gray-500" x-text="'(' + ((rebalance.quote.route && rebalance.quote.route.ppm) || 0) + ' ppm)'"></span>
                                        </span>
                                    </div>
                                </div>
                            </template>
                            <template x-if="rebalance.quoteError && !rebalance.quoting">
                                <div class="text-red-400" x-text="'Quote: ' + rebalance.quoteError"></div>
                            </template>
                            <template x-if="!rebalArrowOk">
                                <div class="text-red-400">
                                    Amount exceeds limit (max
                                    <span class="font-mono" x-text="formatSats(rebalanceMaxAmount())"></span>
                                    sats).
                                </div>
                            </template>
                        </div>

                        <!-- Steps / running state -->
                        <template x-if="rebalance.steps.length > 0">
                            <div class="bg-navy-900 border border-navy-700 rounded-lg p-3 mb-3 space-y-1">
                                <template x-for="s in rebalance.steps" :key="s.label">
                                    <div class="flex items-center gap-2 text-[11px]">
                                        <span x-show="s.state === 'done'" class="text-neon-green">✓</span>
                                        <span x-show="s.state === 'active'" class="text-neon-cyan animate-pulse">⟳</span>
                                        <span x-show="s.state === 'pending'" class="text-gray-600">·</span>
                                        <span x-show="s.state === 'fail'" class="text-red-400">✗</span>
                                        <span :class="s.state === 'done' ? 'text-gray-300' : (s.state === 'fail' ? 'text-red-400' : 'text-gray-500')" x-text="s.label"></span>
                                    </div>
                                </template>
                            </div>
                        </template>

                        <template x-if="rebalance.error">
                            <div class="bg-red-500/10 border border-red-500/30 rounded-lg p-2.5 mb-3 text-[11px] text-red-400" x-text="rebalance.error"></div>
                        </template>

                        <template x-if="rebalance.result">
                            <div class="bg-neon-green/10 border border-neon-green/30 rounded-lg p-2.5 mb-3 text-[11px] text-neon-green">
                                ✓ Rebalanced
                                <span class="font-mono" x-text="formatSats((rebalance.result.result && rebalance.result.result.amount_sats) || 0)"></span>
                                sats — fee
                                <span class="font-mono" x-text="formatSats((rebalance.result.result && rebalance.result.result.fee_sats) || 0)"></span>
                                sats over
                                <span x-text="(rebalance.result.result && rebalance.result.result.hops) || 0"></span> hops
                            </div>
                        </template>

                        <!-- Actions -->
                        <div class="flex items-center justify-between gap-2">
                            <button @click="closeRebalance()"
                                    class="px-3 py-1.5 rounded text-xs text-gray-400 hover:text-gray-200 hover:bg-navy-700 transition-colors">Cancel</button>
                            <button @click="executeRebalance()"
                                    :disabled="rebalance.running || !rebalArrowOk || !rebalance.dest"
                                    class="px-4 py-1.5 rounded text-xs font-medium bg-neon-cyan/15 border border-neon-cyan/40 text-neon-cyan hover:bg-neon-cyan/25 hover:border-neon-cyan disabled:opacity-40 disabled:cursor-not-allowed transition-all flex items-center gap-1.5">
                                <span :class="rebalance.running ? 'animate-spin inline-flex' : 'inline-flex'">
                                    <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i>
                                </span>
                                <span x-text="rebalance.running ? 'Rebalancing…' : 'Rebalance'"></span>
                            </button>
                        </div>

                        <!-- Recent history -->
                        <template x-if="rebalance.recent && rebalance.recent.length > 0">
                            <div class="mt-4 pt-3 border-t border-navy-700">
                                <h4 class="text-[10px] uppercase tracking-wider text-gray-500 mb-2">Recent rebalances</h4>
                                <div class="space-y-1">
                                    <template x-for="(rb, i) in rebalance.recent" :key="i">
                                        <div class="flex items-center justify-between text-[11px] py-1 border-b border-navy-800 last:border-0">
                                            <div class="flex items-center gap-1.5 min-w-0">
                                                <span class="text-gray-300 truncate" x-text="(rb.source_alias || '?') + ' → ' + (rb.dest_alias || '?')"></span>
                                            </div>
                                            <div class="text-gray-500 shrink-0 ml-2">
                                                <span class="font-mono text-gray-300" x-text="formatSats(rb.amount_sats || 0)"></span> sats
                                                <span class="text-gray-600">·</span>
                                                <span class="font-mono" x-text="(rb.fee_sats || 0) + ' fee'"></span>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>
            </div>
        </div>
    </template>

    <!-- FUND WALLET DIALOG -->
    <template x-if="showFundWallet">
        <div class="fixed inset-0 z-50 flex items-center justify-center">
            <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="showFundWallet = false"></div>
            <div class="relative w-full max-w-md mx-4 bg-gradient-to-br from-navy-800 to-navy-900 border border-orange-500/30 rounded-xl p-6 shadow-2xl shadow-black/40">
                <!-- Header -->
                <div class="flex items-center justify-between mb-5">
                    <div class="flex items-center gap-2">
                        <i data-lucide="download" class="w-5 h-5 text-orange-400"></i>
                        <h2 class="text-lg font-semibold text-white">Fund Wallet</h2>
                    </div>
                    <button @click="showFundWallet = false" class="p-1.5 text-gray-500 hover:text-gray-300 hover:bg-navy-700 rounded-lg transition-colors">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>
                <p class="text-xs text-gray-500 -mt-3 mb-5">Generate a fresh on-chain address to receive bitcoin.</p>

                <!-- Suggested amount from the onboarding wizard (informational;
                     also encoded into the BIP21 QR so the sending wallet
                     pre-fills it). Absent on plain opens. Only shown once an
                     address (and its QR) exists — the copy refers to the
                     generated QR, and "New Address" clears fundAddress so this
                     hides again until the next QR appears. -->
                <template x-if="fundSuggestedSats && fundAddress">
                    <div class="flex items-start gap-2 p-3 mb-5 rounded-lg bg-neon-green/10 border border-neon-green/20">
                        <i data-lucide="lightbulb" class="w-4 h-4 text-neon-green shrink-0 mt-0.5"></i>
                        <div class="flex-1 min-w-0">
                            <p class="text-xs text-gray-200 leading-relaxed">
                                Suggested deposit:
                                <span class="font-mono text-neon-green" x-text="formatSats(fundSuggestedSats) + ' sats'"></span>.
                                The QR includes this amount so your sending wallet can pre-fill it.
                            </p>
                            <button @click="fundCopyAmount()"
                                class="mt-2 inline-flex items-center gap-1.5 text-[11px] transition-colors"
                                :class="fundAmountCopied ? 'text-neon-green' : 'text-gray-400 hover:text-neon-green'">
                                <template x-if="fundAmountCopied">
                                    <span class="inline-flex items-center gap-1.5"><i data-lucide="check" class="w-3.5 h-3.5"></i> Amount copied</span>
                                </template>
                                <template x-if="!fundAmountCopied">
                                    <span class="inline-flex items-center gap-1.5"><i data-lucide="copy" class="w-3.5 h-3.5"></i> Copy amount (sats)</span>
                                </template>
                            </button>
                        </div>
                    </div>
                </template>

                <!-- Step 1: Address type selection + Generate -->
                <div x-show="!fundAddress" class="space-y-4">
                    <div>
                        <label class="text-xs text-gray-500 uppercase tracking-wide mb-2 block">Address Type</label>
                        <div class="grid grid-cols-3 gap-2">
                            <template x-for="t in [{id:'p2wkh',label:'Native SegWit',desc:'Widely compatible'},{id:'p2tr',label:'Taproot',desc:'Low fees, best privacy'},{id:'np2wkh',label:'Nested SegWit',desc:'Legacy compatibility'}]" :key="t.id">
                                <button @click="fundAddrType = t.id" class="px-3 py-2.5 rounded-lg border text-left transition-all"
                                    :class="fundAddrType === t.id ? 'border-orange-500/50 bg-orange-500/10 text-white' : 'border-navy-600 bg-navy-800/50 text-gray-400 hover:border-navy-500 hover:text-gray-300'">
                                    <span class="text-sm font-medium block" x-text="t.label"></span>
                                    <span class="text-[10px] text-gray-500 block mt-0.5" x-text="t.desc"></span>
                                </button>
                            </template>
                        </div>
                        <p class="text-[11px] text-gray-500 mt-2">
                            <i data-lucide="info" class="w-3 h-3 inline-block align-[-1px] text-orange-400/80"></i>
                            Use Native SegWit for Ocean addresses.
                        </p>
                    </div>

                    <!-- Optional purpose: seeds the auto:receive label
                         that will appear next to the resulting UTXO in
                         the on-chain UTXOs tab once the funds land. -->
                    <div>
                        <label class="text-xs text-gray-500 uppercase tracking-wide mb-1.5 block">
                            Purpose <span class="text-gray-600">(optional, for your records)</span>
                        </label>
                        <input type="text" maxlength="80" x-model="fundPurpose"
                            placeholder="e.g. Ocean payout, Cold storage refill"
                            class="w-full px-3 py-2 rounded-lg bg-navy-900 border border-navy-600 text-white text-sm placeholder-gray-600 focus:border-orange-500/50 focus:ring-1 focus:ring-orange-500/20 focus:outline-none transition-colors">
                    </div>

                    <button @click="generateAddress()" :disabled="fundLoading"
                        class="w-full flex items-center justify-center gap-2 px-4 py-3 rounded-lg bg-orange-500/15 border border-orange-500/30 text-orange-400 font-medium hover:bg-orange-500/25 hover:border-orange-500/50 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                        <template x-if="fundLoading">
                            <span class="flex items-center gap-2"><span class="w-4 h-4 border-2 border-orange-400 border-t-transparent rounded-full animate-spin"></span> Generating...</span>
                        </template>
                        <template x-if="!fundLoading">
                            <span class="flex items-center gap-2"><i data-lucide="download" class="w-4 h-4"></i> Generate Address</span>
                        </template>
                    </button>

                    <template x-if="fundError">
                        <div class="flex items-center gap-2 p-3 rounded-lg bg-neon-pink/10 border border-neon-pink/20">
                            <i data-lucide="alert-circle" class="w-4 h-4 text-neon-pink shrink-0"></i>
                            <p class="text-xs text-neon-pink" x-text="fundError"></p>
                        </div>
                    </template>
                </div>

                <!-- Step 2: Generated address display -->
                <template x-if="fundAddress">
                    <div class="space-y-4">
                        <!-- QR Code -->
                        <div class="flex justify-center">
                            <div class="bg-white rounded-2xl p-4 shadow-lg shadow-black/20">
                                <canvas x-ref="fundQr" class="max-w-[200px]"></canvas>
                            </div>
                        </div>

                        <!-- Address type badge -->
                        <div class="flex justify-center">
                            <span class="text-[10px] uppercase tracking-wider text-gray-500 bg-navy-800 border border-navy-700 px-2.5 py-1 rounded-full"
                                x-text="({p2tr:'Taproot',p2wkh:'Native SegWit',np2wkh:'Nested SegWit'})[fundAddrType] + ' Address'"></span>
                        </div>

                        <!-- Address text + click to copy -->
                        <div @click="fundCopyAddress()" class="group cursor-pointer bg-navy-900 border border-navy-700 rounded-xl p-4 hover:border-orange-500/30 transition-all">
                            <p class="font-mono text-sm text-gray-300 text-center break-all leading-relaxed select-all group-hover:text-white transition-colors" x-text="fundAddress"></p>
                            <div class="flex items-center justify-center gap-1.5 mt-3">
                                <template x-if="fundCopied">
                                    <span class="flex items-center gap-1.5"><i data-lucide="check" class="w-3.5 h-3.5 text-neon-green"></i><span class="text-xs text-neon-green font-medium">Copied!</span></span>
                                </template>
                                <template x-if="!fundCopied">
                                    <span class="flex items-center gap-1.5"><i data-lucide="copy" class="w-3.5 h-3.5 text-gray-500 group-hover:text-orange-400 transition-colors"></i><span class="text-xs text-gray-500 group-hover:text-orange-400 transition-colors">Click to copy</span></span>
                                </template>
                            </div>
                        </div>

                        <!-- Action buttons -->
                        <div class="flex gap-2">
                            <button @click="resetFundAddress()"
                                class="flex-1 flex items-center justify-center gap-2 px-3 py-2.5 rounded-lg bg-navy-700 border border-navy-600 text-gray-300 hover:border-orange-500/30 hover:text-orange-400 transition-all text-sm">
                                <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i> New Address
                            </button>
                            <button @click="fundCopyAddress()"
                                class="flex-1 flex items-center justify-center gap-2 px-3 py-2.5 rounded-lg text-sm transition-all"
                                :class="fundCopied ? 'bg-neon-green/15 border border-neon-green/30 text-neon-green' : 'bg-orange-500/15 border border-orange-500/30 text-orange-400 hover:bg-orange-500/25'">
                                <template x-if="fundCopied"><span class="flex items-center gap-2"><i data-lucide="check" class="w-3.5 h-3.5"></i> Copied</span></template>
                                <template x-if="!fundCopied"><span class="flex items-center gap-2"><i data-lucide="copy" class="w-3.5 h-3.5"></i> Copy Address</span></template>
                            </button>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </template>

    <!-- TIP THE DEVELOPER DIALOG -->
    <!-- Small amount picker. Hands off to the standard LNURL flow so
         all the usual fee limits, audit logging, and dashboard cap
         enforcement apply unchanged. -->
    <template x-if="showTipDialog">
        <div class="fixed inset-0 z-50 flex items-center justify-center">
            <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="closeTipDialog()"></div>
            <div class="relative w-full max-w-sm mx-4 bg-gradient-to-br from-navy-800 to-navy-900 border border-neon-yellow/30 rounded-xl p-6 shadow-2xl shadow-black/40">
                <div class="flex items-center justify-between mb-1">
                    <div class="flex items-center gap-2">
                        <i data-lucide="coffee" class="w-5 h-5 text-neon-yellow"></i>
                        <h2 class="text-lg font-semibold text-white">Tip the developer</h2>
                    </div>
                    <button @click="closeTipDialog()" class="p-1.5 text-gray-500 hover:text-gray-300 hover:bg-navy-700 rounded-lg transition-colors">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>
                <p class="text-xs text-gray-500 mb-4">
                    Send a Lightning tip to
                    <span class="font-mono text-gray-300" x-text="tipAddress"></span>.
                </p>

                <!-- Amount presets -->
                <div>
                    <label class="text-xs text-gray-500 uppercase tracking-wide mb-2 block">Amount</label>
                    <div class="grid grid-cols-4 gap-2 mb-3">
                        <template x-for="p in tipPresets" :key="p">
                            <button type="button" @click="tipSelectPreset(p)"
                                    :class="tipPresetActive(p)
                                        ? 'bg-neon-yellow/15 border-neon-yellow/50 text-neon-yellow'
                                        : 'bg-navy-800 border-navy-700 text-gray-300 hover:border-neon-yellow/40 hover:text-neon-yellow'"
                                    class="py-2 rounded-lg border text-xs font-mono transition-colors"
                                    x-text="formatSats(p)"></button>
                        </template>
                    </div>
                    <div class="relative">
                        <input type="number" x-model="tipAmountStr" min="1"
                               class="no-spinner w-full pl-3 pr-12 py-2.5 rounded-lg text-sm font-mono bg-navy-900 border border-navy-700 text-gray-300 placeholder-gray-600 focus:outline-none focus:border-neon-yellow/40 focus:ring-1 focus:ring-neon-yellow/20 transition-all" />
                        <span class="pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-xs text-gray-600">sats</span>
                    </div>
                </div>

                <!-- Optional comment -->
                <div class="mt-4">
                    <label class="text-xs text-gray-500 uppercase tracking-wide mb-1.5 block">
                        Comment <span class="normal-case text-gray-600">(optional)</span>
                    </label>
                    <input type="text" x-model="tipComment" maxlength="200"
                           placeholder="Say something nice (or don't)"
                           class="w-full px-3 py-2 rounded-lg text-sm bg-navy-900 border border-navy-700 text-gray-300 placeholder-gray-600 focus:outline-none focus:border-neon-yellow/40 focus:ring-1 focus:ring-neon-yellow/20 transition-all" />
                </div>

                <p class="text-[10px] text-gray-600 mt-3 leading-relaxed">
                    The next screen confirms the recipient and lets you set a fee limit before sending.
                </p>

                <div class="flex gap-2 mt-5">
                    <button @click="closeTipDialog()"
                            class="flex-1 px-4 py-2.5 rounded-lg bg-navy-700 border border-navy-600 text-gray-300 hover:border-navy-500 hover:text-gray-200 transition-all text-sm">
                        Cancel
                    </button>
                    <button @click="continueToTipPayment()"
                            :disabled="!tipCanContinue()"
                            class="flex-1 flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg bg-gradient-to-r from-neon-yellow/20 to-neon-yellow/10 border border-neon-yellow/40 text-neon-yellow hover:from-neon-yellow/30 hover:to-neon-yellow/15 transition-all text-sm font-medium disabled:opacity-40 disabled:cursor-not-allowed">
                        <i data-lucide="zap" class="w-4 h-4"></i>
                        Continue
                    </button>
                </div>
            </div>
        </div>
    </template>

    <!-- SEND PAYMENT DIALOG -->
    <template x-if="showSendPayment">
        <div class="fixed inset-0 z-50 flex items-center justify-center">
            <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="closeSendPayment()"></div>
            <div class="relative w-full max-w-md mx-4 bg-gradient-to-br from-navy-800 to-navy-900 border border-neon-cyan/30 rounded-xl p-6 shadow-2xl shadow-black/40">
                <!-- Header -->
                <div class="flex items-center justify-between mb-1">
                    <div class="flex items-center gap-2">
                        <i data-lucide="send" class="w-5 h-5 text-neon-cyan"></i>
                        <h2 class="text-lg font-semibold text-white">Send Payment</h2>
                    </div>
                    <button @click="closeSendPayment()" class="p-1.5 text-gray-500 hover:text-gray-300 hover:bg-navy-700 rounded-lg transition-colors">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>
                <p class="text-xs text-gray-500 mb-5">Pay a Lightning invoice, LNURL, or Lightning address.</p>

                <!-- Payment Result -->
                <template x-if="payResult">
                    <div class="space-y-4">
                        <template x-if="payResult.success">
                            <div class="text-center space-y-3">
                                <div class="w-14 h-14 mx-auto rounded-full bg-neon-green/15 border border-neon-green/30 flex items-center justify-center">
                                    <i data-lucide="check-circle-2" class="w-7 h-7 text-neon-green"></i>
                                </div>
                                <div>
                                    <p class="text-lg font-semibold text-white">Payment Sent</p>
                                    <template x-if="decodedInvoice">
                                        <p class="text-sm text-gray-400 mt-1" x-text="formatSats(decodedInvoice.num_satoshis) + ' sats'"></p>
                                    </template>
                                </div>
                                <template x-if="payResult.fees !== undefined || payResult.hops !== undefined">
                                    <div class="flex justify-center gap-4 text-xs text-gray-500">
                                        <template x-if="payResult.fees !== undefined">
                                            <span>Fee: <span class="text-gray-300" x-text="payResult.fees + ' sats'"></span></span>
                                        </template>
                                        <template x-if="payResult.hops !== undefined">
                                            <span>Hops: <span class="text-gray-300" x-text="payResult.hops"></span></span>
                                        </template>
                                    </div>
                                </template>
                                <template x-if="payResult.hash">
                                    <div class="bg-navy-900 border border-navy-700 rounded-lg p-3">
                                        <p class="text-[10px] text-gray-500 uppercase tracking-wide mb-1">Payment Hash</p>
                                        <div class="flex items-center gap-2">
                                            <p class="font-mono text-[11px] text-gray-400 truncate flex-1" x-text="payResult.hash"></p>
                                            <button @click="copyText(payResult.hash)" class="text-gray-500 hover:text-neon-cyan shrink-0"><i data-lucide="copy" class="w-3 h-3"></i></button>
                                        </div>
                                    </div>
                                </template>
                                <!-- LNURL success_action display. URLs are
                                     intentionally rendered as plain text
                                     (never anchors) to avoid acting as a
                                     phishing surface. AES variants show
                                     a placeholder. -->
                                <template x-if="lnurlSuccessAction && lnurlSuccessAction.tag === 'message'">
                                    <div class="bg-neon-cyan/5 border border-neon-cyan/20 rounded-lg p-3">
                                        <p class="text-[10px] text-neon-cyan uppercase tracking-wide mb-1">Recipient Message</p>
                                        <p class="text-xs text-gray-300 break-words" x-text="lnurlSuccessAction.message"></p>
                                    </div>
                                </template>
                                <template x-if="lnurlSuccessAction && lnurlSuccessAction.tag === 'url'">
                                    <div class="bg-neon-cyan/5 border border-neon-cyan/20 rounded-lg p-3 space-y-2 text-left">
                                        <p class="text-[10px] text-neon-cyan uppercase tracking-wide">Recipient Receipt</p>
                                        <template x-if="lnurlSuccessAction.description">
                                            <p class="text-xs text-gray-300 break-words" x-text="lnurlSuccessAction.description"></p>
                                        </template>
                                        <div class="flex items-center gap-2">
                                            <p class="font-mono text-[11px] text-gray-400 truncate flex-1" x-text="lnurlSuccessAction.url"></p>
                                            <button @click="copyText(lnurlSuccessAction.url)" class="text-gray-500 hover:text-neon-cyan shrink-0" title="Copy URL"><i data-lucide="copy" class="w-3 h-3"></i></button>
                                        </div>
                                        <p class="text-[10px] text-gray-600">URL shown as text only — copy to open in your browser.</p>
                                    </div>
                                </template>
                                <template x-if="lnurlSuccessAction && lnurlSuccessAction.tag === 'aes'">
                                    <div class="bg-navy-900 border border-navy-700 rounded-lg p-3">
                                        <p class="text-xs text-gray-500">Encrypted receipt — not displayed.</p>
                                    </div>
                                </template>
                            </div>
                        </template>
                        <template x-if="!payResult.success">
                            <div class="text-center space-y-3">
                                <div class="w-14 h-14 mx-auto rounded-full bg-neon-pink/15 border border-neon-pink/30 flex items-center justify-center">
                                    <i data-lucide="alert-circle" class="w-7 h-7 text-neon-pink"></i>
                                </div>
                                <div>
                                    <p class="text-lg font-semibold text-white">Payment Failed</p>
                                    <p class="text-sm text-gray-400 mt-1" x-text="payResult.error"></p>
                                </div>
                            </div>
                        </template>
                        <div class="flex gap-2 pt-2">
                            <button @click="resetSendPayment()"
                                class="flex-1 flex items-center justify-center gap-2 px-3 py-2.5 rounded-lg bg-navy-700 border border-navy-600 text-gray-300 hover:border-neon-cyan/30 hover:text-neon-cyan transition-all text-sm">
                                <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i> New Payment
                            </button>
                            <button @click="closeSendPayment()"
                                class="flex-1 flex items-center justify-center gap-2 px-3 py-2.5 rounded-lg bg-neon-cyan/15 border border-neon-cyan/30 text-neon-cyan hover:bg-neon-cyan/25 transition-all text-sm">
                                Done
                            </button>
                        </div>
                    </div>
                </template>

                <!-- Step 1: Invoice input -->
                <div x-show="!decodedInvoice && !payResult && lnurlState !== 'resolved' && lnurlState !== 'requesting'" class="space-y-4">
                    <div>
                        <div class="flex items-center justify-between mb-2">
                            <label class="text-xs text-gray-500 uppercase tracking-wide">Invoice or Address</label>
                            <button @click="pasteInvoice()" class="flex items-center gap-1 text-[11px] text-neon-cyan hover:text-neon-cyan/80 transition-colors">
                                <i data-lucide="copy" class="w-3 h-3"></i> Paste
                            </button>
                        </div>
                        <textarea x-model="payInvoice" @input="clearPayInvoiceState()" rows="4"
                            placeholder="lnbc... / LNURL... / user@wallet.com"
                            class="w-full h-24 px-3 py-2.5 rounded-lg text-sm font-mono bg-navy-900 border border-navy-700 text-gray-300 placeholder-gray-600 focus:outline-none focus:border-neon-cyan/40 focus:ring-1 focus:ring-neon-cyan/20 resize-none transition-all"
                            spellcheck="false"></textarea>
                    </div>

                    <!-- Input type indicator -->
                    <template x-if="payInvoice.trim()">
                        <div class="flex items-center gap-2">
                            <span class="inline-block w-1.5 h-1.5 rounded-full"
                                :class="payInputType === 'bolt11' ? 'bg-neon-green' : payInputType === 'lnaddr' || payInputType === 'lnurl' ? 'bg-neon-cyan' : 'bg-gray-500'"></span>
                            <span class="text-xs text-gray-500" x-text="payInputType === 'bolt11' ? 'BOLT11 Invoice' : payInputType === 'lnaddr' ? 'Lightning Address' : payInputType === 'lnurl' ? 'LNURL' : 'Unknown format'"></span>
                        </div>
                    </template>

                    <!-- LNURL resolve error -->
                    <template x-if="lnurlError && lnurlState !== 'resolved'">
                        <div class="flex items-center gap-2 p-3 rounded-lg bg-neon-pink/10 border border-neon-pink/20">
                            <i data-lucide="alert-circle" class="w-4 h-4 text-neon-pink shrink-0"></i>
                            <p class="text-xs text-neon-pink" x-text="lnurlError"></p>
                        </div>
                    </template>

                    <!-- Decode error -->
                    <template x-if="payError && !payResult">
                        <div class="flex items-center gap-2 p-3 rounded-lg bg-neon-pink/10 border border-neon-pink/20">
                            <i data-lucide="alert-circle" class="w-4 h-4 text-neon-pink shrink-0"></i>
                            <p class="text-xs text-neon-pink" x-text="payError"></p>
                        </div>
                    </template>

                    <!-- Decode / Resolve button. Routes to LNURL flow for
                         lnaddr / lnurl input, or BOLT11 review otherwise. -->
                    <button @click="(payInputType === 'lnaddr' || payInputType === 'lnurl') ? resolveLnurl() : decodeInvoice()"
                        :disabled="(payInputType !== 'bolt11' && payInputType !== 'lnaddr' && payInputType !== 'lnurl') || payLoading || lnurlState === 'resolving'"
                        class="w-full flex items-center justify-center gap-2 px-4 py-3 rounded-lg bg-neon-cyan/15 border border-neon-cyan/30 text-neon-cyan font-medium hover:bg-neon-cyan/25 hover:border-neon-cyan/50 transition-all disabled:opacity-40 disabled:cursor-not-allowed">
                        <template x-if="payLoading || lnurlState === 'resolving'">
                            <span class="flex items-center gap-2"><span class="w-4 h-4 border-2 border-neon-cyan border-t-transparent rounded-full animate-spin"></span> <span x-text="lnurlState === 'resolving' ? 'Resolving…' : 'Decoding…'"></span></span>
                        </template>
                        <template x-if="!payLoading && lnurlState !== 'resolving'">
                            <span class="flex items-center gap-2"><i data-lucide="zap" class="w-4 h-4"></i> <span x-text="(payInputType === 'lnaddr' || payInputType === 'lnurl') ? 'Continue' : 'Review Invoice'"></span></span>
                        </template>
                    </button>
                </div>

                <!-- Step 1b: LNURL recipient card. Sits between paste and BOLT11 review. -->
                <template x-if="(lnurlState === 'resolved' || lnurlState === 'requesting') && !decodedInvoice && !payResult">
                    <div class="space-y-4">
                        <!-- Recipient header -->
                        <div class="flex items-start gap-3 p-3 rounded-xl bg-navy-900 border border-navy-700">
                            <template x-if="lnurlParams && lnurlParams.metadata_image_data_uri">
                                <img :src="lnurlParams.metadata_image_data_uri" alt=""
                                    class="w-12 h-12 rounded-lg object-cover bg-navy-800 shrink-0" />
                            </template>
                            <template x-if="!(lnurlParams && lnurlParams.metadata_image_data_uri)">
                                <div class="w-12 h-12 rounded-lg bg-navy-800 flex items-center justify-center shrink-0">
                                    <i data-lucide="zap" class="w-5 h-5 text-neon-cyan/60"></i>
                                </div>
                            </template>
                            <div class="min-w-0 flex-1">
                                <p class="font-mono text-[11px] text-gray-500 truncate" x-text="lnurlParams ? lnurlParams.callback_host : ''"></p>
                                <p class="text-sm text-gray-200 mt-0.5 break-words" x-text="lnurlParams ? lnurlParams.metadata_text : ''"></p>
                                <template x-if="lnurlParams && lnurlParams.metadata_long">
                                    <details class="mt-1">
                                        <summary class="text-[11px] text-neon-cyan cursor-pointer hover:text-neon-cyan/80">Show more</summary>
                                        <p class="text-[11px] text-gray-400 mt-1 break-words" x-text="lnurlParams.metadata_long"></p>
                                    </details>
                                </template>
                            </div>
                        </div>

                        <!-- Amount -->
                        <div>
                            <div class="flex items-center justify-between mb-1.5">
                                <label class="text-xs text-gray-500 uppercase tracking-wide">Amount</label>
                                <span class="text-[10px] text-gray-600" x-text="lnurlParams ? (lnurlParams.min_sendable_sats + ' – ' + lnurlParams.max_sendable_sats + ' sats') : ''"></span>
                            </div>
                            <div class="flex gap-1">
                                <div class="relative flex-1">
                                    <input type="number" :min="lnurlParams ? lnurlParams.min_sendable_sats : 1"
                                        :max="lnurlParams ? lnurlParams.max_sendable_sats : undefined"
                                        :disabled="lnurlAmountFixed"
                                        x-model="lnurlAmountStr"
                                        class="no-spinner w-full pl-3 pr-12 py-2.5 rounded-lg text-sm font-mono bg-navy-900 border border-navy-700 text-gray-300 placeholder-gray-600 focus:outline-none focus:border-neon-cyan/40 focus:ring-1 focus:ring-neon-cyan/20 transition-all disabled:opacity-60" />
                                    <span class="pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-xs text-gray-600">sats</span>
                                </div>
                                <button type="button" @click="lnurlSetMax()"
                                        :disabled="lnurlAmountFixed"
                                        class="px-2 rounded text-[11px] bg-neon-cyan/10 border border-neon-cyan/20 text-neon-cyan hover:bg-neon-cyan/20 disabled:opacity-40 disabled:cursor-not-allowed">Max</button>
                            </div>
                            <template x-if="lnurlAmountFixed">
                                <p class="text-[10px] text-gray-500 mt-1">Recipient requires a fixed amount.</p>
                            </template>
                        </div>

                        <!-- Comment (LUD-12) -->
                        <template x-if="lnurlCommentMax > 0">
                            <div>
                                <div class="flex items-center justify-between mb-1.5">
                                    <label class="text-xs text-gray-500 uppercase tracking-wide">Comment</label>
                                    <span class="text-[10px] text-gray-600" x-text="lnurlComment.length + ' / ' + lnurlCommentMax"></span>
                                </div>
                                <input type="text" :maxlength="lnurlCommentMax" x-model="lnurlComment"
                                    placeholder="Optional message to recipient"
                                    class="w-full px-3 py-2.5 rounded-lg text-sm bg-navy-900 border border-navy-700 text-gray-300 placeholder-gray-600 focus:outline-none focus:border-neon-cyan/40 focus:ring-1 focus:ring-neon-cyan/20 transition-all" />
                            </div>
                        </template>

                        <!-- LNURL invoice error -->
                        <template x-if="lnurlError">
                            <div class="flex items-center gap-2 p-3 rounded-lg bg-neon-pink/10 border border-neon-pink/20">
                                <i data-lucide="alert-circle" class="w-4 h-4 text-neon-pink shrink-0"></i>
                                <p class="text-xs text-neon-pink" x-text="lnurlError"></p>
                            </div>
                        </template>

                        <div class="flex gap-2 pt-1">
                            <button @click="backFromLnurl()"
                                class="flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg bg-navy-700 border border-navy-600 text-gray-300 hover:border-navy-500 hover:text-gray-200 transition-all text-sm">
                                <i data-lucide="chevron-left" class="w-3.5 h-3.5"></i> Back
                            </button>
                            <button @click="requestLnurlInvoice()"
                                :disabled="lnurlState === 'requesting'"
                                class="flex-1 flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg bg-neon-cyan/15 border border-neon-cyan/30 text-neon-cyan font-medium hover:bg-neon-cyan/25 hover:border-neon-cyan/50 transition-all disabled:opacity-40 disabled:cursor-not-allowed text-sm">
                                <template x-if="lnurlState === 'requesting'">
                                    <span class="flex items-center gap-2"><span class="w-4 h-4 border-2 border-neon-cyan border-t-transparent rounded-full animate-spin"></span> Requesting…</span>
                                </template>
                                <template x-if="lnurlState !== 'requesting'">
                                    <span class="flex items-center gap-2"><i data-lucide="arrow-right" class="w-4 h-4"></i> Continue</span>
                                </template>
                            </button>
                        </div>
                    </div>
                </template>

                <!-- Step 2: Decoded invoice review -->
                <template x-if="decodedInvoice && !payResult">
                    <div class="space-y-4">
                        <!-- Amount -->
                        <div class="text-center py-2">
                            <p class="text-3xl font-bold font-mono text-white" x-text="decodedInvoice.num_satoshis > 0 ? formatSats(decodedInvoice.num_satoshis) : 'Any amount'"></p>
                            <p class="text-xs text-gray-500 mt-1" x-text="decodedInvoice.num_satoshis > 0 ? 'sats' : '(open amount invoice)'"></p>
                        </div>

                        <!-- Details card -->
                        <div class="bg-navy-900 border border-navy-700 rounded-xl p-4 space-y-3">
                            <template x-if="decodedInvoice.description">
                                <div>
                                    <p class="text-[10px] text-gray-500 uppercase tracking-wide mb-0.5">Description</p>
                                    <p class="text-sm text-gray-300" x-text="decodedInvoice.description"></p>
                                </div>
                            </template>
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <p class="text-[10px] text-gray-500 uppercase tracking-wide mb-0.5">Destination</p>
                                    <p class="font-mono text-[11px] text-gray-400 truncate" x-text="decodedInvoice.destination"></p>
                                </div>
                                <div>
                                    <p class="text-[10px] text-gray-500 uppercase tracking-wide mb-0.5">Expires</p>
                                    <p class="text-[11px]"
                                        :class="payInvoiceExpired ? 'text-neon-pink' : 'text-gray-400'"
                                        x-text="payInvoiceExpired ? 'EXPIRED' : payExpiresAt"></p>
                                </div>
                            </div>
                        </div>

                        <!-- Expired warning -->
                        <template x-if="payInvoiceExpired">
                            <div class="flex items-center gap-2 p-3 rounded-lg bg-neon-pink/10 border border-neon-pink/20">
                                <i data-lucide="alert-circle" class="w-4 h-4 text-neon-pink shrink-0"></i>
                                <p class="text-xs text-neon-pink">This invoice has expired. Request a fresh one from the recipient.</p>
                            </div>
                        </template>

                        <!-- Routing controls (advanced) — mirrors the rebalance dialog
                             so the operator gets the same %/sats fee toggle, optional
                             outgoing-channel pin, and route-estimate probe regardless
                             of whether they pasted a BOLT 11 or resolved an LNURL. -->
                        <div class="bg-navy-900 border border-navy-700 rounded-xl p-3 space-y-3">
                            <p class="text-[10px] text-gray-500 uppercase tracking-wide">Routing</p>

                            <!-- Fee + timeout row -->
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <div class="flex items-center justify-between mb-1">
                                        <label class="text-[11px] text-gray-500"
                                               x-text="pay.feeLimitMode === 'percent' ? 'Max fee (% of amount)' : 'Max fee (sats)'"></label>
                                        <div class="inline-flex rounded border border-navy-700 overflow-hidden text-[10px]">
                                            <button type="button"
                                                    @click="paySetFeeMode('percent')"
                                                    :class="pay.feeLimitMode === 'percent' ? 'bg-neon-cyan/15 text-neon-cyan' : 'bg-navy-800 text-gray-500 hover:text-gray-300'"
                                                    class="px-1.5 py-0.5 font-mono">%</button>
                                            <button type="button"
                                                    @click="paySetFeeMode('sats')"
                                                    :class="pay.feeLimitMode === 'sats' ? 'bg-neon-cyan/15 text-neon-cyan' : 'bg-navy-800 text-gray-500 hover:text-gray-300'"
                                                    class="px-1.5 py-0.5 font-mono border-l border-navy-700">sats</button>
                                        </div>
                                    </div>
                                    <template x-if="pay.feeLimitMode === 'sats'">
                                        <div class="relative">
                                            <input type="number" x-model.number="payFeeLimitSats" min="0"
                                                   class="no-spinner w-full pl-2 pr-10 py-1.5 rounded text-xs font-mono bg-navy-800 border border-navy-700 text-gray-200 focus:outline-none focus:border-neon-cyan" />
                                            <span class="pointer-events-none absolute right-2 top-1/2 -translate-y-1/2 text-[10px] text-gray-600">sats</span>
                                        </div>
                                    </template>
                                    <template x-if="pay.feeLimitMode === 'percent'">
                                        <div>
                                            <input type="number" x-model.number="payFeeLimitPercent" min="0" step="0.01"
                                                   class="w-full bg-navy-800 border border-navy-700 rounded px-2 py-1.5 text-xs font-mono text-gray-200 focus:outline-none focus:border-neon-cyan">
                                            <div class="text-[10px] text-gray-500 font-mono mt-0.5">
                                                ≈ <span class="text-gray-300" x-text="formatSats(pay.feeLimitApproxSats)"></span> sats max
                                            </div>
                                        </div>
                                    </template>
                                </div>
                                <div>
                                    <label class="text-[11px] text-gray-500 block mb-1">Timeout</label>
                                    <div class="relative">
                                        <input type="number" x-model.number="payTimeoutSeconds" min="5" max="300"
                                               class="no-spinner w-full pl-2 pr-10 py-1.5 rounded text-xs font-mono bg-navy-800 border border-navy-700 text-gray-200 focus:outline-none focus:border-neon-cyan" />
                                        <span class="pointer-events-none absolute right-2 top-1/2 -translate-y-1/2 text-[10px] text-gray-600">sec</span>
                                    </div>
                                </div>
                            </div>

                            <!-- Source-channel accordion (advanced) -->
                            <div>
                                <button type="button" @click="togglePaySourceAccordion()"
                                        class="w-full flex items-center justify-between text-[11px] text-gray-400 hover:text-gray-200 py-1">
                                    <span class="flex items-center gap-1.5">
                                        <i data-lucide="git-fork" class="w-3 h-3"></i>
                                        <span>Source channel</span>
                                        <template x-if="pay.source">
                                            <span class="text-neon-cyan font-mono truncate max-w-[160px]" x-text="channelAlias(pay.source)"></span>
                                        </template>
                                        <template x-if="!pay.source">
                                            <span class="text-gray-600">(auto)</span>
                                        </template>
                                    </span>
                                    <i data-lucide="chevron-down" class="w-3 h-3 transition-transform"
                                       :class="pay.sourceOpen ? 'rotate-180' : ''"></i>
                                </button>
                                <template x-if="pay.sourceOpen">
                                    <div class="mt-2 space-y-2 border-t border-navy-700 pt-2">
                                        <template x-if="pay.source">
                                            <div class="flex items-center justify-between text-[11px] bg-navy-800/50 border border-neon-cyan/20 rounded px-2 py-1.5">
                                                <span class="text-gray-300 font-mono truncate" x-text="channelAlias(pay.source)"></span>
                                                <button type="button" @click="payClearSource()"
                                                        class="text-gray-500 hover:text-neon-pink flex items-center gap-1 shrink-0">
                                                    <i data-lucide="x" class="w-3 h-3"></i> clear
                                                </button>
                                            </div>
                                        </template>
                                        <div class="flex gap-1.5">
                                            <input type="text" :value="pay.sourceSearch" @input="setField('pay','sourceSearch', $event.target.value)" placeholder="Search alias or pubkey…"
                                                   class="flex-1 bg-navy-800 border border-navy-700 rounded px-2 py-1 text-[11px] text-gray-200 placeholder-gray-600 focus:outline-none focus:border-neon-cyan" />
                                            <select :value="pay.sourceSortBy" @change="setField('pay','sourceSortBy', $event.target.value)"
                                                    class="bg-navy-800 border border-navy-700 rounded px-1 py-1 text-[11px] text-gray-200 focus:outline-none focus:border-neon-cyan">
                                                <option value="local_desc">Local ↓</option>
                                                <option value="local_asc">Local ↑</option>
                                                <option value="alias">Alias</option>
                                            </select>
                                            <label class="flex items-center gap-1 text-[10px] text-gray-500 px-1">
                                                <input type="checkbox" :checked="pay.sourceShowAll" @change="setField('pay','sourceShowAll', $event.target.checked)"
                                                       class="accent-neon-cyan w-3 h-3" />
                                                <span>show all</span>
                                            </label>
                                        </div>
                                        <div class="max-h-44 overflow-y-auto space-y-1">
                                            <template x-for="ch in paySourceCandidates()" :key="ch.chan_id">
                                                <button type="button" @click="paySelectSource(ch)"
                                                        class="w-full text-left bg-navy-800 hover:bg-navy-700 border border-navy-700 hover:border-neon-cyan/40 rounded px-2 py-1.5 transition-colors">
                                                    <div class="flex items-center justify-between text-[11px]">
                                                        <span class="font-mono text-gray-200 truncate" x-text="channelAlias(ch)"></span>
                                                        <span class="font-mono text-neon-yellow shrink-0"
                                                              x-text="formatSats(rebalanceMaxSendable(ch)) + ' sendable'"></span>
                                                    </div>
                                                </button>
                                            </template>
                                            <template x-if="paySourceCandidates().length === 0">
                                                <p class="text-[11px] text-gray-500 text-center py-3">
                                                    No channels with enough local balance —
                                                    <button type="button" @click="setField('pay','sourceShowAll', true)"
                                                            class="text-neon-cyan hover:underline">show all</button>
                                                </p>
                                            </template>
                                        </div>
                                    </div>
                                </template>
                            </div>

                            <!-- Estimate fee + quote panel -->
                            <div class="flex items-center justify-between gap-2 border-t border-navy-700 pt-2">
                                <button type="button" @click="payEstimateRoute()"
                                        :disabled="payInvoiceExpired || pay.quoting"
                                        class="px-2 py-1 rounded text-[11px] bg-neon-cyan/10 border border-neon-cyan/20 text-neon-cyan hover:bg-neon-cyan/20 disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-1">
                                    <template x-if="pay.quoting">
                                        <span class="flex items-center gap-1"><span class="w-3 h-3 border-2 border-neon-cyan border-t-transparent rounded-full animate-spin"></span> Probing…</span>
                                    </template>
                                    <template x-if="!pay.quoting">
                                        <span class="flex items-center gap-1"><i data-lucide="route" class="w-3 h-3"></i> Estimate fee</span>
                                    </template>
                                </button>
                                <template x-if="payQuoteRoute()">
                                    <div class="text-[11px] text-right">
                                        <span class="text-gray-300"><span x-text="(payQuoteRoute() || {}).hops || 0"></span> hops</span>
                                        <span class="text-gray-500"> · </span>
                                        <span class="text-neon-cyan font-mono" x-text="formatSats((payQuoteRoute() || {}).total_fees_sat || 0) + ' sats'"></span>
                                        <span class="text-gray-500" x-text="' (' + ((payQuoteRoute() || {}).ppm || 0) + ' ppm)'"></span>
                                    </div>
                                </template>
                            </div>
                            <template x-if="pay.quoteError">
                                <p class="text-[11px] text-neon-pink" x-text="pay.quoteError"></p>
                            </template>
                        </div>

                        <!-- Send error -->
                        <template x-if="payError && !payResult">
                            <div class="flex items-center gap-2 p-3 rounded-lg bg-neon-pink/10 border border-neon-pink/20">
                                <i data-lucide="alert-circle" class="w-4 h-4 text-neon-pink shrink-0"></i>
                                <p class="text-xs text-neon-pink" x-text="payError"></p>
                            </div>
                        </template>

                        <!-- Action buttons -->
                        <div class="flex gap-2 pt-1">
                            <button @click="backFromInvoiceReview()"
                                class="flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg bg-navy-700 border border-navy-600 text-gray-300 hover:border-navy-500 hover:text-gray-200 transition-all text-sm">
                                <i data-lucide="chevron-left" class="w-3.5 h-3.5"></i> Back
                            </button>
                            <button @click="sendPayment()"
                                :disabled="payInvoiceExpired || payLoading || (pay.source && payAmountSats() > rebalanceMaxSendable(pay.source))"
                                class="flex-1 flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg bg-neon-cyan/15 border border-neon-cyan/30 text-neon-cyan font-medium hover:bg-neon-cyan/25 hover:border-neon-cyan/50 transition-all disabled:opacity-40 disabled:cursor-not-allowed text-sm">
                                <template x-if="payLoading">
                                    <span class="flex items-center gap-2"><span class="w-4 h-4 border-2 border-neon-cyan border-t-transparent rounded-full animate-spin"></span> Sending...</span>
                                </template>
                                <template x-if="!payLoading">
                                    <span class="flex items-center gap-2"><i data-lucide="send" class="w-4 h-4"></i> <span x-text="decodedInvoice.num_satoshis > 0 ? 'Send ' + formatSats(decodedInvoice.num_satoshis) + ' sats' : 'Send Payment'"></span></span>
                                </template>
                            </button>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </template>

    <!-- RECEIVE INVOICE DIALOG -->
    <template x-if="showReceiveInvoice">
        <div class="fixed inset-0 z-50 flex items-center justify-center">
            <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="closeReceiveInvoice()"></div>
            <div class="relative w-full max-w-md mx-4 bg-gradient-to-br from-navy-800 to-navy-900 border border-neon-green/30 rounded-xl p-6 shadow-2xl shadow-black/40"
                 :class="recvPaid ? 'recv-paid-glow' : ''">
                <!-- Header -->
                <div class="flex items-center justify-between mb-1">
                    <div class="flex items-center gap-2">
                        <i data-lucide="arrow-down-left" class="w-5 h-5 text-neon-green"></i>
                        <h2 class="text-lg font-semibold text-white" x-text="recvPaid ? 'Payment Received' : 'Receive Lightning'"></h2>
                    </div>
                    <button @click="closeReceiveInvoice()" class="p-1.5 text-gray-500 hover:text-gray-300 hover:bg-navy-700 rounded-lg transition-colors">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>
                <p class="text-xs text-gray-500 mb-5" x-text="recvPaid ? 'Settled over Lightning.' : 'Create an invoice for someone to pay you over Lightning.'"></p>

                <!-- Step 1: Invoice form -->
                <div x-show="!createdInvoice" class="space-y-4">
                    <!-- Inbound-liquidity banner.
                         Two variants:
                         * ``block`` — zero inbound, hard block.
                         * ``short`` — have some, but less than the
                           amount the user is currently typing.
                         A third "channel too small" branch shows the
                         no-CTA copy from. -->
                    <template x-if="inboundBannerPayload">
                        <div class="flex items-start gap-3 p-3 rounded-lg border"
                             :class="inboundBannerPayload.tone === 'block'
                                     ? 'bg-neon-pink/10 border-neon-pink/30'
                                     : (inboundBannerPayload.tone === 'short'
                                         ? 'bg-neon-yellow/10 border-neon-yellow/30'
                                         : 'bg-navy-800 border-navy-700')">
                            <i data-lucide="alert-circle" class="w-4 h-4 shrink-0 mt-0.5"
                               :class="inboundBannerPayload.tone === 'block'
                                       ? 'text-neon-pink'
                                       : (inboundBannerPayload.tone === 'short'
                                           ? 'text-neon-yellow'
                                           : 'text-gray-400')"></i>
                            <div class="flex-1 min-w-0">
                                <p class="text-xs leading-relaxed"
                                   :class="inboundBannerPayload.tone === 'block'
                                           ? 'text-neon-pink'
                                           : (inboundBannerPayload.tone === 'short'
                                               ? 'text-neon-yellow'
                                               : 'text-gray-300')"
                                   x-text="inboundBannerPayload.text"></p>
                                <template x-if="inboundBannerPayload.cta">
                                    <button @click="inboundOpenFromBanner()"
                                        class="mt-2 inline-flex items-center gap-1.5 px-3 py-1.5 rounded-md text-xs font-medium transition-all"
                                        :class="inboundBannerPayload.tone === 'block'
                                                ? 'bg-neon-pink/15 border border-neon-pink/40 text-neon-pink hover:bg-neon-pink/25'
                                                : 'bg-neon-yellow/15 border border-neon-yellow/40 text-neon-yellow hover:bg-neon-yellow/25'">
                                        <i data-lucide="zap" class="w-3.5 h-3.5"></i>
                                        <span x-text="inboundBannerPayload.cta"></span>
                                    </button>
                                </template>
                            </div>
                        </div>
                    </template>

                    <!-- Amount -->
                    <div>
                        <label class="text-xs text-gray-500 uppercase tracking-wide mb-1.5 block">Amount</label>
                        <div class="relative">
                            <input type="number" min="0" x-model="recvAmountStr" placeholder="0 = any amount"
                                class="no-spinner w-full pl-3 pr-12 py-2.5 rounded-lg text-sm font-mono bg-navy-900 border border-navy-700 text-gray-300 placeholder-gray-600 focus:outline-none focus:border-neon-green/40 focus:ring-1 focus:ring-neon-green/20 transition-all" />
                            <span class="pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-xs text-gray-600">sats</span>
                        </div>
                        <p class="text-[10px] text-gray-600 mt-1">Leave empty or 0 for an open-amount invoice.</p>
                    </div>

                    <!-- Memo -->
                    <div>
                        <label class="text-xs text-gray-500 uppercase tracking-wide mb-1.5 block">Memo <span class="normal-case text-gray-600">(optional)</span></label>
                        <input type="text" x-model="recvMemo" placeholder="What is this payment for?" maxlength="256"
                            class="w-full px-3 py-2.5 rounded-lg text-sm bg-navy-900 border border-navy-700 text-gray-300 placeholder-gray-600 focus:outline-none focus:border-neon-green/40 focus:ring-1 focus:ring-neon-green/20 transition-all" />
                    </div>

                    <!-- Expiry -->
                    <div>
                        <label class="text-xs text-gray-500 uppercase tracking-wide mb-1.5 block">Expires In</label>
                        <div class="grid grid-cols-3 gap-2">
                            <template x-for="e in [{v:600,l:'10 min'},{v:3600,l:'1 hour'},{v:86400,l:'24 hours'}]" :key="e.v">
                                <button @click="recvExpiry = e.v"
                                    class="px-3 py-2 rounded-lg border text-sm font-medium text-center transition-all"
                                    :class="recvExpiry === e.v ? 'border-neon-green/50 bg-neon-green/10 text-white' : 'border-navy-600 bg-navy-800/50 text-gray-400 hover:border-navy-500 hover:text-gray-300'">
                                    <span x-text="e.l"></span>
                                </button>
                            </template>
                        </div>
                    </div>

                    <!-- Error -->
                    <template x-if="recvError">
                        <div class="flex items-center gap-2 p-3 rounded-lg bg-neon-pink/10 border border-neon-pink/20">
                            <i data-lucide="alert-circle" class="w-4 h-4 text-neon-pink shrink-0"></i>
                            <p class="text-xs text-neon-pink" x-text="recvError"></p>
                        </div>
                    </template>

                    <!-- Create button. Disabled when the user has
                         zero inbound capacity (``block`` banner kind)
                         — the invoice would mint fine but no sender
                         could collect it, so we'd just be teeing up
                         confusion. The ``short`` banner does not
                         disable the button: a smaller-than-requested
                         invoice is still useful. -->
                    <button @click="createInvoice()" :disabled="recvLoading || inboundBannerKind === 'block'"
                        class="w-full flex items-center justify-center gap-2 px-4 py-3 rounded-lg bg-neon-green/15 border border-neon-green/30 text-neon-green font-medium hover:bg-neon-green/25 hover:border-neon-green/50 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                        <template x-if="recvLoading">
                            <span class="flex items-center gap-2"><span class="w-4 h-4 border-2 border-neon-green border-t-transparent rounded-full animate-spin"></span> Creating...</span>
                        </template>
                        <template x-if="!recvLoading">
                            <span class="flex items-center gap-2"><i data-lucide="zap" class="w-4 h-4"></i> Create Invoice</span>
                        </template>
                    </button>
                </div>

                <!-- Step 2: Created invoice display (waiting for payment) -->
                <template x-if="createdInvoice && !recvPaid">
                    <div class="space-y-4">
                        <!-- Amount summary -->
                        <template x-if="recvAmountStr && recvAmountStr > 0">
                            <div class="text-center">
                                <p class="text-2xl font-bold font-mono text-white" x-text="formatSats(recvAmountStr)"></p>
                                <p class="text-xs text-gray-500">sats</p>
                            </div>
                        </template>

                        <!-- Waiting indicator — a tiny breathing dot above the QR -->
                        <div class="flex items-center justify-center gap-2 text-[11px] text-gray-500">
                            <span class="w-1.5 h-1.5 rounded-full bg-neon-green animate-pulse-neon"></span>
                            <span>Waiting for payment…</span>
                        </div>

                        <!-- QR Code -->
                        <div class="flex justify-center">
                            <div class="bg-white rounded-2xl p-4 shadow-lg shadow-black/20">
                                <canvas x-ref="recvQr" class="max-w-[200px]"></canvas>
                            </div>
                        </div>

                        <!-- Labels -->
                        <div class="flex justify-center gap-2">
                            <span class="text-[10px] uppercase tracking-wider text-gray-500 bg-navy-800 border border-navy-700 px-2.5 py-1 rounded-full">Lightning Invoice</span>
                            <template x-if="recvMemo">
                                <span class="text-[10px] text-gray-500 bg-navy-800 border border-navy-700 px-2.5 py-1 rounded-full truncate max-w-[180px]" x-text="recvMemo"></span>
                            </template>
                        </div>

                        <!-- Invoice text + click to copy -->
                        <div @click="recvCopyInvoice()" class="group cursor-pointer bg-navy-900 border border-navy-700 rounded-xl p-4 hover:border-neon-green/30 transition-all">
                            <p class="font-mono text-[11px] text-gray-400 text-center break-all leading-relaxed select-all group-hover:text-gray-300 transition-colors max-h-20 overflow-y-auto" x-text="createdInvoice.payment_request"></p>
                            <div class="flex items-center justify-center gap-1.5 mt-3">
                                <template x-if="recvCopied">
                                    <span class="flex items-center gap-1.5"><i data-lucide="check" class="w-3.5 h-3.5 text-neon-green"></i><span class="text-xs text-neon-green font-medium">Copied!</span></span>
                                </template>
                                <template x-if="!recvCopied">
                                    <span class="flex items-center gap-1.5"><i data-lucide="copy" class="w-3.5 h-3.5 text-gray-500 group-hover:text-neon-green transition-colors"></i><span class="text-xs text-gray-500 group-hover:text-neon-green transition-colors">Click to copy</span></span>
                                </template>
                            </div>
                        </div>

                        <!-- Action buttons -->
                        <div class="flex gap-2">
                            <button @click="resetReceiveInvoice()"
                                class="flex-1 flex items-center justify-center gap-2 px-3 py-2.5 rounded-lg bg-navy-700 border border-navy-600 text-gray-300 hover:border-neon-green/30 hover:text-neon-green transition-all text-sm">
                                <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i> New Invoice
                            </button>
                            <button @click="recvCopyInvoice()"
                                class="flex-1 flex items-center justify-center gap-2 px-3 py-2.5 rounded-lg text-sm transition-all"
                                :class="recvCopied ? 'bg-neon-green/15 border border-neon-green/30 text-neon-green' : 'bg-neon-green/15 border border-neon-green/30 text-neon-green hover:bg-neon-green/25'">
                                <template x-if="recvCopied"><span class="flex items-center gap-2"><i data-lucide="check" class="w-3.5 h-3.5"></i> Copied</span></template>
                                <template x-if="!recvCopied"><span class="flex items-center gap-2"><i data-lucide="copy" class="w-3.5 h-3.5"></i> Copy Invoice</span></template>
                            </button>
                        </div>
                    </div>
                </template>

                <!-- Step 3: Payment received — celebration view.
                     Renders when ``recvPaid`` flips after the poller sees
                     the invoice transition to SETTLED. The QR/copy panel
                     is replaced by a stack of expanding neon-green rings
