                     behind a popping check icon, a fan of eight sparks,
                     a fade-up "Payment Received" headline, and the
                     animated sat count-up. -->
                <template x-if="recvPaid">
                    <div class="space-y-5">
                        <!-- Animated badge: rings + sparks + check -->
                        <div class="relative flex items-center justify-center h-48">
                            <span class="recv-paid-ring"></span>
                            <span class="recv-paid-ring recv-paid-ring-2"></span>
                            <span class="recv-paid-ring recv-paid-ring-3"></span>
                            <!-- Spark fan. Each outer span sits at the
                                 dialog centre and is rotated to its own
                                 angle; the inner span runs the slide +
                                 fade keyframe in the outer's rotated
                                 coordinate system. Inline ``style`` is
                                 used for the absolute centring + offset
                                 so this doesn't depend on Tailwind JIT
                                 picking up arbitrary px values that
                                 aren't elsewhere in the templates. -->
                            <div class="absolute inset-0 pointer-events-none">
                                <template x-for="i in recvSparkSeq" :key="i">
                                    <span class="absolute" style="top:50%;left:50%" :style="recvSparkStyle(i)">
                                        <span class="absolute w-1.5 h-1.5 rounded-full bg-neon-green recv-paid-spark"
                                              style="top:-3px;left:-3px;box-shadow:0 0 6px rgba(6,255,165,0.85)"></span>
                                    </span>
                                </template>
                            </div>
                            <!-- Check icon — sits on top of the rings -->
                            <div class="relative w-20 h-20 rounded-full bg-neon-green/15 border-2 border-neon-green/60 flex items-center justify-center recv-paid-check"
                                 style="box-shadow:0 0 24px rgba(6,255,165,0.4)">
                                <i data-lucide="check" class="w-10 h-10 text-neon-green"></i>
                            </div>
                        </div>

                        <!-- Headline + counted-up amount -->
                        <div class="text-center recv-paid-title">
                            <p class="text-xs uppercase tracking-wider text-neon-green/80 mb-1">Payment Received</p>
                            <p class="text-3xl font-bold font-mono text-white" x-text="formatSats(recvPaidDisplaySats)"></p>
                            <p class="text-xs text-gray-500 mt-0.5">sats</p>
                            <template x-if="recvMemo">
                                <p class="text-[11px] text-gray-400 mt-2 italic" x-text="'“' + recvMemo + '”'"></p>
                            </template>
                        </div>

                        <!-- Actions -->
                        <div class="flex gap-2">
                            <button @click="resetReceiveInvoice()"
                                class="flex-1 flex items-center justify-center gap-2 px-3 py-2.5 rounded-lg bg-navy-700 border border-navy-600 text-gray-300 hover:border-neon-green/30 hover:text-neon-green transition-all text-sm">
                                <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i> New Invoice
                            </button>
                            <button @click="closeReceiveInvoice()"
                                class="flex-1 flex items-center justify-center gap-2 px-3 py-2.5 rounded-lg bg-neon-green/15 border border-neon-green/30 text-neon-green hover:bg-neon-green/25 transition-all text-sm">
                                <i data-lucide="check" class="w-3.5 h-3.5"></i> Done
                            </button>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </template>

    <!-- ADD RECEIVE CAPACITY DIALOG ─────────────────────────────────
         Inbound-liquidity wizard.
         Single dialog with four view modes driven by ``inboundStep``:
            * form    — pick an amount + see fees, submit.
            * progress— three-stage status with the claim txid once
                        broadcast (mempool + copy affordance).
            * success — celebration view, re-uses recv-paid-* keyframes.
            * failed  — recoverable error view with retry. -->
    <template x-if="showInboundCapacity">
        <div class="fixed inset-0 z-50 flex items-center justify-center" @keydown.escape.window="closeInboundCapacity()">
            <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="closeInboundCapacity()"></div>
            <div class="relative w-full max-w-md mx-4 bg-gradient-to-br from-navy-800 to-navy-900 border border-neon-cyan/30 rounded-xl p-6 shadow-2xl shadow-black/40">
                <!-- Header -->
                <div class="flex items-center justify-between mb-1">
                    <div class="flex items-center gap-2">
                        <i data-lucide="arrow-left-right" class="w-5 h-5 text-neon-cyan"></i>
                        <h2 class="text-lg font-semibold text-white">Add receive capacity</h2>
                    </div>
                    <button @click="closeInboundCapacity()" class="p-1.5 text-gray-500 hover:text-gray-300 hover:bg-navy-700 rounded-lg transition-colors">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>

                <!-- ──────── FORM ──────── -->
                <div x-show="inboundStep === 'form'" class="space-y-5 mt-3">
                    <p class="text-xs text-gray-400 leading-relaxed">
                        To receive Lightning payments, some of your channel's sats need to be on the other side.
                        We'll move some onto the Bitcoin chain — they stay yours and land in your wallet's
                        on-chain balance.
                    </p>

                    <!-- Three-state status for the fees fetch:
                         * loading — fetch in flight (first time the
                           user opens the dialog this session); show a
                           non-alarming spinner.
                         * reachable — happy path; nothing to show here.
                         * unreachable — fetch completed but Boltz didn't
                           return a usable payload. Show the red banner.
                         The loading branch matters because the Tor-
                         routed /cold-storage/fees call can take several
                         seconds; without it, the unreachable banner
                         would flash on every first-open. -->
                    <template x-if="inboundFeesLoading">
                        <div class="flex items-center gap-2 p-3 rounded-lg bg-navy-900 border border-navy-700">
                            <span class="w-3.5 h-3.5 border-2 border-neon-cyan border-t-transparent rounded-full animate-spin"></span>
                            <p class="text-xs text-gray-400">Looking up current rates…</p>
                        </div>
                    </template>
                    <template x-if="!inboundFeesLoading && !inboundBoltzReachable">
                        <div class="flex items-start gap-2 p-3 rounded-lg bg-neon-pink/10 border border-neon-pink/30">
                            <i data-lucide="alert-circle" class="w-4 h-4 text-neon-pink shrink-0 mt-0.5"></i>
                            <div class="flex-1 min-w-0">
                                <p class="text-xs text-neon-pink">
                                    Our liquidity service is temporarily unreachable.
                                </p>
                                <p class="text-[11px] text-neon-pink/80 mt-1">
                                    Please try again in a few minutes.
                                </p>
                            </div>
                        </div>
                    </template>

                    <!-- Amount -->
                    <div>
                        <label class="text-xs uppercase tracking-wider text-gray-500 mb-1.5 block">
                            How much receive capacity do you want?
                        </label>
                        <div class="relative">
                            <input type="number" min="1" x-model.number="inboundAmountSats"
                                   @input="inboundMarkAmountTouched()"
                                   class="no-spinner w-full pl-3 pr-12 py-2.5 rounded-lg text-sm font-mono bg-navy-900 border border-navy-700 text-gray-200 placeholder-gray-600 focus:outline-none focus:border-neon-cyan/40 focus:ring-1 focus:ring-neon-cyan/20 transition-all">
                            <span class="pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-xs text-gray-500">sats</span>
                        </div>
                        <template x-if="inboundAmountError">
                            <p class="text-[11px] text-neon-pink mt-1" x-text="inboundAmountError"></p>
                        </template>
                        <template x-if="!inboundAmountError && inboundCappedBySeed">
                            <!-: user came from the short-warning
                                 banner asking for more than their local
                                 balance can supply. Tell them the ceiling
                                 explicitly so the suggested default doesn't
                                 look arbitrary. -->
                            <p class="text-[11px] text-neon-yellow mt-1">
                                Your channel only allows up to <span x-text="formatSats(inboundMaxAddableCapacity)"></span> sats of capacity right now.
                            </p>
                        </template>
                        <template x-if="!inboundAmountError && !inboundCappedBySeed">
                            <p class="text-[11px] text-gray-500 mt-1">
                                Available on your channel: <span x-text="formatSats(inboundLocalBalanceSats)"></span> sats.
                            </p>
                        </template>
                    </div>

                    <!-- Fee preview.
                         Suppressed while the fees fetch is in flight
                         or has failed — without this, the rows briefly
                         show "0 sats" before the real numbers arrive,
                         which reads as a misleading "free swap"
                         preview. The loading-state banner above
                         already tells the user we're waiting. -->
                    <template x-if="inboundBoltzReachable">
                        <div class="bg-navy-900 border border-navy-700 rounded-lg p-4 space-y-2">
                            <div class="flex items-center justify-between text-sm">
                                <span class="text-gray-400">You'll pay</span>
                                <span class="font-mono text-white"><span x-text="formatSats(inboundTotalFeeSats)"></span> sats</span>
                            </div>
                            <div class="flex items-center justify-between text-sm">
                                <span class="text-gray-400">You'll receive on-chain</span>
                                <span class="font-mono text-white"><span x-text="formatSats(inboundReceiveOnchainSats)"></span> sats</span>
                            </div>
                            <div class="flex items-center justify-between text-sm">
                                <span class="text-gray-400">You'll be able to receive</span>
                                <span class="font-mono text-neon-cyan"><span x-text="formatSats(inboundAmountSats || 0)"></span> sats</span>
                            </div>
                            <!-- Expandable fee details -->
                            <button type="button" @click="inboundToggleFeeBreakdown()"
                                class="w-full mt-1 pt-2 border-t border-navy-700 flex items-center justify-between text-[11px] text-gray-500 hover:text-gray-300 transition-colors">
                                <span>Fee details</span>
                                <i :data-lucide="inboundFeeBreakdownOpen ? 'chevron-up' : 'chevron-down'" class="w-3.5 h-3.5"></i>
                            </button>
                            <div x-show="inboundFeeBreakdownOpen" class="space-y-1 pt-1">
                                <div class="flex items-center justify-between text-[11px]">
                                    <span class="text-gray-500">Service fee (percentage)</span>
                                    <span class="font-mono text-gray-300"><span x-text="formatSats(inboundBoltzPercentageFeeSats)"></span> sats</span>
                                </div>
                                <div class="flex items-center justify-between text-[11px]">
                                    <span class="text-gray-500">Bitcoin network fees</span>
                                    <span class="font-mono text-gray-300"><span x-text="formatSats(inboundBoltzMinerFeeSats)"></span> sats</span>
                                </div>
                            </div>
                        </div>
                    </template>

                    <p class="text-[11px] text-gray-500 leading-relaxed">
                        The on-chain transaction will take about 30 minutes to confirm. You can safely close this
                        page; we'll keep working in the background.
                    </p>

                    <template x-if="inboundError">
                        <div class="flex items-start gap-2 p-3 rounded-lg bg-neon-pink/10 border border-neon-pink/20">
                            <i data-lucide="alert-circle" class="w-4 h-4 text-neon-pink shrink-0 mt-0.5"></i>
                            <p class="text-xs text-neon-pink" x-text="inboundError"></p>
                        </div>
                    </template>

                    <button @click="submitInboundCapacity()" :disabled="!inboundCanSubmit"
                        class="w-full inline-flex items-center justify-center gap-2 px-4 py-3 rounded-lg bg-neon-cyan/15 border border-neon-cyan/40 text-neon-cyan font-medium hover:bg-neon-cyan/25 hover:border-neon-cyan/60 transition-all disabled:opacity-40 disabled:cursor-not-allowed">
                        <template x-if="inboundLoading">
                            <span class="flex items-center gap-2"><span class="w-4 h-4 border-2 border-neon-cyan border-t-transparent rounded-full animate-spin"></span> Starting…</span>
                        </template>
                        <template x-if="!inboundLoading">
                            <span class="flex items-center gap-2"><i data-lucide="zap" class="w-4 h-4"></i> Add receive capacity</span>
                        </template>
                    </button>
                </div>

                <!-- ──────── PROGRESS ──────── -->
                <div x-show="inboundStep === 'progress'" class="space-y-5 mt-3">
                    <div class="flex items-center justify-center py-4">
                        <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-neon-cyan/15 border-2 border-neon-cyan/40 animate-pulse-neon">
                            <i data-lucide="zap" class="w-7 h-7 text-neon-cyan"></i>
                        </div>
                    </div>

                    <h3 class="text-base font-semibold text-white text-center">Working on it…</h3>

                    <!-- Three-stage progress list -->
                    <div class="bg-navy-900 border border-navy-700 rounded-lg p-4 space-y-2.5">
                        <div class="flex items-center gap-2.5 text-sm">
                            <span class="w-2 h-2 rounded-full"
                                  :class="inboundProgressStepIndex >= 0 ? 'bg-neon-cyan animate-pulse-neon' : 'bg-navy-700'"></span>
                            <span :class="inboundProgressStepIndex >= 0 ? 'text-gray-200' : 'text-gray-500'">
                                Sending sats over Lightning
                            </span>
                        </div>
                        <div class="flex items-center gap-2.5 text-sm">
                            <span class="w-2 h-2 rounded-full"
                                  :class="inboundProgressStepIndex >= 1
                                          ? (inboundProgressStepIndex === 1 ? 'bg-neon-cyan animate-pulse-neon' : 'bg-neon-cyan')
                                          : 'bg-navy-700'"></span>
                            <span :class="inboundProgressStepIndex >= 1 ? 'text-gray-200' : 'text-gray-500'">
                                Waiting for Bitcoin transaction
                            </span>
                        </div>
                        <div class="flex items-center gap-2.5 text-sm">
                            <span class="w-2 h-2 rounded-full"
                                  :class="inboundProgressStepIndex >= 2
                                          ? (inboundProgressStepIndex === 2 ? 'bg-neon-cyan animate-pulse-neon' : 'bg-neon-cyan')
                                          : 'bg-navy-700'"></span>
                            <span :class="inboundProgressStepIndex >= 2 ? 'text-gray-200' : 'text-gray-500'">
                                Confirming on the blockchain
                            </span>
                        </div>
                    </div>

                    <!-- On-chain affordance — claim txid + copy + mempool link.
                         Only shown once the wallet has broadcast its claim
                         (status ``claimed`` onward).: mempool +
                         clipboard are non-negotiable for any pending tx. -->
                    <template x-if="inboundShouldShowClaimTxid">
                        <div>
                            <p class="text-xs uppercase tracking-wider text-gray-500 mb-1.5">Bitcoin transaction</p>
                            <div class="flex items-center gap-2 bg-navy-800 border border-navy-700 rounded px-3 py-2">
                                <span class="font-mono text-xs text-gray-300 truncate flex-1" x-text="inboundClaimTxid"></span>
                                <button @click="copyText(inboundClaimTxid)"
                                        class="text-gray-500 hover:text-neon-cyan transition-colors"
                                        title="Copy transaction ID">
                                    <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                                </button>
                                <a :href="mempoolTxUrl(inboundClaimTxid)" target="_blank" rel="noopener"
                                   class="text-gray-500 hover:text-neon-cyan transition-colors"
                                   title="View in mempool explorer">
                                    <i data-lucide="external-link" class="w-3.5 h-3.5"></i>
                                </a>
                            </div>
                            <template x-if="inboundClaimConfirmations !== null">
                                <p class="text-[11px] text-gray-500 mt-1.5 text-center">
                                    <span x-text="inboundClaimConfirmations"></span> confirmation<span x-text="inboundClaimConfirmations === 1 ? '' : 's'"></span>
                                </p>
                            </template>
                        </div>
                    </template>

                    <p class="text-[11px] text-gray-500 text-center leading-relaxed">
                        You can safely close this page; we'll keep working in the background.
                    </p>

                    <!-- Surface a failed cancel attempt here so the
                         user gets feedback. Without this, a network
                         error during cancel sets ``inboundError`` but
                         that field is only displayed on the form
                         view; the user would see the Cancel button
                         look like it had no effect. -->
                    <template x-if="inboundError">
                        <div class="flex items-start gap-2 p-3 rounded-lg bg-neon-pink/10 border border-neon-pink/20">
                            <i data-lucide="alert-circle" class="w-4 h-4 text-neon-pink shrink-0 mt-0.5"></i>
                            <p class="text-xs text-neon-pink" x-text="inboundError"></p>
                        </div>
                    </template>

                    <!-- Cancel (only in ``created``) -->
                    <template x-if="inboundIsCancellable">
                        <div class="flex justify-center">
                            <button @click="cancelInboundSwap()"
                                class="text-xs text-gray-400 hover:text-neon-pink transition-colors">
                                Cancel
                            </button>
                        </div>
                    </template>
                </div>

                <!-- ──────── SUCCESS ──────── -->
                <div x-show="inboundStep === 'success'" class="space-y-5 mt-3">
                    <div class="relative flex items-center justify-center h-40">
                        <span class="recv-paid-ring"></span>
                        <span class="recv-paid-ring recv-paid-ring-2"></span>
                        <span class="recv-paid-ring recv-paid-ring-3"></span>
                        <div class="relative w-20 h-20 rounded-full bg-neon-green/15 border-2 border-neon-green/60 flex items-center justify-center recv-paid-check"
                             style="box-shadow:0 0 24px rgba(6,255,165,0.4)">
                            <i data-lucide="check" class="w-10 h-10 text-neon-green"></i>
                        </div>
                    </div>

                    <div class="text-center recv-paid-title">
                        <p class="text-xs uppercase tracking-wider text-neon-green/80 mb-1">You can now receive payments</p>
                        <p class="text-sm text-gray-400">
                            Available receive capacity
                        </p>
                        <p class="text-2xl font-bold font-mono text-white mt-1">
                            ~<span x-text="formatSats(inboundAmountSats || 0)"></span> <span class="text-sm text-gray-500 font-normal">sats</span>
                        </p>
                    </div>

                    <template x-if="inboundClaimTxid">
                        <div>
                            <p class="text-xs uppercase tracking-wider text-gray-500 mb-1.5">On-chain transaction</p>
                            <div class="flex items-center gap-2 bg-navy-800 border border-navy-700 rounded px-3 py-2">
                                <span class="font-mono text-xs text-gray-300 truncate flex-1" x-text="inboundClaimTxid"></span>
                                <button @click="copyText(inboundClaimTxid)"
                                        class="text-gray-500 hover:text-neon-cyan transition-colors"
                                        title="Copy transaction ID">
                                    <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                                </button>
                                <a :href="mempoolTxUrl(inboundClaimTxid)" target="_blank" rel="noopener"
                                   class="text-gray-500 hover:text-neon-cyan transition-colors"
                                   title="View in mempool explorer">
                                    <i data-lucide="external-link" class="w-3.5 h-3.5"></i>
                                </a>
                            </div>
                        </div>
                    </template>

                    <div class="flex flex-col gap-2">
                        <button @click="inboundCreateInvoiceNow()"
                            class="w-full inline-flex items-center justify-center gap-2 px-4 py-3 rounded-lg bg-neon-green/15 border border-neon-green/40 text-neon-green hover:bg-neon-green/25 hover:border-neon-green/60 transition-all text-sm font-medium">
                            <i data-lucide="arrow-down-left" class="w-4 h-4"></i>
                            Create an invoice now
                        </button>
                        <button @click="closeInboundCapacity()"
                            class="w-full inline-flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg bg-navy-700 border border-navy-600 text-gray-300 hover:border-gray-500 transition-all text-sm">
                            Done
                        </button>
                    </div>
                </div>

                <!-- ──────── FAILED ──────── -->
                <div x-show="inboundStep === 'failed'" class="space-y-5 mt-3">
                    <div class="flex items-center justify-center py-2">
                        <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-neon-pink/15 border-2 border-neon-pink/40">
                            <i data-lucide="alert-triangle" class="w-7 h-7 text-neon-pink"></i>
                        </div>
                    </div>

                    <div class="text-center">
                        <h3 class="text-base font-semibold text-white mb-1">Something went wrong</h3>
                        <p class="text-xs text-gray-400 max-w-sm mx-auto">
                            We weren't able to add capacity this time. Your sats are safe — they're back in your wallet.
                            You can try again whenever you'd like.
                        </p>
                    </div>

                    <template x-if="inboundSwapError">
                        <div class="bg-navy-900 border border-navy-700 rounded-lg p-3">
                            <p class="text-[11px] uppercase tracking-wider text-gray-500 mb-1">Reason</p>
                            <p class="text-xs text-gray-300 break-words" x-text="inboundSwapError"></p>
                        </div>
                    </template>

                    <div class="flex flex-col gap-2">
                        <button @click="inboundResetToForm()"
                            class="w-full inline-flex items-center justify-center gap-2 px-4 py-3 rounded-lg bg-neon-cyan/15 border border-neon-cyan/40 text-neon-cyan hover:bg-neon-cyan/25 hover:border-neon-cyan/60 transition-all text-sm font-medium">
                            <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                            Try again
                        </button>
                        <button @click="closeInboundCapacity()"
                            class="w-full inline-flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg bg-navy-700 border border-navy-600 text-gray-300 hover:border-gray-500 transition-all text-sm">
                            Close
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- OPEN INBOUND DIALOG (per-channel) ────────────────────────────
         Drains a chosen channel's local balance to open receive room.
         Two tabs:
            * onchain  — Boltz reverse swap pinned to the channel, into
                         the user's own wallet (form/progress/success/
                         failed, driven by ``ciStep``).
            * lightning— pay an external destination out through the
                         channel (reuses the Send-Payment state). -->
    <template x-if="showChannelInbound">
        <div class="fixed inset-0 z-50 flex items-center justify-center" @keydown.escape.window="closeChannelInbound()">
            <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="closeChannelInbound()"></div>
            <div class="relative w-full max-w-md mx-4 bg-gradient-to-br from-navy-800 to-navy-900 border border-neon-green/30 rounded-xl p-6 shadow-2xl shadow-black/40">
                <!-- Header -->
                <div class="flex items-center justify-between mb-1">
                    <div class="flex items-center gap-2">
                        <i data-lucide="arrow-down-left" class="w-5 h-5 text-neon-green"></i>
                        <h2 class="text-lg font-semibold text-white">Open Inbound</h2>
                    </div>
                    <button @click="closeChannelInbound()" class="p-1.5 text-gray-500 hover:text-gray-300 hover:bg-navy-700 rounded-lg transition-colors">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>
                <p class="text-xs text-gray-400">
                    <span class="font-mono text-gray-300" x-text="ciChannelAlias"></span>
                    <span class="text-gray-600">·</span>
                    up to <span class="font-mono" x-text="formatSats(ciMaxFreeable)"></span> sats can be freed
                </p>

                <!-- Intro + tabs (hidden once an on-chain swap is running). -->
                <div x-show="ciStep === 'form'">
                    <p class="text-xs text-gray-400 leading-relaxed mt-3">
                        This channel can send right now, but it's low on room to receive. Moving some sats out
                        of it makes room for incoming payments. Pick where the money should go:
                    </p>
                    <div class="flex gap-2 mt-3">
                        <button @click="ciSelectTab('onchain')"
                                :class="ciTab === 'onchain' ? 'bg-neon-green/15 border-neon-green/40 text-neon-green' : 'bg-navy-900 border-navy-700 text-gray-400 hover:text-gray-200'"
                                class="flex-1 inline-flex items-center justify-center gap-1.5 px-3 py-2 rounded-lg border text-xs font-medium transition-all">
                            <i data-lucide="wallet" class="w-3.5 h-3.5"></i> To my wallet
                        </button>
                        <button @click="ciSelectTab('lightning')"
                                :class="ciTab === 'lightning' ? 'bg-neon-green/15 border-neon-green/40 text-neon-green' : 'bg-navy-900 border-navy-700 text-gray-400 hover:text-gray-200'"
                                class="flex-1 inline-flex items-center justify-center gap-1.5 px-3 py-2 rounded-lg border text-xs font-medium transition-all">
                            <i data-lucide="zap" class="w-3.5 h-3.5"></i> Pay a Lightning bill
                        </button>
                    </div>
                </div>

                <!-- ═══════════ TAB A — TO MY WALLET (on-chain swap) ═══════════ -->
                <div x-show="ciTab === 'onchain'">

                    <!-- ──────── BUSY (a swap is running on another channel) ──────── -->
                    <div x-show="ciStep === 'busy'" class="space-y-5 mt-4">
                        <div class="flex items-center justify-center py-2">
                            <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-neon-yellow/15 border-2 border-neon-yellow/40">
                                <i data-lucide="hourglass" class="w-7 h-7 text-neon-yellow"></i>
                            </div>
                        </div>
                        <div class="text-center">
                            <h3 class="text-base font-semibold text-white mb-1">A transfer is already running</h3>
                            <p class="text-xs text-gray-400 max-w-sm mx-auto">
                                An inbound transfer is already in progress on
                                <span class="font-mono text-gray-300" x-text="ciChannelAlias"></span>.
                                Finish or cancel it before starting another.
                            </p>
                        </div>
                        <div class="flex flex-col gap-2">
                            <button @click="ciViewRunningSwap()"
                                class="w-full inline-flex items-center justify-center gap-2 px-4 py-3 rounded-lg bg-neon-green/15 border border-neon-green/40 text-neon-green hover:bg-neon-green/25 hover:border-neon-green/60 transition-all text-sm font-medium">
                                <i data-lucide="eye" class="w-4 h-4"></i> View transfer
                            </button>
                            <button @click="closeChannelInbound()"
                                class="w-full inline-flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg bg-navy-700 border border-navy-600 text-gray-300 hover:border-gray-500 transition-all text-sm">
                                Close
                            </button>
                        </div>
                    </div>

                    <!-- ──────── FORM ──────── -->
                    <div x-show="ciStep === 'form'" class="space-y-5 mt-4">
                        <p class="text-xs text-gray-400 leading-relaxed">
                            We'll move some of this channel's sats onto the Bitcoin chain — they stay yours and
                            land in your wallet's on-chain balance.
                        </p>

                        <template x-if="ciFeesLoading">
                            <div class="flex items-center gap-2 p-3 rounded-lg bg-navy-900 border border-navy-700">
                                <span class="w-3.5 h-3.5 border-2 border-neon-green border-t-transparent rounded-full animate-spin"></span>
                                <p class="text-xs text-gray-400">Looking up current rates…</p>
                            </div>
                        </template>
                        <template x-if="!ciFeesLoading && !ciBoltzReachable">
                            <div class="flex items-start gap-2 p-3 rounded-lg bg-neon-pink/10 border border-neon-pink/30">
                                <i data-lucide="alert-circle" class="w-4 h-4 text-neon-pink shrink-0 mt-0.5"></i>
                                <div class="flex-1 min-w-0">
                                    <p class="text-xs text-neon-pink">Our liquidity service is temporarily unreachable.</p>
                                    <p class="text-[11px] text-neon-pink/80 mt-1">Please try again in a few minutes.</p>
                                </div>
                            </div>
                        </template>

                        <!-- Destination address + Generate -->
                        <div>
                            <label class="text-xs uppercase tracking-wider text-gray-500 mb-1.5 block">Your on-chain address</label>
                            <div class="flex gap-2">
                                <input type="text" x-model="ciAddress" spellcheck="false" placeholder="bc1q…"
                                       class="flex-1 min-w-0 px-3 py-2.5 rounded-lg text-sm font-mono bg-navy-900 border border-navy-700 text-gray-200 placeholder-gray-600 focus:outline-none focus:border-neon-green/40 focus:ring-1 focus:ring-neon-green/20 transition-all">
                                <button @click="ciGenerateAddress()" :disabled="ciGenerating"
                                        class="shrink-0 inline-flex items-center gap-1.5 px-3 py-2.5 rounded-lg text-xs font-medium bg-neon-green/10 border border-neon-green/30 text-neon-green hover:bg-neon-green/20 hover:border-neon-green/50 transition-all disabled:opacity-40 disabled:cursor-not-allowed">
                                    <template x-if="ciGenerating">
                                        <span class="w-3.5 h-3.5 border-2 border-neon-green border-t-transparent rounded-full animate-spin"></span>
                                    </template>
                                    <template x-if="!ciGenerating">
                                        <span class="flex items-center gap-1.5"><i data-lucide="plus" class="w-3.5 h-3.5"></i> Generate</span>
                                    </template>
                                </button>
                            </div>
                            <p class="text-[11px] text-gray-500 mt-1">
                                Tap <span class="text-gray-400">Generate</span> for a fresh address in your own wallet — the sats land there after the transfer.
                            </p>
                        </div>

                        <!-- Amount -->
                        <div>
                            <div class="flex items-center justify-between mb-1.5">
                                <label class="text-xs uppercase tracking-wider text-gray-500">How much to move out?</label>
                                <button @click="ciSetMaxAmount()" class="text-[11px] text-neon-green hover:text-neon-green/80 transition-colors">Max</button>
                            </div>
                            <div class="relative">
                                <input type="number" min="1" x-model.number="ciAmountSats" @input="ciMarkAmountTouched()"
                                       class="no-spinner w-full pl-3 pr-12 py-2.5 rounded-lg text-sm font-mono bg-navy-900 border border-navy-700 text-gray-200 placeholder-gray-600 focus:outline-none focus:border-neon-green/40 focus:ring-1 focus:ring-neon-green/20 transition-all">
                                <span class="pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-xs text-gray-500">sats</span>
                            </div>
                            <template x-if="ciAmountError">
                                <p class="text-[11px] text-neon-pink mt-1" x-text="ciAmountError"></p>
                            </template>
                            <template x-if="!ciAmountError">
                                <p class="text-[11px] text-gray-500 mt-1">
                                    This channel can free up to <span x-text="formatSats(ciAmountCeiling)"></span> sats right now.
                                </p>
                            </template>
                        </div>

                        <!-- Fee preview -->
                        <template x-if="ciBoltzReachable">
                            <div class="bg-navy-900 border border-navy-700 rounded-lg p-4 space-y-2">
                                <div class="flex items-center justify-between text-sm">
                                    <span class="text-gray-400">You'll pay</span>
                                    <span class="font-mono text-white"><span x-text="formatSats(ciTotalFeeSats)"></span> sats</span>
                                </div>
                                <div class="flex items-center justify-between text-sm">
                                    <span class="text-gray-400">You'll receive on-chain</span>
                                    <span class="font-mono text-white"><span x-text="formatSats(ciReceiveOnchainSats)"></span> sats</span>
                                </div>
                                <div class="flex items-center justify-between text-sm">
                                    <span class="text-gray-400">Room to receive gained</span>
                                    <span class="font-mono text-neon-green"><span x-text="formatSats(ciAmountSats || 0)"></span> sats</span>
                                </div>
                                <button type="button" @click="ciToggleFeeBreakdown()"
                                    class="w-full mt-1 pt-2 border-t border-navy-700 flex items-center justify-between text-[11px] text-gray-500 hover:text-gray-300 transition-colors">
                                    <span>Fee details</span>
                                    <i :data-lucide="ciFeeBreakdownOpen ? 'chevron-up' : 'chevron-down'" class="w-3.5 h-3.5"></i>
                                </button>
                                <div x-show="ciFeeBreakdownOpen" class="space-y-1 pt-1">
                                    <div class="flex items-center justify-between text-[11px]">
                                        <span class="text-gray-500">Service fee (percentage)</span>
                                        <span class="font-mono text-gray-300"><span x-text="formatSats(ciBoltzPercentageFeeSats)"></span> sats</span>
                                    </div>
                                    <div class="flex items-center justify-between text-[11px]">
                                        <span class="text-gray-500">Bitcoin network fees</span>
                                        <span class="font-mono text-gray-300"><span x-text="formatSats(ciBoltzMinerFeeSats)"></span> sats</span>
                                    </div>
                                </div>
                            </div>
                        </template>

                        <p class="text-[11px] text-gray-500 leading-relaxed">
                            The on-chain transaction takes about 30 minutes to confirm. You can safely close this
                            page; we'll keep working in the background.
                        </p>

                        <template x-if="ciError">
                            <div class="flex items-start gap-2 p-3 rounded-lg bg-neon-pink/10 border border-neon-pink/20">
                                <i data-lucide="alert-circle" class="w-4 h-4 text-neon-pink shrink-0 mt-0.5"></i>
                                <p class="text-xs text-neon-pink" x-text="ciError"></p>
                            </div>
                        </template>

                        <button @click="ciStep = 'confirm'" :disabled="!ciCanSubmit"
                            class="w-full inline-flex items-center justify-center gap-2 px-4 py-3 rounded-lg bg-neon-green/15 border border-neon-green/40 text-neon-green font-medium hover:bg-neon-green/25 hover:border-neon-green/60 transition-all disabled:opacity-40 disabled:cursor-not-allowed">
                            <span class="flex items-center gap-2"><i data-lucide="arrow-right" class="w-4 h-4"></i> Review</span>
                        </button>
                    </div>

                    <!-- ──────── CONFIRM ──────── -->
                    <div x-show="ciStep === 'confirm'" class="space-y-5 mt-4">
                        <p class="text-xs text-gray-400 leading-relaxed">
                            Please check the details. This moves sats out of this channel and into your own
                            on-chain wallet; it can't be undone once it starts.
                        </p>
                        <div class="bg-navy-900 border border-navy-700 rounded-lg p-4 space-y-2 text-sm">
                            <div class="flex items-center justify-between">

                            <div class="flex items-center justify-between">
                                <span class="text-gray-400">Fee</span>

                            </div>
                            <div class="flex items-center justify-between">
                                <span class="text-gray-400">You'll receive on-chain</span>
                                <span class="font-mono text-white"><span x-text="formatSats(ciReceiveOnchainSats)"></span> sats</span>
                            </div>
                            <div class="flex items-center justify-between">
                                <span class="text-gray-400">Room to receive gained</span>

                            </div>
                            <div class="pt-2 border-t border-navy-700">
                                <p class="text-[11px] uppercase tracking-wider text-gray-500 mb-1">To your address</p>

                            </div>
                        </div>
                        <template x-if="ciError">
                            <div class="flex items-start gap-2 p-3 rounded-lg bg-neon-pink/10 border border-neon-pink/20">
                                <i data-lucide="alert-circle" class="w-4 h-4 text-neon-pink shrink-0 mt-0.5"></i>
                                <p class="text-xs text-neon-pink" x-text="ciError"></p>
                            </div>
                        </template>
                        <template x-if="ciSuggestedRetryAmount > 0">
                            <button @click="ciAcceptSuggestedRetry()"
                                class="w-full inline-flex items-center justify-center gap-2 px-4 py-2 rounded-lg bg-neon-yellow/10 border border-neon-yellow/40 text-neon-yellow font-medium hover:bg-neon-yellow/20 hover:border-neon-yellow/60 transition-all text-xs">
                                <i data-lucide="rotate-cw" class="w-4 h-4"></i>
                                <span>Try with <span x-text="formatSats(ciSuggestedRetryAmount)"></span> sats instead</span>
                            </button>
                        </template>
                        <div class="flex gap-2">
                            <button @click="ciStep = 'form'" :disabled="ciLoading"
                                class="px-4 py-3 rounded-lg bg-navy-700 border border-navy-600 text-gray-300 hover:border-gray-500 transition-all text-sm disabled:opacity-40">Back</button>
                            <button @click="ciStartSwap()" :disabled="!ciCanSubmit"
                                class="flex-1 inline-flex items-center justify-center gap-2 px-4 py-3 rounded-lg bg-neon-green/15 border border-neon-green/40 text-neon-green font-medium hover:bg-neon-green/25 hover:border-neon-green/60 transition-all disabled:opacity-40 disabled:cursor-not-allowed">
                                <template x-if="ciLoading">
                                    <span class="flex items-center gap-2"><span class="w-4 h-4 border-2 border-neon-green border-t-transparent rounded-full animate-spin"></span> Starting…</span>
                                </template>
                                <template x-if="!ciLoading">
                                    <span class="flex items-center gap-2"><i data-lucide="arrow-down-left" class="w-4 h-4"></i> Open inbound room</span>
                                </template>
                            </button>
                        </div>
                    </div>

                    <!-- ──────── PROGRESS ──────── -->
                    <div x-show="ciStep === 'progress'" class="space-y-5 mt-4">
                        <div class="flex items-center justify-center py-4">
                            <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-neon-green/15 border-2 border-neon-green/40 animate-pulse-neon">
                                <i data-lucide="arrow-down-left" class="w-7 h-7 text-neon-green"></i>
                            </div>
                        </div>
                        <h3 class="text-base font-semibold text-white text-center">Working on it…</h3>
                        <div class="space-y-0">
                            <template x-for="(step, idx) in ciSwapSteps" :key="step.key">
                                <div class="flex items-start gap-3 relative">
                                    <template x-if="idx < ciSwapSteps.length - 1">
                                        <div class="absolute left-[9px] top-[20px] w-0.5 h-6"
                                            :class="idx < ciProgressStepIndex ? 'bg-neon-green/40' : 'bg-navy-600'"></div>
                                    </template>
                                    <div class="shrink-0 mt-0.5">
                                        <template x-if="idx < ciProgressStepIndex || ciSwapStatus === 'completed'">
                                            <i data-lucide="check-circle-2" class="w-[18px] h-[18px] text-neon-green"></i>
                                        </template>
                                        <template x-if="idx === ciProgressStepIndex && ciSwapStatus !== 'completed'">
                                            <span class="w-[18px] h-[18px] border-2 border-neon-green border-t-transparent rounded-full animate-spin inline-block"></span>
                                        </template>
                                        <template x-if="idx > ciProgressStepIndex && ciSwapStatus !== 'completed'">
                                            <div class="w-[18px] h-[18px] rounded-full border border-navy-600"></div>
                                        </template>
                                    </div>
                                    <div class="pb-4">
                                        <p class="text-xs font-medium"
                                            :class="(idx < ciProgressStepIndex || ciSwapStatus === 'completed') ? 'text-neon-green' : (idx === ciProgressStepIndex ? 'text-white' : 'text-gray-600')"
                                            x-text="step.label"></p>
                                        <p class="text-[10px]"
                                            :class="idx === ciProgressStepIndex ? 'text-gray-400' : 'text-gray-600'"
                                            x-text="step.desc"></p>
                                    </div>
                                </div>
                            </template>
                        </div>
                        <template x-if="ciShouldShowLockupTxid">
                            <div>
                                <p class="text-xs uppercase tracking-wider text-gray-500 mb-1.5">Boltz lockup transaction</p>
                                <div class="flex items-center gap-2 bg-navy-800 border border-navy-700 rounded px-3 py-2">
                                    <span class="font-mono text-xs text-gray-300 truncate flex-1" x-text="ciLockupTxid"></span>
                                    <button @click="copyText(ciLockupTxid)" class="text-gray-500 hover:text-neon-green transition-colors" title="Copy transaction ID">
                                        <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                                    </button>
                                    <a :href="mempoolTxUrl(ciLockupTxid)" target="_blank" rel="noopener" class="text-gray-500 hover:text-neon-green transition-colors" title="View in mempool explorer">
                                        <i data-lucide="external-link" class="w-3.5 h-3.5"></i>
                                    </a>
                                </div>
                                <p class="text-[11px] text-gray-500 mt-1.5 text-center leading-relaxed">
                                    <template x-if="ciLockupConfirmations !== null">
                                        <span>
                                            <span x-text="ciLockupConfirmations"></span> confirmation<span x-text="ciLockupConfirmations === 1 ? '' : 's'"></span> on Boltz's lockup. Once it has enough, we'll claim it to your wallet.
                                        </span>
                                    </template>
                                    <template x-if="ciLockupConfirmations === null">
                                        <span>Boltz has locked the funds on-chain. Once the lockup confirms, we'll claim it to your wallet.</span>
                                    </template>
                                </p>
                            </div>
                        </template>
                        <template x-if="ciShouldShowClaimTxid">
                            <div>
                                <p class="text-xs uppercase tracking-wider text-gray-500 mb-1.5">Bitcoin transaction</p>
                                <div class="flex items-center gap-2 bg-navy-800 border border-navy-700 rounded px-3 py-2">
                                    <span class="font-mono text-xs text-gray-300 truncate flex-1" x-text="ciClaimTxid"></span>
                                    <button @click="copyText(ciClaimTxid)" class="text-gray-500 hover:text-neon-green transition-colors" title="Copy transaction ID">
                                        <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                                    </button>
                                    <a :href="mempoolTxUrl(ciClaimTxid)" target="_blank" rel="noopener" class="text-gray-500 hover:text-neon-green transition-colors" title="View in mempool explorer">
                                        <i data-lucide="external-link" class="w-3.5 h-3.5"></i>
                                    </a>
                                </div>
                                <template x-if="ciClaimConfirmations !== null">
                                    <p class="text-[11px] text-gray-500 mt-1.5 text-center">
                                        <span x-text="ciClaimConfirmations"></span> confirmation<span x-text="ciClaimConfirmations === 1 ? '' : 's'"></span>
                                    </p>
                                </template>
                            </div>
                        </template>
                        <p class="text-[11px] text-gray-500 text-center leading-relaxed">
                            You can safely close this page; we'll keep working in the background.
                        </p>

                        <!-- Recovery banner: surfaces the backend classifier's
                             hint for a stuck swap, with one-tap actions
                             ("Retry claim" → cooperative-claim; "Recover on-chain"
                             → unilateral script-path claim). -->
                        <template x-if="ciShowRecoveryBanner">
                            <div class="rounded-lg p-3 space-y-2"
                                 :class="ciSwapRecovery.severity === 'critical' ? 'bg-neon-pink/10 border border-neon-pink/30' : 'bg-neon-yellow/10 border border-neon-yellow/30'">
                                <div class="flex items-start gap-2">
                                    <i :data-lucide="ciSwapRecovery.severity === 'critical' ? 'alert-octagon' : 'alert-triangle'"
                                       class="w-4 h-4 flex-shrink-0 mt-0.5"
                                       :class="ciSwapRecovery.severity === 'critical' ? 'text-neon-pink' : 'text-neon-yellow'"></i>
                                    <div class="flex-1 min-w-0">
                                        <p class="text-xs font-medium"
                                           :class="ciSwapRecovery.severity === 'critical' ? 'text-neon-pink' : 'text-neon-yellow'"
                                           x-text="ciSwapRecovery.headline"></p>
                                        <p class="text-[11px] text-gray-300 mt-1" x-text="ciSwapRecovery.detail"></p>
                                    </div>
                                </div>
                                <template x-if="ciRecoveryHasActions">
                                    <div class="flex flex-wrap gap-2 pt-1">
                                        <template x-for="act in ciSwapRecovery.actions" :key="act">
                                            <button @click="invokeCiRecoveryAction(act)"
                                                    :disabled="ciRecoveryBusy"
                                                    class="px-3 py-1.5 rounded text-[11px] font-medium bg-navy-700 border border-navy-600 text-gray-200 hover:border-neon-green/40 hover:text-white disabled:opacity-50 disabled:cursor-not-allowed transition-all"
                                                    x-text="ciRecoveryActionLabel(act)"></button>
                                        </template>
                                    </div>
                                </template>
                                <template x-if="ciRecoveryError">
                                    <p class="text-[11px] text-neon-pink pt-1" x-text="ciRecoveryError"></p>
                                </template>
                            </div>
                        </template>

                        <template x-if="ciError">
                            <div class="flex items-start gap-2 p-3 rounded-lg bg-neon-pink/10 border border-neon-pink/20">
                                <i data-lucide="alert-circle" class="w-4 h-4 text-neon-pink shrink-0 mt-0.5"></i>
                                <p class="text-xs text-neon-pink" x-text="ciError"></p>
                            </div>
                        </template>
                        <template x-if="ciIsCancellable">
                            <div class="flex justify-center">
                                <button @click="ciCancelSwap()" class="text-xs text-gray-400 hover:text-neon-pink transition-colors">Cancel</button>
                            </div>
                        </template>
                    </div>

                    <!-- ──────── SUCCESS ──────── -->
                    <div x-show="ciStep === 'success'" class="space-y-5 mt-4">
                        <div class="relative flex items-center justify-center h-40">
                            <span class="recv-paid-ring"></span>
                            <span class="recv-paid-ring recv-paid-ring-2"></span>
                            <span class="recv-paid-ring recv-paid-ring-3"></span>
                            <div class="relative w-20 h-20 rounded-full bg-neon-green/15 border-2 border-neon-green/60 flex items-center justify-center recv-paid-check" style="box-shadow:0 0 24px rgba(6,255,165,0.4)">
                                <i data-lucide="check" class="w-10 h-10 text-neon-green"></i>
                            </div>
                        </div>
                        <div class="text-center recv-paid-title">
                            <p class="text-xs uppercase tracking-wider text-neon-green/80 mb-1">This channel can now receive</p>
                            <p class="text-sm text-gray-400">Room to receive gained</p>
                            <p class="text-2xl font-bold font-mono text-white mt-1">
                                ~<span x-text="formatSats(ciAmountSats || 0)"></span> <span class="text-sm text-gray-500 font-normal">sats</span>
                            </p>
                        </div>
                        <template x-if="ciClaimTxid">
                            <div>
                                <p class="text-xs uppercase tracking-wider text-gray-500 mb-1.5">On-chain transaction</p>
                                <div class="flex items-center gap-2 bg-navy-800 border border-navy-700 rounded px-3 py-2">
                                    <span class="font-mono text-xs text-gray-300 truncate flex-1" x-text="ciClaimTxid"></span>
                                    <button @click="copyText(ciClaimTxid)" class="text-gray-500 hover:text-neon-green transition-colors" title="Copy transaction ID">
                                        <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                                    </button>
                                    <a :href="mempoolTxUrl(ciClaimTxid)" target="_blank" rel="noopener" class="text-gray-500 hover:text-neon-green transition-colors" title="View in mempool explorer">
                                        <i data-lucide="external-link" class="w-3.5 h-3.5"></i>
                                    </a>
                                </div>
                            </div>
                        </template>
                        <button @click="closeChannelInbound()"
                            class="w-full inline-flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg bg-navy-700 border border-navy-600 text-gray-300 hover:border-gray-500 transition-all text-sm">
                            Done
                        </button>
                    </div>

                    <!-- ──────── FAILED ──────── -->
                    <div x-show="ciStep === 'failed'" class="space-y-5 mt-4">
                        <div class="flex items-center justify-center py-2">
                            <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-neon-pink/15 border-2 border-neon-pink/40">
                                <i data-lucide="alert-triangle" class="w-7 h-7 text-neon-pink"></i>
                            </div>
                        </div>
                        <div class="text-center">
                            <h3 class="text-base font-semibold text-white mb-1">Something went wrong</h3>
                            <p class="text-xs text-gray-400 max-w-sm mx-auto">
                                We weren't able to move the sats this time. Your sats are safe — they're still in this channel.
                                You can try again whenever you'd like.
                            </p>
                        </div>
                        <template x-if="ciSwapError">
                            <div class="bg-navy-900 border border-navy-700 rounded-lg p-3">
                                <p class="text-[11px] uppercase tracking-wider text-gray-500 mb-1">Reason</p>
                                <p class="text-xs text-gray-300 break-words" x-text="ciSwapError"></p>
                            </div>
                        </template>
                        <div class="flex flex-col gap-2">
                            <button @click="ciResetToForm()"
                                class="w-full inline-flex items-center justify-center gap-2 px-4 py-3 rounded-lg bg-neon-green/15 border border-neon-green/40 text-neon-green hover:bg-neon-green/25 hover:border-neon-green/60 transition-all text-sm font-medium">
                                <i data-lucide="refresh-cw" class="w-4 h-4"></i> Try again
                            </button>
                            <button @click="closeChannelInbound()"
                                class="w-full inline-flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg bg-navy-700 border border-navy-600 text-gray-300 hover:border-gray-500 transition-all text-sm">
                                Close
                            </button>
                        </div>
                    </div>
                </div>

                <!-- ═══════════ TAB B — PAY A LIGHTNING BILL (pinned send) ═══════════ -->
                <div x-show="ciTab === 'lightning'" class="mt-4">

                    <!-- Input: paste an invoice / address. Shown until a
                         BOLT11 is decoded or an LNURL recipient resolves. -->
                    <div x-show="!decodedInvoice && lnurlState !== 'resolved' && lnurlState !== 'requesting' && !payResult" class="space-y-4">
                        <p class="text-xs text-gray-400 leading-relaxed">
                            Pay an invoice, LNURL, or Lightning address. The payment leaves through this channel,
                            which opens up the same amount of room to receive.
                        </p>
                        <div>
                            <div class="flex items-center justify-between mb-1.5">
                                <label class="text-xs uppercase tracking-wider text-gray-500">Pay to</label>
                                <button @click="pasteInvoice()" class="text-[11px] text-neon-green hover:text-neon-green/80 transition-colors inline-flex items-center gap-1">
                                    <i data-lucide="clipboard" class="w-3 h-3"></i> Paste
                                </button>
                            </div>
                            <textarea x-model="payInvoice" rows="3" spellcheck="false" placeholder="lnbc… / LNURL… / user@wallet.com"
                                class="w-full px-3 py-2.5 rounded-lg text-sm font-mono bg-navy-900 border border-navy-700 text-gray-200 placeholder-gray-600 focus:outline-none focus:border-neon-green/40 focus:ring-1 focus:ring-neon-green/20 transition-all resize-none"></textarea>
                            <template x-if="payInputType && payInputType !== 'unknown'">
                                <p class="text-[11px] text-gray-500 mt-1">
                                    Detected:
                                    <span x-show="payInputType === 'bolt11'" class="text-neon-green">Lightning invoice</span>
                                    <span x-show="payInputType === 'lnaddr'" class="text-neon-cyan">Lightning address</span>
                                    <span x-show="payInputType === 'lnurl'" class="text-neon-cyan">LNURL</span>
                                </p>
                            </template>
                        </div>
                        <template x-if="payError">
                            <div class="flex items-start gap-2 p-3 rounded-lg bg-neon-pink/10 border border-neon-pink/20">
                                <i data-lucide="alert-circle" class="w-4 h-4 text-neon-pink shrink-0 mt-0.5"></i>
                                <p class="text-xs text-neon-pink" x-text="payError"></p>
                            </div>
                        </template>
                        <template x-if="lnurlError">
                            <div class="flex items-start gap-2 p-3 rounded-lg bg-neon-pink/10 border border-neon-pink/20">
                                <i data-lucide="alert-circle" class="w-4 h-4 text-neon-pink shrink-0 mt-0.5"></i>
                                <p class="text-xs text-neon-pink" x-text="lnurlError"></p>
                            </div>
                        </template>
                        <button @click="ciContinueLightning()"
                                :disabled="!payInputType || payInputType === 'unknown' || payLoading || lnurlState === 'resolving'"
                            class="w-full inline-flex items-center justify-center gap-2 px-4 py-3 rounded-lg bg-neon-green/15 border border-neon-green/40 text-neon-green font-medium hover:bg-neon-green/25 hover:border-neon-green/60 transition-all disabled:opacity-40 disabled:cursor-not-allowed">
                            <template x-if="payLoading || lnurlState === 'resolving'">
                                <span class="flex items-center gap-2"><span class="w-4 h-4 border-2 border-neon-green border-t-transparent rounded-full animate-spin"></span> Checking…</span>
                            </template>
                            <template x-if="!(payLoading || lnurlState === 'resolving')">
                                <span class="flex items-center gap-2">Continue</span>
                            </template>
                        </button>
                    </div>

                    <!-- LNURL / Lightning-address recipient card -->
                    <div x-show="lnurlState === 'resolved' || lnurlState === 'requesting'" class="space-y-4">
                        <template x-if="lnurlParams">
                            <div class="bg-navy-900 border border-navy-700 rounded-lg p-3">
                                <p class="text-xs text-gray-500 mb-0.5">Paying</p>
                                <p class="text-sm text-gray-200 font-mono break-all" x-text="lnurlParams ? lnurlParams.callback_host : ''"></p>
                                <p x-show="lnurlParams ? lnurlParams.metadata_text : false" class="text-xs text-gray-400 mt-1" x-text="lnurlParams ? lnurlParams.metadata_text : ''"></p>
                            </div>
                        </template>
                        <div>
                            <div class="flex items-center justify-between mb-1.5">
                                <label class="text-xs uppercase tracking-wider text-gray-500">Amount</label>
                                <button x-show="!lnurlAmountFixed" @click="lnurlSetMax()" class="text-[11px] text-neon-green hover:text-neon-green/80 transition-colors">Max</button>
                            </div>
                            <div class="relative">
                                <input type="number" min="1" x-model="lnurlAmountStr" :disabled="lnurlAmountFixed"
                                       class="no-spinner w-full pl-3 pr-12 py-2.5 rounded-lg text-sm font-mono bg-navy-900 border border-navy-700 text-gray-200 placeholder-gray-600 focus:outline-none focus:border-neon-green/40 focus:ring-1 focus:ring-neon-green/20 transition-all disabled:opacity-60">
                                <span class="pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-xs text-gray-500">sats</span>
                            </div>
                        </div>
                        <template x-if="lnurlCommentMax > 0">
                            <div>
                                <label class="text-xs uppercase tracking-wider text-gray-500 mb-1.5 block">Comment (optional)</label>
                                <input type="text" x-model="lnurlComment" :maxlength="lnurlCommentMax"
                                       class="w-full px-3 py-2.5 rounded-lg text-sm bg-navy-900 border border-navy-700 text-gray-200 focus:outline-none focus:border-neon-green/40 transition-all">
                            </div>
                        </template>
                        <template x-if="lnurlError">
                            <div class="flex items-start gap-2 p-3 rounded-lg bg-neon-pink/10 border border-neon-pink/20">
                                <i data-lucide="alert-circle" class="w-4 h-4 text-neon-pink shrink-0 mt-0.5"></i>
                                <p class="text-xs text-neon-pink" x-text="lnurlError"></p>
                            </div>
                        </template>
                        <div class="flex gap-2">
                            <button @click="backFromLnurl()" class="px-4 py-2.5 rounded-lg bg-navy-700 border border-navy-600 text-gray-300 hover:border-gray-500 transition-all text-sm">Back</button>
                            <button @click="requestLnurlInvoice()" :disabled="lnurlState === 'requesting'"
                                class="flex-1 inline-flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg bg-neon-green/15 border border-neon-green/40 text-neon-green font-medium hover:bg-neon-green/25 hover:border-neon-green/60 transition-all disabled:opacity-40 disabled:cursor-not-allowed">
                                <template x-if="lnurlState === 'requesting'">
                                    <span class="flex items-center gap-2"><span class="w-4 h-4 border-2 border-neon-green border-t-transparent rounded-full animate-spin"></span> Requesting…</span>
                                </template>
                                <template x-if="lnurlState !== 'requesting'">
                                    <span>Continue</span>
                                </template>
                            </button>
                        </div>
                    </div>

                    <!-- Invoice review + pay -->
                    <template x-if="decodedInvoice && !payResult">
                      <div class="space-y-4">
                        <div class="text-center py-2">
                            <p class="text-xs uppercase tracking-wider text-gray-500 mb-1">Paying</p>
                            <p class="text-2xl font-bold font-mono text-white"><span x-text="formatSats(payAmountSats())"></span> <span class="text-sm text-gray-500 font-normal">sats</span></p>
                        </div>
                        <template x-if="decodedInvoice.description">
                            <div class="bg-navy-900 border border-navy-700 rounded-lg p-3">
                                <p class="text-[11px] uppercase tracking-wider text-gray-500 mb-1">Description</p>
                                <p class="text-xs text-gray-300 break-words" x-text="decodedInvoice.description"></p>
                            </div>
                        </template>
                        <template x-if="payInvoiceExpired">
                            <div class="flex items-start gap-2 p-3 rounded-lg bg-neon-pink/10 border border-neon-pink/30">
                                <i data-lucide="alert-circle" class="w-4 h-4 text-neon-pink shrink-0 mt-0.5"></i>
                                <p class="text-xs text-neon-pink">This invoice has expired. Ask for a fresh one.</p>
                            </div>
                        </template>
                        <template x-if="payAmountSats() > ciMaxFreeable">
                            <div class="flex items-start gap-2 p-3 rounded-lg bg-neon-yellow/10 border border-neon-yellow/30">
                                <i data-lucide="alert-triangle" class="w-4 h-4 text-neon-yellow shrink-0 mt-0.5"></i>
                                <p class="text-xs text-neon-yellow">This is more than this channel can send right now (<span x-text="formatSats(ciMaxFreeable)"></span> sats). The payment may not find a route.</p>
                            </div>
                        </template>
                        <p class="text-[11px] text-gray-500 text-center">
                            Routes out through <span class="font-mono text-gray-400" x-text="ciChannelAlias"></span>
                        </p>
                        <!-- Advanced: routing fee cap. Kept behind a disclosure
                             so the default path is one tap. Bound to the shared
                             send fee-limit (sats mode). -->
                        <div>
                            <button type="button" @click="ciAdvancedOpen = !ciAdvancedOpen"
                                class="w-full flex items-center justify-between text-[11px] text-gray-500 hover:text-gray-300 transition-colors">
                                <span>Advanced</span>
                                <i :data-lucide="ciAdvancedOpen ? 'chevron-up' : 'chevron-down'" class="w-3.5 h-3.5"></i>
                            </button>
                            <div x-show="ciAdvancedOpen" class="mt-2">
                                <label class="text-[11px] uppercase tracking-wider text-gray-500 mb-1 block">Max routing fee</label>
                                <div class="relative">
                                    <input type="number" min="0" x-model.number="payFeeLimitSats"
                                           class="no-spinner w-full pl-3 pr-12 py-2 rounded-lg text-sm font-mono bg-navy-900 border border-navy-700 text-gray-200 focus:outline-none focus:border-neon-green/40 focus:ring-1 focus:ring-neon-green/20 transition-all">
                                    <span class="pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-xs text-gray-500">sats</span>
                                </div>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button @click="backFromInvoiceReview()" class="px-4 py-2.5 rounded-lg bg-navy-700 border border-navy-600 text-gray-300 hover:border-gray-500 transition-all text-sm">Back</button>
                            <button @click="ciSendPayment()" :disabled="payLoading || payInvoiceExpired"
                                class="flex-1 inline-flex items-center justify-center gap-2 px-4 py-3 rounded-lg bg-neon-green/15 border border-neon-green/40 text-neon-green font-medium hover:bg-neon-green/25 hover:border-neon-green/60 transition-all disabled:opacity-40 disabled:cursor-not-allowed">
                                <template x-if="payLoading">
                                    <span class="flex items-center gap-2"><span class="w-4 h-4 border-2 border-neon-green border-t-transparent rounded-full animate-spin"></span> Paying…</span>
                                </template>
                                <template x-if="!payLoading">
                                    <span class="flex items-center gap-2"><i data-lucide="send" class="w-4 h-4"></i> Pay & open room</span>
                                </template>
                            </button>
                        </div>
                      </div>
                    </template>

                    <!-- Result -->
                    <template x-if="payResult">
                      <div class="space-y-5">
                        <template x-if="payResult.success">
                            <div class="space-y-4">
                                <div class="flex items-center justify-center py-2">
                                    <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-neon-green/15 border-2 border-neon-green/60">
                                        <i data-lucide="check" class="w-7 h-7 text-neon-green"></i>
                                    </div>
                                </div>
                                <div class="text-center">
                                    <h3 class="text-base font-semibold text-white mb-1">Payment sent</h3>
                                    <p class="text-xs text-gray-400">This channel now has more room to receive.</p>
                                </div>
                            </div>
                        </template>
                        <template x-if="!payResult.success">
                            <div class="space-y-4">
                                <div class="flex items-center justify-center py-2">
                                    <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-neon-pink/15 border-2 border-neon-pink/40">
                                        <i data-lucide="alert-triangle" class="w-7 h-7 text-neon-pink"></i>
                                    </div>
                                </div>
                                <div class="text-center">
                                    <h3 class="text-base font-semibold text-white mb-1">Payment failed</h3>
                                    <p class="text-xs text-gray-400 max-w-sm mx-auto" x-text="payResult.error || 'The payment did not go through. Your sats are safe.'"></p>
                                </div>
                            </div>
                        </template>
                        <div class="flex flex-col gap-2">
                            <button @click="ciResetPayment()"
                                class="w-full inline-flex items-center justify-center gap-2 px-4 py-3 rounded-lg bg-neon-green/15 border border-neon-green/40 text-neon-green hover:bg-neon-green/25 hover:border-neon-green/60 transition-all text-sm font-medium">
                                <i data-lucide="refresh-cw" class="w-4 h-4"></i> Make another payment
                            </button>
                            <button @click="closeChannelInbound()"
                                class="w-full inline-flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg bg-navy-700 border border-navy-600 text-gray-300 hover:border-gray-500 transition-all text-sm">
                                Done
                            </button>
                        </div>
                      </div>
                    </template>
                </div>
            </div>
        </div>
    </template>

    <!-- COLD STORAGE DIALOG -->
    <template x-if="showColdStorage">
        <div class="fixed inset-0 z-50 flex items-center justify-center" @keydown.escape.window="closeColdStorage()">
            <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="closeColdStorage()"></div>
