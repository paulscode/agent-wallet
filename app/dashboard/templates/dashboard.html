                                                 x-on:click.stop="braiinsDepositInfoTipOpen"
                                                 class="absolute bottom-full left-0 mb-2 w-64 z-30 p-3 rounded-lg bg-navy-700 border border-navy-500 shadow-xl text-xs text-gray-200 leading-relaxed normal-case">
                                                <p class="font-semibold text-white mb-1" x-text="braiinsDepositGlossaryTitle('channel-reserve')"></p>
                                                <p x-text="braiinsDepositGlossaryBody('channel-reserve')"></p>
                                            </div>
                                        </span>
                                        <span class="font-mono" x-text="formatSats(braiinsDepositChannelCapacitySats)"></span>
                                    </div>
                                    <!-- Bumped to the channel minimum: prominent. -->
                                    <template x-if="braiinsDepositChannelBumpedToMin">
                                        <p class="text-amber-200/90">
                                            Lightning channels have a minimum size, so this deposit opens a larger (minimum-size) channel. About <span class="font-mono" x-text="formatSats(braiinsDepositChannelExcessToLnSats)"></span> sats won't go to Braiins — it becomes spendable Lightning balance you keep.
                                        </p>
                                    </template>
                                    <!-- Naturally sized: small leftover note. -->
                                    <template x-if="!braiinsDepositChannelBumpedToMin">
                                        <p class="text-gray-500">
                                            ~<span class="font-mono" x-text="formatSats(braiinsDepositChannelExcessPlusReserveSats)"></span> sats stays in the new channel as Lightning balance you keep.
                                        </p>
                                    </template>
                                </div>
                            </template>
                            <div class="flex items-center justify-between text-sm">
                                <span class="text-gray-400">Total fees</span>
                                <span class="font-mono text-white">~<span x-text="formatSats(braiinsDepositTotalFeeSats)"></span> sats</span>
                            </div>
                            <div class="flex items-center justify-between text-sm pt-1.5 border-t border-navy-700">
                                <span class="text-gray-400" x-text="braiinsDepositDebitLabel"></span>
                                <span class="font-mono text-white">~<span x-text="formatSats(braiinsDepositDebitAmount)"></span> sats</span>
                            </div>
                            <button type="button" @click="braiinsDepositFeeDetailsOpen = !braiinsDepositFeeDetailsOpen"
                                class="w-full mt-1 pt-2 border-t border-navy-700 flex items-center justify-between text-[11px] text-gray-500 hover:text-gray-300 transition-colors">
                                <span>Fee details</span>
                                <i :data-lucide="braiinsDepositFeeDetailsOpen ? 'chevron-up' : 'chevron-down'" class="w-3.5 h-3.5"></i>
                            </button>
                            <div x-show="braiinsDepositFeeDetailsOpen" class="space-y-1 pt-1">
                                <template x-if="braiinsDepositSourceKind === 'onchain'">
                                    <div>
                                        <div class="flex items-center justify-between text-[11px]">
                                            <span class="text-gray-500">On-chain → Lightning service fee</span>
                                            <span class="font-mono text-gray-300"><span x-text="formatSats(braiinsDepositSubmarineServiceFeeSats)"></span> sats</span>
                                        </div>
                                        <div class="flex items-center justify-between text-[11px]">
                                            <span class="text-gray-500">On-chain funding-tx fee</span>
                                            <span class="font-mono text-gray-300"><span x-text="formatSats(braiinsDepositSubmarineFundingFeeSats)"></span> sats</span>
                                        </div>
                                    </div>
                                </template>
                                <div class="flex items-center justify-between text-[11px]">
                                    <span class="text-gray-500">Lightning → on-chain service fee</span>
                                    <span class="font-mono text-gray-300"><span x-text="formatSats(braiinsDepositBoltzServiceFeeSats)"></span> sats</span>
                                </div>
                                <div class="flex items-center justify-between text-[11px]">
                                    <span class="inline-flex items-center gap-1 relative text-gray-500">
                                        Lightning routing headroom
                                        <button type="button"
                                                class="text-gray-500 hover:text-emerald-400 focus:text-emerald-400 focus:outline-none"
                                                x-on:click.stop="braiinsDepositToggleInfoTip('routing-headroom')"
                                                aria-label="What is the Lightning routing headroom?">
                                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                            </svg>
                                        </button>
                                        <div x-show="braiinsDepositInfoTipOpen === 'routing-headroom'" x-cloak
                                             x-on:click.stop="braiinsDepositInfoTipOpen"
                                             class="absolute bottom-full left-0 mb-2 w-64 z-30 p-3 rounded-lg bg-navy-700 border border-navy-500 shadow-xl text-xs text-gray-200 leading-relaxed normal-case">
                                            <p class="font-semibold text-white mb-1" x-text="braiinsDepositGlossaryTitle('routing-headroom')"></p>
                                            <p x-text="braiinsDepositGlossaryBody('routing-headroom')"></p>
                                        </div>
                                    </span>
                                    <span class="font-mono text-gray-300"><span x-text="formatSats(braiinsDepositRoutingFeeSats)"></span> sats</span>
                                </div>
                                <div class="flex items-center justify-between text-[11px]">
                                    <span class="text-gray-500">Send-to-Braiins fee</span>
                                    <span class="font-mono text-gray-300"><span x-text="formatSats(braiinsDepositSendFeeSats)"></span> sats</span>
                                </div>
                            </div>
                        </div>
                    </template>

                    <p class="text-[11px] text-gray-500 leading-relaxed" x-text="braiinsDepositLeadDescription"></p>

                    <template x-if="braiinsDepositError">
                        <div class="flex items-start gap-2 p-3 rounded-lg bg-neon-pink/10 border border-neon-pink/20">
                            <i data-lucide="alert-circle" class="w-4 h-4 text-neon-pink shrink-0 mt-0.5"></i>
                            <p class="text-xs text-neon-pink" x-text="braiinsDepositError"></p>
                        </div>
                    </template>

                    <!-- D1(a) contextual recommendation: swap couldn't be
                         routed to our node, but a channel-open would work. -->
                    <template x-if="braiinsDepositChannelSuggested">
                        <div class="flex items-start gap-2 p-3 rounded-lg bg-amber-500/10 border border-amber-500/30">
                            <i data-lucide="lightbulb" class="w-4 h-4 text-amber-300 shrink-0 mt-0.5"></i>
                            <div class="text-[11px] text-amber-200/90 leading-relaxed">
                                <p>Your node can't currently receive this over Lightning. You can deposit anyway by <span class="font-semibold">opening a channel</span> — slower (~30-60 min) and ~1% stays as receive capacity you keep.</p>
                                <button type="button"
                                        class="mt-1.5 inline-flex items-center gap-1 text-emerald-300 hover:text-emerald-200 font-semibold focus:outline-none"
                                        x-on:click="braiinsDepositAcceptChannelSuggestion()">
                                    <i data-lucide="git-merge" class="w-3 h-3"></i>
                                    Open a channel instead
                                </button>
                            </div>
                        </div>
                    </template>

                    <template x-if="!braiinsDepositCanStart && !braiinsDepositLoading">
                        <p class="text-[11px] text-gray-500 text-center" x-text="braiinsDepositStartHint"></p>
                    </template>

                    <button @click="braiinsDepositStart()" :disabled="!braiinsDepositCanStart || braiinsDepositLoading"
                        class="w-full inline-flex items-center justify-center gap-2 px-4 py-3 rounded-lg bg-neon-cyan/15 border border-neon-cyan/40 text-neon-cyan font-medium hover:bg-neon-cyan/25 hover:border-neon-cyan/60 transition-all disabled:opacity-40 disabled:cursor-not-allowed">
                        <template x-if="braiinsDepositLoading">
                            <span class="flex items-center gap-2"><span class="w-4 h-4 border-2 border-neon-cyan border-t-transparent rounded-full animate-spin"></span> Starting…</span>
                        </template>
                        <template x-if="!braiinsDepositLoading">
                            <span class="flex items-center gap-2" x-text="braiinsDepositStartButtonLabel"></span>
                        </template>
                    </button>
                </div>

                <!-- ──────── AWAIT FUNDS (external sources) ──────── -->
                <!-- Shows the user the receive primitive (Lightning
                     invoice or Bitcoin address) and waits for their
                     payment / deposit to arrive. -->
                <div x-show="braiinsDepositStep === 'await_funds'" class="space-y-5 mt-3">
                    <!-- ── ext-LN: pay-this-invoice screen ──
                         Plan.a — when the countdown hits 0 the
                         QR + invoice card are replaced with a
                         "This invoice expired" panel so the user
                         doesn't accidentally pay a dead invoice.
                         The "Generate new invoice" button moves to
                         centre-prominent at that point. -->
                    <template x-if="braiinsDepositSession && braiinsDepositSession.source_kind === 'ext_lightning'">
                        <div class="space-y-4">
                            <!-- ── Active-invoice state ── -->
                            <template x-if="!braiinsDepositExtInvoiceExpired">
                                <div class="space-y-4">
                                    <p class="text-sm text-gray-300 leading-relaxed">
                                        Pay this Lightning invoice from your other wallet:
                                    </p>

                                    <!-- QR code -->
                                    <div class="flex justify-center pt-1">
                                        <canvas x-ref="braiinsDepositExtLnQr"
                                                width="220" height="220"
                                                class="bg-white rounded p-2"></canvas>
                                    </div>

                                    <!-- Amount + countdown -->
                                    <div class="grid grid-cols-2 gap-3 text-center">
                                        <div class="bg-navy-900 border border-navy-700 rounded-lg p-3">
                                            <p class="text-[10px] uppercase tracking-wider text-gray-500 mb-1">Amount</p>
                                            <p class="font-mono text-base text-neon-cyan">
                                                <span x-text="formatSats(braiinsDepositSession.ext_intake_amount_sats || 0)"></span>
                                                <span class="text-xs text-gray-500"> sats</span>
                                            </p>
                                        </div>
                                        <div class="bg-navy-900 border border-navy-700 rounded-lg p-3">
                                            <p class="text-[10px] uppercase tracking-wider text-gray-500 mb-1">Expires in</p>
                                            <p class="font-mono text-base"
                                               :class="braiinsDepositExtCountdownCritical ? 'text-neon-pink' : 'text-gray-200'"
                                               x-text="braiinsDepositExtCountdownText"></p>
                                        </div>
                                    </div>

                                    <!-- Invoice (click-to-copy) -->
                                    <div x-on:click="braiinsDepositCopyInvoice()"
                                         class="group cursor-pointer bg-navy-900 border border-navy-700 rounded-lg p-3 hover:border-neon-cyan/40 transition-all"
                                         title="Copy invoice">
                                        <div class="flex items-center justify-between mb-1">
                                            <p class="text-[11px] text-gray-400">Lightning invoice</p>
                                            <i data-lucide="copy" class="w-3.5 h-3.5 text-gray-500 group-hover:text-neon-cyan shrink-0"></i>
                                        </div>
                                        <p class="font-mono text-[11px] text-gray-300 break-all leading-relaxed select-all max-h-24 overflow-y-auto"
                                           x-text="braiinsDepositSession.ext_ln_invoice || '(generating…)'"></p>
                                    </div>

                                    <!-- Status banner: waiting / arrived. The
                                         "Payment received!" two-stage flip
                                         (plan.a) shows when the
                                         transition to SWAPPING is in flight
                                         but the wizard is still on
                                         await_funds — gives the user a beat
                                         to register what happened. -->
                                    <template x-if="!braiinsDepositExtPaymentReceived">
                                        <div class="flex items-start gap-2 p-3 rounded-lg bg-neon-cyan/5 border border-neon-cyan/20">
                                            <div class="w-4 h-4 rounded-full bg-neon-cyan/30 border-2 border-neon-cyan/60 animate-pulse-neon mt-0.5 shrink-0"></div>
                                            <div class="flex-1">
                                                <p class="text-xs text-neon-cyan font-medium">Waiting for your payment...</p>
                                                <p class="text-[11px] text-gray-400 mt-0.5 leading-relaxed">
                                                    Once you pay this invoice, we'll automatically build a fresh Bitcoin transaction and send your deposit to Braiins. You can close this window — we'll keep working in the background.
                                                </p>
                                            </div>
                                        </div>
                                    </template>
                                    <template x-if="braiinsDepositExtPaymentReceived">
                                        <div class="flex items-start gap-2 p-3 rounded-lg bg-neon-green/10 border border-neon-green/30">
                                            <i data-lucide="check-circle-2" class="w-4 h-4 text-neon-green shrink-0 mt-0.5"></i>
                                            <div class="flex-1">
                                                <p class="text-xs text-neon-green font-medium">✓ Payment received!</p>
                                                <p class="text-[11px] text-gray-300 mt-0.5 leading-relaxed">
                                                    Building your Bitcoin transaction…
                                                </p>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </template>

                            <!-- ── Expired-invoice state ── -->
                            <template x-if="braiinsDepositExtInvoiceExpired">
                                <div class="space-y-4">
                                    <div class="flex flex-col items-center text-center py-4 px-3 rounded-lg bg-navy-900 border border-neon-pink/30">
                                        <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-neon-pink/15 border border-neon-pink/40 mb-3">
                                            <i data-lucide="clock-alert" class="w-6 h-6 text-neon-pink"></i>
                                        </div>
                                        <h3 class="text-sm font-medium text-white mb-1">This invoice expired</h3>
                                        <p class="text-[11px] text-gray-400 leading-relaxed max-w-sm">
                                            No payment was received before the invoice timed out. Generate a new one to continue — your other wallet will still be able to pay it.
                                        </p>
                                    </div>
                                </div>
                            </template>

                            <template x-if="braiinsDepositError">
                                <div class="flex items-start gap-2 p-3 rounded-lg bg-neon-pink/10 border border-neon-pink/20">
                                    <i data-lucide="alert-circle" class="w-4 h-4 text-neon-pink shrink-0 mt-0.5"></i>
                                    <p class="text-xs text-neon-pink" x-text="braiinsDepositError"></p>
                                </div>
                            </template>

                            <!-- Actions. When the invoice has expired
                                 "Generate new invoice" gets visual
                                 prominence (centre, filled neon-cyan).
                                 -->
                            <template x-if="!braiinsDepositExtInvoiceExpired">
                                <div class="flex items-center gap-2">
                                    <button @click="braiinsDepositRegenerateInvoice()"
                                            :disabled="braiinsDepositLoading || !braiinsDepositCanRegenerateInvoice"
                                            class="flex-1 px-3 py-2 rounded-md text-xs text-gray-400 hover:text-white hover:bg-navy-800 transition-all disabled:opacity-40 disabled:cursor-not-allowed">
                                        Generate new invoice
                                    </button>
                                    <button @click="braiinsDepositCancel()"
                                            class="flex-1 px-3 py-2 rounded-md text-xs text-neon-pink hover:bg-neon-pink/10 transition-all">
                                        Cancel
                                    </button>
                                </div>
                            </template>
                            <template x-if="braiinsDepositExtInvoiceExpired">
                                <div class="space-y-2">
                                    <button @click="braiinsDepositRegenerateInvoice()"
                                            :disabled="braiinsDepositLoading"
                                            class="w-full inline-flex items-center justify-center gap-2 px-4 py-3 rounded-lg bg-neon-cyan/15 border border-neon-cyan/40 text-neon-cyan font-medium hover:bg-neon-cyan/25 hover:border-neon-cyan/60 transition-all disabled:opacity-40 disabled:cursor-not-allowed">
                                        <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                                        Generate new invoice
                                    </button>
                                    <button @click="braiinsDepositCancel()"
                                            class="w-full px-3 py-2 rounded-md text-xs text-gray-400 hover:text-neon-pink hover:bg-neon-pink/10 transition-all">
                                        Cancel
                                    </button>
                                </div>
                            </template>
                        </div>
                    </template>

                    <!-- ── ext-OC: send-to-this-address screen ── -->
                    <template x-if="braiinsDepositSession && braiinsDepositSession.source_kind === 'ext_onchain'">
                        <div class="space-y-4">
                            <p class="text-sm text-gray-300 leading-relaxed">
                                Send sats to this address from your other wallet:
                            </p>

                            <!-- QR code -->
                            <div class="flex justify-center pt-1">
                                <canvas x-ref="braiinsDepositExtOcQr"
                                        width="220" height="220"
                                        class="bg-white rounded p-2"></canvas>
                            </div>

                            <!-- Amount line (click-to-copy: RAW sats, no separators) -->
                            <div x-on:click="braiinsDepositCopyAmount()"
                                 class="group cursor-pointer bg-navy-900 border border-navy-700 rounded-lg p-3 text-center hover:border-neon-cyan/40 transition-all"
                                 title="Copy amount in sats">
                                <p class="text-[10px] uppercase tracking-wider text-gray-500 mb-1">Send exactly</p>
                                <p class="font-mono text-base text-neon-cyan inline-flex items-center justify-center gap-2">
                                    <span>
                                        <span x-text="formatSats(braiinsDepositSession.ext_intake_amount_sats || 0)"></span>
                                        <span class="text-xs text-gray-500"> sats</span>
                                    </span>
                                    <i data-lucide="copy" class="w-3.5 h-3.5 text-gray-500 group-hover:text-neon-cyan shrink-0"></i>
                                </p>
                            </div>

                            <!-- Address (click-to-copy) -->
                            <div x-on:click="braiinsDepositCopyAddress()"
                                 class="group cursor-pointer bg-navy-900 border border-navy-700 rounded-lg p-3 hover:border-neon-cyan/40 transition-all"
                                 title="Copy address">
                                <div class="flex items-center justify-between mb-1">
                                    <p class="text-[11px] text-gray-400">Bitcoin address</p>
                                    <i data-lucide="copy" class="w-3.5 h-3.5 text-gray-500 group-hover:text-neon-cyan shrink-0"></i>
                                </div>
                                <p class="font-mono text-xs text-gray-200 break-all select-all"
                                   x-text="braiinsDepositSession.ext_intake_address || '(generating…)'"></p>
                            </div>

                            <!-- Partial-deposit banner (when received > 0 but < required) -->
                            <template x-if="(braiinsDepositSession.ext_intake_received_sats || 0) > 0 && (braiinsDepositSession.ext_intake_received_sats || 0) < (braiinsDepositSession.ext_intake_amount_sats || 0)">
                                <div class="flex items-start gap-2 p-3 rounded-lg bg-neon-yellow/10 border border-neon-yellow/30">
                                    <i data-lucide="alert-triangle" class="w-4 h-4 text-neon-yellow shrink-0 mt-0.5"></i>
                                    <div class="flex-1 text-xs text-neon-yellow">
                                        <p class="font-medium">Partial deposit received</p>
                                        <p class="mt-0.5 text-gray-300">
                                            You sent <span class="font-mono" x-text="formatSats(braiinsDepositSession.ext_intake_received_sats || 0)"></span> sats.
                                            Send <span class="font-mono" x-text="formatSats(braiinsDepositExtRemainingSats)"></span> more sats to the same address to continue.
                                        </p>
                                    </div>
                                </div>
                            </template>

                            <!-- Deposit detected in the mempool — waiting for
                                 confirmations. Replaces the "waiting for your
                                 deposit" banner the moment the tx is seen. -->
                            <template x-if="braiinsDepositExtDepositDetected">
                                <div class="flex items-start gap-2 p-3 rounded-lg bg-neon-cyan/10 border border-neon-cyan/40">
                                    <i data-lucide="clock" class="w-4 h-4 text-neon-cyan shrink-0 mt-0.5"></i>
                                    <div class="flex-1">
                                        <p class="text-xs text-neon-cyan font-medium">
                                            Deposit detected — waiting for confirmations
                                            (<span x-text="braiinsDepositExtDetectedConfs"></span>/<span x-text="braiinsDepositExtConfsRequired"></span>)
                                        </p>
                                        <p class="text-[11px] text-gray-400 mt-0.5 leading-relaxed">
                                            We found your transaction in the mempool. We'll start working once it reaches
                                            <span x-text="braiinsDepositExtConfsRequired"></span>
                                            confirmation<span x-show="braiinsDepositExtConfsRequired !== 1">s</span>. You can close this window — we'll continue in the background.
                                        </p>
                                        <template x-if="braiinsDepositExtDetectedTxid">
                                            <a :href="mempoolTxUrl(braiinsDepositExtDetectedTxid)" target="_blank" rel="noopener noreferrer"
                                               class="inline-flex items-center gap-1 mt-1.5 text-[11px] text-neon-cyan hover:underline">
                                                <i data-lucide="external-link" class="w-3 h-3"></i>
                                                View transaction in mempool
                                            </a>
                                        </template>
                                    </div>
                                </div>
                            </template>

                            <!-- Status banner. The ⓘ on "confirmation"
                                 opens the existing BRAIINS_DEPOSIT_GLOSSARY
                                 entry (/.b). -->
                            <template x-if="!braiinsDepositExtDepositDetected">
                            <div class="flex items-start gap-2 p-3 rounded-lg bg-neon-cyan/5 border border-neon-cyan/20">
                                <div class="w-4 h-4 rounded-full bg-neon-cyan/30 border-2 border-neon-cyan/60 animate-pulse-neon mt-0.5 shrink-0"></div>
                                <div class="flex-1">
                                    <p class="text-xs text-neon-cyan font-medium">Waiting for your deposit...</p>
                                    <!-- <div>, not <p>: contains an info-tip popover <div>; see
                                         the wrapper-conversion note at the top of this dialog. -->
                                    <div class="text-[11px] text-gray-400 mt-0.5 leading-relaxed">
                                        Send the exact amount shown above, in a single Bitcoin transaction (or in multiple — we'll add them up). We'll start working once your deposit gets 1 confirmation<span class="relative inline-flex items-center align-middle ml-0.5">
                                            <button type="button"
                                                    class="text-gray-500 hover:text-neon-cyan focus:text-neon-cyan transition-colors focus:outline-none"
                                                    x-on:click.stop="braiinsDepositToggleInfoTip('confirmation')"
                                                    aria-label="What is a confirmation?">
                                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                                </svg>
                                            </button>
                                            <div x-show="braiinsDepositInfoTipOpen === 'confirmation'" x-cloak
                                                 x-on:click.stop="braiinsDepositInfoTipOpen"
                                                 class="absolute bottom-full left-0 mb-2 w-64 z-30 p-3 rounded-lg bg-navy-700 border border-navy-500 shadow-xl text-xs text-gray-200 leading-relaxed normal-case">
                                                <p class="font-semibold text-white mb-1" x-text="braiinsDepositGlossaryTitle('confirmation')"></p>
                                                <p x-text="braiinsDepositGlossaryBody('confirmation')"></p>
                                            </div>
                                        </span> (~10-30 minutes). You can close this window — we'll continue in the background.
                                    </div>
                                </div>
                            </div>
                            </template>

                            <template x-if="braiinsDepositError">
                                <div class="flex items-start gap-2 p-3 rounded-lg bg-neon-pink/10 border border-neon-pink/20">
                                    <i data-lucide="alert-circle" class="w-4 h-4 text-neon-pink shrink-0 mt-0.5"></i>
                                    <p class="text-xs text-neon-pink" x-text="braiinsDepositError"></p>
                                </div>
                            </template>

                            <!-- Cancel — hidden once the deposit is detected
                                 in the mempool: the funds are already in
                                 flight to a wallet-controlled address, so
                                 cancelling can't stop them (it would only
                                 orphan them). The deposit proceeds once it
                                 confirms; the user dismisses via the dialog's
                                 close/X instead. -->
                            <template x-if="!braiinsDepositExtDepositDetected">
                                <button @click="braiinsDepositCancel()"
                                        class="w-full px-3 py-2 rounded-md text-xs text-neon-pink hover:bg-neon-pink/10 transition-all">
                                    Cancel
                                </button>
                            </template>
                        </div>
                    </template>
                </div>

                <!-- ──────── PROGRESS ──────── -->
                <div x-show="braiinsDepositStep === 'progress'" class="space-y-5 mt-3">
                    <div class="flex items-center justify-center py-2">
                        <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-neon-cyan/15 border-2 border-neon-cyan/40 animate-pulse-neon">
                            <i data-lucide="pickaxe" class="w-6 h-6 text-neon-cyan"></i>
                        </div>
                    </div>

                    <!- — parked-session banner. Shows when the
                         session is in AWAITING_FEE_REDUCTION; surfaces
                         the resume-threshold target and the override
                         button so the user has the same actionable
                         state in the wizard as on the deposits-list
                         tab. -->
                    <template x-if="braiinsDepositSession
                                    && braiinsDepositSession.status === 'awaiting_fee_reduction'">
                        <div class="bg-amber-900/30 border border-amber-500/40 rounded-lg p-3 text-xs text-amber-200 leading-relaxed space-y-2">
                            <p class="font-semibold flex items-center gap-1.5">
                                <i data-lucide="clock" class="w-3.5 h-3.5"></i>
                                Waiting for network fees to drop
                            </p>
                            <template x-if="braiinsDepositSession.resume_threshold_sat_per_vbyte > 0">
                                <p>
                                    The on-chain send will resume automatically when fees drop to
                                    <span class="font-mono">≤ <span x-text="braiinsDepositSession.resume_threshold_sat_per_vbyte"></span></span>
                                    sat/vB.
                                </p>
                            </template>
                            <button type="button"
                                    @click="braiinsDepositWizardOverride()"
                                    class="px-2.5 py-1 rounded text-[11px] font-medium bg-amber-500/15 border border-amber-500/40 text-amber-200 hover:bg-amber-500/25 transition-all">
                                Broadcast anyway →
                            </button>
                        </div>
                    </template>

                    <!-- Progress dot row. The dot list
                         varies by source_kind — self-LN (3), self-OC
                         (4), ext-LN (4), ext-OC (5). The
                         ``braiinsDepositProgressDots`` getter produces
                         the right list; we iterate and compare each
                         dot's index to the active
                         ``braiinsDepositProgressStep``. -->
                    <div class="bg-navy-900 border border-navy-700 rounded-lg p-4 space-y-2.5">
                        <template x-for="dot in braiinsDepositProgressDots" :key="dot.label">
                            <div class="flex items-center gap-2.5 text-sm">
                                <span class="w-2 h-2 rounded-full"
                                      :class="braiinsDepositProgressStep >= dot.index
                                              ? (braiinsDepositProgressStep === dot.index ? 'bg-neon-cyan animate-pulse-neon' : 'bg-neon-cyan')
                                              : 'bg-navy-700'"></span>
                                <span :class="braiinsDepositProgressStep >= dot.index ? 'text-gray-200' : 'text-gray-500'"
                                      x-text="dot.label"></span>
                            </div>
                        </template>
                    </div>

                    <!-- Surface the submarine-funding txid
                         (the wallet's send to Boltz's lockup address)
                         for both self-OC and ext-OC sessions — they
                         share the same submarine leg downstream of
                         AWAITING_ONCHAIN_FUNDS. -->
                    <template x-if="braiinsDepositSession && (braiinsDepositSession.source_kind === 'onchain' || braiinsDepositSession.source_kind === 'ext_onchain') && braiinsDepositSession.submarine_funding_txid">
                        <div>
                            <p class="text-xs uppercase tracking-wider text-gray-500 mb-1.5">
                                On-chain funding transaction
                            </p>
                            <div class="flex items-center gap-2 bg-navy-800 border border-navy-700 rounded px-3 py-2">
                                <span class="font-mono text-xs text-gray-300 truncate flex-1" x-text="braiinsDepositSession.submarine_funding_txid"></span>
                                <button @click="copyText(braiinsDepositSession.submarine_funding_txid)"
                                        class="text-gray-500 hover:text-neon-cyan transition-colors"
                                        title="Copy transaction ID">
                                    <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                                </button>
                                <a x-show="mempoolBaseUrl"
                                   :href="mempoolTxUrl(braiinsDepositSession.submarine_funding_txid)" target="_blank" rel="noopener noreferrer"
                                   class="text-gray-500 hover:text-neon-cyan transition-colors"
                                   title="View in mempool explorer">
                                    <i data-lucide="external-link" class="w-3.5 h-3.5"></i>
                                </a>
                            </div>
                            <template x-if="braiinsDepositSession.submarine_funding_confirmations !== undefined && braiinsDepositSession.submarine_funding_confirmations !== null">
                                <p class="text-[11px] text-gray-500 mt-1">
                                    <span x-text="braiinsDepositSession.submarine_funding_confirmations"></span> confirmation<span x-text="braiinsDepositSession.submarine_funding_confirmations === 1 ? '' : 's'"></span>
                                </p>
                            </template>
                        </div>
                    </template>

                    <!-- Channel funding tx (funding_strategy="channel"). Mirrors
                         the submarine funding-tx block so the user can watch the
                         channel open confirm in their mempool explorer. -->
                    <template x-if="braiinsDepositSession && braiinsDepositSession.funding_strategy === 'channel' && braiinsDepositSession.channel_open_txid">
                        <div>
                            <p class="text-xs uppercase tracking-wider text-gray-500 mb-1.5">
                                Channel funding transaction
                            </p>
                            <div class="flex items-center gap-2 bg-navy-800 border border-navy-700 rounded px-3 py-2">
                                <span class="font-mono text-xs text-gray-300 truncate flex-1" x-text="braiinsDepositSession.channel_open_txid"></span>
                                <button @click="copyText(braiinsDepositSession.channel_open_txid)"
                                        class="text-gray-500 hover:text-neon-cyan transition-colors"
                                        title="Copy transaction ID">
                                    <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                                </button>
                                <a x-show="mempoolBaseUrl"
                                   :href="mempoolTxUrl(braiinsDepositSession.channel_open_txid)" target="_blank" rel="noopener noreferrer"
                                   class="text-gray-500 hover:text-neon-cyan transition-colors"
                                   title="View in mempool explorer">
                                    <i data-lucide="external-link" class="w-3.5 h-3.5"></i>
                                </a>
                            </div>
                            <template x-if="braiinsDepositSession.channel_open_confirmations !== undefined && braiinsDepositSession.channel_open_confirmations !== null">
                                <p class="text-[11px] text-gray-500 mt-1">
                                    <span x-text="braiinsDepositSession.channel_open_confirmations"></span><span x-show="braiinsDepositSession.channel_activation_confs"> / <span x-text="braiinsDepositSession.channel_activation_confs"></span></span> confirmation<span x-text="braiinsDepositSession.channel_open_confirmations === 1 ? '' : 's'"></span><span x-show="braiinsDepositSession.channel_activation_confs && braiinsDepositSession.channel_open_confirmations >= braiinsDepositSession.channel_activation_confs"> — ready</span>
                                </p>
                            </template>
                        </div>
                    </template>

                    <!-- T1: Boltz claim tx (the fresh-UTXO tx in your wallet) -->
                    <template x-if="braiinsDepositSession && braiinsDepositSession.fresh_utxo_txid">
                        <div>
                            <!-- <div>, not <p>: contains popover <div>. -->
                            <div class="text-xs uppercase tracking-wider text-gray-500 mb-1.5">
                                Bitcoin transaction prepared
                                <span class="relative inline-flex items-center align-middle ml-1">
                                    <button type="button" class="text-gray-500 hover:text-neon-cyan focus:text-neon-cyan transition-colors focus:outline-none"
                                        x-on:click.stop="braiinsDepositToggleInfoTip('btc-tx-prepared')"
                                        aria-label="What does this mean?">
                                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                        </svg>
                                    </button>
                                    <div x-show="braiinsDepositInfoTipOpen === 'btc-tx-prepared'" x-cloak
                                         x-on:click.stop="braiinsDepositInfoTipOpen"
                                         class="absolute top-full left-0 mt-2 w-64 z-30 p-3 rounded-lg bg-navy-700 border border-navy-500 shadow-xl text-xs text-gray-200 leading-relaxed normal-case">
                                        <p class="font-semibold text-white mb-1.5" x-text="braiinsDepositGlossaryTitle('btc-tx-prepared')"></p>
                                        <p x-text="braiinsDepositGlossaryBody('btc-tx-prepared')"></p>
                                    </div>
                                </span>
                            </div>
                            <div class="flex items-center gap-2 bg-navy-800 border border-navy-700 rounded px-3 py-2">
                                <span class="font-mono text-xs text-gray-300 truncate flex-1" x-text="braiinsDepositSession.fresh_utxo_txid"></span>
                                <button @click="copyText(braiinsDepositSession.fresh_utxo_txid)"
                                        class="text-gray-500 hover:text-neon-cyan transition-colors"
                                        title="Copy transaction ID">
                                    <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                                </button>
                                <a x-show="mempoolBaseUrl"
                                   :href="mempoolTxUrl(braiinsDepositSession.fresh_utxo_txid)" target="_blank" rel="noopener noreferrer"
                                   class="text-gray-500 hover:text-neon-cyan transition-colors"
                                   title="View in mempool explorer">
                                    <i data-lucide="external-link" class="w-3.5 h-3.5"></i>
                                </a>
                            </div>
                            <template x-if="braiinsDepositSession.fresh_utxo_confirmations !== undefined && braiinsDepositSession.fresh_utxo_confirmations !== null">
                                <!-- <div>, not <p>: contains popover <div>. -->
                                <div class="text-[11px] text-gray-500 mt-1">
                                    <span x-text="braiinsDepositSession.fresh_utxo_confirmations"></span> confirmation<span x-text="braiinsDepositSession.fresh_utxo_confirmations === 1 ? '' : 's'"></span>
                                    <span class="relative inline-flex items-center align-middle ml-1">
                                        <button type="button" class="text-gray-500 hover:text-neon-cyan focus:text-neon-cyan transition-colors focus:outline-none"
                                            x-on:click.stop="braiinsDepositToggleInfoTip('confirmation')"
                                            aria-label="What is a confirmation?">
                                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                            </svg>
                                        </button>
                                        <div x-show="braiinsDepositInfoTipOpen === 'confirmation'" x-cloak
                                             x-on:click.stop="braiinsDepositInfoTipOpen"
                                             class="absolute top-full left-0 mt-2 w-64 z-30 p-3 rounded-lg bg-navy-700 border border-navy-500 shadow-xl text-xs text-gray-200 leading-relaxed normal-case">
                                            <p class="font-semibold text-white mb-1.5" x-text="braiinsDepositGlossaryTitle('confirmation')"></p>
                                            <p x-text="braiinsDepositGlossaryBody('confirmation')"></p>
                                        </div>
                                    </span>
                                </p>
                            </template>
                        </div>
                    </template>

                    <!-- T2: send-to-Braiins tx -->
                    <template x-if="braiinsDepositSession && braiinsDepositSession.send_txid">
                        <div>
                            <p class="text-xs uppercase tracking-wider text-gray-500 mb-1.5">Sent to Braiins</p>
                            <div class="flex items-center gap-2 bg-navy-800 border border-navy-700 rounded px-3 py-2">
                                <span class="font-mono text-xs text-gray-300 truncate flex-1" x-text="braiinsDepositSession.send_txid"></span>
                                <button @click="copyText(braiinsDepositSession.send_txid)"
                                        class="text-gray-500 hover:text-neon-cyan transition-colors"
                                        title="Copy transaction ID">
                                    <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                                </button>
                                <a x-show="mempoolBaseUrl"
                                   :href="mempoolTxUrl(braiinsDepositSession.send_txid)" target="_blank" rel="noopener noreferrer"
                                   class="text-gray-500 hover:text-neon-cyan transition-colors"
                                   title="View in mempool explorer">
                                    <i data-lucide="external-link" class="w-3.5 h-3.5"></i>
                                </a>
                            </div>
                            <template x-if="braiinsDepositSession.send_confirmations_live !== undefined && braiinsDepositSession.send_confirmations_live !== null">
                                <p class="text-[11px] text-gray-500 mt-1">
                                    <span x-text="braiinsDepositSession.send_confirmations_live"></span> confirmation<span x-text="braiinsDepositSession.send_confirmations_live === 1 ? '' : 's'"></span>
                                </p>
                            </template>
                        </div>
                    </template>

                    <!- — non-fatal warning surface
                         (LND/Boltz transient, CREATED-TTL exceeded,
                         "stuck" tx, etc.). Renders only while the
                         session is non-terminal and error_message
                         is set. -->
                    <template x-if="braiinsDepositSession && braiinsDepositSession.error_message">
                        <div class="flex items-start gap-2 p-3 rounded-lg bg-amber-500/10 border border-amber-500/30">
                            <i data-lucide="alert-circle" class="w-4 h-4 text-amber-400 shrink-0 mt-0.5"></i>
                            <p class="text-xs text-amber-200 leading-relaxed" x-text="braiinsDepositSession.error_message"></p>
                        </div>
                    </template>

                    <!- — timestamped progress log fed by
                         server-side status_history. -->
                    <template x-if="braiinsDepositProgressLog.length > 0">
                        <div>
                            <p class="text-xs uppercase tracking-wider text-gray-500 mb-1.5">Progress log</p>
                            <div x-ref="braiinsProgressLog"
                                 class="bg-navy-900 border border-navy-700 rounded-lg p-3 max-h-40 overflow-y-auto space-y-1">
                                <template x-for="(entry, idx) in braiinsDepositProgressLog" :key="idx">
                                    <p class="text-[11px] font-mono text-gray-400 leading-snug">
                                        <span class="text-gray-500" x-text="entry.ts"></span>
                                        <span class="ml-2" x-text="entry.text"></span>
                                    </p>
                                </template>
                            </div>
                        </div>
                    </template>

                    <p class="text-[11px] text-gray-500 text-center leading-relaxed">
                        The deposit has started. You can safely close this window.
                    </p>

                    <!-- Cancel surface — allowed in CREATED, or in
                         SWAPPING while the linked Boltz swap hasn't
                         been paid yet. Server enforces the actual
                         precondition; we show the button optimistically
                         and let the server reject with a clear message
                         if the user clicks too late. -->
                    <template x-if="braiinsDepositSession && (braiinsDepositSession.status === 'created' || braiinsDepositSession.status === 'swapping')">
                        <div class="flex justify-center">
                            <button @click="braiinsDepositCancel()"
                                class="text-xs text-gray-400 hover:text-neon-pink transition-colors">
                                Cancel
                            </button>
                        </div>
                    </template>
                </div>

                <!-- ──────── SUCCESS ──────── -->
                <div x-show="braiinsDepositStep === 'success'" class="space-y-5 mt-3">
                    <div class="flex items-center justify-center py-2">
                        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-neon-green/15 border-2 border-neon-green/40">
                            <i data-lucide="check" class="w-8 h-8 text-neon-green"></i>
                        </div>
                    </div>
                    <div class="text-center">
                        <p class="text-xs uppercase tracking-wider text-neon-green/80 mb-1">Deposit sent</p>
                        <p class="text-2xl font-bold font-mono text-white mt-1">
                            <span x-text="formatSats(braiinsDepositAmountSats || 0)"></span> <span class="text-sm text-gray-500 font-normal">sats</span>
                        </p>
                    </div>

                    <template x-if="braiinsDepositSession && braiinsDepositSession.send_txid">
                        <div>
                            <!-- <div>, not <p>: contains popover <div>. -->
                            <div class="text-xs uppercase tracking-wider text-gray-500 mb-1.5">
                                Final transaction ID
                                <span class="relative inline-flex items-center align-middle ml-1">
                                    <button type="button" class="text-gray-500 hover:text-neon-cyan focus:text-neon-cyan transition-colors focus:outline-none"
                                        x-on:click.stop="braiinsDepositToggleInfoTip('txid')"
                                        aria-label="What is a transaction ID?">
                                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                        </svg>
                                    </button>
                                    <div x-show="braiinsDepositInfoTipOpen === 'txid'" x-cloak
                                         x-on:click.stop="braiinsDepositInfoTipOpen"
                                         class="absolute top-full left-0 mt-2 w-64 z-30 p-3 rounded-lg bg-navy-700 border border-navy-500 shadow-xl text-xs text-gray-200 leading-relaxed normal-case">
                                        <p class="font-semibold text-white mb-1.5" x-text="braiinsDepositGlossaryTitle('txid')"></p>
                                        <p x-text="braiinsDepositGlossaryBody('txid')"></p>
                                    </div>
                                </span>
                            </div>
                            <div class="flex items-center gap-2 bg-navy-800 border border-navy-700 rounded px-3 py-2">
                                <span class="font-mono text-xs text-gray-300 truncate flex-1" x-text="braiinsDepositSession.send_txid"></span>
                                <button @click="copyText(braiinsDepositSession.send_txid)"
                                        class="text-gray-500 hover:text-neon-cyan transition-colors"
                                        title="Copy transaction ID">
                                    <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                                </button>
                                <a x-show="mempoolBaseUrl"
                                   :href="mempoolTxUrl(braiinsDepositSession.send_txid)" target="_blank" rel="noopener noreferrer"
                                   class="text-gray-500 hover:text-neon-cyan transition-colors"
                                   title="View in mempool explorer">
                                    <i data-lucide="external-link" class="w-3.5 h-3.5"></i>
                                </a>
                            </div>
                        </div>
                    </template>

                    <template x-if="braiinsDepositSession && braiinsDepositSession.fresh_utxo_txid">
                        <button type="button"
                                @click="braiinsDepositAllTxsOpen = !braiinsDepositAllTxsOpen"
                                class="w-full flex items-center justify-between text-[11px] text-gray-500 hover:text-gray-300 transition-colors pt-1">
                            <span>All transactions in this deposit</span>
                            <i :data-lucide="braiinsDepositAllTxsOpen ? 'chevron-up' : 'chevron-down'" class="w-3.5 h-3.5"></i>
                        </button>
                    </template>
                    <template x-if="braiinsDepositAllTxsOpen">
                        <div class="space-y-2">
                            <template x-if="braiinsDepositSession && braiinsDepositSession.fresh_utxo_txid">
                                <div>
                                    <p class="text-[10px] text-gray-500 mb-1">Bitcoin transaction prepared</p>
                                    <div class="flex items-center gap-2 bg-navy-800 border border-navy-700 rounded px-3 py-1.5">
                                        <span class="font-mono text-[11px] text-gray-400 truncate flex-1" x-text="braiinsDepositSession.fresh_utxo_txid"></span>
                                        <button @click="copyText(braiinsDepositSession.fresh_utxo_txid)" class="text-gray-500 hover:text-neon-cyan transition-colors">
                                            <i data-lucide="copy" class="w-3 h-3"></i>
                                        </button>
                                        <a x-show="mempoolBaseUrl"
                                           :href="mempoolTxUrl(braiinsDepositSession.fresh_utxo_txid)" target="_blank" rel="noopener noreferrer" class="text-gray-500 hover:text-neon-cyan transition-colors">
                                            <i data-lucide="external-link" class="w-3 h-3"></i>
                                        </a>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>

                    <!-- Timestamped progress log (read-only history).
                         Same block as the progress step so reopening a
                         completed deposit shows exactly what happened. -->
                    <template x-if="braiinsDepositProgressLog.length > 0">
                        <div>
                            <p class="text-xs uppercase tracking-wider text-gray-500 mb-1.5">Progress log</p>
                            <div class="bg-navy-900 border border-navy-700 rounded-lg p-3 max-h-40 overflow-y-auto space-y-1">
                                <template x-for="(entry, idx) in braiinsDepositProgressLog" :key="idx">
                                    <p class="text-[11px] font-mono text-gray-400 leading-snug">
                                        <span class="text-gray-500" x-text="entry.ts"></span>
                                        <span class="ml-2" x-text="entry.text"></span>
                                    </p>
                                </template>
                            </div>
                        </div>
                    </template>

                    <div class="flex gap-2">
                        <button @click="braiinsDepositMakeAnother()"
                            class="flex-1 inline-flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg bg-neon-cyan/15 border border-neon-cyan/40 text-neon-cyan hover:bg-neon-cyan/25 hover:border-neon-cyan/60 transition-all text-sm">
                            <i data-lucide="plus" class="w-4 h-4"></i>
                            Make another
                        </button>
                        <button @click="closeBraiinsDeposit()"
                            class="flex-1 inline-flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg bg-navy-700 border border-navy-600 text-gray-300 hover:border-gray-500 transition-all text-sm">
                            Done
                        </button>
                    </div>
                </div>

                <!-- ──────── FAILED ──────── -->
                <div x-show="braiinsDepositStep === 'failed'" class="space-y-5 mt-3">
                    <!-- Recoverable interruption (swap done, fresh UTXO in the
                         wallet, only the send was interrupted) is framed as a
                         calm "interrupted — funds safe", NOT a scary failure. -->
                    <div class="flex items-center justify-center py-2">
                        <template x-if="braiinsDepositIsCancelled(braiinsDepositSession)">
                            <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-navy-800 border-2 border-navy-600">
                                <i data-lucide="x-circle" class="w-7 h-7 text-gray-400"></i>
                            </div>
                        </template>
                        <template x-if="!braiinsDepositIsCancelled(braiinsDepositSession) && braiinsDepositIsRecoverableFailure(braiinsDepositSession)">
                            <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-amber-500/15 border-2 border-amber-500/40">
                                <i data-lucide="pause-circle" class="w-7 h-7 text-amber-300"></i>
                            </div>
                        </template>
                        <template x-if="!braiinsDepositIsCancelled(braiinsDepositSession) && !braiinsDepositIsRecoverableFailure(braiinsDepositSession)">
                            <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-neon-pink/15 border-2 border-neon-pink/40">
                                <i data-lucide="alert-triangle" class="w-7 h-7 text-neon-pink"></i>
                            </div>
                        </template>
                    </div>
                    <div class="text-center">
                        <template x-if="braiinsDepositIsCancelled(braiinsDepositSession)">
                            <div>
                                <h3 class="text-base font-semibold text-white mb-1">Deposit cancelled</h3>
                                <p class="text-xs text-gray-400 max-w-sm mx-auto">You cancelled this deposit. No funds were moved.</p>
                            </div>
                        </template>
                        <template x-if="!braiinsDepositIsCancelled(braiinsDepositSession) && braiinsDepositIsRecoverableFailure(braiinsDepositSession)">
                            <div>
                                <h3 class="text-base font-semibold text-white mb-1">Deposit interrupted</h3>
                                <p class="text-xs text-gray-400 max-w-sm mx-auto">The swap finished and your funds are safe in your wallet — only the final send to Braiins was interrupted. Click <span class="text-gray-200 font-medium">Retry send</span> to finish.</p>
                            </div>
                        </template>
                        <template x-if="!braiinsDepositIsCancelled(braiinsDepositSession) && !braiinsDepositIsRecoverableFailure(braiinsDepositSession)">
                            <div>
                                <h3 class="text-base font-semibold text-white mb-1">Something went wrong</h3>
                                <p class="text-xs text-gray-400 max-w-sm mx-auto" x-text="braiinsDepositFailureExplanation"></p>
                            </div>
                        </template>
                    </div>
                    <!-- "Funds safe" affirmation for a recoverable interruption. -->
                    <template x-if="braiinsDepositIsRecoverableFailure(braiinsDepositSession)">
                        <div class="bg-navy-900 border border-emerald-500/30 rounded-lg p-3 flex items-start gap-2">
                            <i data-lucide="shield-check" class="w-4 h-4 text-emerald-400 shrink-0 mt-0.5"></i>
                            <p class="text-xs text-gray-300 leading-relaxed">
                                Your clean
                                <span class="font-mono text-white" x-text="formatSats(braiinsDepositSession.fresh_utxo_amount_sats || 0)"></span>-sat
                                deposit is held in your wallet and was not sent. Retrying broadcasts it to Braiins; nothing is lost.
                            </p>
                        </div>
                    </template>
                    <!-- Raw technical reason: only for genuine (non-recoverable)
                         failures; hidden for the calm interrupted case. -->
                    <template x-if="braiinsDepositSession && braiinsDepositSession.error_message && !braiinsDepositIsRecoverableFailure(braiinsDepositSession) && !braiinsDepositIsCancelled(braiinsDepositSession)">
                        <div class="bg-navy-900 border border-navy-700 rounded-lg p-3">
                            <p class="text-[11px] uppercase tracking-wider text-gray-500 mb-1">Reason</p>
                            <p class="text-xs text-gray-300 break-words" x-text="braiinsDepositSession.error_message"></p>
                        </div>
                    </template>
                    <!-- If the failure happened after FUNDED, the user
                         still owns the fresh UTXO; offer retry. -->
                    <template x-if="braiinsDepositCanRetrySend">
                        <button @click="braiinsDepositRetrySend()"
                            class="w-full inline-flex items-center justify-center gap-2 px-4 py-3 rounded-lg bg-neon-cyan/15 border border-neon-cyan/40 text-neon-cyan hover:bg-neon-cyan/25 hover:border-neon-cyan/60 transition-all text-sm font-medium">
                            <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                            Retry send
                        </button>
                    </template>

                    <!-- ext-OC refund-prompt panel.
                         Shown when an ext_onchain session failed after
                         receiving funds. Collects a refund address from
                         the user and triggers a send back to it. -->
                    <template x-if="braiinsDepositNeedsRefund">
                        <div class="bg-navy-900 border border-navy-700 rounded-lg p-3 space-y-2.5">
                            <div>
                                <p class="text-[11px] uppercase tracking-wider text-gray-500 mb-1">Recover your sats</p>
                                <p class="text-xs text-gray-300 leading-relaxed">
                                    Your deposit of
                                    <span class="font-mono text-white" x-text="formatSats(braiinsDepositSession.ext_intake_received_sats || 0)"></span>
                                    sats is safe in this wallet. Paste an address from your other wallet to send it back.
                                </p>
                            </div>
                            <input type="text"
                                   x-model="braiinsDepositExtRefundAddress"
                                   placeholder="bc1q… paste here"
                                   class="w-full px-3 py-2 rounded text-sm font-mono bg-navy-900 border border-navy-700 text-gray-200 placeholder-gray-600 focus:outline-none focus:border-neon-cyan/40">
                            <template x-if="braiinsDepositExtRefundError">
                                <p class="text-[11px] text-neon-pink" x-text="braiinsDepositExtRefundError"></p>
                            </template>
                            <button @click="braiinsDepositSubmitRefund()"
                                    :disabled="braiinsDepositLoading || !braiinsDepositExtRefundAddress"
                                    class="w-full px-3 py-2 rounded-md text-xs font-medium bg-neon-cyan/15 border border-neon-cyan/30 text-neon-cyan hover:bg-neon-cyan/25 hover:border-neon-cyan/50 transition-all disabled:opacity-40 disabled:cursor-not-allowed">
                                Send refund →
                            </button>
                        </div>
                    </template>

                    <!-- Confirmation when the refund tx has been sent. -->
                    <template x-if="braiinsDepositSession && braiinsDepositSession.refund_txid">
                        <div class="bg-navy-900 border border-neon-green/30 rounded-lg p-3 space-y-2">
                            <div class="flex items-center gap-2">
                                <i data-lucide="check-circle-2" class="w-4 h-4 text-neon-green"></i>
                                <p class="text-xs text-neon-green font-medium">
                                    Refunded <span class="font-mono" x-text="formatSats(braiinsDepositSession.ext_intake_received_sats || 0)"></span> sats
                                    to <span class="font-mono break-all" x-text="braiinsDepositSession.refund_address"></span>
                                </p>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="font-mono text-xs text-gray-300 truncate flex-1" x-text="braiinsDepositSession.refund_txid"></span>
                                <button @click="copyText(braiinsDepositSession.refund_txid)"
                                        title="Copy transaction ID"
                                        class="text-gray-500 hover:text-neon-cyan transition-colors">
                                    <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                                </button>
                                <a :href="mempoolTxUrl(braiinsDepositSession.refund_txid)" target="_blank" rel="noopener noreferrer"
                                   title="Open on mempool"
                                   class="text-gray-500 hover:text-neon-cyan transition-colors">
                                    <i data-lucide="external-link" class="w-3.5 h-3.5"></i>
                                </a>
                            </div>
                        </div>
                    </template>

                    <!-- Timestamped progress log (read-only history) so
                         reopening a failed/cancelled deposit shows the
                         full sequence that led to the outcome. -->
                    <template x-if="braiinsDepositProgressLog.length > 0">
                        <div>
                            <p class="text-xs uppercase tracking-wider text-gray-500 mb-1.5">Progress log</p>
                            <div class="bg-navy-900 border border-navy-700 rounded-lg p-3 max-h-40 overflow-y-auto space-y-1">
                                <template x-for="(entry, idx) in braiinsDepositProgressLog" :key="idx">
                                    <p class="text-[11px] font-mono text-gray-400 leading-snug">
                                        <span class="text-gray-500" x-text="entry.ts"></span>
                                        <span class="ml-2" x-text="entry.text"></span>
                                    </p>
                                </template>
                            </div>
                        </div>
                    </template>

                    <button @click="closeBraiinsDeposit()"
                        class="w-full inline-flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg bg-navy-700 border border-navy-600 text-gray-300 hover:border-gray-500 transition-all text-sm">
                        Close
                    </button>
                </div>
            </div>
        </div>
    </div>
    </template>

    <!-- ═══ API KEYS MODAL ═══ -->
    <template x-if="showApiKeys">
        <div class="fixed inset-0 z-50 flex items-center justify-center" @keydown.escape.window="closeApiKeys()">
            <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="closeApiKeys()"></div>
            <div class="relative w-full max-w-3xl mx-4 my-8 bg-gradient-to-br from-navy-800 to-navy-900 border border-neon-cyan/30 rounded-xl shadow-2xl shadow-black/40 max-h-[90vh] flex flex-col">
                <!-- Header -->
                <div class="flex items-center justify-between p-5 border-b border-navy-700 shrink-0">
                    <div class="flex items-center gap-2">
                        <i data-lucide="key-round" class="w-5 h-5 text-neon-cyan"></i>
                        <h2 class="text-lg font-semibold text-white">API Keys</h2>
                    </div>
                    <button @click="closeApiKeys()" class="p-1.5 text-gray-500 hover:text-gray-300 hover:bg-navy-700 rounded-lg">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>

                <!-- Body -->
                <div class="overflow-y-auto p-5 space-y-4">

                    <!-- Just-created key (shown once) -->
                    <template x-if="apiKeyJustCreated">
                        <div class="rounded-lg border-2 border-neon-green/40 bg-neon-green/5 p-4 space-y-3">
                            <div class="flex items-center gap-2">
                                <i data-lucide="check-circle-2" class="w-5 h-5 text-neon-green"></i>
                                <h3 class="font-semibold text-white">Key created</h3>
                            </div>
                            <div class="text-xs text-gray-400 space-y-0.5">
                                <div>Name: <span class="text-gray-200" x-text="apiKeyJustCreated.name"></span></div>
                                <div>Scope: <span class="text-gray-200" x-text="scopeLabel(apiKeyJustCreated.scope)"></span></div>
                                <div>Expires: <span class="text-gray-200" x-text="formatExpires(apiKeyJustCreated.expires_at)"></span></div>
                            </div>
                            <div class="flex items-center gap-2 p-3 rounded-md bg-navy-950 border border-navy-700">
                                <code class="flex-1 text-xs text-neon-cyan font-mono break-all" x-text="apiKeyJustCreated.key"></code>
                                <button type="button" @click="copyJustCreatedKey()"
                                    class="shrink-0 px-2 py-1 rounded bg-neon-cyan/10 hover:bg-neon-cyan/20 text-neon-cyan text-xs">
                                    <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                                </button>
                            </div>
                            <template x-if="apiKeyClipboardCountdown > 0">
                                <div class="flex items-center gap-2 text-[11px] text-gray-400">
                                    <i data-lucide="clipboard-x" class="w-3.5 h-3.5 text-neon-cyan"></i>
                                    <span>Clipboard will clear in <span class="font-mono text-neon-cyan" x-text="apiKeyClipboardCountdown"></span>s</span>
                                </div>
                            </template>
                            <div class="flex items-start gap-2 text-xs text-amber-300 bg-amber-500/10 border border-amber-500/30 rounded-md p-2.5">
                                <i data-lucide="alert-triangle" class="w-4 h-4 shrink-0 mt-0.5"></i>
                                <span>This is the only time the key will be shown. Store it in your secret manager before continuing.</span>
                            </div>
                            <div class="flex justify-end gap-2">
                                <template x-if="apiKeyRotateContext">
                                    <button type="button" @click="cancelRotation()"
                                        class="px-3 py-1.5 rounded bg-navy-700 hover:bg-navy-600 text-sm text-gray-300">
                                        Cancel rotation
                                    </button>
                                </template>
                                <button type="button" @click="confirmKeyCaptured()"
                                    class="px-3 py-1.5 rounded bg-neon-green/20 border border-neon-green/40 hover:bg-neon-green/30 text-sm text-neon-green font-medium">
                                    <span x-show="!apiKeyRotateContext">I've saved it</span>
                                    <span x-show="apiKeyRotateContext">I've saved it &amp; disable old</span>
                                </button>
                            </div>
                        </div>
                    </template>

                    <!-- Create panel -->
                    <template x-if="apiKeyDraftOpen && !apiKeyJustCreated">
                        <div class="rounded-lg border border-navy-600 bg-navy-950/40 p-4 space-y-3">
                            <h3 class="text-sm font-semibold text-white">New API key</h3>
                            <div class="space-y-2">
                                <label class="block text-xs text-gray-400">
                                    Name
                                    <input type="text" :value="apiKeyDraft.name" @input="setField('apiKeyDraft','name', $event.target.value)" maxlength="128"
                                        class="mt-1 w-full px-2.5 py-1.5 rounded bg-navy-900 border border-navy-600 text-sm text-white focus:outline-none focus:border-neon-cyan"
                                        placeholder="ai-agent-readonly">
                                </label>
                                <div class="space-y-1.5 text-xs text-gray-300">
                                    <label class="flex items-start gap-1.5 cursor-pointer">
                                        <input type="radio" name="apikey-scope" value="monitor" :checked="apiKeyDraft.scope === 'monitor'" @change="setField('apiKeyDraft','scope', 'monitor')" class="mt-0.5">
                                        <span><span class="text-blue-300">Monitor + receive</span> — view balances, channels, and history, and receive funds (generate addresses, create invoices). Cannot send or withdraw.</span>
                                    </label>
                                    <label class="flex items-start gap-1.5 cursor-pointer">
                                        <input type="radio" name="apikey-scope" value="spend" :checked="apiKeyDraft.scope === 'spend'" @change="setField('apiKeyDraft','scope', 'spend')" class="mt-0.5">
                                        <span><span class="text-amber-300">Spend (agent)</span> — read access plus pay invoices, keysend, and withdraw to cold storage. The recommended choice for an autonomous agent. No channel, signing, or key management.</span>
                                    </label>
                                    <label class="flex items-start gap-1.5 cursor-pointer">
                                        <input type="radio" name="apikey-scope" value="admin" :checked="apiKeyDraft.scope === 'admin'" @change="setField('apiKeyDraft','scope', 'admin')" class="mt-0.5">
