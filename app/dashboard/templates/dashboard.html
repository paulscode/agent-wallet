                                            With a single Boltz operator handling both legs, if that

                                        <div x-show="anonymizeShowDistinctOperatorOnchainBanner()"

                                            <strong class="text-yellow-100">Privacy capped at moderate:</strong>
                                            Lightning routing hides <em>where</em> the funds end up.
                                            The UTXO funding this session, though, stays visible on-chain.
                                            If it's already tied to your identity (KYC withdrawal, reused
                                            address, address clustering), observers can tell you ran a
                                            privacy session — they just can't see the outcome.
                                        </div>

                                        <!-- Bin amount chip selector. Chips outside the policy's

                                                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                                        </svg>
                                                    </button>
                                                    <div x-show="anonymizeInfoTipOpen === 'bin-amount'" x-cloak
                                                         x-on:click.stop="anonymizeInfoTipOpen"

                                                        <p class="font-semibold text-white mb-1.5">Bin amount</p>
                                                        <p>Sessions only run at a fixed set of "bin" sizes so every session of the same bin looks identical from the outside.</p>
                                                        <p class="mt-1.5 text-gray-400">Why: if every session used a different amount, an observer could pick yours out by the amount alone. Forcing everyone into the same handful of buckets makes individual sessions look interchangeable.</p>
                                                    </div>
                                                </span>

                                        <!-- Destination address. Generate button mints a fresh

                                        <div>

                                                        x-bind:disabled="anonymizeGenerateAddressLoading"
                                                        x-on:click="anonymizeGenerateDestinationAddress()"

                                        <!-- Inline quote review — auto-fetched when amount +

                                        <div x-show="anonymizeQuoteLoading"
                                             class="text-[11px] text-gray-500 italic">
                                            Fetching quote…
                                        </div>
                                        <template x-if="anonymizeQuote && !anonymizeQuoteLoading">
                                            <div class="bg-navy-900 border border-navy-700 rounded-lg p-3 space-y-2 text-sm">
                                                <div class="flex justify-between items-center">
                                                    <span class="text-gray-400">Bin amount</span>
                                                    <span class="text-white font-mono"
                                                          x-text="(anonymizeQuoteOrEmpty.bin_amount_sat || 0).toLocaleString() + ' sat'"></span>
                                                </div>
                                                <div class="flex justify-between items-center">
                                                    <span class="relative inline-flex items-center gap-1">
                                                        <span class="text-gray-400">Advisory tier</span>
                                                        <button type="button"
                                                                class="text-gray-500 hover:text-emerald-400 focus:text-emerald-400 transition-colors focus:outline-none"
                                                                x-on:click.stop="anonymizeToggleInfoTip('advisory-tier')"
                                                                aria-label="What does Advisory tier mean?">
                                                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                                            </svg>
                                                        </button>
                                                        <div x-show="anonymizeInfoTipOpen === 'advisory-tier'" x-cloak
                                                             x-on:click.stop="anonymizeInfoTipOpen"
                                                             class="absolute top-full left-0 mt-2 w-64 z-30 p-3 rounded-lg bg-navy-700 border border-navy-500 shadow-xl text-xs text-gray-200 leading-relaxed normal-case">
                                                            <p class="font-semibold text-white mb-1.5">Advisory tier</p>
                                                            <p>An honest assessment of the privacy this session can deliver: <span class="text-red-300">weak</span>, <span class="text-amber-300">moderate</span>, or <span class="text-emerald-300">strong</span>.</p>
                                                            <p class="mt-1.5 text-gray-400">The wallet caps this based on real-world limits of your current setup (single operator, no Liquid hop, etc.), NOT marketing claims.</p>
                                                        </div>
                                                    </span>
                                                    <span class="px-2 py-0.5 rounded text-xs font-semibold"
                                                          x-bind:class="{
                                                              'bg-emerald-600/30 text-emerald-200': anonymizeQuoteOrEmpty.advisory_tier === 'strong',
                                                              'bg-amber-500/30 text-amber-200': anonymizeQuoteOrEmpty.advisory_tier === 'moderate',
                                                              'bg-red-500/30 text-red-200': anonymizeQuoteOrEmpty.advisory_tier === 'weak'
                                                          }"
                                                          x-text="anonymizeQuoteOrEmpty.advisory_tier || ''"></span>
                                                </div>
                                                <div class="flex justify-between items-center">
                                                    <span class="text-gray-400">Min chunks for tier</span>

                                                </div>
                                                <div class="flex justify-between items-center"
                                                     x-show="anonymizeWizardPreferLiquid || anonymizeQuoteOrEmpty.uses_liquid">

                                                    <template x-if="anonymizeWizardPreferLiquid && anonymizeQuote && !anonymizeQuoteOrEmpty.uses_liquid">
                                                        <span class="px-2 py-0.5 rounded text-xs font-semibold bg-amber-500/30 text-amber-200">downgraded (operator disabled)</span>
                                                    </template>
                                                </div>
                                                <!- — operator-attribution block.
                                                     LN-only quotes omit the submarine cell (no
                                                     submarine_operator_id field on the response). -->
                                                <div class="mt-2 pt-2 border-t border-navy-700/60 grid grid-cols-2 gap-2 text-[11px]">
                                                    <template x-if="anonymizeWizardIsOnchainSource">
                                                        <div>
                                                            <div class="text-gray-500 uppercase tracking-wider mb-0.5">Submarine</div>
                                                            <div class="font-mono text-gray-200" x-text="anonymizeQuoteOrEmpty.submarine_operator_id || '—'"></div>
                                                            <div x-show="anonymizeSubmarineSecondaryFallbackActive"

                                                            </div>
                                                        </div>

                                                    <div>
                                                        <div class="text-gray-500 uppercase tracking-wider mb-0.5">Reverse</div>

                                                <details class="text-xs text-gray-500 mt-1 pt-1 border-t border-navy-700/60">

                                                        <template x-for="note in anonymizeQuoteOrEmpty.advisory_tier_notes || []" x-bind:key="note">

                                    </div>

                                    <!-- Step 2: deposit primitive (BOLT 11 / BOLT 12 / BIP-353).

                                    <div x-show="anonymizeWizardStep === 2" class="space-y-3">
                                        <!-- ``anonymizeCreated`` is always a safe-shape object -->

                                        <template x-if="anonymizeCreated.id">

                                                <!-- BOLT 12 offer (clickable to copy). -->
                                                <template x-if="anonymizeCreated.deposit && anonymizeCreated.deposit.bolt12_offer">
                                                    <div x-on:click="anonymizeCopyDeposit('bolt12')"

                                                        <div class="flex items-center justify-between mb-1">
                                                            <p class="text-[11px] text-gray-400">BOLT 12 offer</p>

                                                           x-show="anonymizeDepositCopied === 'bolt12'">Copied!</p>
                                                    </div>
                                                </template>

                                                <!-- BOLT 11 invoice (clickable to copy). -->

                                                    <div x-on:click="anonymizeCopyDeposit('bolt11')"

                                                        <div class="flex items-center justify-between mb-1">
                                                            <p class="text-[11px] text-gray-400">BOLT 11 invoice</p>

                                                        </div>
                                                        <p class="font-mono text-[11px] text-gray-300 break-all leading-relaxed select-all max-h-24 overflow-y-auto"

                                                        <p class="text-[11px] mt-1 text-emerald-400"
                                                           x-show="anonymizeDepositCopied === 'bolt11'">Copied!</p>

                                                            <p class="text-[11px] text-gray-400">BIP-353 handle</p>

                                                           x-show="anonymizeDepositCopied === 'bip353'">Copied!</p>

                                                                directly — the BIP-353 handle is a convenience layer.
                                                            </p>
                                                            <div x-on:click="anonymizeCopyDeposit('txt')"
                                                                 class="group cursor-pointer bg-navy-900 border border-navy-700 rounded p-2 hover:border-emerald-600/40"
                                                                 title="Copy TXT record">
                                                                <div class="flex items-start justify-between gap-2">
                                                                    <p class="font-mono text-[10px] text-gray-300 break-all select-all min-w-0 flex-1"
                                                                       x-text="anonymizeCreated.deposit.bip353_txt_record"></p>
                                                                    <i data-lucide="copy" class="w-3 h-3 text-gray-500 group-hover:text-emerald-400 shrink-0 mt-0.5"></i>
                                                                </div>
                                                                <p class="text-[10px] mt-1 text-emerald-400"
                                                                   x-show="anonymizeDepositCopied === 'txt'">Copied!</p>
                                                            </div>
                                                        </div>
                                                    </details>
                                                </template>

                                                <template x-if="anonymizeCreated.deposit && anonymizeCreated.deposit.onchain_address && !anonymizeCreated.deposit.bolt11_invoice && !anonymizeCreated.deposit.bolt12_offer">
                                                    <div x-on:click="anonymizeCopyDeposit('onchain')"
                                                         class="group cursor-pointer bg-navy-900 border border-navy-700 rounded-lg p-3 hover:border-emerald-600/40 transition-all"

                                                        <div class="flex items-start justify-between gap-2 mb-1">

                                    <!-- Wizard buttons. Step 1 (form) renders Cancel + Confirm —
                                         Braiins-Deposit-style commit. Step 2 (deposit primitive,
                                         ext sources only) renders Done. The clock-skew + Tor
                                         gating that previously applied to Next/Confirm is now
                                         exclusively on Confirm — Preview/quote auto-fetches in
                                         the background regardless. -->
                                    <div class="flex items-center justify-between gap-3 mt-5">

                                        <div class="flex-1"></div>

    <!-- CONFIGURE / NEW RECEIVE OFFER DIALOG (BOLT 12) -->
    <!--
        Mints a new BOLT 12 offer and promotes it to the default
        receive offer. BOLT 12 offers are immutable (the description
        is part of the signed bech32), so this is mint+demote rather
        than edit. Two presets:

          * Ocean mining pool — auto-builds the mandated
            "OCEAN Payouts for <bitcoin-address>" string.
          * Custom — free-form description for any other payer.

        The previous default is kept (with is_default_receive=False)
        so it still appears in the user's offer history.
    -->
    <template x-if="showBolt12ConfigureReceive">
        <div class="fixed inset-0 z-50 flex items-center justify-center"
            @keydown.escape.window="showBolt12ConfigureReceive = false">
            <div class="absolute inset-0 bg-black/60 backdrop-blur-sm"
                @click="showBolt12ConfigureReceive = false"></div>
            <div class="relative w-full max-w-lg mx-4 bg-gradient-to-br from-navy-800 to-navy-900 border border-neon-cyan/30 rounded-xl p-6 shadow-2xl shadow-black/40">
                <div class="flex items-center justify-between mb-5">
                    <div class="flex items-center gap-2">
                        <i data-lucide="plus" class="w-5 h-5 text-neon-cyan"></i>
                        <h2 class="text-lg font-semibold text-white">New receive offer</h2>
                    </div>
                    <button @click="showBolt12ConfigureReceive = false"
                        class="p-1.5 text-gray-500 hover:text-gray-300 hover:bg-navy-700 rounded-lg">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>

                <p class="text-xs text-gray-400 mb-4">
                    Mints a new BOLT 12 offer and makes it your default.
                    BOLT 12 offers are immutable — If you change your default
                    offer, the previous default will be kept in your offer
                    history, but will no longer be the default.

                <!-- Preset selector -->
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <button type="button" @click="setBolt12ReceivePreset('ocean')"
                        class="px-3 py-2.5 rounded-lg border text-left transition-all"
                        :class="bolt12ReceivePreset === 'ocean' ? 'border-neon-cyan/50 bg-neon-cyan/10 text-white' : 'border-navy-600 bg-navy-800/50 text-gray-400 hover:border-navy-500'">
                        <span class="text-sm font-medium block">Ocean mining payouts</span>
                        <span class="text-[10px] text-gray-500 block mt-0.5">Use Ocean's required description format</span>
                    </button>
                    <button type="button" @click="setBolt12ReceivePreset('custom')"
                        class="px-3 py-2.5 rounded-lg border text-left transition-all"
                        :class="bolt12ReceivePreset === 'custom' ? 'border-neon-cyan/50 bg-neon-cyan/10 text-white' : 'border-navy-600 bg-navy-800/50 text-gray-400 hover:border-navy-500'">
                        <span class="text-sm font-medium block">Custom</span>
                        <span class="text-[10px] text-gray-500 block mt-0.5">Free-form description for any payer</span>
                    </button>
                </div>

                <!-- Ocean preset form -->
                <div x-show="bolt12ReceivePreset === 'ocean'" x-cloak class="space-y-3">
                    <!-- Helper note: was previously inline on the receive panel.
                         Now scoped to the new-offer dialog where it's directly
                         actionable. -->
                    <div class="flex items-start gap-2 text-xs px-2.5 py-2 rounded border bg-neon-cyan/5 border-neon-cyan/20 text-gray-300">
                        <i data-lucide="info" class="w-3.5 h-3.5 mt-0.5 shrink-0 text-neon-cyan"></i>
                        <div>
                            Ocean requires a specific description format on the
                            BOLT 12 offer. Enter your Ocean Bitcoin address below
                            and we'll build the right description.
                        </div>
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 block mb-1">
                            Your Bitcoin address (Ocean username)
                            <span class="text-neon-pink">*</span>
                        </label>
                        <input type="text" x-model="bolt12ReceiveOceanAddress"
                            spellcheck="false" autocomplete="off"
                            class="w-full bg-navy-800 border border-navy-700 rounded px-3 py-1.5 text-xs font-mono text-gray-200 focus:outline-none focus:border-neon-cyan"
                            placeholder="bc1q...">
                        <div class="text-[11px] text-gray-500 mt-1">
                            Use the same Bitcoin address you registered with Ocean.
                            Ocean uses this address as your account username and as part
                            of the mandated offer description.
                        </div>
                    </div>
                    <div>
                        <div class="text-[10px] uppercase tracking-wide text-gray-500 mb-1">Offer description preview</div>
                        <div class="bg-navy-800 border border-navy-700 rounded px-3 py-1.5 text-xs font-mono text-gray-200 break-all min-h-[1.75rem]"
                            x-text="bolt12ReceiveComputedDescription() || '(enter your address above)'"></div>
                    </div>
                </div>

                <!-- Custom preset form -->
                <div x-show="bolt12ReceivePreset === 'custom'" x-cloak class="space-y-3">
                    <div>
                        <label class="text-xs text-gray-500 block mb-1">
                            Description <span class="text-neon-pink">*</span>
                        </label>
                        <textarea x-model="bolt12ReceiveCustomDescription" rows="3" maxlength="640"
                            class="w-full bg-navy-800 border border-navy-700 rounded px-3 py-1.5 text-xs text-gray-200 focus:outline-none focus:border-neon-cyan"
                            placeholder="e.g. Payouts for alice"></textarea>
                        <div class="text-[11px] text-gray-500 mt-1">Up to 640 characters.</div>
                    </div>
                </div>

                <!-- Error -->
                <div x-show="bolt12ReceiveConfigureError"
                    class="mt-3 flex items-center gap-2 p-2.5 rounded bg-neon-pink/10 border border-neon-pink/20">
                    <i data-lucide="alert-circle" class="w-3.5 h-3.5 text-neon-pink shrink-0"></i>
                    <p class="text-xs text-neon-pink" x-text="bolt12ReceiveConfigureError"></p>
                </div>

                <!-- Actions -->
                <div class="flex items-center justify-end gap-2 mt-5">
                    <button type="button" @click="showBolt12ConfigureReceive = false"
                        class="px-3 py-1.5 rounded-lg text-xs text-gray-400 hover:text-white hover:bg-navy-800">
                        Cancel
                    </button>
                    <button type="button" @click="submitBolt12ConfigureReceive()"
                        :disabled="bolt12ReceiveConfigureLoading || !!bolt12ReceiveValidationError()"
                        class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs bg-neon-cyan/15 border border-neon-cyan/30 text-neon-cyan hover:bg-neon-cyan/25 disabled:opacity-50 disabled:cursor-not-allowed">
                        <i data-lucide="check" class="w-3.5 h-3.5"></i>
                        <span x-text="bolt12ReceiveConfigureLoading ? 'Creating…' : 'Create offer'"></span>
                    </button>
                </div>
            </div>
        </div>
    </template>

    <!-- SEND ON-CHAIN DIALOG ────────────────────────────────────────────
         Quick on-chain send accessible from the On-chain tab. Layout
         and styling are deliberately identical to the Cold Storage
         dialog's on-chain tab so the muscle memory transfers, but the
         lightning tab is hidden, the title says "Send On-chain", and
         all "cold storage" copy is replaced with neutral on-chain
         language. Reuses the same Alpine state (coldAddress, coldAmount,
         coldEstimate, coldStep) and the same sendColdOnchain() action
         since those are generic on-chain primitives. ─────────────── -->
    <template x-if="showSendOnchain">
        <div class="fixed inset-0 z-50 flex items-center justify-center" @keydown.escape.window="closeSendOnchain()">
            <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="closeSendOnchain()"></div>
            <div class="relative w-full max-w-lg mx-4 bg-gradient-to-br from-navy-800 to-navy-900 border border-blue-500/30 rounded-xl p-6 shadow-2xl max-h-[90vh] overflow-y-auto">

                <!-- Header -->
                <div class="flex items-center justify-between mb-1">
                    <div class="flex items-center gap-2">
                        <i data-lucide="arrow-up-right" class="w-5 h-5 text-blue-400"></i>
                        <h2 class="text-lg font-semibold text-white">Send On-chain</h2>
                    </div>
                    <button @click="closeSendOnchain()" class="p-1.5 text-gray-500 hover:text-gray-300 hover:bg-navy-700 rounded-lg transition-colors">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>
                <p class="text-xs text-gray-500 mb-5">Send bitcoin to any on-chain address.</p>

                <!-- Form Step -->
                <div x-show="coldStep === 'form'" class="space-y-4">
                    <!-- Info banner -->
                    <div class="bg-navy-900/50 border border-blue-500/20 rounded-lg p-3">
                        <div class="flex items-center gap-2 mb-2">
                            <i data-lucide="link" class="w-4 h-4 text-orange-400"></i>
                            <h3 class="text-sm font-medium text-white">On-chain Bitcoin Transfer</h3>
                        </div>
                        <p class="text-[11px] text-gray-400">Direct on-chain transaction to any Bitcoin address. Standard network fees apply.</p>
                    </div>

                    <!- — Braiins Deposit discovery hint. Fires
                         when the typed amount exactly matches a preset
                         AND there's enough Lightning balance to back
                         it. Dismissable via localStorage. -->
                    <template x-if="sendOnchainShowBraiinsDepositHint">
                        <div class="bg-neon-cyan/10 border border-neon-cyan/30 rounded-lg p-3 flex items-start gap-2">
                            <i data-lucide="pickaxe" class="w-4 h-4 text-neon-cyan shrink-0 mt-0.5"></i>
                            <div class="flex-1 min-w-0">
                                <p class="text-[11px] text-neon-cyan/90 leading-relaxed">
                                    Depositing to Braiins Hashpower? The Braiins Deposit flow produces a cleaner transaction that's less likely to be flagged for manual review.
                                </p>
                                <div class="flex items-center gap-3 mt-2">
                                    <button type="button" @click="openBraiinsDepositFromSendOnchain()"
                                        class="text-[11px] text-neon-cyan hover:text-white font-medium transition-colors">
                                        Use Braiins Deposit →
                                    </button>
                                    <button type="button" @click="dismissBraiinsDepositHint()"
                                        class="text-[11px] text-gray-500 hover:text-gray-300 transition-colors">
                                        Don't show again
                                    </button>
                                </div>
                            </div>
                        </div>
                    </template>

                    <!-- Sendable balance -->
                    <div class="bg-navy-900/50 border border-navy-700 border-l-2 border-l-neon-green/30 rounded-lg p-3">
                        <div class="flex items-center justify-between">
                            <span class="text-xs text-gray-500">On-chain (sendable)</span>
                            <span class="text-sm font-mono text-neon-green/90 font-medium" x-text="formatSats(confirmedBalance) + ' sats'"></span>
                        </div>
                    </div>

                    <!-- Address Input -->
                    <div>
                        <label class="text-xs text-gray-500 uppercase tracking-wide mb-1.5 block">Bitcoin Address</label>
                        <input type="text" x-model="coldAddress" placeholder="bc1q... or bc1p..."
                            class="w-full px-3 py-2.5 rounded-lg bg-navy-900 border border-navy-600 text-white font-mono text-sm placeholder-gray-600 focus:border-blue-500/50 focus:ring-1 focus:ring-blue-500/20 focus:outline-none transition-colors"
                            spellcheck="false" autocomplete="off">
                        <template x-if="coldAddress.trim().length > 0 && !isValidBtcAddress(coldAddress)">
                            <p class="text-[10px] text-neon-pink mt-1 flex items-center gap-1">
                                <i data-lucide="alert-circle" class="w-3 h-3"></i> Invalid Bitcoin address format
                            </p>
                        </template>
                        <template x-if="isValidBtcAddress(coldAddress)">
                            <p class="text-[10px] text-gray-500 mt-1" x-text="getAddressType(coldAddress)"></p>
                        </template>
                    </div>

                    <!-- Amount Input -->
                    <div>
                        <div class="flex items-center justify-between mb-1.5">
                            <label class="text-xs text-gray-500 uppercase tracking-wide">Amount (sats)</label>
                            <button @click="setMaxColdAmount()"
                                class="text-[10px] text-blue-400 hover:text-blue-300 font-medium transition-colors">Send Max</button>
                        </div>
                        <input type="number" x-model.number="coldAmount" min="1" placeholder="0"
                            class="w-full px-3 py-2.5 rounded-lg bg-navy-900 border border-navy-600 text-white font-mono text-sm placeholder-gray-600 focus:border-blue-500/50 focus:ring-1 focus:ring-blue-500/20 focus:outline-none transition-colors">
                        <template x-if="coldAmount > 0">
                            <p class="text-[10px] text-gray-500 mt-1" x-text="'≈ ₿' + formatBtc(coldAmount)"></p>
                        </template>
                        <template x-if="coldAmount > 0 && coldAmount < 546">
                            <p class="text-[10px] text-neon-pink mt-1 flex items-center gap-1">
                                <i data-lucide="alert-circle" class="w-3 h-3"></i> Minimum 546 sats (dust limit)
                            </p>
                        </template>
                        <template x-if="coldAmount > confirmedBalance">
                            <p class="text-[10px] text-neon-pink mt-1 flex items-center gap-1">
                                <i data-lucide="alert-circle" class="w-3 h-3"></i>
                                Exceeds sendable balance (<span x-text="formatSats(confirmedBalance)"></span> sats)
                            </p>
                        </template>
                    </div>

                    <!-- Coin Control Accordion -->
                    <div class="border border-navy-700 rounded-lg">
                        <button @click="toggleSendCoinControl()"
                            class="w-full flex items-center justify-between px-3 py-2 text-xs text-gray-400 hover:text-gray-200">
                            <span class="flex items-center gap-2">
                                <i :data-lucide="sendCoinControlOpen ? 'chevron-down' : 'chevron-right'" class="w-3 h-3"></i>
                                <span>Coin Control</span>
                                <span x-show="sendCoinControlMode === 'manual' && sendCoinControlSelected.length > 0"
                                    class="text-[10px] text-neon-cyan"
                                    x-text="sendCoinControlSelected.length + ' UTXO' + (sendCoinControlSelected.length === 1 ? '' : 's') + ' \u2022 ' + formatSats(sendCoinControlSelectedTotal) + ' sats'"></span>
                            </span>
                            <span class="text-[10px] text-gray-500" x-text="sendCoinControlMode === 'auto' ? 'Auto' : 'Manual'"></span>
                        </button>
                        <div x-show="sendCoinControlOpen" x-cloak class="px-3 pb-3 space-y-2">
                            <div class="flex items-center gap-3 text-[11px]">
                                <label class="flex items-center gap-1 cursor-pointer">
                                    <input type="radio" name="coin-control-mode" value="auto" x-model="sendCoinControlMode" class="accent-neon-cyan">
                                    <span class="text-gray-300">Auto (LND chooses)</span>
                                </label>
                                <label class="flex items-center gap-1 cursor-pointer">
                                    <input type="radio" name="coin-control-mode" value="manual" x-model="sendCoinControlMode" class="accent-neon-cyan">
                                    <span class="text-gray-300">Manual</span>
                                </label>
                            </div>
                            <div x-show="sendCoinControlMode === 'manual'" x-cloak>
                                <template x-if="utxosLoading">
                                    <p class="text-[11px] text-gray-500 py-2">Loading UTXOs\u2026</p>
                                </template>
                                <template x-if="!utxosLoading && utxos.length === 0">
                                    <p class="text-[11px] text-gray-500 py-2">No UTXOs available.</p>
                                </template>
                                <div x-show="utxos.length > 0" class="max-h-48 overflow-y-auto border border-navy-700 rounded">
                                    <table class="w-full text-[11px]">
                                        <tbody>
                                            <template x-for="u in utxos" :key="u.key">
                                                <tr class="border-b border-navy-700/40 hover:bg-navy-800/40">
                                                    <td class="py-1 px-2 w-6">
                                                        <input type="checkbox" :checked="sendCoinControlSelected.includes(u.key)"
                                                            @change="toggleCoinControlSelection(u)" class="accent-neon-cyan">
                                                    </td>
                                                    <td class="py-1 px-1 text-gray-300 truncate max-w-[140px]" x-text="u.label || '\u2014'"></td>
                                                    <td class="py-1 px-1 text-right font-mono text-gray-200" x-text="formatSats(u.amount_sat)"></td>
                                                    <td class="py-1 px-1 text-right text-gray-500 font-mono" x-text="u.confirmations + ' c'"></td>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                </div>
                                <p x-show="sendCoinControlMode === 'manual' && sendCoinControlSelected.length === 0"
                                    class="text-[10px] text-neon-yellow mt-1">
                                    Select at least one UTXO to send.
                                </p>
                            </div>
                        </div>
                    </div>

                    <!-- Fee Priority -->
                    <div>
                        <label class="text-xs text-gray-500 uppercase tracking-wide mb-1.5 block">Fee Priority</label>
                        <div class="grid grid-cols-3 gap-2">
                            <template x-for="p in [{v:'low',l:'Low',d:'~1 hour',c:'text-neon-green'},{v:'medium',l:'Medium',d:'~30 min',c:'text-neon-yellow'},{v:'high',l:'High',d:'Next block',c:'text-orange-400'}]" :key="p.v">
                                <button @click="coldSelectFeePriority(p.v)"
                                    class="px-3 py-2 rounded-lg border text-left transition-all"
                                    :class="coldFeePriority === p.v ? 'border-blue-500/50 bg-blue-500/10 text-white' : 'border-navy-600 bg-navy-800/50 text-gray-400 hover:border-navy-500 hover:text-gray-300'">
                                    <span class="text-xs font-medium block" x-text="p.l"></span>
                                    <span class="text-[10px] block mt-0.5"
                                        :class="coldFeePriority === p.v ? p.c : 'text-gray-500'">
                                        <span x-text="p.d"></span>
                                        <template x-if="fees && fees[p.v === 'low' ? 'hourFee' : (p.v === 'medium' ? 'halfHourFee' : 'fastestFee')]">
                                            <span x-text="' (' + fees[p.v === 'low' ? 'hourFee' : (p.v === 'medium' ? 'halfHourFee' : 'fastestFee')] + ' sat/vB)'"></span>
                                        </template>
                                    </span>
                                </button>
                            </template>
                        </div>
                    </div>

                    <!-- Fee Estimate -->
                    <template x-if="coldEstimate && coldAmount >= 546 && isValidBtcAddress(coldAddress)">
                        <div class="bg-navy-900/50 border border-navy-700 rounded-lg p-3 space-y-1.5">
                            <div class="flex items-center justify-between text-xs">
                                <span class="text-gray-500">Estimated fee</span>
                                <span class="text-gray-300 font-mono" x-text="formatSats(coldEstimateOrEmpty.fee_sat || 0) + ' sats'"</span>
                            </div>
                            <div class="flex items-center justify-between text-xs">
                                <span class="text-gray-500">Fee rate</span>
                                <span class="text-gray-300 font-mono" x-text="(coldEstimateOrEmpty.sat_per_vbyte || '') + ' sat/vB'"></span>
                            </div>
                            <div class="border-t border-navy-700 pt-1.5 flex items-center justify-between text-xs">
                                <span class="text-gray-400 font-medium">Total deducted</span>
                                <span class="text-white font-mono font-medium" x-text="formatSats(coldAmount + (coldEstimateOrEmpty.fee_sat || 0)) + ' sats'"></span>
                            </div>
                            <template x-if="(coldAmount + (coldEstimateOrEmpty.fee_sat || 0)) > confirmedBalance">
                                <p class="text-[10px] text-neon-pink flex items-center gap-1 pt-1">
                                    <i data-lucide="alert-circle" class="w-3 h-3"></i> Amount + fee exceeds sendable balance
                                </p>
                            </template>
                        </div>
                    </template>

                    <!-- Review Button -->
                    <button @click="coldStep = 'confirm'"
                        :disabled="coldReviewDisabled"
                        class="w-full flex items-center justify-center gap-2 px-4 py-3 rounded-lg bg-blue-500/15 border border-blue-500/30 text-blue-400 font-medium hover:bg-blue-500/25 hover:border-blue-500/50 transition-all disabled:opacity-30 disabled:cursor-not-allowed">
                        <i data-lucide="arrow-right" class="w-4 h-4"></i> Review Transaction
                    </button>
                </div>

                <!-- Confirm Step -->
                <div x-show="coldStep === 'confirm'" class="space-y-4">
                    <div class="bg-navy-900/50 border border-blue-500/20 rounded-lg p-4 space-y-3">
                        <h3 class="text-sm font-medium text-white flex items-center gap-2">
                            <i data-lucide="shield-check" class="w-4 h-4 text-blue-400"></i> Confirm Transaction
                        </h3>
                        <div class="space-y-2">
                            <div class="flex items-center justify-between text-xs">
                                <span class="text-gray-500">To address</span>
                                <span class="text-gray-300 font-mono text-[11px] max-w-[220px] truncate" x-text="coldAddress"></span>
                            </div>
                            <div class="flex items-center justify-between text-xs">
                                <span class="text-gray-500">Address type</span>
                                <span class="text-gray-300" x-text="getAddressType(coldAddress)"></span>
                            </div>
                            <div class="flex items-center justify-between text-xs">
                                <span class="text-gray-500">Amount</span>
                                <span class="text-white font-mono font-medium" x-text="formatSats(coldAmount) + ' sats'"></span>
                            </div>
                            <template x-if="coldEstimate">
                                <div class="space-y-2">
                                    <div class="flex items-center justify-between text-xs">
                                        <span class="text-gray-500">Network fee</span>
                                        <span class="text-gray-300 font-mono" x-text="formatSats(coldEstimateOrEmpty.fee_sat || 0) + ' sats'"</span>
                                    </div>
                                    <div class="border-t border-navy-700 pt-2 flex items-center justify-between text-xs">
                                        <span class="text-gray-400 font-medium">Total</span>
                                        <span class="text-white font-mono font-medium" x-text="formatSats(coldAmount + (coldEstimateOrEmpty.fee_sat || 0)) + ' sats'"></span>
                                    </div>
                                </div>
                            </template>
                        </div>
                        <div class="flex items-start gap-1.5 pt-1">
                            <i data-lucide="alert-circle" class="w-3 h-3 text-neon-yellow mt-0.5 shrink-0"></i>
                            <p class="text-[10px] text-gray-500 leading-relaxed">
                                This transaction is <span class="text-neon-yellow">irreversible</span>. Double-check the address before confirming. On-chain transactions typically take 10–60 minutes to confirm.
                            </p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button @click="coldStep = 'form'"
                            class="flex-1 flex items-center justify-center gap-2 px-3 py-2.5 rounded-lg bg-navy-700 border border-navy-600 text-gray-300 hover:border-blue-500/30 hover:text-blue-400 transition-all text-sm">
                            Back
                        </button>
                        <button @click="sendColdOnchain()" :disabled="coldLoading"
                            class="flex-1 flex items-center justify-center gap-2 px-3 py-2.5 rounded-lg text-sm bg-blue-500/20 border border-blue-500/40 text-blue-400 font-medium hover:bg-blue-500/30 hover:border-blue-500/60 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                            <template x-if="coldLoading">
                                <span class="flex items-center gap-2"><span class="w-4 h-4 border-2 border-blue-400 border-t-transparent rounded-full animate-spin inline-block"></span> Sending...</span>
                            </template>
                            <template x-if="!coldLoading">
                                <span class="flex items-center gap-2"><i data-lucide="arrow-up-right" class="w-4 h-4"></i> Send Bitcoin</span>
                            </template>
                        </button>
                    </div>
                </div>

                <!-- Result Step -->
                <div x-show="coldStep === 'result'" class="space-y-4">
                    <!-- Success -->
                    <template x-if="coldResultSuccess">
                        <div class="text-center space-y-3">
                            <div class="w-14 h-14 mx-auto rounded-full bg-neon-green/10 border border-neon-green/20 flex items-center justify-center">
                                <i data-lucide="check-circle-2" class="w-7 h-7 text-neon-green"></i>
                            </div>
                            <div>
                                <h3 class="text-lg font-semibold text-white">Transaction Sent</h3>
                                <p class="text-xs text-gray-400 mt-1" x-text="formatSats(coldAmount) + ' sats sent on-chain'"></p>
                            </div>
                            <template x-if="coldResultDataOrEmpty.txid">
                                <div class="bg-navy-900/50 border border-navy-700 rounded-lg p-3 space-y-2.5">
                                    <span class="text-[10px] text-gray-500 uppercase tracking-wider block">Transaction ID</span>
                                    <p class="font-mono text-xs text-gray-300 break-all select-all" x-text="coldResultDataOrEmpty.txid"></p>
                                    <!-- Post-send actions: clipboard copy + explorer link.
                                         Two equal-width buttons so each click target is
                                         finger-friendly and the layout balances within the
                                         existing modal width. ``mempoolTxUrl`` honors the
                                         operator's configured ``MEMPOOL_PUBLIC_URL`` (which
                                         can point at a self-hosted mempool / electrs UI
                                         or a different public explorer). -->
                                    <div class="flex gap-2 pt-1">
                                        <button @click="copyText(coldResultDataOrEmpty.txid)"
                                                title="Copy transaction ID"
                                                class="flex-1 flex items-center justify-center gap-1.5 px-3 py-1.5 rounded text-xs bg-navy-700 border border-navy-600 text-gray-300 hover:border-blue-500/30 hover:text-white transition-all">
                                            <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                                            <span>Copy ID</span>
                                        </button>
                                        <a :href="mempoolTxUrl(coldResultDataOrEmpty.txid)"
                                           target="_blank" rel="noopener noreferrer"
                                           title="View on mempool explorer"
                                           class="flex-1 flex items-center justify-center gap-1.5 px-3 py-1.5 rounded text-xs bg-navy-700 border border-navy-600 text-gray-300 hover:border-blue-500/30 hover:text-white transition-all">
                                            <i data-lucide="external-link" class="w-3.5 h-3.5"></i>
                                            <span>View on explorer</span>
                                        </a>
                                    </div>
                                </div>
                            </template>
                            <button @click="closeSendOnchain()" class="w-full px-4 py-2.5 rounded-lg text-sm bg-navy-700 border border-navy-600 text-gray-300 hover:border-blue-500/30 hover:text-white transition-all">
                                Done
                            </button>
                        </div>
                    </template>
                    <!-- Failure -->
                    <template x-if="coldResultFailed">
                        <div class="text-center space-y-3">
                            <div class="w-14 h-14 mx-auto rounded-full bg-neon-pink/10 border border-neon-pink/20 flex items-center justify-center">
                                <i data-lucide="alert-circle" class="w-7 h-7 text-neon-pink"></i>
                            </div>
                            <div>
                                <h3 class="text-lg font-semibold text-white">Transaction Failed</h3>
                                <p class="text-xs text-gray-400 mt-1" x-text="coldResultDataOrEmpty.error"></p>
                            </div>
                            <div class="flex gap-2">
                                <button @click="sendOnchainTryAgain()"
                                    class="flex-1 px-4 py-2.5 rounded-lg text-sm bg-navy-700 border border-navy-600 text-gray-300 hover:border-blue-500/30 hover:text-white transition-all">
                                    Try Again
                                </button>
                                <button @click="closeSendOnchain()"
                                    class="flex-1 px-4 py-2.5 rounded-lg text-sm bg-navy-700 border border-navy-600 text-gray-300 hover:text-white transition-all">
                                    Close
                                </button>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </template>

    <!-- App-wide confirm modal (askConfirm). Kept at the top level of the
         dashboard root so its z-[60] beats the z-50 action dialogs — when
         it was nested inside a page section, a section stacking context
         trapped it *behind* an open dialog and the confirm never showed. -->
    <div x-show="confirmOpen" x-cloak
         class="fixed inset-0 z-[60] flex items-center justify-center"
         x-on:keydown.escape.window="confirmDismiss()">
        <div class="absolute inset-0 bg-black/70 backdrop-blur-sm"
             x-on:click="confirmDismiss()"></div>
        <div class="relative w-full max-w-md mx-4 bg-navy-900 border border-navy-700 rounded-xl p-5 shadow-2xl">
            <p class="text-sm text-gray-200 mb-4" x-text="confirmBody"></p>
            <div class="flex justify-end gap-2">
                <button type="button"
                        class="px-3 py-1.5 rounded bg-navy-700 hover:bg-navy-600 text-sm text-gray-300"
                        x-on:click="confirmDismiss()"
                        x-text="confirmCancelLabel"></button>
                <button type="button"
                        class="px-3 py-1.5 rounded text-sm font-medium"
                        x-bind:class="confirmDangerous
                            ? 'bg-red-600 hover:bg-red-500 text-white'
                            : 'bg-blue-700 hover:bg-blue-600 text-white'"
                        x-on:click="confirmAccept()"
                        x-text="confirmOkLabel"></button>
            </div>
        </div>
    </div>

    <!-- ═══ CLOSE CHANNELS DIALOG (multi-select) ═══════════════════════
         Select → Review (coop vs force groups) → Progress. Cooperative
         for online peers; force for offline peers (auto-detected). -->
    <template x-if="showCloseChannels">
        <div class="fixed inset-0 z-50 flex items-center justify-center" @keydown.escape.window="closeCloseChannels()">
            <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="closeCloseChannels()"></div>
            <div class="relative w-full max-w-2xl mx-4 bg-gradient-to-br from-navy-800 to-navy-900 border border-neon-pink/30 rounded-xl p-6 shadow-2xl max-h-[92vh] overflow-y-auto">
                <div class="flex items-center justify-between mb-1">
                    <div class="flex items-center gap-2">
                        <i data-lucide="unplug" class="w-5 h-5 text-neon-pink"></i>
                        <h2 class="text-lg font-semibold text-white">Close Channels</h2>
                    </div>
                    <button @click="closeCloseChannels()" class="p-1.5 text-gray-500 hover:text-gray-300 hover:bg-navy-700 rounded-lg transition-colors">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>

                <!-- ──────── SELECT ──────── -->
                <div x-show="closeStep === 'select'" class="mt-3 space-y-3">
                    <p class="text-xs text-gray-400 leading-relaxed">
                        Pick the channels you want to close. Their balances come back to your on-chain wallet.
                        If the other side is online this takes a few minutes; if it's offline we'll force the
                        channel closed and your funds return after a short waiting period.
                    </p>

                    <div class="bg-navy-900 border border-navy-700 rounded-lg p-3">
                        <div class="flex items-center justify-between mb-2 gap-2">
                            <span class="text-[10px] uppercase tracking-wider text-gray-500">Select one or more</span>
                            <div class="flex items-center gap-1">
                                <select x-model="closeSortBy" class="bg-navy-800 border border-navy-700 rounded px-2 py-1 text-[11px] text-gray-300 focus:outline-none focus:border-neon-pink">
                                    <option value="local_desc">Most local</option>
                                    <option value="capacity">Capacity</option>
                                    <option value="alias">Alias A→Z</option>
                                </select>
                                <label class="flex items-center gap-1 text-[11px] text-gray-500 cursor-pointer">
                                    <input type="checkbox" x-model="closeShowInactive" class="accent-neon-pink"> show offline
                                </label>
                            </div>
                        </div>
                        <div class="relative mb-2">
                            <i data-lucide="search" class="absolute left-2 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-gray-500"></i>
                            <input type="text" x-model="closeSearch" placeholder="Search by alias or pubkey..."
                                   class="w-full bg-navy-800 border border-navy-700 rounded pl-7 pr-3 py-1.5 text-xs text-gray-200 focus:outline-none focus:border-neon-pink">
                        </div>
                        <div class="space-y-1.5 max-h-64 overflow-y-auto">
                            <template x-for="ch in closeCandidates()" :key="ch.chan_id">
                                <button type="button" @click="closeToggle(ch)"
                                        class="w-full text-left bg-navy-800 border rounded-lg p-2.5 transition-all"
                                        :class="closeIsSelected(ch) ? 'border-neon-pink/60 ring-1 ring-neon-pink/40' : 'border-navy-700 hover:border-neon-pink/40'">
                                    <div class="flex items-center justify-between mb-1 gap-2">
                                        <div class="flex items-center gap-2 min-w-0">
                                            <span class="w-3.5 h-3.5 rounded border flex items-center justify-center shrink-0 text-[10px] font-bold leading-none"
                                                  :class="closeIsSelected(ch) ? 'bg-neon-pink border-neon-pink text-navy-900' : 'border-navy-600 text-transparent'">✓</span>
                                            <span class="w-1.5 h-1.5 rounded-full shrink-0" :class="ch.active ? 'bg-neon-green' : 'bg-gray-600'"></span>
                                            <span class="text-white text-xs font-mono truncate" x-text="channelAlias(ch)"></span>
                                        </div>
                                        <span class="text-[10px] text-gray-500 ml-2 shrink-0"><span x-text="formatSats(ch.capacity || 0)"></span> sats</span>
                                    </div>
                                    <div class="capacity-bar bg-navy-700 flex h-1">
                                        <div class="h-full bg-neon-yellow rounded-l" :style="'width: ' + (ch.capacity > 0 ? ((ch.local_balance / ch.capacity) * 100) : 0) + '%'"></div>
                                        <div class="h-full bg-neon-cyan rounded-r" :style="'width: ' + (ch.capacity > 0 ? ((ch.remote_balance / ch.capacity) * 100) : 0) + '%'"></div>
                                    </div>
                                    <div class="flex justify-between text-[10px] mt-1 text-gray-500">
                                        <span>Local <span class="text-neon-yellow font-mono" x-text="formatSats(ch.local_balance || 0)"></span></span>
                                        <span x-show="!ch.active" class="text-amber-400/80">offline — needs force close</span>
                                    </div>
                                </button>
                            </template>
                            <template x-if="closeCandidates().length === 0">
                                <p class="text-xs text-gray-500 text-center py-4">No matching channels — try toggling "show offline" or clearing the search.</p>
                            </template>
                        </div>
                    </div>

                    <p class="text-[11px] text-gray-600">Tip: channels opened by automated features (like Anonymize) close themselves — you don't need to close those here.</p>

                    <div class="flex items-center justify-between">
                        <span class="text-xs text-gray-400">
                            <span x-text="closeSelected.length"></span> selected<span x-show="closeSelected.length > 0"> · ~<span class="font-mono" x-text="formatSats(closeSelectedTotalSats())"></span> sats returning</span>
                        </span>
                        <button @click="closeReview()" :disabled="closeSelected.length === 0"
                                class="inline-flex items-center gap-1.5 px-4 py-2 rounded-lg text-sm font-medium bg-neon-pink/15 border border-neon-pink/40 text-neon-pink hover:bg-neon-pink/25 hover:border-neon-pink/60 transition-all disabled:opacity-40 disabled:cursor-not-allowed">
                            Review &amp; close <i data-lucide="arrow-right" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>

                <!-- ──────── REVIEW ──────── -->
                <div x-show="closeStep === 'review'" class="mt-3 space-y-4">
                    <p class="text-xs text-gray-400">You're closing <span x-text="closeSelected.length"></span> channel<span x-show="closeSelected.length !== 1">s</span>:</p>

                    <template x-if="closeCoopGroup().length > 0">
                        <div class="bg-navy-900 border border-navy-700 rounded-lg p-3">
                            <p class="text-[11px] uppercase tracking-wider text-neon-cyan mb-1.5">Cooperative — funds back in minutes</p>
                            <div class="space-y-1">
                                <template x-for="ch in closeCoopGroup()" :key="ch.chan_id">
                                    <div class="flex items-center justify-between text-xs gap-2">
                                        <span class="text-gray-200 font-mono truncate" x-text="channelAlias(ch)"></span>
                                        <span class="text-gray-400 font-mono shrink-0">~<span x-text="formatSats(ch.local_balance || 0)"></span> sats</span>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>

                    <template x-if="closeForceGroup().length > 0">
                        <div class="bg-amber-400/5 border border-amber-400/30 rounded-lg p-3">
                            <p class="text-[11px] uppercase tracking-wider text-amber-400 mb-1.5">Force close — funds locked, then released</p>
                            <div class="space-y-1 mb-2">
                                <template x-for="ch in closeForceGroup()" :key="ch.chan_id">
                                    <div class="flex items-center justify-between text-xs gap-2">
                                        <span class="text-gray-200 font-mono truncate" x-text="channelAlias(ch)"></span>
                                        <span class="text-gray-400 font-mono shrink-0">~<span x-text="formatSats(ch.local_balance || 0)"></span> sats</span>
                                    </div>
                                </template>
                            </div>
                            <p class="text-[11px] text-amber-400/80">These peers are offline, so we force the channels closed. Your sats are safe but locked on-chain for a little while (often about a day) before they're spendable.</p>
                        </div>
                    </template>

                    <p class="text-[11px] text-gray-500">On-chain fees are deducted from each channel's closing transaction.</p>

                    <!-- BOLT12 offer caution: a closed channel can orphan the blinded
                         path baked into the current Ocean receive offer. -->
                    <div class="p-3 rounded-lg bg-amber-500/10 border border-amber-500/30 flex items-start gap-2">
                        <i data-lucide="alert-triangle" class="w-4 h-4 text-amber-400 shrink-0 mt-0.5"></i>
                        <div class="text-[11px] text-amber-200/90 leading-relaxed">
                            Using a BOLT12 offer for Ocean payouts? Your offer carries a private route built from your current channels. Closing channels can break that route, and payouts may silently stop. If you're set up for Ocean, mint a fresh offer from the Receive screen after closing.
                        </div>
                    </div>

                    <div class="flex gap-2">
                        <button @click="closeBack()" class="px-4 py-2.5 rounded-lg bg-navy-700 border border-navy-600 text-gray-300 hover:border-gray-500 transition-all text-sm">Back</button>
                        <button @click="confirmAndClose()"
                                class="flex-1 inline-flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg text-sm font-medium bg-neon-pink/15 border border-neon-pink/40 text-neon-pink hover:bg-neon-pink/25 hover:border-neon-pink/60 transition-all">
                            <i data-lucide="unplug" class="w-4 h-4"></i> Close <span x-text="closeSelected.length"></span> channel<span x-show="closeSelected.length !== 1">s</span>
                        </button>
                    </div>
                </div>

                <!-- ──────── PROGRESS / RESULT ──────── -->
                <div x-show="closeStep === 'progress'" class="mt-3 space-y-4">
                    <div class="flex items-center justify-between">
                        <h3 class="text-sm font-medium text-white">Closing…</h3>
                        <span x-show="closeRunning" class="w-4 h-4 border-2 border-neon-pink border-t-transparent rounded-full animate-spin inline-block"></span>
                    </div>
                    <div class="space-y-1.5">
                        <template x-for="r in closeResults" :key="r.chan_id">
                            <div class="flex items-center justify-between gap-2 bg-navy-900 border border-navy-700 rounded-lg p-2.5 text-xs">
                                <div class="flex items-center gap-2 min-w-0">
                                    <template x-if="r.ok"><i data-lucide="check-circle-2" class="w-4 h-4 text-neon-green shrink-0"></i></template>
                                    <template x-if="!r.ok"><i data-lucide="alert-triangle" class="w-4 h-4 text-neon-pink shrink-0"></i></template>
                                    <span class="text-gray-200 font-mono truncate" x-text="r.alias"></span>
                                </div>
                                <div class="shrink-0 text-right">
                                    <template x-if="r.ok">
                                        <span class="text-gray-400" x-text="r.force ? 'force close requested' : 'close requested'"></span>
                                    </template>
                                    <template x-if="!r.ok">
                                        <div class="flex items-center gap-2 justify-end">
                                            <span class="text-neon-pink/80" x-text="r.error"></span>
                                            <button x-show="closeRetryIsForceable(r)" @click="closeForceRetry(r)" class="shrink-0 px-2 py-0.5 rounded bg-amber-400/10 border border-amber-400/30 text-amber-400 hover:bg-amber-400/20 transition-all">Force close</button>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                    <p class="text-[11px] text-gray-500" x-show="!closeRunning">Closing channels show up in the channel list with their status — and, for force closes, a countdown until the funds are released.</p>
                    <button @click="closeCloseChannels()" :disabled="closeRunning"
                            class="w-full inline-flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg bg-navy-700 border border-navy-600 text-gray-300 hover:border-gray-500 transition-all text-sm disabled:opacity-40">
                        Done
                    </button>
                </div>
            </div>
        </div>
    </template>

    <!-- ═══ REBALANCE DIALOG (circular self-payment) ═══════════════════
         Mints a local invoice and sends a self-payment from the
         selected source channel to the selected destination channel,
         using ``outgoing_chan_id`` + ``last_hop_pubkey`` to pin both
         hops. The visualisation animates between the two stacked
         capacity bars so the user can SEE the sats moving from one
         channel's local side to the other's. ─────────────────────── -->
    <template x-if="showRebalance">
        <div class="fixed inset-0 z-50 flex items-center justify-center" @keydown.escape.window="closeRebalance()">
            <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="closeRebalance()"></div>
            <div class="relative w-full max-w-2xl mx-4 bg-gradient-to-br from-navy-800 to-navy-900 border border-neon-cyan/30 rounded-xl p-6 shadow-2xl max-h-[92vh] overflow-y-auto">

                <!-- Header -->
                <div class="flex items-center justify-between mb-1">
                    <div class="flex items-center gap-2">
                        <i data-lucide="refresh-cw" class="w-5 h-5 text-neon-cyan"></i>
                        <h2 class="text-lg font-semibold text-white">Rebalance Channel</h2>
                    </div>
                    <button @click="closeRebalance()" class="p-1.5 text-gray-500 hover:text-gray-300 hover:bg-navy-700 rounded-lg transition-colors">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>
                <p class="text-xs text-gray-500 mb-4">
                    <template x-if="!rebalance.dest">
                        <span><span class="text-neon-cyan font-mono">Pick a destination</span> channel to move sats into via a circular self-payment.</span>
                    </template>
                    <template x-if="rebalance.dest">
                        <span>Set the <span class="text-neon-cyan font-mono">amount</span> and <span class="text-neon-cyan font-mono">max fee</span>, then start the rebalance to move sats from the source channel back to your node via the destination.</span>
                    </template>
                </p>

                <!-- Compact source context — only shown while picking a destination, since
                     the full source row appears inside the SVG panel once a dest is chosen. -->
                <template x-if="!rebalance.dest">
                    <div class="flex items-center justify-between gap-2 mb-3 px-3 py-2 rounded-md bg-navy-900/60 border border-navy-700 text-[11px]">
                        <div class="flex items-center gap-1.5 min-w-0">
                            <span class="text-[10px] uppercase tracking-wider text-gray-500">From</span>
                            <span class="w-1.5 h-1.5 rounded-full bg-neon-green shrink-0"></span>
                            <span class="font-mono text-gray-200 truncate" x-text="channelAlias(rebalance.source)"></span>
                        </div>
                        <span class="text-gray-500 shrink-0">
                            Max sendable
                            <span class="font-mono text-neon-yellow ml-1" x-text="formatSats(rebalMaxSendableSrc) + ' sats'"></span>
                        </span>
                    </div>
                </template>

                <!-- Destination picker (when none selected) -->
                <template x-if="!rebalance.dest">
                    <div class="bg-navy-900 border border-navy-700 rounded-lg p-3 mb-3">
                        <div class="flex items-center justify-between mb-2 gap-2">
                            <span class="text-[10px] uppercase tracking-wider text-gray-500">Destination — pick one</span>
                            <div class="flex items-center gap-1">
                                <select :value="rebalance.sortBy" @change="setField('rebalance','sortBy', $event.target.value)"
                                        class="bg-navy-800 border border-navy-700 rounded px-2 py-1 text-[11px] text-gray-300 focus:outline-none focus:border-neon-cyan">
                                    <option value="best">Best fit</option>
                                    <option value="ratio">Most inbound</option>
                                    <option value="capacity">Capacity</option>
                                    <option value="alias">Alias A→Z</option>
                                </select>
                                <label class="flex items-center gap-1 text-[11px] text-gray-500 cursor-pointer">
                                    <input type="checkbox" :checked="rebalance.showAllDests" @change="setField('rebalance','showAllDests', $event.target.checked)" class="accent-neon-cyan">
                                    show all
                                </label>
                            </div>
                        </div>
                        <div class="relative mb-2">
                            <i data-lucide="search" class="absolute left-2 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-gray-500"></i>
                            <input type="text" :value="rebalance.search" @input="setField('rebalance','search', $event.target.value)"
                                   placeholder="Search by alias or pubkey..."
                                   class="w-full bg-navy-800 border border-navy-700 rounded pl-7 pr-3 py-1.5 text-xs text-gray-200 focus:outline-none focus:border-neon-cyan">
                        </div>
                        <div class="space-y-1.5 max-h-64 overflow-y-auto">
                            <template x-for="ch in rebalanceCandidates()" :key="ch.chan_id">
                                <button type="button"
                                        @click="rebalancePickDest(ch)"
                                        class="w-full text-left bg-navy-800 hover:bg-navy-700 border border-navy-700 hover:border-neon-cyan/50 rounded-lg p-2.5 transition-all">
                                    <div class="flex items-center justify-between mb-1">
                                        <div class="flex items-center gap-2 min-w-0">
                                            <span class="w-1.5 h-1.5 rounded-full bg-neon-green"></span>
                                            <span class="text-white text-xs font-mono truncate" x-text="channelAlias(ch)"></span>
                                        </div>
                                        <span class="text-[10px] text-gray-500 ml-2 shrink-0">
                                            <span x-text="formatSats(ch.capacity || 0)"></span> sats
                                        </span>
                                    </div>
                                    <div class="capacity-bar bg-navy-700 flex h-1">
                                        <div class="h-full bg-neon-yellow rounded-l" :style="rebalanceLocalStyle(ch)"></div>
                                        <div class="h-full bg-neon-cyan rounded-r" :style="rebalanceRemoteStyle(ch)"></div>
                                    </div>
                                    <div class="flex justify-between text-[10px] mt-1 text-gray-500">
                                        <span>Local <span class="text-neon-yellow font-mono" x-text="formatSats(ch.local_balance || 0)"></span></span>
                                        <span>Inbound headroom: <span class="text-neon-cyan font-mono" x-text="formatSats(rebalanceMaxReceivable(ch))"></span></span>
                                    </div>
                                </button>
                            </template>
                            <template x-if="rebalanceCandidates().length === 0">
                                <p class="text-xs text-gray-500 text-center py-4">No matching channels — try toggling "show all" or clearing the search.</p>
                            </template>
                        </div>
                    </div>
                </template>

                <!-- Destination summary (when chosen) + visualization -->
                <template x-if="rebalance.dest">
                    <div>
                        <!-- SVG visualisation -->
                        <div class="bg-navy-900 border border-navy-700 rounded-lg p-3 mb-3">
                            <!-- Source row: alias + balances move from the dialog header into
                                 the visualisation panel so the dialog opens with a clean intro. -->
                            <div class="flex items-center justify-between mb-1.5 text-[11px]">
                                <div class="flex items-center gap-1.5 min-w-0">
                                    <span class="text-[10px] uppercase tracking-wider text-gray-500">Source</span>
                                    <span class="w-1.5 h-1.5 rounded-full bg-neon-green shrink-0"></span>
                                    <span class="font-mono text-gray-200 truncate" x-text="channelAlias(rebalance.source)"></span>
                                </div>
                                <span class="font-mono text-gray-500" x-text="formatSats(rebalance.source.capacity || 0) + ' sats cap'"></span>
                            </div>
                            <!-- Source balance + sendable line. Placed above the bar+arrow
                                 graphic so the source-channel stats sit next to their
                                 source-channel header (not next to the destination bar). -->
                            <div class="flex justify-between items-center mb-2 text-[11px]">
                                <span class="text-neon-yellow">Local: <span class="font-mono" x-text="formatSats(rebalance.source.local_balance || 0)"></span></span>
                                <span class="text-gray-500">Remaining after rebalance:
                                    <span class="font-mono text-gray-300" x-text="formatSats(rebalSrcRemainingLocal) + ' sats'"></span>
                                </span>
                                <span class="text-gray-500">Max sendable:
                                    <span class="font-mono" x-text="formatSats(rebalMaxSendableSrc)"></span>
                                </span>
                            </div>
                            <svg viewBox="0 0 400 140" class="w-full h-32" preserveAspectRatio="none" style="overflow: visible;">
                                <defs>
                                    <!-- refX=0 anchors the marker by the broad (back) edge of the
                                         triangle, so the path terminates at the broad edge and the
                                         pointy tip extends forward toward the bar. -->
                                    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                                        <path d="M 0 0 L 10 5 L 0 10 z" class="fill-neon-cyan"/>
                                    </marker>
                                    <marker id="arrow-red" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                                        <path d="M 0 0 L 10 5 L 0 10 z" class="fill-red-500"/>
                                    </marker>
                                </defs>

                                <!-- Source bar (top, y=18..38) -->
                                <rect x="0" y="18" width="400" height="20" rx="3" class="fill-navy-700"/>
                                <rect x="0" y="18"
                                      :width="rebalSrcLocalW"
                                      height="20" rx="3" class="fill-neon-yellow opacity-60"/>
                                <rect :x="rebalSrcSliceX"
                                      y="16"
                                      :width="rebalSrcSliceW"
                                      height="24" rx="3"
                                      :class="rebalArrowOk ? 'fill-neon-cyan animate-pulse-neon' : 'fill-red-500/70'"/>

                                <!-- Dest bar (bottom, y=102..122) -->
                                <rect x="0" y="102" width="400" height="20" rx="3" class="fill-navy-700"/>
                                <rect x="0" y="102"
                                      :width="rebalDstLocalW"
                                      height="20" rx="3" class="fill-neon-yellow opacity-60"/>
                                <rect :x="rebalDstSliceX"
                                      y="100"
                                      :width="rebalDstSliceW"
                                      height="24" rx="3"
                                      :class="rebalArrowOk ? 'fill-neon-yellow animate-pulse-neon' : 'fill-red-500/70'"/>

                                <!-- Curved arrow -->
                                <path :d="rebalArrowPath"
                                      :class="rebalArrowOk ? 'stroke-neon-cyan' : 'stroke-red-500'"
                                      fill="none"
                                      stroke-width="2"
                                      stroke-dasharray="6 4"
                                      :marker-end="rebalArrowOk ? 'url(#arrow-cyan)' : 'url(#arrow-red)'"
                                      style="animation: dash-flow 1.2s linear infinite;"/>
                            </svg>
                            <!-- Destination row: alias header + change link, then balance details -->
                            <div class="flex items-center justify-between text-[11px] pt-2 border-t border-navy-700">
                                <div class="flex items-center gap-1.5 min-w-0">
                                    <span class="text-[10px] uppercase tracking-wider text-gray-500">Dest</span>
                                    <span class="w-1.5 h-1.5 rounded-full bg-neon-green shrink-0"></span>
                                    <span class="font-mono text-gray-200 truncate" x-text="channelAlias(rebalance.dest)"></span>
                                </div>
