{% extends "base.html" %}

{% block title %}Dashboard — Agent Wallet{% endblock %}

{% block body %}
<div x-data="dashboard" x-init="init()" class="min-h-screen">

    <!-- ═══ HEADER ═══ -->
    <header class="bg-navy-900 border-b border-navy-700 px-4 py-3">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="/dashboard/static/logo.png" alt="" class="w-8 h-8 rounded">
                <h1 class="text-lg font-bold text-white">Agent Wallet</h1>
                <template x-if="infoAlias">
                    <div class="flex items-center gap-2 ml-4">
                        <span class="text-gray-400 text-sm" x-text="infoAlias"></span>
                        <span
                            class="w-2 h-2 rounded-full"
                            :class="infoSynced ? 'bg-neon-green' : 'bg-neon-yellow animate-pulse-neon'"
                            :title="infoSynced ? 'Synced' : 'Syncing...'"
                        ></span>
                    </div>
                </template>
            </div>
            <div class="flex items-center gap-3">
                <!-- Block clock -->
                <template x-if="infoBlockHeight">
                    <div class="hidden sm:flex items-center gap-2 px-3 py-1.5 rounded-md bg-navy-800/70 border border-navy-700 block-clock"
                         :title="'Bitcoin block height \u00b7 ' + (infoSynced ? 'synced' : 'syncing')">
                        <i data-lucide="box" class="w-3.5 h-3.5 text-neon-cyan"></i>
                        <span class="text-[10px] uppercase tracking-wider text-gray-500">Block</span>
                        <span class="text-sm font-mono text-neon-cyan tabular-nums"
                              :class="blockClockBump ? 'block-clock-bump' : ''"
                              x-text="infoBlockHeight.toLocaleString()"></span>
                    </div>
                </template>
                <!-- Settings menu — entry point for API key management,
                     audit log, and logout. Replaces the bare logout
                     button so administration UI has a discoverable home
                     without crowding the header. -->
                <div class="relative" @click.outside="showSettingsMenu = false"
                     @keydown.escape.window="showSettingsMenu = false">
                    <button
                        type="button"
                        @click="showSettingsMenu = !showSettingsMenu"
                        class="flex items-center gap-1.5 px-2 py-1.5 rounded-md text-gray-400 hover:text-white hover:bg-navy-700 transition-colors"
                        :class="showSettingsMenu ? 'bg-navy-700 text-white' : ''"
                        title="Settings"
                        aria-haspopup="true"
                        :aria-expanded="showSettingsMenu ? 'true' : 'false'"
                    >
                        <i data-lucide="settings" class="w-4 h-4"></i>
                        <i data-lucide="chevron-down" class="w-3 h-3"></i>
                    </button>
                    <div x-show="showSettingsMenu" x-cloak
                         x-transition.opacity.duration.150ms
                         class="absolute right-0 mt-2 w-56 bg-navy-900 border border-navy-700 rounded-lg shadow-2xl shadow-black/40 py-1 z-40">
                        <button type="button"
                            @click="openApiKeys()"
                            class="w-full text-left flex items-center gap-2 px-3 py-2 text-sm text-gray-300 hover:bg-navy-700 hover:text-white">
                            <i data-lucide="key-round" class="w-4 h-4 text-neon-cyan"></i>
                            <span>API Keys</span>
                        </button>
                        <button type="button"
                            @click="openAuditLog()"
                            class="w-full text-left flex items-center gap-2 px-3 py-2 text-sm text-gray-300 hover:bg-navy-700 hover:text-white">
                            <i data-lucide="scroll-text" class="w-4 h-4 text-neon-yellow"></i>
                            <span>Audit Log</span>
                        </button>
                        <!- — Tor health panel. The dot's colour
                             reflects the Tor breaker state (cyan=closed,
                             yellow=half-open, pink=open) for at-a-glance
                             status without opening the modal. -->
                        <button type="button"
                            @click="openTorHealth()"
                            class="w-full text-left flex items-center gap-2 px-3 py-2 text-sm text-gray-300 hover:bg-navy-700 hover:text-white">
                            <i data-lucide="shield-check" class="w-4 h-4 text-neon-green"></i>
                            <span>Tor Health</span>
                            <span
                                class="ml-auto w-2 h-2 rounded-full"
                                :class="torHealthIndicatorClass"
                                :title="torHealthIndicatorTitle"
                                aria-hidden="true"></span>
                        </button>
                        <!-- Visible only after a user explicitly dismissed
                             the onboarding wizard but doesn't yet have an
                             active channel. Re-entering the wizard is
                             always safe; it derives state from chain. -->
                        <template x-if="onboardingSkipped && !onboardingHasActiveChannel">
                            <button type="button"
                                @click="onboardingResumeFromMenu()"
                                class="w-full text-left flex items-center gap-2 px-3 py-2 text-sm text-gray-300 hover:bg-navy-700 hover:text-white">
                                <i data-lucide="compass" class="w-4 h-4 text-neon-green"></i>
                                <span>Resume guided setup</span>
                            </button>
                        </template>
                        <div class="border-t border-navy-700 my-1"></div>
                        <button type="button"
                            @click="logout()"
                            class="w-full text-left flex items-center gap-2 px-3 py-2 text-sm text-gray-300 hover:bg-navy-700 hover:text-white">
                            <i data-lucide="log-out" class="w-4 h-4 text-gray-500"></i>
                            <span>Logout</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6 space-y-6">

        <!-- Loading State -->
        <template x-if="loading && !summary">
            <div class="flex items-center justify-center py-20">
                <div class="w-8 h-8 border-2 border-neon-cyan border-t-transparent rounded-full animate-spin"></div>
                <span class="ml-3 text-gray-400">Connecting to node...</span>
            </div>
        </template>

        <!-- Error State -->
        <template x-if="error && !summary">
            <div class="bg-neon-pink/10 border border-neon-pink/30 rounded-lg p-6 text-center">
                <p class="text-neon-pink mb-2" x-text="error"></p>
                <button @click="fetchAll()" class="text-sm text-gray-400 hover:text-white">Retry</button>
            </div>
        </template>

        <!-- Onboarding wizard.
             Renders in place of the tabbed dashboard while
             ``onboardingStep`` is non-null.
             ``|| onboardingCelebrating`` keeps the wizard mounted
             for ~2.4 s after a channel first goes active so the
             "You're connected!" view can play before the regular
             dashboard takes over.
             ``|| channelPlannerActive`` keeps the wrapper mounted
             when the channel-mix planner is opened from the
             Channels tab (post-onboarding); the planner panels
             check ``channelPlanMode`` directly and the other
             wizard steps stay hidden because their x-show keys off
             ``onboardingStep``. -->
        <template x-if="summary && (onboardingStep || onboardingCelebrating || channelPlannerActive)">
            <div class="max-w-2xl mx-auto">
                <!-- WELCOME (intent → amount → recommendation) ───────── -->
                <div x-show="onboardingStep === 'welcome'" class="onboarding-fade-up py-10">
                    <div class="text-center mb-6">
                        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-neon-yellow/15 border-2 border-neon-yellow/40 mb-4 animate-pulse-neon">
                            <i data-lucide="zap" class="w-8 h-8 text-neon-yellow"></i>
                        </div>
                        <h2 class="text-2xl font-semibold text-white mb-2">Welcome to Agent Wallet</h2>
                        <p class="text-sm text-gray-400 max-w-md mx-auto">
                            Agent Wallet lets you and your AI agents send and receive Bitcoin —
                            on-chain and over Lightning. Tell us how you'll use it and we'll
                            suggest how much to deposit.
                        </p>
                    </div>

                    <!-- progress dots -->
                    <div class="flex items-center justify-center gap-1.5 mb-5">
                        <span class="w-2 h-2 rounded-full transition-colors" :class="welcomeBeat === 'use_case' ? 'bg-neon-cyan' : 'bg-navy-600'"></span>
                        <span class="w-2 h-2 rounded-full transition-colors" :class="welcomeBeat === 'scale' ? 'bg-neon-cyan' : 'bg-navy-600'"></span>
                        <span class="w-2 h-2 rounded-full transition-colors" :class="welcomeBeat === 'recommend' ? 'bg-neon-cyan' : 'bg-navy-600'"></span>
                    </div>

                    <div class="bg-navy-900 border border-navy-700 rounded-lg p-5 max-w-md mx-auto">
                        <!-- BEAT 1: use case -->
                        <div x-show="welcomeBeat === 'use_case'" class="space-y-1.5">
                            <p class="text-xs uppercase tracking-wider text-gray-500 mb-2">What will you use Agent Wallet for?</p>
                            <button @click="welcomeSelectUseCase('spend')" class="w-full text-left p-3 rounded border border-navy-700 hover:border-neon-cyan/40 hover:bg-neon-cyan/5 transition-colors">
                                <span class="text-sm font-medium text-white block">Spend / pay out</span>
                                <span class="text-xs text-gray-400">Pay for goods, services, and tips.</span>
                            </button>
                            <button @click="welcomeSelectUseCase('receive')" class="w-full text-left p-3 rounded border border-navy-700 hover:border-neon-cyan/40 hover:bg-neon-cyan/5 transition-colors">
                                <span class="text-sm font-medium text-white block">Receive / get paid</span>
                                <span class="text-xs text-gray-400">Accept payments, tips, payouts.</span>
                            </button>
                            <button @click="welcomeSelectUseCase('both')" class="w-full text-left p-3 rounded border border-navy-700 hover:border-neon-cyan/40 hover:bg-neon-cyan/5 transition-colors">
                                <span class="text-sm font-medium text-white block">Both</span>
                                <span class="text-xs text-gray-400">Send and receive in roughly equal measure.</span>
                            </button>
                            <button @click="welcomeSelectUseCase('explore')" class="w-full text-left p-3 rounded border border-navy-700 hover:border-neon-cyan/40 hover:bg-neon-cyan/5 transition-colors">
                                <span class="text-sm font-medium text-white block">Not sure / just exploring</span>
                                <span class="text-xs text-gray-400">Start small; you can add more later.</span>
                            </button>
                        </div>

                        <!-- BEAT 2: scale -->
                        <div x-show="welcomeBeat === 'scale'" class="space-y-3">
                            <button @click="welcomeBack()" class="text-[11px] text-gray-500 hover:text-neon-cyan">&larr; Back</button>
                            <p class="text-xs uppercase tracking-wider text-gray-500">Roughly how much do you want to <span x-text="welcomeVerb"></span>?</p>
                            <div class="grid grid-cols-3 gap-1.5">
                                <button @click="welcomeSelectScale('light')" class="text-center p-2.5 rounded border border-navy-700 hover:border-neon-green/40 hover:bg-neon-green/5 transition-colors">
                                    <span class="text-sm font-medium text-white block">Light</span>
                                    <span class="text-[10px] text-gray-500 font-mono">150k sats</span>
                                </button>
                                <button @click="welcomeSelectScale('standard')" class="text-center p-2.5 rounded border border-navy-700 hover:border-neon-green/40 hover:bg-neon-green/5 transition-colors">
                                    <span class="text-sm font-medium text-white block">Standard</span>
                                    <span class="text-[10px] text-gray-500 font-mono">500k sats</span>
                                </button>
                                <button @click="welcomeSelectScale('heavy')" class="text-center p-2.5 rounded border border-navy-700 hover:border-neon-green/40 hover:bg-neon-green/5 transition-colors">
                                    <span class="text-sm font-medium text-white block">Heavy</span>
                                    <span class="text-[10px] text-gray-500 font-mono">2M sats</span>
                                </button>
                            </div>
                            <div>
                                <label class="flex items-center gap-2 text-xs text-gray-400 cursor-pointer">
                                    <input type="radio" name="welcomeScale" value="custom" x-model="welcomeScalePreset" class="accent-neon-green">
                                    Custom amount
                                </label>
                                <div x-show="welcomeScalePreset === 'custom'" class="mt-2 space-y-2">
                                    <div class="relative">
                                        <input type="number" min="1" x-model.number="welcomeScaleCustom" @keydown.enter="welcomeSubmitCustomScale()"
                                               placeholder="Amount in sats"
                                               class="no-spinner w-full pl-3 pr-12 py-2.5 rounded-lg text-sm font-mono bg-navy-800 border border-navy-700 text-gray-200 placeholder-gray-600 focus:outline-none focus:border-neon-green/40">
                                        <span class="pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-xs text-gray-500">sats</span>
                                    </div>
                                    <button @click="welcomeSubmitCustomScale()" :disabled="welcomeScaleSats <= 0"
                                            class="w-full px-4 py-2 rounded-lg bg-neon-green/15 border border-neon-green/40 text-neon-green text-sm font-medium hover:bg-neon-green/25 transition-all disabled:opacity-40 disabled:cursor-not-allowed">
                                        See suggestion &rarr;
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- BEAT 3: recommendation -->
                        <div x-show="welcomeBeat === 'recommend'" class="space-y-4">
                            <button @click="welcomeBack()" class="text-[11px] text-gray-500 hover:text-neon-cyan">&larr; Back</button>

                            <template x-if="welcomeRecLoading">
                                <div class="text-center py-6 text-sm text-gray-400">
                                    <span class="inline-block w-4 h-4 border-2 border-neon-cyan border-t-transparent rounded-full animate-spin align-[-2px]"></span>
                                    Working out a suggestion…
                                </div>
                            </template>

                            <template x-if="!welcomeRecLoading && welcomeRecError">
                                <div class="space-y-3">
                                    <div class="flex items-start gap-2 p-3 rounded-lg bg-neon-yellow/10 border border-neon-yellow/20">
                                        <i data-lucide="alert-triangle" class="w-4 h-4 text-neon-yellow shrink-0 mt-0.5"></i>
                                        <p class="text-xs text-neon-yellow" x-text="welcomeRecError"></p>
                                    </div>
                                    <button @click="welcomeChooseAmountMyself()"
                                            class="w-full inline-flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg bg-neon-green/15 border border-neon-green/40 text-neon-green font-medium hover:bg-neon-green/25 text-sm">
                                        Choose the amount myself
                                    </button>
                                </div>
                            </template>

                            <template x-if="!welcomeRecLoading && !welcomeRecError && welcomeActiveCard">
                                <div class="space-y-4">
                                    <!-- receive: efficient / fast switch -->
                                    <template x-if="welcomeHasAlternative">
                                        <div class="grid grid-cols-2 gap-1.5">
                                            <button @click="welcomeSelectStrategy('bootstrap')"
                                                    class="text-center p-2 rounded border text-xs transition-colors"
                                                    :class="welcomeActiveStrategy === 'bootstrap' ? 'border-neon-green/40 bg-neon-green/5 text-white' : 'border-navy-700 text-gray-400 hover:border-navy-600'">
                                                <span class="font-medium block">Efficient</span>
                                                <span class="text-[10px] text-gray-500">less to start · slower</span>
                                            </button>
                                            <button @click="welcomeSelectStrategy('parallel')"
                                                    class="text-center p-2 rounded border text-xs transition-colors"
                                                    :class="welcomeActiveStrategy === 'parallel' ? 'border-neon-green/40 bg-neon-green/5 text-white' : 'border-navy-700 text-gray-400 hover:border-navy-600'">
                                                <span class="font-medium block">Fast</span>
                                                <span class="text-[10px] text-gray-500">instant · costs more</span>
                                            </button>
                                        </div>
                                    </template>

                                    <div class="text-center">
                                        <p class="text-xs uppercase tracking-wider text-gray-500 mb-1">Suggested deposit</p>
                                        <p class="text-3xl font-bold font-mono text-white">
                                            <span x-text="formatSats(welcomeActiveCard.deposit_sats)"></span>
                                            <span class="text-base text-gray-500 font-normal">sats</span>
                                        </p>
                                    </div>
                                    <p class="text-[12px] text-gray-400 text-center leading-relaxed" x-text="welcomeActiveCard.rationale"></p>

                                    <!-- bootstrap estimate -->
                                    <template x-if="welcomeActiveIsBootstrap">
                                        <div class="border-t border-navy-700 pt-3 space-y-1.5 text-xs">
                                            <div class="flex justify-between"><span class="text-gray-400">Inbound you'll build</span><span class="font-mono text-neon-green" x-text="formatSats(welcomeEstimate.expected_total_inbound_sats) + ' sat'"></span></div>
                                            <div class="flex justify-between"><span class="text-gray-400">Estimated time</span><span class="font-mono text-gray-300" x-text="welcomeDurationLabel(welcomeEstimate.est_duration_minutes)"></span></div>
                                            <div class="flex justify-between"><span class="text-gray-400">Estimated fees</span><span class="font-mono text-gray-300" x-text="formatSats(welcomeEstimate.total_fees_sats) + ' sat'"></span></div>
                                            <div class="flex justify-between"><span class="text-gray-400">Left as outbound / reserve</span><span class="font-mono text-gray-300" x-text="formatSats(welcomeEstimate.residual_outbound_sats) + ' sat'"></span></div>
                                            <p class="text-[11px] text-gray-500 pt-1 leading-relaxed">Runs in the background over a few hours — you can close this and come back. You'll have little inbound right after depositing; it builds round by round.</p>
                                        </div>
                                    </template>

                                    <!-- "Why this amount?" — parallel breakdown -->
                                    <template x-if="welcomeHasBreakdown">
                                        <div class="border-t border-navy-700 pt-3">
                                            <button @click="welcomeWhyOpen = !welcomeWhyOpen" class="w-full flex items-center justify-between text-xs text-gray-400 hover:text-white">
                                                <span>Why this amount?</span>
                                                <i :data-lucide="welcomeWhyOpen ? 'chevron-up' : 'chevron-down'" class="w-3.5 h-3.5"></i>
                                            </button>
                                            <template x-if="welcomeWhyOpen">
                                                <div class="mt-2 space-y-1 text-[11px] text-gray-400">
                                                    <div class="flex justify-between"><span>Channel capacity</span><span class="font-mono text-gray-300" x-text="formatSats(welcomeBreakdown.channel_capacity_sats) + ' sat'"></span></div>
                                                    <div class="flex justify-between"><span>Open fee</span><span class="font-mono text-gray-300" x-text="formatSats(welcomeBreakdown.open_fees_sats) + ' sat'"></span></div>
                                                    <div class="flex justify-between"><span>Close reserve</span><span class="font-mono text-gray-300" x-text="formatSats(welcomeBreakdown.close_reserve_sats) + ' sat'"></span></div>
                                                    <div class="flex justify-between"><span>Fee-spike cushion</span><span class="font-mono text-gray-300" x-text="formatSats(welcomeBreakdown.fee_spike_cushion_sats) + ' sat'"></span></div>
                                                    <p class="pt-1 text-gray-500 leading-relaxed">The reserve and cushion stay on-chain so you can close cleanly even if fees spike.</p>
                                                </div>
                                            </template>
                                        </div>
                                    </template>

                                    <template x-if="welcomeWarnings.length">
                                        <ul class="space-y-1">
                                            <template x-for="w in welcomeWarnings" :key="w">
                                                <li class="text-[11px] text-neon-yellow flex items-start gap-1.5">
                                                    <i data-lucide="alert-triangle" class="w-3 h-3 shrink-0 mt-0.5"></i><span x-text="w"></span>
                                                </li>
                                            </template>
                                        </ul>
                                    </template>

                                    <button @click="welcomeAcceptAndDeposit()"
                                            class="w-full inline-flex items-center justify-center gap-2 px-4 py-3 rounded-lg bg-neon-green/15 border border-neon-green/40 text-neon-green font-medium hover:bg-neon-green/25 hover:border-neon-green/60 transition-all text-sm">
                                        <i data-lucide="arrow-down-to-line" class="w-4 h-4"></i> Get deposit address
                                    </button>
                                    <button @click="welcomeChooseAmountMyself()" class="w-full text-[11px] text-gray-500 hover:text-neon-cyan">Choose the amount myself</button>
                                </div>
                            </template>
                        </div>

                        <p class="text-xs text-gray-500 text-center mt-5 pt-4 border-t border-navy-800">
                            Already familiar with setting up a Lightning node?
                            <button @click="onboardingSkip()" class="text-neon-cyan hover:underline">Skip to dashboard</button>
                        </p>
                    </div>
                </div>

                <!-- AWAITING DEPOSIT ───────────────────────────────────── -->
                <div x-show="onboardingStep === 'awaiting_deposit'" class="onboarding-fade-up py-10">
                    <div class="flex items-center justify-center gap-1.5 mb-6">
                        <span class="w-2.5 h-2.5 rounded-full bg-neon-cyan onboarding-dot"></span>
                        <span class="w-2.5 h-2.5 rounded-full bg-neon-cyan onboarding-dot onboarding-dot-2"></span>
                        <span class="w-2.5 h-2.5 rounded-full bg-neon-cyan onboarding-dot onboarding-dot-3"></span>
                    </div>
                    <h2 class="text-2xl font-semibold text-white text-center mb-2">Your deposit is on the way</h2>
                    <p class="text-sm text-gray-400 text-center max-w-md mx-auto mb-6">
                        We'll let you know the moment it lands. Bitcoin transactions usually take about 10 minutes to confirm.
                    </p>

                    <!-- Echo the remembered funding plan so the wait feels purposeful. -->
                    <template x-if="onboardingHasSavedBootstrap">
                        <p class="text-xs text-neon-cyan text-center max-w-md mx-auto mb-6 -mt-3">
                            Once it confirms, we'll start <span class="font-medium">building inbound efficiently</span> —
                            it runs in the background over a few hours, so you can close this and come back.
                        </p>
                    </template>

                    <div class="bg-navy-900 border border-navy-700 rounded-lg p-5 max-w-md mx-auto space-y-4">
                        <div class="text-center">
                            <p class="text-xs uppercase tracking-wider text-gray-500 mb-1">Incoming</p>
                            <p class="text-3xl font-bold font-mono text-white" x-text="formatSats(onboardingIncomingSats)"></p>
                            <p class="text-xs text-gray-500">sats</p>
                        </div>

                        <template x-if="onboardingDepositTxs.length > 0">
                            <div>
                                <p class="text-xs uppercase tracking-wider text-gray-500 mb-1.5">Transaction</p>
                                <div class="flex items-center gap-2 bg-navy-800 border border-navy-700 rounded px-3 py-2">
                                    <span class="font-mono text-xs text-gray-300 truncate flex-1" x-text="onboardingDepositTxs[0].tx_hash"></span>
                                    <button @click="copyText(onboardingDepositTxs[0].tx_hash)"
                                            class="text-gray-500 hover:text-neon-cyan transition-colors"
                                            title="Copy transaction ID">
                                        <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                                    </button>
                                    <a :href="mempoolTxUrl(onboardingDepositTxs[0].tx_hash)" target="_blank" rel="noopener"
                                       class="text-gray-500 hover:text-neon-cyan transition-colors"
                                       title="View in mempool explorer">
                                        <i data-lucide="external-link" class="w-3.5 h-3.5"></i>
                                    </a>
                                </div>
                                <template x-if="onboardingDepositTxs.length > 1">
                                    <p class="text-[11px] text-gray-500 mt-2 text-center"
                                       x-text="'+ ' + (onboardingDepositTxs.length - 1) + ' more deposit' + (onboardingDepositTxs.length > 2 ? 's' : '') + ' pending'"></p>
                                </template>
                            </div>
                        </template>
                    </div>

                    <div class="text-center mt-6">
                        <button @click="onboardingOpenDeposit()"
                            class="text-xs text-gray-400 hover:text-neon-cyan transition-colors inline-flex items-center gap-1">
                            <i data-lucide="plus" class="w-3.5 h-3.5"></i>
                            Make another deposit
                        </button>
                    </div>
                </div>

                <!-- READY TO CONNECT ──────────────────────────────────── -->
                <div x-show="onboardingStep === 'ready_to_connect' && channelPlanMode === 'wizard_choice'" class="onboarding-fade-up py-10">
                    <div class="flex flex-col items-center mb-6">
                        <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-neon-green/15 border-2 border-neon-green/40 mb-3">
                            <i data-lucide="check" class="w-7 h-7 text-neon-green"></i>
                        </div>
                        <p class="text-xs uppercase tracking-wider text-neon-green/80">Funds confirmed</p>
                        <p class="text-2xl font-bold font-mono text-white"

                                <template x-if="channelPlanLoading">
                                    <span class="flex items-center gap-2"><span class="w-3.5 h-3.5 border-2 border-neon-cyan border-t-transparent rounded-full animate-spin"></span> Planning…</span>
                                </template>
                                <template x-if="!channelPlanLoading">
                                    <span>Show the plan</span>
                                </template>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- PLANNER: preview ──────────────────────────────── -->
                <div x-show="channelPlanMode === 'plan_preview'" class="onboarding-fade-up py-10">
                    <template x-if="channelPlanHasResult">

                            <h2 class="text-xl font-semibold text-white text-center mb-1">Here's the plan</h2>
                            <p class="text-sm text-gray-400 text-center max-w-md mx-auto mb-6" x-show="!channelPlanIsBootstrap">
                                <span x-text="channelPlanPerChannel.length"></span> channels across
                                <span x-text="channelPlanPerChannel.length"></span> peers.
                            </p>
                            <p class="text-sm text-gray-400 text-center max-w-md mx-auto mb-6" x-show="channelPlanIsBootstrap">
                                <span x-text="channelBootstrapPlan.expected_rounds"></span> rounds, one channel at a time —
                                ~<span x-text="channelBootstrapDurationLabel"></span>.
                            </p>

                            <div class="bg-navy-900 border border-navy-700 rounded-lg p-5 max-w-md mx-auto space-y-5">
                                <!-- Bootstrap estimate -->
                                <template x-if="channelPlanIsBootstrap">
                                    <div class="space-y-4">
                                        <div class="text-center">
                                            <p class="text-xs uppercase tracking-wider text-gray-500 mb-1">Deposit to start</p>
                                            <p class="text-3xl font-bold font-mono text-white">
                                                <span x-text="formatSats(channelBootstrapPlan.initial_deposit_sats)"></span>
                                                <span class="text-base text-gray-500 font-normal">sats</span>
                                            </p>
                                        </div>
                                        <div class="border-t border-navy-700 pt-4 space-y-1.5 text-xs">
                                            <div class="flex justify-between">
                                                <span class="text-gray-400">Inbound you'll build</span>
                                                <span class="font-mono text-neon-green" x-text="formatSats(channelBootstrapPlan.expected_total_inbound_sats) + ' sat'"></span>
                                            </div>
                                            <div class="flex justify-between">
                                                <span class="text-gray-400">Rounds</span>
                                                <span class="font-mono text-gray-300" x-text="channelBootstrapPlan.expected_rounds"></span>
                                            </div>
                                            <div class="flex justify-between">
                                                <span class="text-gray-400">Estimated time</span>
                                                <span class="font-mono text-gray-300" x-text="channelBootstrapDurationLabel"></span>
                                            </div>
                                            <div class="flex justify-between">
                                                <span class="text-gray-400">Estimated fees</span>
                                                <span class="font-mono text-gray-300" x-text="formatSats(channelBootstrapPlan.expected_total_fees_sats) + ' sat'"></span>
                                            </div>
                                            <div class="flex justify-between">
                                                <span class="text-gray-400">Left as outbound / reserve</span>
                                                <span class="font-mono text-gray-300" x-text="formatSats(channelBootstrapPlan.residual_outbound_sats) + ' sat'"></span>
                                            </div>
                                        </div>
                                        <p class="text-[11px] text-gray-500 leading-relaxed border-t border-navy-700 pt-3">
                                            This runs in the background — you can keep using the wallet. We open a channel,
                                            swap its balance back on-chain, and reuse it for the next one. Numbers are estimates;
                                            fees and routing make the result best-effort.
                                        </p>
                                    </div>
                                </template>

                                <!-- Headline two-number display (parallel) -->
                                <div class="text-center" x-show="!channelPlanIsBootstrap">
                                    <p class="text-xs uppercase tracking-wider text-gray-500 mb-1">
                                        <template x-if="!channelPlanShowMinimum">
                                            <span>Recommended funding</span>
                                        </template>
                                        <template x-if="channelPlanShowMinimum">
                                            <span>Minimum funding</span>
                                        </template>
                                    </p>
                                    <p class="text-3xl font-bold font-mono text-white">
                                        <span x-text="formatSats(channelPlanHeadlineSats)"></span>
                                        <span class="text-base text-gray-500 font-normal">sats</span>
                                    </p>
                                    <p class="text-[11px] text-gray-500 mt-2">
                                        <template x-if="!channelPlanShowMinimum">
                                            <span>
                                                Send at least <span class="text-gray-300" x-text="formatSats(channelPlanMinimumSats)"></span> sats,
                                                or this larger amount for a more comfortable buffer.
                                            </span>
                                        </template>
                                        <template x-if="channelPlanShowMinimum">
                                            <span>
                                                Or send <span class="text-gray-300" x-text="formatSats(channelPlanRecommendedSats)"></span> sats for a more comfortable buffer.
                                            </span>
                                        </template>
                                    </p>
                                    <button type="button" @click="channelPlanShowMinimum = !channelPlanShowMinimum"
                                            class="text-[11px] text-neon-cyan hover:underline mt-2">
                                        <template x-if="!channelPlanShowMinimum">
                                            <span>Send the minimum instead</span>
                                        </template>
                                        <template x-if="channelPlanShowMinimum">
                                            <span>Show recommended</span>
                                        </template>
                                    </button>
                                </div>

                                <!-- Buffer disclosure -->
                                <template x-if="!channelPlanIsBootstrap && channelPlanShowBuffer && !channelPlanShowMinimum">
                                    <div class="border-t border-navy-700 pt-4">
                                        <button type="button" @click="channelPlanWhyOpen = !channelPlanWhyOpen"
                                                class="w-full flex items-center justify-between text-left text-xs text-gray-400 hover:text-white">
                                            <span>Why the buffer?</span>
                                            <i :data-lucide="channelPlanWhyOpen ? 'chevron-up' : 'chevron-down'" class="w-3.5 h-3.5"></i>
                                        </button>
                                        <template x-if="channelPlanWhyOpen">
                                            <div class="mt-3 space-y-1.5 text-[11px] text-gray-400">
                                                <div class="flex justify-between">
                                                    <span>Close reserve</span>
                                                    <span class="font-mono text-gray-300" x-text="formatSats(channelPlanBreakdown.close_reserve_sats || 0) + ' sat'"></span>
                                                </div>
                                                <div class="flex justify-between">
                                                    <span>Fee-spike cushion</span>
                                                    <span class="font-mono text-gray-300" x-text="formatSats(channelPlanBreakdown.fee_spike_cushion_sats || 0) + ' sat'"></span>
                                                </div>
                                                <template x-if="channelPlanFutureChannelSlotSats > 0">
                                                    <div class="flex justify-between">
                                                        <span>Room for one more</span>
                                                        <span class="font-mono text-gray-300" x-text="formatSats(channelPlanFutureChannelSlotSats) + ' sat'"></span>
                                                    </div>
                                                </template>
                                                <p class="pt-2 text-gray-500 leading-relaxed">
                                                    The reserve and cushion stay on-chain so you can close cleanly even if mempool fees spike.
                                                </p>
                                            </div>
                                        </template>
                                    </div>
                                </template>

                                <!-- Per-channel list -->
                                <div class="border-t border-navy-700 pt-4" x-show="!channelPlanIsBootstrap">
                                    <p class="text-xs uppercase tracking-wider text-gray-500 mb-2">Channels</p>
                                    <ul class="space-y-2">
                                        <template x-for="(ch, idx) in channelPlanPerChannel" :key="idx">
                                            <li class="bg-navy-800 border border-navy-700 rounded px-3 py-2 text-xs">
                                                <div class="flex items-center justify-between">
                                                    <span class="font-medium text-white" x-text="ch.peer.alias"></span>
                                                    <span class="font-mono text-gray-300" x-text="formatSats(ch.capacity) + ' sat'"></span>
                                                </div>
                                                <div class="text-[10px] text-gray-500 mt-0.5" x-text="ch.peer.location || ''"></div>
                                            </li>
                                        </template>
                                    </ul>
                                </div>

                                <template x-if="channelPlanWarnings.length">
                                    <div class="border-t border-navy-700 pt-4">
                                        <ul class="space-y-1">
                                            <template x-for="w in channelPlanWarnings" :key="w">
                                                <li class="text-[11px] text-neon-yellow flex items-start gap-1.5">
                                                    <i data-lucide="alert-triangle" class="w-3 h-3 shrink-0 mt-0.5"></i>
                                                    <span x-text="w"></span>
                                                </li>
                                            </template>
                                        </ul>
                                    </div>
                                </template>

                                <template x-if="channelPlanError">
                                    <div class="flex items-start gap-2 p-3 rounded-lg bg-neon-pink/10 border border-neon-pink/20">
                                        <i data-lucide="alert-circle" class="w-4 h-4 text-neon-pink shrink-0 mt-0.5"></i>
                                        <p class="text-xs text-neon-pink" x-text="channelPlanError"></p>
                                    </div>
                                </template>

                                <div class="flex items-center gap-2 pt-2">
                                    <button @click="closeChannelPlanner()"
                                            class="flex-1 px-4 py-2.5 rounded-lg border border-navy-700 text-gray-400 hover:text-white hover:border-navy-600 text-sm transition-colors">
                                        Cancel
                                    </button>
                                    <button @click="executeChannelPlan()" :disabled="channelPlanLoading"
                                            class="flex-1 inline-flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg bg-neon-green/15 border border-neon-green/40 text-neon-green font-medium hover:bg-neon-green/25 hover:border-neon-green/60 transition-all disabled:opacity-40 disabled:cursor-not-allowed text-sm">
                                        <template x-if="channelPlanLoading">
                                            <span class="flex items-center gap-2"><span class="w-3.5 h-3.5 border-2 border-neon-green border-t-transparent rounded-full animate-spin"></span> Starting…</span>
                                        </template>
                                        <template x-if="!channelPlanLoading && !channelPlanIsBootstrap">
                                            <span class="flex items-center gap-2"><i data-lucide="zap" class="w-4 h-4"></i> Open channels</span>
                                        </template>
                                        <template x-if="!channelPlanLoading && channelPlanIsBootstrap">
                                            <span class="flex items-center gap-2"><i data-lucide="zap" class="w-4 h-4"></i> Start building inbound</span>
                                        </template>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>

                <!-- PLANNER: executing / done ─────────────────────── -->
                <div x-show="channelPlanMode === 'executing' || channelPlanMode === 'done'" class="onboarding-fade-up py-10">
                    <div class="flex items-center justify-center mb-6">
                        <template x-if="channelPlanMode === 'executing'">
                            <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-neon-yellow/15 border-2 border-neon-yellow/40 animate-pulse-neon">
                                <i data-lucide="zap" class="w-7 h-7 text-neon-yellow"></i>
                            </div>
                        </template>
                        <template x-if="channelPlanMode === 'done'">
                            <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-neon-green/15 border-2 border-neon-green/40">
                                <i data-lucide="check" class="w-7 h-7 text-neon-green"></i>
                            </div>
                        </template>
                    </div>

                    <h2 class="text-xl font-semibold text-white text-center mb-2">
                        <template x-if="channelPlanMode === 'executing' && !channelMixRunIsBootstrap"><span>Opening your channels…</span></template>
                        <template x-if="channelPlanMode === 'executing' && channelMixRunIsBootstrap"><span>Building inbound…</span></template>
                        <template x-if="channelPlanMode === 'done'"><span>All done</span></template>
                    </h2>

                    <!-- Bootstrap: running totals + per-round progress + stop -->
                    <template x-if="channelMixRunIsBootstrap">
                        <div class="bg-navy-900 border border-navy-700 rounded-lg p-5 max-w-md mx-auto space-y-4">
                            <div class="grid grid-cols-3 gap-2 text-center">
                                <div>
                                    <p class="text-[10px] uppercase tracking-wider text-gray-500">Inbound built</p>
                                    <p class="font-mono text-sm text-neon-green" x-text="formatSats(channelMixRunRealizedInbound)"></p>
                                </div>
                                <div>
                                    <p class="text-[10px] uppercase tracking-wider text-gray-500">Rounds</p>
                                    <p class="font-mono text-sm text-gray-200" x-text="channelMixRunRoundsLabel"></p>
                                </div>
                                <div>
                                    <p class="text-[10px] uppercase tracking-wider text-gray-500">Fees</p>
                                    <p class="font-mono text-sm text-gray-200" x-text="formatSats(channelMixRunTotalFees)"></p>
                                </div>
                            </div>
                            <template x-if="channelMixRunStateLabel">
                                <p class="text-[11px] text-center text-gray-400" x-text="channelMixRunStateLabel"></p>
                            </template>
                            <template x-if="channelMixRunNote">
                                <p class="text-[11px] text-center text-neon-yellow" x-text="channelMixRunNote"></p>
                            </template>
                            <template x-if="channelMixRunChannels.length">
                                <ul class="space-y-2">
                                    <template x-for="(r, idx) in channelMixRunChannels" :key="idx">
                                        <li class="bg-navy-800 border border-navy-700 rounded px-3 py-2 text-xs">
                                            <div class="flex items-center justify-between">
                                                <span class="font-medium text-white">Round <span x-text="r.round_index + 1"></span> · <span x-text="r.peer_alias"></span></span>
                                                <span class="font-mono text-gray-300" x-text="formatSats(r.capacity_sats) + ' sat'"></span>
                                            </div>
                                            <div class="flex items-center justify-between mt-1">
                                                <span class="text-[10px] text-gray-500" x-text="channelMixRoundStateLabel(r.state)"></span>
                                                <template x-if="r.state === 'settled'">
                                                    <i data-lucide="check" class="w-3.5 h-3.5 text-neon-green"></i>
                                                </template>
                                                <template x-if="r.state === 'open_failed' || r.state === 'swap_failed'">
                                                    <i data-lucide="x" class="w-3.5 h-3.5 text-neon-pink"></i>
                                                </template>
                                                <template x-if="r.state !== 'settled' && r.state !== 'open_failed' && r.state !== 'swap_failed'">
                                                    <span class="w-3 h-3 border-2 border-neon-yellow border-t-transparent rounded-full animate-spin"></span>
                                                </template>
                                            </div>
                                            <template x-if="r.expected_inbound_sats > 0">
                                                <p class="text-[10px] text-gray-500 mt-0.5">+<span x-text="formatSats(r.expected_inbound_sats)"></span> inbound</p>
                                            </template>
                                            <template x-if="r.open_error">
                                                <p class="text-[10px] text-neon-pink mt-1" x-text="r.open_error"></p>
                                            </template>
                                            <template x-if="r.swap_error">
                                                <p class="text-[10px] text-neon-yellow mt-1" x-text="r.swap_error"></p>
                                            </template>
                                        </li>
                                    </template>
                                </ul>
                            </template>
                            <template x-if="channelMixRunWarnings.length">
                                <ul class="space-y-1 border-t border-navy-700 pt-3">
                                    <template x-for="w in channelMixRunWarnings" :key="w">
                                        <li class="text-[11px] text-neon-yellow flex items-start gap-1.5">
                                            <i data-lucide="alert-triangle" class="w-3 h-3 shrink-0 mt-0.5"></i><span x-text="w"></span>
                                        </li>
                                    </template>
                                </ul>
                            </template>
                            <template x-if="channelPlanMode === 'executing'">
                                <button @click="stopChannelMixRun()" :disabled="channelMixRunStopRequested"
                                        class="w-full px-4 py-2 rounded-lg border border-navy-700 text-gray-400 hover:text-white hover:border-navy-600 text-xs transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
                                    <span x-show="!channelMixRunStopRequested">Stop after this round</span>
                                    <span x-show="channelMixRunStopRequested">Stopping after this round…</span>
                                </button>
                            </template>
                        </div>
                    </template>

                    <div class="bg-navy-900 border border-navy-700 rounded-lg p-5 max-w-md mx-auto" x-show="!channelMixRunIsBootstrap">
                        <template x-if="channelMixRunChannels.length">
                            <ul class="space-y-2">
                                <template x-for="(ch, idx) in channelMixRunChannels" :key="idx">
                                    <li class="bg-navy-800 border border-navy-700 rounded px-3 py-2 text-xs">
                                        <div class="flex items-center justify-between">
                                            <span class="font-medium text-white" x-text="ch.peer_alias"></span>
                                            <span class="font-mono text-gray-300" x-text="formatSats(ch.capacity_sats) + ' sat'"></span>
                                        </div>
                                        <div class="flex items-center justify-between mt-1">
                                            <span class="text-[10px] text-gray-500">
                                                <span x-text="prettyState(ch.open_state)"></span>
                                                <template x-if="ch.seed_state !== 'skipped'">
                                                    <span> · seed: <span x-text="prettyState(ch.seed_state)"></span></span>
                                                </template>
                                            </span>
                                            <template x-if="ch.open_state === 'open_active'">
                                                <i data-lucide="check" class="w-3.5 h-3.5 text-neon-green"></i>
                                            </template>
                                            <template x-if="ch.open_state === 'open_failed' || ch.seed_state === 'seed_failed'">
                                                <i data-lucide="x" class="w-3.5 h-3.5 text-neon-pink"></i>
                                            </template>
                                            <template x-if="ch.open_state === 'opening' || ch.open_state === 'open_pending' || ch.seed_state === 'swapping'">
                                                <span class="w-3 h-3 border-2 border-neon-yellow border-t-transparent rounded-full animate-spin"></span>
                                            </template>
                                        </div>
                                        <template x-if="ch.open_error">
                                            <p class="text-[10px] text-neon-pink mt-1" x-text="ch.open_error"></p>
                                        </template>
                                        <template x-if="ch.seed_error">
                                            <p class="text-[10px] text-neon-pink mt-1" x-text="ch.seed_error"></p>
                                        </template>
                                    </li>
                                </template>
                            </ul>
                        </template>
                        <!-- Run-level outcome + warnings (e.g. "Stopped at
                             your request" after a force-cancel, or an
                             auto-resolution note). The bootstrap card has
                             its own copy of this; parallel needs it too so
                             a cancelled/auto-failed parallel run isn't blank. -->
                        <template x-if="channelMixRunStateLabel">
                            <p class="text-[11px] text-center text-gray-400 mt-3" x-text="channelMixRunStateLabel"></p>
                        </template>
                        <template x-if="channelMixRunWarnings.length">
                            <ul class="space-y-1 border-t border-navy-700 pt-3 mt-3">
                                <template x-for="w in channelMixRunWarnings" :key="w">
                                    <li class="text-[11px] text-neon-yellow flex items-start gap-1.5">
                                        <i data-lucide="alert-triangle" class="w-3 h-3 shrink-0 mt-0.5"></i><span x-text="w"></span>
                                    </li>
                                </template>
                            </ul>
                        </template>
                    </div>

                    <!-- Force-cancel (both modes): the escape from a wedged
                         run. Quiet secondary action normally; rendered
                         prominently while a "taking longer than expected"
                         note is showing, since it's then the actionable
                         resolution. -->
                    <template x-if="channelPlanMode === 'executing'">
                        <div class="max-w-md mx-auto mt-4">
                            <template x-if="!channelMixCancelConfirm">
                                <button @click="channelMixCancelConfirm = true"
                                        class="w-full px-4 py-2 rounded-lg border text-xs transition-colors"
                                        :class="channelMixRunNote ? 'border-neon-pink/60 text-neon-pink hover:bg-neon-pink/10' : 'border-navy-700 text-gray-500 hover:text-white hover:border-navy-600'">
                                    Cancel run
                                </button>
                            </template>
                            <template x-if="channelMixCancelConfirm">
                                <div class="bg-navy-900 border border-navy-700 rounded-lg p-4 space-y-3">
                                    <p class="text-xs text-gray-300">
                                        Stop managing this run? Any channel or swap already in progress will finish on its own — you just won't see it tracked here. You can start a new plan afterwards.
                                    </p>
                                    <div class="flex gap-2">
                                        <button @click="forceCancelChannelMixRun()"
                                                class="flex-1 px-4 py-2 rounded-lg bg-neon-pink/15 border border-neon-pink/40 text-neon-pink hover:bg-neon-pink/25 text-xs transition-colors">
                                            Yes, cancel
                                        </button>
                                        <button @click="channelMixCancelConfirm = false"
                                                class="flex-1 px-4 py-2 rounded-lg border border-navy-700 text-gray-400 hover:text-white hover:border-navy-600 text-xs transition-colors">
                                            Keep going
                                        </button>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>

                    <template x-if="channelPlanMode === 'done'">
                        <p class="text-xs text-gray-500 text-center mt-6">
                            <button @click="closeChannelPlanner()" class="text-neon-cyan hover:underline">Back to dashboard</button>
                        </p>
                    </template>
                </div>

                <!-- CONNECTING ───────────────────────────────────────── -->
                <div x-show="onboardingStep === 'connecting'" class="onboarding-fade-up py-10">
                    <div class="flex items-center justify-center mb-6">
                        <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-neon-yellow/15 border-2 border-neon-yellow/40 animate-pulse-neon">
                            <i data-lucide="zap" class="w-7 h-7 text-neon-yellow"></i>
                        </div>
                    </div>

                    <h2 class="text-2xl font-semibold text-white text-center mb-2">Setting up your Lightning connection…</h2>
                    <p class="text-sm text-gray-400 text-center max-w-md mx-auto mb-6">
                        The Bitcoin network needs to confirm the channel-opening transaction 3 times before it's ready to use.
                        This usually takes about 30 minutes.
                    </p>

                    <div class="bg-navy-900 border border-navy-700 rounded-lg p-5 max-w-md mx-auto space-y-4">
                        <template x-if="onboardingPendingChannel">
                            <div class="text-center">
                                <p class="text-xs uppercase tracking-wider text-gray-500 mb-1">Channel</p>
                                <p class="text-sm text-white">with <span class="font-medium" x-text="onboardingPendingPeerLabel"></span></p>
                                <p class="text-lg font-bold font-mono text-white mt-1">
                                    <span x-text="formatSats(onboardingPendingCapacity)"></span>
                                    <span class="text-xs text-gray-500 font-normal">sats capacity</span>
                                </p>
                            </div>
                        </template>

                                </div>

                <!-- CELEBRATION ───────────────────────────────────────────

                    </div>
                    <div class="text-center recv-paid-title">

                        </p>
                        <!-- Soft link to inbound-liquidity flow.

                             side → ``remote_balance_sat`` is 0 → they can
                             pay outbound but cannot receive yet. We surface
                             a non-intrusive link rather than an automatic

                        <p class="text-xs text-gray-500 mt-4">

            </div>

        <template x-if="summary && !onboardingStep && !onboardingCelebrating && !channelPlannerActive">
            <div class="space-y-6">

                <!-- ═══ BALANCE CARDS ═══ -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                    <!-- Total Balance. -->
                    <div class="bg-gradient-to-br from-neon-yellow/10 to-orange-500/5 border border-neon-yellow/30 rounded-lg p-5 card-hover">
                        <div class="flex items-center justify-between mb-3">
                            <div class="flex items-center gap-2 text-gray-400 text-sm">
                                <i data-lucide="bitcoin" class="w-4 h-4 text-neon-yellow"></i>
                                <span>Total Balance</span>
                            </div>
                            <button @click="showColdStorage = true" class="flex items-center gap-1 px-2 py-1 rounded-md text-[11px] font-medium transition-all bg-blue-500/10 border border-blue-500/20 text-blue-400 hover:bg-blue-500/20 hover:border-blue-500/40 hover:text-blue-300" title="Cold Storage">

                        </div>
                        <div class="text-2xl font-bold text-white font-mono cursor-pointer" @click="showBtc = !showBtc">
                            <span x-text="showBtc ? formatBtc(totalBalance()) + ' BTC' : formatSats(totalBalance()) + ' sats'"></span>
                        </div>
                    </div>

                    <!-- On-chain -->
                    <div class="bg-navy-900 border border-orange-500/20 rounded-lg p-5 card-hover">
                        <div class="flex items-center justify-between mb-3">
                            <div class="flex items-center gap-2 text-gray-400 text-sm">
                                <i data-lucide="link" class="w-4 h-4 text-orange-400"></i>
                                <span>On-chain</span>
                            </div>
                            <button @click="openOnchainReceive()" class="flex items-center gap-1 px-2 py-1 rounded-md text-[11px] font-medium transition-all bg-neon-green/10 border border-neon-green/20 text-neon-green hover:bg-neon-green/20 hover:border-neon-green/40">
                                <i data-lucide="download" class="w-3 h-3"></i>
                                <span>Add Funds</span>
                            </button>
                        </div>
                        <div class="text-2xl font-bold text-white font-mono" x-text="formatSats(onchainTotalBalance) + ' sats'"></div>
                        <template x-if="unconfirmedBalance > 0">
                            <div class="text-xs text-gray-500 mt-1"
                                 title="On-chain change or receives still in the mempool — included in the total above, spendable once confirmed.">
                                (<span x-text="formatSats(unconfirmedBalance)"></span> still pending confirmation)
                            </div>
                        </template>
                        <template x-if="limboBalance > 0">
                            <div class="text-xs text-amber-400/80 mt-1"
                                 title="Funds from a force-closed channel are time-locked on-chain and will return automatically once they mature. Not included in the total above until then.">
                                (<span x-text="formatSats(limboBalance)"></span> being released from a closing channel)
                            </div>
                        </template>
                    </div>

                    <!-- Lightning Outbound -->
                    <div class="bg-navy-900 border border-neon-yellow/20 rounded-lg p-5 card-hover">
                        <div class="flex items-center justify-between mb-3">
                            <div class="flex items-center gap-2 text-gray-400 text-sm">
                                <i data-lucide="zap" class="w-4 h-4 text-neon-yellow"></i>
                                <span>Outbound</span>
                            </div>
                            <button @click="showSendPayment = true" class="flex items-center gap-1 px-2 py-1 rounded-md text-[11px] font-medium transition-all bg-neon-cyan/10 border border-neon-cyan/20 text-neon-cyan hover:bg-neon-cyan/20 hover:border-neon-cyan/40">
                                <i data-lucide="send" class="w-3 h-3"></i>
                                <span>Send</span>
                            </button>
                        </div>
                        <div class="text-2xl font-bold text-white font-mono" x-text="formatSats(localBalance) + ' sats'"></div>
                        <div class="text-xs text-gray-500 mt-1">spendable</div>
                    </div>

                    <!-- Lightning Inbound -->
                    <div class="bg-navy-900 border border-neon-cyan/20 rounded-lg p-5 card-hover">
                        <div class="flex items-center justify-between mb-3">
                            <div class="flex items-center gap-2 text-gray-400 text-sm">
                                <i data-lucide="zap" class="w-4 h-4 text-neon-yellow"></i>
                                <span>Inbound</span>
                            </div>
                            <button @click="showReceiveInvoice = true" class="flex items-center gap-1 px-2 py-1 rounded-md text-[11px] font-medium transition-all bg-neon-green/10 border border-neon-green/20 text-neon-green hover:bg-neon-green/20 hover:border-neon-green/40">
                                <i data-lucide="arrow-down-left" class="w-3 h-3"></i>
                                <span>Receive</span>
                            </button>
                        </div>
                        <div class="text-2xl font-bold text-white font-mono" x-text="formatSats(remoteBalance) + ' sats'"></div>
                        <div class="text-xs text-gray-500 mt-1">receivable</div>
                    </div>
                </div>

                <!-- ═══ FEE ESTIMATE BAR ═══ -->
                <div class="bg-navy-900 border rounded-lg p-4" :class="fees ? 'border-navy-700' : 'border-neon-pink/30'">
                    <div class="flex items-center justify-between flex-wrap gap-2">
                        <div class="flex items-center gap-2 text-sm">
                            <!-- Reactive color lives on the wrapper span so it
                                 survives Lucide's <i>→<svg> replacement. The
                                 SVG inherits the colour via currentColor. -->
                            <span :class="fees ? 'text-gray-400' : 'text-neon-pink'">
                                <i data-lucide="gauge" class="w-4 h-4"></i>
                            </span>
                            <span :class="fees ? 'text-gray-400' : 'text-neon-pink'">Fee Estimates</span>
                            <span class="w-2 h-2 rounded-full" :class="fees ? 'bg-neon-green' : 'bg-neon-pink animate-pulse'"></span>
                            <!-- Opens the configured mempool explorer's home page. -->
                            <a :href="mempoolBaseUrl" target="_blank" rel="noopener noreferrer"
                               class="text-gray-500 hover:text-neon-cyan focus:text-neon-cyan focus:outline-none"
                               title="Open mempool explorer" aria-label="Open mempool explorer">
                                <i data-lucide="external-link" class="w-3.5 h-3.5"></i>
                            </a>
                        </div>
                        <template x-if="fees">
                            <div class="flex gap-4 text-sm">
                                <div class="flex items-center gap-1.5">
                                    <span class="w-2 h-2 rounded-full bg-neon-green"></span>
                                    <span class="text-gray-400">Low</span>
                                    <span class="text-white font-mono" x-text="fees.hourFee + ' sat/vB'"></span>
                                </div>
                                <div class="flex items-center gap-1.5">
                                    <span class="w-2 h-2 rounded-full bg-neon-yellow"></span>
                                    <span class="text-gray-400">Med</span>
                                    <span class="text-white font-mono" x-text="fees.halfHourFee + ' sat/vB'"></span>
                                </div>
                                <div class="flex items-center gap-1.5">
                                    <span class="w-2 h-2 rounded-full bg-neon-pink"></span>
                                    <span class="text-gray-400">High</span>
                                    <span class="text-white font-mono" x-text="fees.fastestFee + ' sat/vB'"></span>
                                </div>
                            </div>
                        </template>
                        <template x-if="!fees">

                                <button @click="fetchFees()" class="text-xs text-gray-400 hover:text-white transition-colors ml-1" title="Retry">
                                    <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i>
                                </button>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- ═══ NODE INFO (collapsible) ═══ -->
                <template x-if="info">
                    <div class="bg-navy-900 border border-navy-700 rounded-lg card-hover">
                        <button @click="nodeInfoOpen = !nodeInfoOpen" class="w-full flex items-center justify-between p-4 text-left">
                            <div class="flex items-center gap-3">
                                <!-- Reactive color on the wrapper so it survives
                                     Lucide's <i>→<svg> replacement (see gauge
                                     icon comment above). -->
                                <span :class="info.synced_to_chain ? 'text-neon-green' : 'text-neon-yellow animate-pulse-neon'">
                                    <i data-lucide="radio" class="w-5 h-5"></i>
                                </span>
                                <div>
                                    <h3 class="text-sm font-medium text-white" x-text="info.alias || 'LND Node'"></h3>
                                    <p class="text-xs text-gray-500">
                                        <span x-text="info.num_active_channels"></span> channels · <span x-text="info.num_peers"></span> peers · block <span x-text="blockHeightDisplay"></span>
                                    </p>
                                </div>
                            </div>
                            <i :data-lucide="nodeInfoOpen ? 'chevron-up' : 'chevron-down'" class="w-4 h-4 text-gray-400"></i>
                        </button>
                        <div x-show="nodeInfoOpen" class="border-t border-navy-700 p-4">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                                <div>
                                    <span class="text-gray-500">Pubkey</span>
                                    <div class="flex items-center gap-1 mt-0.5">
                                        <span class="text-white font-mono text-xs truncate" x-text="info.identity_pubkey"></span>
                                        <button @click="copyText(info.identity_pubkey)" class="text-gray-500 hover:text-neon-cyan shrink-0">
                                            <i data-lucide="copy" class="w-3 h-3"></i>
                                        </button>
                                    </div>
                                </div>
                                <div>
                                    <span class="text-gray-500">Version</span>
                                    <div class="text-white font-mono text-xs mt-0.5" x-text="info.version"></div>
                                </div>
                                <div>
                                    <span class="text-gray-500">Channels</span>
                                    <div class="text-white text-xs mt-0.5">
                                        <span x-text="info.num_active_channels"></span> active,
                                        <span x-text="info.num_inactive_channels"></span> inactive,
                                        <span x-text="info.num_pending_channels"></span> pending
                                    </div>
                                </div>
                                <div>
                                    <span class="text-gray-500">Peers</span>
                                    <div class="text-white text-xs mt-0.5" x-text="info.num_peers"></div>
                                </div>
                                <div>
                                    <span class="text-gray-500">Block Height</span>
                                    <div class="text-white font-mono text-xs mt-0.5" x-text="blockHeightDisplay"></div>
                                </div>
                                <div>
                                    <span class="text-gray-500">Synced</span>
                                    <div class="text-xs mt-0.5" :class="info.synced_to_chain ? 'text-neon-green' : 'text-neon-yellow'" x-text="info.synced_to_chain ? 'Yes' : 'Syncing...'"></div>
                                </div>
                                <template x-if="info.uris && info.uris.length > 0">
                                    <div class="md:col-span-2">
                                        <span class="text-gray-500">URIs</span>
                                        <template x-for="uri in info.uris" :key="uri">
                                            <div class="flex items-center gap-1 mt-0.5">
                                                <span class="text-white font-mono text-xs truncate" x-text="uri"></span>
                                                <button @click="copyText(uri)" class="text-gray-500 hover:text-neon-cyan shrink-0">
                                                    <i data-lucide="copy" class="w-3 h-3"></i>
                                                </button>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- ═══ TABS ═══ -->
                <div>
                    <div class="flex border-b border-navy-700 gap-1 overflow-x-auto">
                        <template x-for="t in visibleTabs" :key="t.id">
                            <button
                                @click="activeTab = t.id"
                                class="flex items-center gap-1.5 px-4 py-2.5 text-sm whitespace-nowrap transition-colors"
                                :class="activeTab === t.id ? 'tab-active' : 'text-gray-400 hover:text-white'"
