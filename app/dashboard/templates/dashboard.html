            <div class="relative w-full max-w-lg mx-4 bg-gradient-to-br from-navy-800 to-navy-900 border border-blue-500/30 rounded-xl p-6 shadow-2xl max-h-[90vh] overflow-y-auto">

                <!-- Header -->
                <div class="flex items-center justify-between mb-1">
                    <div class="flex items-center gap-2">
                        <i data-lucide="snowflake" class="w-5 h-5 text-blue-400"></i>
                        <h2 class="text-lg font-semibold text-white">Cold Storage</h2>
                    </div>
                    <button @click="closeColdStorage()" class="p-1.5 text-gray-500 hover:text-gray-300 hover:bg-navy-700 rounded-lg transition-colors">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>
                <p class="text-xs text-gray-500 mb-5">Send funds to a secure offline wallet for long-term storage.</p>

                <!-- Tab Selector (segmented) -->
                <div class="flex rounded-lg bg-navy-900 border border-navy-700 p-1 mb-5">
                    <button @click="switchColdOnchain()"
                        class="flex-1 flex items-center justify-center gap-1.5 px-3 py-2 rounded-md text-sm font-medium transition-all"
                        :class="coldTab === 'onchain' ? 'bg-blue-500/15 text-blue-400 border border-blue-500/30' : 'text-gray-500 hover:text-gray-300 border border-transparent'">
                        <i data-lucide="link" class="w-3.5 h-3.5"></i> On-Chain
                    </button>
                    <button @click="switchColdLightning()"
                        class="flex-1 flex items-center justify-center gap-1.5 px-3 py-2 rounded-md text-sm font-medium transition-all"
                        :class="coldTab === 'lightning' ? 'bg-blue-500/15 text-blue-400 border border-blue-500/30' : 'text-gray-500 hover:text-gray-300 border border-transparent'">
                        <i data-lucide="zap" class="w-3.5 h-3.5"></i> Lightning
                    </button>
                </div>

                <!-- ═══ ON-CHAIN TAB ═══ -->

                <!-- On-chain: Form Step -->
                <div x-show="coldTab === 'onchain' && coldStep === 'form'" class="space-y-4">
                    <!-- Info banner -->
                    <div class="bg-navy-900/50 border border-blue-500/20 rounded-lg p-3">
                        <div class="flex items-center gap-2 mb-2">
                            <i data-lucide="link" class="w-4 h-4 text-orange-400"></i>
                            <h3 class="text-sm font-medium text-white">On-Chain → Cold Storage</h3>
                        </div>
                        <p class="text-[11px] text-gray-400">Direct on-chain transaction to your cold storage address. Standard network fees apply.</p>
                    </div>

                    <!-- Sendable balance -->
                    <div class="bg-navy-900/50 border border-navy-700 border-l-2 border-l-neon-green/30 rounded-lg p-3">
                        <div class="flex items-center justify-between">
                            <span class="text-xs text-gray-500">On-chain (sendable)</span>
                            <span class="text-sm font-mono text-neon-green/90 font-medium" x-text="formatSats(confirmedBalance) + ' sats'"></span>
                        </div>
                    </div>

                    <!-- Address Input -->
                    <div>
                        <label class="text-xs text-gray-500 uppercase tracking-wide mb-1.5 block">Cold Storage Address</label>
                        <input type="text" x-model="coldAddress" placeholder="bc1q... or bc1p..."
                            class="w-full px-3 py-2.5 rounded-lg bg-navy-900 border border-navy-600 text-white font-mono text-sm placeholder-gray-600 focus:border-blue-500/50 focus:ring-1 focus:ring-blue-500/20 focus:outline-none transition-colors"
                            spellcheck="false" autocomplete="off">
                        <template x-if="coldAddress.trim().length > 0 && !isValidBtcAddress(coldAddress)">
                            <p class="text-[10px] text-neon-pink mt-1 flex items-center gap-1">
                                <i data-lucide="alert-circle" class="w-3 h-3"></i> Invalid Bitcoin address format
                            </p>
                        </template>
                        <template x-if="isValidBtcAddress(coldAddress)">
                            <p class="text-[10px] text-gray-500 mt-1" x-text="getAddressType(coldAddress)"></p>
                        </template>
                    </div>

                    <!-- Amount Input -->
                    <div>
                        <div class="flex items-center justify-between mb-1.5">
                            <label class="text-xs text-gray-500 uppercase tracking-wide">Amount (sats)</label>
                            <button @click="setMaxColdAmount()"
                                class="text-[10px] text-blue-400 hover:text-blue-300 font-medium transition-colors">Send Max</button>
                        </div>
                        <input type="number" x-model.number="coldAmount" min="1" placeholder="0"
                            class="w-full px-3 py-2.5 rounded-lg bg-navy-900 border border-navy-600 text-white font-mono text-sm placeholder-gray-600 focus:border-blue-500/50 focus:ring-1 focus:ring-blue-500/20 focus:outline-none transition-colors">
                        <template x-if="coldAmount > 0">
                            <p class="text-[10px] text-gray-500 mt-1" x-text="'≈ ₿' + formatBtc(coldAmount)"></p>
                        </template>
                        <template x-if="coldAmount > 0 && coldAmount < 546">
                            <p class="text-[10px] text-neon-pink mt-1 flex items-center gap-1">
                                <i data-lucide="alert-circle" class="w-3 h-3"></i> Minimum 546 sats (dust limit)
                            </p>
                        </template>
                        <template x-if="coldAmount > confirmedBalance">
                            <p class="text-[10px] text-neon-pink mt-1 flex items-center gap-1">
                                <i data-lucide="alert-circle" class="w-3 h-3"></i>
                                Exceeds sendable balance (<span x-text="formatSats(confirmedBalance)"></span> sats)
                            </p>
                        </template>
                    </div>

                    <!-- Coin Control Accordion -->
                    <div class="border border-navy-700 rounded-lg">
                        <button @click="toggleSendCoinControl()"
                            class="w-full flex items-center justify-between px-3 py-2 text-xs text-gray-400 hover:text-gray-200">
                            <span class="flex items-center gap-2">
                                <i :data-lucide="sendCoinControlOpen ? 'chevron-down' : 'chevron-right'" class="w-3 h-3"></i>
                                <span>Coin Control</span>
                                <span x-show="sendCoinControlMode === 'manual' && sendCoinControlSelected.length > 0"
                                    class="text-[10px] text-neon-cyan"
                                    x-text="sendCoinControlSelected.length + ' UTXO' + (sendCoinControlSelected.length === 1 ? '' : 's') + ' \u2022 ' + formatSats(sendCoinControlSelectedTotal) + ' sats'"></span>
                            </span>
                            <span class="text-[10px] text-gray-500" x-text="sendCoinControlMode === 'auto' ? 'Auto' : 'Manual'"></span>
                        </button>
                        <div x-show="sendCoinControlOpen" x-cloak class="px-3 pb-3 space-y-2">
                            <div class="flex items-center gap-3 text-[11px]">
                                <label class="flex items-center gap-1 cursor-pointer">
                                    <input type="radio" name="coin-control-mode" value="auto" x-model="sendCoinControlMode" class="accent-neon-cyan">
                                    <span class="text-gray-300">Auto (LND chooses)</span>
                                </label>
                                <label class="flex items-center gap-1 cursor-pointer">
                                    <input type="radio" name="coin-control-mode" value="manual" x-model="sendCoinControlMode" class="accent-neon-cyan">
                                    <span class="text-gray-300">Manual</span>
                                </label>
                            </div>
                            <div x-show="sendCoinControlMode === 'manual'" x-cloak>
                                <template x-if="utxosLoading">
                                    <p class="text-[11px] text-gray-500 py-2">Loading UTXOs\u2026</p>
                                </template>
                                <template x-if="!utxosLoading && utxos.length === 0">
                                    <p class="text-[11px] text-gray-500 py-2">No UTXOs available.</p>
                                </template>
                                <div x-show="utxos.length > 0" class="max-h-48 overflow-y-auto border border-navy-700 rounded">
                                    <table class="w-full text-[11px]">
                                        <tbody>
                                            <template x-for="u in utxos" :key="u.key">
                                                <tr class="border-b border-navy-700/40 hover:bg-navy-800/40">
                                                    <td class="py-1 px-2 w-6">
                                                        <input type="checkbox" :checked="sendCoinControlSelected.includes(u.key)"
                                                            @change="toggleCoinControlSelection(u)" class="accent-neon-cyan">
                                                    </td>
                                                    <td class="py-1 px-1 text-gray-300 truncate max-w-[140px]" x-text="u.label || '\u2014'"></td>
                                                    <td class="py-1 px-1 text-right font-mono text-gray-200" x-text="formatSats(u.amount_sat)"></td>
                                                    <td class="py-1 px-1 text-right text-gray-500 font-mono" x-text="u.confirmations + ' c'"></td>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                </div>
                                <p x-show="sendCoinControlMode === 'manual' && sendCoinControlSelected.length === 0"
                                    class="text-[10px] text-neon-yellow mt-1">
                                    Select at least one UTXO to send.
                                </p>
                            </div>
                        </div>
                    </div>

                    <!-- Fee Priority -->
                    <div>
                        <label class="text-xs text-gray-500 uppercase tracking-wide mb-1.5 block">Fee Priority</label>
                        <div class="grid grid-cols-3 gap-2">
                            <template x-for="p in [{v:'low',l:'Low',d:'~1 hour',c:'text-neon-green'},{v:'medium',l:'Medium',d:'~30 min',c:'text-neon-yellow'},{v:'high',l:'High',d:'Next block',c:'text-orange-400'}]" :key="p.v">
                                <button @click="coldSelectFeePriority(p.v)"
                                    class="px-3 py-2 rounded-lg border text-left transition-all"
                                    :class="coldFeePriority === p.v ? 'border-blue-500/50 bg-blue-500/10 text-white' : 'border-navy-600 bg-navy-800/50 text-gray-400 hover:border-navy-500 hover:text-gray-300'">
                                    <span class="text-xs font-medium block" x-text="p.l"></span>
                                    <span class="text-[10px] block mt-0.5"
                                        :class="coldFeePriority === p.v ? p.c : 'text-gray-500'">
                                        <span x-text="p.d"></span>
                                        <template x-if="fees && fees[p.v === 'low' ? 'hourFee' : (p.v === 'medium' ? 'halfHourFee' : 'fastestFee')]">
                                            <span x-text="' (' + fees[p.v === 'low' ? 'hourFee' : (p.v === 'medium' ? 'halfHourFee' : 'fastestFee')] + ' sat/vB)'"></span>
                                        </template>
                                    </span>
                                </button>
                            </template>
                        </div>
                    </div>

                    <!-- Fee Estimate (auto-fetched) -->
                    <template x-if="coldEstimate && coldAmount >= 546 && isValidBtcAddress(coldAddress)">
                        <div class="bg-navy-900/50 border border-navy-700 rounded-lg p-3 space-y-1.5">
                            <div class="flex items-center justify-between text-xs">
                                <span class="text-gray-500">Estimated fee</span>
                                <span class="text-gray-300 font-mono" x-text="formatSats(coldEstimateOrEmpty.fee_sat || 0) + ' sats'"</span>
                            </div>
                            <div class="flex items-center justify-between text-xs">
                                <span class="text-gray-500">Fee rate</span>
                                <span class="text-gray-300 font-mono" x-text="(coldEstimateOrEmpty.sat_per_vbyte || '') + ' sat/vB'"></span>
                            </div>
                            <div class="border-t border-navy-700 pt-1.5 flex items-center justify-between text-xs">
                                <span class="text-gray-400 font-medium">Total deducted</span>
                                <span class="text-white font-mono font-medium" x-text="formatSats(coldAmount + (coldEstimateOrEmpty.fee_sat || 0)) + ' sats'"></span>
                            </div>
                            <template x-if="(coldAmount + (coldEstimateOrEmpty.fee_sat || 0)) > confirmedBalance">
                                <p class="text-[10px] text-neon-pink flex items-center gap-1 pt-1">
                                    <i data-lucide="alert-circle" class="w-3 h-3"></i> Amount + fee exceeds sendable balance
                                </p>
                            </template>
                        </div>
                    </template>

                    <!-- Review Button -->
                    <button @click="coldStep = 'confirm'"
                        :disabled="coldReviewDisabled"
                        class="w-full flex items-center justify-center gap-2 px-4 py-3 rounded-lg bg-blue-500/15 border border-blue-500/30 text-blue-400 font-medium hover:bg-blue-500/25 hover:border-blue-500/50 transition-all disabled:opacity-30 disabled:cursor-not-allowed">
                        <i data-lucide="arrow-right" class="w-4 h-4"></i> Review Transaction
                    </button>
                </div>

                <!-- On-chain: Confirm Step -->
                <div x-show="coldTab === 'onchain' && coldStep === 'confirm'" class="space-y-4">
                    <div class="bg-navy-900/50 border border-blue-500/20 rounded-lg p-4 space-y-3">
                        <h3 class="text-sm font-medium text-white flex items-center gap-2">
                            <i data-lucide="shield-check" class="w-4 h-4 text-blue-400"></i> Confirm Transaction
                        </h3>
                        <div class="space-y-2">
                            <div class="flex items-center justify-between text-xs">
                                <span class="text-gray-500">To address</span>
                                <span class="text-gray-300 font-mono text-[11px] max-w-[220px] truncate" x-text="coldAddress"></span>
                            </div>
                            <div class="flex items-center justify-between text-xs">
                                <span class="text-gray-500">Address type</span>
                                <span class="text-gray-300" x-text="getAddressType(coldAddress)"></span>
                            </div>
                            <div class="flex items-center justify-between text-xs">
                                <span class="text-gray-500">Amount</span>
                                <span class="text-white font-mono font-medium" x-text="formatSats(coldAmount) + ' sats'"></span>
                            </div>
                            <template x-if="coldEstimate">
                                <div class="space-y-2">
                                    <div class="flex items-center justify-between text-xs">
                                        <span class="text-gray-500">Network fee</span>
                                        <span class="text-gray-300 font-mono" x-text="formatSats(coldEstimateOrEmpty.fee_sat || 0) + ' sats'"</span>
                                    </div>
                                    <div class="border-t border-navy-700 pt-2 flex items-center justify-between text-xs">
                                        <span class="text-gray-400 font-medium">Total</span>
                                        <span class="text-white font-mono font-medium" x-text="formatSats(coldAmount + (coldEstimateOrEmpty.fee_sat || 0)) + ' sats'"></span>
                                    </div>
                                </div>
                            </template>
                        </div>
                        <div class="flex items-start gap-1.5 pt-1">
                            <i data-lucide="alert-circle" class="w-3 h-3 text-neon-yellow mt-0.5 shrink-0"></i>
                            <p class="text-[10px] text-gray-500 leading-relaxed">
                                This transaction is <span class="text-neon-yellow">irreversible</span>. Double-check the address before confirming. On-chain transactions typically take 10–60 minutes to confirm.
                            </p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button @click="coldStep = 'form'"
                            class="flex-1 flex items-center justify-center gap-2 px-3 py-2.5 rounded-lg bg-navy-700 border border-navy-600 text-gray-300 hover:border-blue-500/30 hover:text-blue-400 transition-all text-sm">
                            Back
                        </button>
                        <button @click="sendColdOnchain()" :disabled="coldLoading"
                            class="flex-1 flex items-center justify-center gap-2 px-3 py-2.5 rounded-lg text-sm bg-blue-500/20 border border-blue-500/40 text-blue-400 font-medium hover:bg-blue-500/30 hover:border-blue-500/60 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                            <template x-if="coldLoading">
                                <span class="flex items-center gap-2"><span class="w-4 h-4 border-2 border-blue-400 border-t-transparent rounded-full animate-spin inline-block"></span> Sending...</span>
                            </template>
                            <template x-if="!coldLoading">
                                <span class="flex items-center gap-2"><i data-lucide="snowflake" class="w-4 h-4"></i> Send to Cold Storage</span>
                            </template>
                        </button>
                    </div>
                </div>

                <!-- On-chain: Result Step -->
                <div x-show="coldTab === 'onchain' && coldStep === 'result'" class="space-y-4">
                    <!-- Success -->
                    <template x-if="coldResultSuccess">
                        <div class="text-center space-y-3">
                            <div class="w-14 h-14 mx-auto rounded-full bg-neon-green/10 border border-neon-green/20 flex items-center justify-center">
                                <i data-lucide="check-circle-2" class="w-7 h-7 text-neon-green"></i>
                            </div>
                            <div>
                                <h3 class="text-lg font-semibold text-white">Transaction Sent</h3>
                                <p class="text-xs text-gray-400 mt-1" x-text="formatSats(coldAmount) + ' sats sent to cold storage'"></p>
                            </div>
                            <template x-if="coldResultDataOrEmpty.txid">
                                <div class="bg-navy-900/50 border border-navy-700 rounded-lg p-3 space-y-2.5">
                                    <span class="text-[10px] text-gray-500 uppercase tracking-wider block">Transaction ID</span>
                                    <p class="font-mono text-xs text-gray-300 break-all select-all" x-text="coldResultDataOrEmpty.txid"></p>
                                    <!-- Post-send actions: clipboard copy + explorer link.
                                         Mirrors the Send On-chain dialog's result panel so
                                         the two flows present identical UX. -->
                                    <div class="flex gap-2 pt-1">
                                        <button @click="copyText(coldResultDataOrEmpty.txid)"
                                                title="Copy transaction ID"
                                                class="flex-1 flex items-center justify-center gap-1.5 px-3 py-1.5 rounded text-xs bg-navy-700 border border-navy-600 text-gray-300 hover:border-blue-500/30 hover:text-white transition-all">
                                            <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                                            <span>Copy ID</span>
                                        </button>
                                        <a :href="mempoolTxUrl(coldResultDataOrEmpty.txid)"
                                           target="_blank" rel="noopener noreferrer"
                                           title="View on mempool explorer"
                                           class="flex-1 flex items-center justify-center gap-1.5 px-3 py-1.5 rounded text-xs bg-navy-700 border border-navy-600 text-gray-300 hover:border-blue-500/30 hover:text-white transition-all">
                                            <i data-lucide="external-link" class="w-3.5 h-3.5"></i>
                                            <span>View on explorer</span>
                                        </a>
                                    </div>
                                </div>
                            </template>
                            <button @click="closeColdStorage()" class="w-full px-4 py-2.5 rounded-lg text-sm bg-navy-700 border border-navy-600 text-gray-300 hover:border-blue-500/30 hover:text-white transition-all">
                                Done
                            </button>
                        </div>
                    </template>
                    <!-- Failure -->
                    <template x-if="coldResultFailed">
                        <div class="text-center space-y-3">
                            <div class="w-14 h-14 mx-auto rounded-full bg-neon-pink/10 border border-neon-pink/20 flex items-center justify-center">
                                <i data-lucide="alert-circle" class="w-7 h-7 text-neon-pink"></i>
                            </div>
                            <div>
                                <h3 class="text-lg font-semibold text-white">Transaction Failed</h3>
                                <p class="text-xs text-gray-400 mt-1" x-text="coldResultDataOrEmpty.error"></p>
                            </div>
                            <div class="flex gap-2">
                                <button @click="coldOnchainTryAgain()"
                                    class="flex-1 px-4 py-2.5 rounded-lg text-sm bg-navy-700 border border-navy-600 text-gray-300 hover:border-blue-500/30 hover:text-white transition-all">
                                    Try Again
                                </button>
                                <button @click="closeColdStorage()"
                                    class="flex-1 px-4 py-2.5 rounded-lg text-sm bg-navy-700 border border-navy-600 text-gray-300 hover:text-white transition-all">
                                    Close
                                </button>
                            </div>
                        </div>
                    </template>
                </div>

                <!-- ═══ LIGHTNING TAB ═══ -->

                <!-- Lightning: Form Step -->
                <div x-show="coldTab === 'lightning' && coldStep === 'form'" class="space-y-4">
                    <!-- Info banner -->
                    <div class="bg-navy-900/50 border border-blue-500/20 rounded-lg p-3">
                        <div class="flex items-center gap-2 mb-2">
                            <i data-lucide="zap" class="w-4 h-4 text-neon-yellow"></i>
                            <h3 class="text-sm font-medium text-white">Lightning → Cold Storage</h3>
                        </div>
                        <p class="text-[11px] text-gray-400">
                            Trustless reverse swap via <a href="https://boltz.exchange" target="_blank" rel="noopener noreferrer" class="text-blue-400 hover:text-blue-300 underline underline-offset-2">Boltz Exchange</a>. Non-custodial, time-locked contracts.
                        </p>
                    </div>

                    <!-- Spendable info -->
                    <div class="bg-navy-900/50 border border-navy-700 border-l-2 border-l-neon-green/30 rounded-lg p-3">
                        <div class="flex items-center justify-between">
                            <span class="text-xs text-gray-500">Lightning outbound (sendable)</span>
                            <span class="text-sm font-mono text-neon-green/90 font-medium" x-text="formatSats(localBalance) + ' sats'"></span>
                        </div>
                    </div>

                    <!-- Stale pair-info banner. Surfaces when the
                         /cold-storage/fees response is served from
                         the never-expiring fallback cache because
                         Boltz's API is currently unreachable. The
                         Review Swap button is gated on the
                         "Proceed anyway" checkbox so the operator
                         can't silently accept outdated fees. -->
                    <template x-if="boltzFees && boltzFees.stale">
                        <div class="bg-neon-yellow/5 border border-neon-yellow/30 rounded-lg p-3 space-y-2">
                            <p class="text-[11px] text-neon-yellow">
                                <strong>⚠ Boltz API unreachable.</strong>
                                Fees shown are from cache and may be
                                outdated. Wait a minute and refresh,
                                or proceed at your own risk — the
                                actual swap quote may differ from
                                the preview below.
                            </p>
                            <label class="flex items-center gap-2 text-[11px] text-neon-yellow cursor-pointer">
                                <input type="checkbox" x-model="coldBoltzAcceptStale"
                                    class="w-3 h-3 accent-neon-yellow">
                                <span>Proceed anyway with cached fees</span>
                            </label>
                        </div>
                    </template>

                    <!-- Address input -->
                    <div>
                        <label class="text-xs text-gray-500 uppercase tracking-wide mb-1.5 block">Cold Storage Address</label>
                        <input type="text" x-model="coldBoltzAddress" placeholder="bc1q... or bc1p..."
                            class="w-full px-3 py-2.5 bg-navy-900/50 border border-navy-600 rounded-lg text-white text-sm font-mono placeholder-gray-600 focus:outline-none focus:border-blue-500/50 focus:ring-1 focus:ring-blue-500/20">
                    </div>

                    <!-- Amount input -->
                    <div>
                        <div class="flex items-center justify-between mb-1.5">
                            <label class="text-xs text-gray-500 uppercase tracking-wide">Amount (sats)</label>
                            <button @click="setMaxBoltzAmount()"
                                class="text-[10px] text-blue-400 hover:text-blue-300 font-medium">Send Max</button>
                        </div>
                        <input type="number" x-model.number="coldBoltzAmount" min="1"
                            :placeholder="boltzPlaceholder()"
                            class="w-full px-3 py-2.5 bg-navy-900/50 border border-navy-600 rounded-lg text-white text-sm font-mono placeholder-gray-600 focus:outline-none focus:border-blue-500/50 focus:ring-1 focus:ring-blue-500/20">
                        <template x-if="coldBoltzAmountBelowMin()">
                            <p class="text-[10px] text-neon-pink mt-1">Minimum: <span x-text="formatSats(boltzFees.min)"></span> sats</p>
                        </template>
                        <template x-if="coldBoltzAmountAboveMax()">
                            <p class="text-[10px] text-neon-pink mt-1">Maximum: <span x-text="formatSats(boltzFees.max)"></span> sats</p>
                        </template>
                        <template x-if="coldBoltzAmount > localBalance">
                            <p class="text-[10px] text-neon-pink mt-1">Exceeds spendable balance (<span x-text="formatSats(localBalance)"></span> sats)</p>
                        </template>
                    </div>

                    <!-- Fee preview -->
                    <template x-if="isBoltzAmountInRange()">
                        <div class="bg-navy-900/30 border border-navy-700 rounded-lg p-3 space-y-1.5">
                            <div class="flex justify-between text-xs">
                                <span class="text-gray-500">Boltz fee (<span x-text="boltzFees.fees_percentage"></span>%)</span>
                                <span class="text-gray-300 font-mono" x-text="'-' + formatSats(boltzFeeAmount()) + ' sats'"></span>
                            </div>
                            <div class="flex justify-between text-xs">
                                <span class="text-gray-500">Miner fees (lockup + claim)</span>
                                <span class="text-gray-300 font-mono" x-text="'-' + formatSats(boltzMinerTotal()) + ' sats'"></span>
                            </div>
                            <div class="border-t border-navy-600 pt-1.5 flex justify-between text-xs">
                                <span class="text-gray-400 font-medium">You receive on-chain</span>
                                <span class="text-neon-green font-mono font-medium" x-text="'≈ ' + formatSats(boltzReceiveAmount()) + ' sats'"></span>
                            </div>
                        </div>
                    </template>

                    <!-- Submit -->
                    <button @click="coldStep = 'confirm'"
                        :disabled="boltzReviewDisabled"
                        class="w-full py-2.5 rounded-lg text-sm font-medium transition-all bg-blue-600 hover:bg-blue-500 text-white disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:bg-blue-600">
                        Review Swap
                    </button>

                    <!-- Recent Swaps -->
                    <template x-if="swapHistory && swapHistory.length > 0">
                        <div class="border-t border-navy-700 pt-4 mt-2">
                            <h4 class="text-xs font-medium text-gray-400 flex items-center gap-1.5 mb-3">
                                <i data-lucide="history" class="w-3.5 h-3.5"></i> Recent Swaps
                            </h4>
                            <div class="space-y-2">
                                <template x-for="swap in swapHistory.slice(0, 5)" :key="swap.id">
                                    <div class="flex items-center justify-between text-xs bg-navy-900/50 rounded-lg px-3 py-2">
                                        <div class="flex items-center gap-2">
                                            <span class="inline-flex items-center gap-1 px-1.5 py-0.5 rounded text-[10px] font-medium"
                                                :class="swap.status === 'completed' ? 'text-neon-green bg-neon-green/10' : swap.status === 'failed' || swap.status === 'cancelled' ? 'text-neon-pink bg-neon-pink/10' : 'text-neon-yellow bg-neon-yellow/10'"
                                                x-text="swap.status"></span>
                                            <span class="text-gray-400 font-mono" x-text="formatSats(swap.invoice_amount_sats || 0) + ' sats'"></span>
                                        </div>
                                        <span class="text-gray-600 text-[10px]" x-text="formatDateStr(swap.created_at)"></span>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>

                <!-- Lightning: Confirm Step -->
                <div x-show="coldTab === 'lightning' && coldStep === 'confirm'" class="space-y-4">
                    <div class="bg-navy-900/50 border border-blue-500/20 rounded-lg p-4 space-y-3">
                        <h3 class="text-sm font-medium text-white flex items-center gap-2">
                            <i data-lucide="shield-check" class="w-4 h-4 text-blue-400"></i> Confirm Lightning → Cold Storage
                        </h3>
                        <div class="space-y-2 text-xs">
                            <div class="flex justify-between">
                                <span class="text-gray-500">Send</span>
                                <span class="text-white font-mono" x-text="formatSats(coldBoltzAmount) + ' sats'"></span>
                            </div>
                            <template x-if="boltzFees">
                                <div class="space-y-2">
                                    <div class="flex justify-between">
                                        <span class="text-gray-500">Boltz fee (<span x-text="boltzFees.fees_percentage"></span>%)</span>
                                        <span class="text-gray-400 font-mono" x-text="'-' + formatSats(boltzFeeAmount())"></span>
                                    </div>
                                    <div class="flex justify-between">
                                        <span class="text-gray-500">Miner fees</span>
                                        <span class="text-gray-400 font-mono" x-text="'-' + formatSats(boltzFees.fees_miner_lockup + boltzFees.fees_miner_claim)"></span>
                                    </div>
                                    <div class="border-t border-navy-600 pt-2 flex justify-between">
                                        <span class="text-gray-300 font-medium">Receive on-chain</span>
                                        <span class="text-neon-green font-mono font-medium" x-text="'≈ ' + formatSats(boltzReceiveAmount()) + ' sats'"></span>
                                    </div>
                                </div>
                            </template>
                            <div class="border-t border-navy-600 pt-2">
                                <p class="text-gray-500 mb-1">Destination</p>
                                <p class="text-white font-mono text-[11px] break-all" x-text="coldBoltzAddress"></p>
                            </div>
                        </div>
                    </div>
                    <div class="p-3 rounded-lg bg-neon-yellow/5 border border-neon-yellow/15">
                        <p class="text-[11px] text-neon-yellow">
                            <strong>Important:</strong> Once started, the swap cannot be cancelled after the Lightning payment is sent. The process is automatic and typically completes within a few minutes.
                        </p>
                    </div>
                    <div class="flex gap-2">
                        <button @click="coldStep = 'form'"
                            class="flex-1 px-4 py-2.5 rounded-lg text-sm bg-navy-700 border border-navy-600 text-gray-300 hover:border-blue-500/30 hover:text-white transition-all">
                            Back
                        </button>
                        <button @click="initiateBoltzSwap()" :disabled="coldLoading"
                            class="flex-1 px-4 py-2.5 rounded-lg text-sm font-medium transition-all bg-blue-600 hover:bg-blue-500 text-white disabled:opacity-50">
                            <template x-if="coldLoading">
                                <span class="flex items-center justify-center gap-2"><span class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin inline-block"></span> Starting...</span>
                            </template>
                            <template x-if="!coldLoading">
                                <span>Start Swap</span>
                            </template>
                        </button>
                    </div>
                </div>

                <!-- Lightning: Progress Step -->
                <div x-show="coldTab === 'lightning' && coldStep === 'progress'" class="space-y-4">
                    <div class="flex items-center justify-between">
                        <h3 class="text-sm font-medium text-white">Swap Progress</h3>
                        <span class="w-4 h-4 border-2 border-blue-400 border-t-transparent rounded-full animate-spin inline-block"></span>
                    </div>
                    <!-- Step tracker -->
                    <div class="space-y-0">
                        <template x-for="(step, idx) in swapSteps" :key="step.key">
                            <div class="flex items-start gap-3 relative">
                                <template x-if="idx < swapSteps.length - 1">
                                    <div class="absolute left-[9px] top-[20px] w-0.5 h-6"
                                        :class="idx < activeSwapStep ? 'bg-neon-green/40' : 'bg-navy-600'"></div>
                                </template>
                                <div class="shrink-0 mt-0.5">
                                    <template x-if="idx < activeSwapStep || activeSwapStatus === 'completed'">
                                        <i data-lucide="check-circle-2" class="w-[18px] h-[18px] text-neon-green"></i>
                                    </template>
                                    <template x-if="idx === activeSwapStep && activeSwapStatus !== 'completed' && !swapIsFailed">
                                        <span class="w-[18px] h-[18px] border-2 border-blue-400 border-t-transparent rounded-full animate-spin inline-block"></span>
                                    </template>
                                    <template x-if="idx > activeSwapStep && activeSwapStatus !== 'completed'">
                                        <div class="w-[18px] h-[18px] rounded-full border border-navy-600"></div>
                                    </template>
                                </div>
                                <div class="pb-4">
                                    <p class="text-xs font-medium"
                                        :class="(idx < activeSwapStep || activeSwapStatus === 'completed') ? 'text-neon-green' : (idx === activeSwapStep && !swapIsFailed) ? 'text-white' : 'text-gray-600'"
                                        x-text="step.label"></p>
                                    <p class="text-[10px]"
                                        :class="idx === activeSwapStep ? 'text-gray-400' : 'text-gray-600'"
                                        x-text="step.desc"></p>
                                </div>
                            </div>
                        </template>
                    </div>
                    <template x-if="swapIsFailed && activeSwapError">
                        <div class="p-3 rounded-lg bg-neon-pink/10 border border-neon-pink/20">
                            <p class="text-xs text-neon-pink" x-text="activeSwapError"></p>
                        </div>
                    </template>
                    <!-- Cancel-attempt + transient-poll error surface.
                         Without this block, ``cancelBoltzSwap()``
                         failures landed silently in ``coldError`` and
                         the user — staring at the progress view —
                         had no idea their Cancel click had been
                         rejected (typically because the LN payment
                         had already started, racing past the
                         ``created`` state the backend accepts cancel
                         from). Also surfaces transient poll errors
                         so the dots-stopped-advancing case has a
                         legible explanation. -->
                    <template x-if="coldError">
                        <div class="p-3 rounded-lg bg-neon-pink/10 border border-neon-pink/20">
                            <p class="text-xs text-neon-pink" x-text="coldError"></p>
                        </div>
                    </template>
                    <!-- Claim transaction affordance.
                         As soon as the wallet broadcasts the claim
                         tx (status ``claimed``), surface the txid
                         with copy + mempool-explorer affordances
                         so the user can watch the on-chain
                         confirmation independently — same policy
                         applied to the onboarding wizard's
                         ``connecting`` step and the inbound dialog. -->
                    <!-- Boltz lockup tx, surfaced during the wait window
                         between LN payment and our own claim broadcast.
                         Same affordance set as the claim panel below
                         (copy + mempool explorer link) so the user can
                         watch the lockup confirmations instead of
                         staring at a blank "Confirming the on-chain
                         transaction" step. Mutually exclusive with
                         the claim panel: once the claim broadcasts,
                         this hides and the claim panel takes over. -->
                    <template x-if="shouldShowActiveSwapLockupTxid">
                        <div class="bg-navy-900/50 border border-navy-700 rounded-lg p-3 space-y-2.5">
                            <span class="text-[10px] text-gray-500 uppercase tracking-wider block">Boltz lockup transaction</span>
                            <p class="font-mono text-xs text-gray-300 break-all select-all" x-text="activeSwapLockupTxid"></p>
                            <div class="flex gap-2 pt-1">
                                <button @click="copyText(activeSwapLockupTxid)"
                                        title="Copy transaction ID"
                                        class="flex-1 flex items-center justify-center gap-1.5 px-3 py-1.5 rounded text-xs bg-navy-700 border border-navy-600 text-gray-300 hover:border-blue-500/30 hover:text-white transition-all">
                                    <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                                    <span>Copy ID</span>
                                </button>
                                <a :href="mempoolTxUrl(activeSwapLockupTxid)"
                                   target="_blank" rel="noopener noreferrer"
                                   title="View on mempool explorer"
                                   class="flex-1 flex items-center justify-center gap-1.5 px-3 py-1.5 rounded text-xs bg-navy-700 border border-navy-600 text-gray-300 hover:border-blue-500/30 hover:text-white transition-all">
                                    <i data-lucide="external-link" class="w-3.5 h-3.5"></i>
                                    <span>View on explorer</span>
                                </a>
                            </div>
                            <p class="text-[11px] text-gray-500 text-center pt-1 leading-relaxed">
                                <template x-if="activeSwapLockupConfirmations !== null">
                                    <span>
                                        <span x-text="activeSwapLockupConfirmations"></span> confirmation<span x-text="activeSwapLockupConfirmations === 1 ? '' : 's'"></span> on Boltz's lockup. Once it has enough, we'll claim it to your wallet.
                                    </span>
                                </template>
                                <template x-if="activeSwapLockupConfirmations === null">
                                    <span>Boltz has locked the funds on-chain. Once the lockup confirms, we'll claim it to your wallet.</span>
                                </template>
                            </p>
                        </div>
                    </template>
                    <template x-if="activeSwapClaimTxid">
                        <div class="bg-navy-900/50 border border-navy-700 rounded-lg p-3 space-y-2.5">
                            <span class="text-[10px] text-gray-500 uppercase tracking-wider block">On-chain claim transaction</span>
                            <p class="font-mono text-xs text-gray-300 break-all select-all" x-text="activeSwapClaimTxid"></p>
                            <div class="flex gap-2 pt-1">
                                <button @click="copyText(activeSwapClaimTxid)"
                                        title="Copy transaction ID"
                                        class="flex-1 flex items-center justify-center gap-1.5 px-3 py-1.5 rounded text-xs bg-navy-700 border border-navy-600 text-gray-300 hover:border-blue-500/30 hover:text-white transition-all">
                                    <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                                    <span>Copy ID</span>
                                </button>
                                <a :href="mempoolTxUrl(activeSwapClaimTxid)"
                                   target="_blank" rel="noopener noreferrer"
                                   title="View on mempool explorer"
                                   class="flex-1 flex items-center justify-center gap-1.5 px-3 py-1.5 rounded text-xs bg-navy-700 border border-navy-600 text-gray-300 hover:border-blue-500/30 hover:text-white transition-all">
                                    <i data-lucide="external-link" class="w-3.5 h-3.5"></i>
                                    <span>View on explorer</span>
                                </a>
                            </div>
                            <template x-if="activeSwapClaimConfirmations !== null">
                                <p class="text-[11px] text-gray-500 text-center pt-1">
                                    <span x-text="activeSwapClaimConfirmations"></span> confirmation<span x-text="activeSwapClaimConfirmations === 1 ? '' : 's'"></span>
                                </p>
                            </template>
                        </div>
                    </template>
                    <template x-if="activeSwapStatus === 'created'">
                        <button @click="cancelBoltzSwap()" :disabled="coldLoading"
                            class="w-full py-2 rounded-lg text-xs text-gray-400 border border-navy-600 hover:text-neon-pink hover:border-neon-pink/30 transition-all">
                            Cancel Swap
                        </button>
                    </template>

                    <!-- Recovery banner. Surfaces the structured
                         hint emitted by the classifier on the swap
                         detail. Visible only when the classifier
                         reports a non-OK severity; ``ok`` and
                         ``info`` states hide the banner to keep the
                         progress view calm. Operators see the
                         headline + detail and any available action
                         buttons (cooperative-claim retry,
                         unilateral script-path claim). -->
                    <template x-if="showSwapRecoveryBanner">
                        <div class="mt-3 rounded-lg p-3 space-y-2"
                             :class="activeSwapRecovery.severity === 'critical' ? 'bg-neon-pink/10 border border-neon-pink/30' : 'bg-neon-yellow/10 border border-neon-yellow/30'">
                            <div class="flex items-start gap-2">
                                <i :data-lucide="activeSwapRecovery.severity === 'critical' ? 'alert-octagon' : 'alert-triangle'"
                                   class="w-4 h-4 flex-shrink-0 mt-0.5"
                                   :class="activeSwapRecovery.severity === 'critical' ? 'text-neon-pink' : 'text-neon-yellow'"></i>
                                <div class="flex-1 min-w-0">
                                    <p class="text-xs font-medium"
                                       :class="activeSwapRecovery.severity === 'critical' ? 'text-neon-pink' : 'text-neon-yellow'"
                                       x-text="activeSwapRecovery.headline"></p>
                                    <p class="text-[11px] text-gray-300 mt-1" x-text="activeSwapRecovery.detail"></p>
                                </div>
                            </div>
                            <template x-if="swapRecoveryHasActions">
                                <div class="flex flex-wrap gap-2 pt-1">
                                    <template x-for="act in activeSwapRecovery.actions" :key="act">
                                        <button @click="invokeSwapRecoveryAction(act)"
                                                :disabled="activeSwapRecoveryBusy"
                                                class="px-3 py-1.5 rounded text-[11px] font-medium bg-navy-700 border border-navy-600 text-gray-200 hover:border-blue-500/40 hover:text-white disabled:opacity-50 disabled:cursor-not-allowed transition-all"
                                                x-text="act === 'cooperative_claim' ? 'Retry cooperative claim' : (act === 'unilateral_claim' ? 'Unilateral claim' : act)"></button>
                                    </template>
                                </div>
                            </template>
                            <template x-if="activeSwapRecoveryError">
                                <p class="text-[11px] text-neon-pink pt-1" x-text="activeSwapRecoveryError"></p>
                            </template>
                        </div>
                    </template>
                </div>

                <!-- Lightning: Result Step -->
                <div x-show="coldTab === 'lightning' && coldStep === 'result'" class="space-y-4">
                    <template x-if="coldResultSuccess">
                        <div class="flex flex-col items-center gap-3 py-4">
                            <div class="w-12 h-12 rounded-full bg-neon-green/10 border border-neon-green/30 flex items-center justify-center">
                                <i data-lucide="check-circle-2" class="w-6 h-6 text-neon-green"></i>
                            </div>
                            <h3 class="text-lg font-semibold text-white">Swap Complete</h3>
                            <p class="text-xs text-gray-400 text-center" x-text="formatSats(coldBoltzAmount) + ' sats sent to cold storage'"></p>
                            <!-- Plan inbound_liquidity cross-cutting policy:
                                 every pending or completed on-chain tx the user
                                 sees gets a 📋 + 🔗 pair. Brings the Lightning
                                 result panel in line with the on-chain result
                                 panel above and the inbound-liquidity dialog. -->
                            <template x-if="coldResultDataOrEmpty.claimTxid">
                                <div class="w-full bg-navy-900/50 border border-navy-700 rounded-lg p-3 space-y-2.5">
                                    <span class="text-[10px] text-gray-500 uppercase tracking-wider block">Claim transaction ID</span>
                                    <p class="font-mono text-xs text-gray-300 break-all select-all" x-text="coldResultDataOrEmpty.claimTxid"></p>
                                    <div class="flex gap-2 pt-1">
                                        <button @click="copyText(coldResultDataOrEmpty.claimTxid)"
                                                title="Copy transaction ID"
                                                class="flex-1 flex items-center justify-center gap-1.5 px-3 py-1.5 rounded text-xs bg-navy-700 border border-navy-600 text-gray-300 hover:border-blue-500/30 hover:text-white transition-all">
                                            <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                                            <span>Copy ID</span>
                                        </button>
                                        <a :href="mempoolTxUrl(coldResultDataOrEmpty.claimTxid)"
                                           target="_blank" rel="noopener noreferrer"
                                           title="View on mempool explorer"
                                           class="flex-1 flex items-center justify-center gap-1.5 px-3 py-1.5 rounded text-xs bg-navy-700 border border-navy-600 text-gray-300 hover:border-blue-500/30 hover:text-white transition-all">
                                            <i data-lucide="external-link" class="w-3.5 h-3.5"></i>
                                            <span>View on explorer</span>
                                        </a>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>
                    <template x-if="coldResultFailed">
                        <div class="flex flex-col items-center gap-3 py-4">
                            <div class="w-12 h-12 rounded-full bg-neon-pink/10 border border-neon-pink/30 flex items-center justify-center">
                                <i data-lucide="alert-circle" class="w-6 h-6 text-neon-pink"></i>
                            </div>
                            <h3 class="text-lg font-semibold text-white">Swap Failed</h3>
                            <p class="text-xs text-gray-400 text-center" x-text="coldResultDataOrEmpty.error"></p>
                        </div>
                    </template>
                    <button @click="coldBoltzNewSwap()"
                        class="w-full py-2.5 rounded-lg text-sm bg-navy-700 border border-navy-600 text-gray-300 hover:text-white transition-all"
                        x-text="coldResultBtnText">
                    </button>
                </div>

            </div>
        </div>
    </template>

    <!-- OPEN CHANNEL DIALOG -->
    <template x-if="showOpenChannel">
        <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm" @click.self="showOpenChannel = false">
            <div class="bg-gradient-to-b from-navy-800 to-navy-900 border border-navy-700 rounded-xl p-6 w-full max-w-md mx-4 shadow-2xl">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-bold text-white">Open Channel</h2>
                    <button @click="closeOpenChannel()" class="text-gray-500 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>

                <div class="space-y-3">
                    <div>
                        <label class="text-sm text-gray-400 mb-1 block">Node Pubkey or URI</label>
                        <input type="text" x-model="chanPubkey" placeholder="02abc... or 02abc...@host:9735" class="w-full bg-navy-800 border border-navy-600 rounded-lg px-3 py-2.5 text-white font-mono text-sm placeholder-gray-600 focus:border-neon-cyan/50 focus:outline-none">
                        <p x-show="chanIsUri" class="mt-1 text-[11px] text-neon-cyan/80">URI detected — host parsed from the input.</p>
                    </div>
                    <div x-show="!chanIsUri">
                        <label class="text-sm text-gray-400 mb-1 block">Host (optional, e.g. ip:port)</label>
                        <input type="text" x-model="chanHost" placeholder="127.0.0.1:9735" class="w-full bg-navy-800 border border-navy-600 rounded-lg px-3 py-2.5 text-white font-mono text-sm placeholder-gray-600 focus:border-neon-cyan/50 focus:outline-none">
                    </div>
                    <div>
                        <label class="text-sm text-gray-400 mb-1 block">Channel Size (sats)</label>
                        <input type="number" x-model.number="chanAmount" min="20000" placeholder="100000" class="w-full bg-navy-800 border border-navy-600 rounded-lg px-3 py-2.5 text-white font-mono text-sm placeholder-gray-600 focus:border-neon-cyan/50 focus:outline-none">
                    </div>
                    <div>
                        <label class="text-sm text-gray-400 mb-1 block">Fee Rate</label>
                        <div class="flex gap-2">
                            <template x-for="p in [{l:'Low',v:'low'},{l:'Med',v:'medium'},{l:'High',v:'high'}]" :key="p.v">
                                <button @click="setChanFee(p.v)" class="px-3 py-1.5 text-xs rounded-lg border transition-colors"
                                    :class="chanFeePriority === p.v ? 'bg-neon-cyan/15 border-neon-cyan/30 text-neon-cyan' : 'border-navy-600 text-gray-400 hover:text-white'">
                                    <span x-text="p.l"></span>
                                </button>
                            </template>
                            <input type="number" x-model.number="chanFeeRate" min="1" placeholder="sat/vB" class="flex-1 bg-navy-800 border border-navy-600 rounded-lg px-3 py-1.5 text-white font-mono text-xs focus:border-neon-cyan/50 focus:outline-none">
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <input type="checkbox" x-model="chanPrivate" id="chanPrivate" class="rounded bg-navy-800 border-navy-600">
                        <label for="chanPrivate" class="text-sm text-gray-400">Private channel</label>
                    </div>
                    <button @click="openChannel()" :disabled="!chanPubkey || !chanAmount || chanLoading" class="w-full bg-neon-cyan/15 border border-neon-cyan/30 text-neon-cyan rounded-lg py-2.5 hover:bg-neon-cyan/25 transition-colors disabled:opacity-50">
                        <span x-show="!chanLoading">Open Channel</span>
                        <span x-show="chanLoading" class="flex items-center justify-center gap-2"><span class="w-4 h-4 border-2 border-neon-cyan border-t-transparent rounded-full animate-spin"></span></span>
                    </button>
