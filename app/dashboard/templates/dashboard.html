                                <i :data-lucide="t.icon" class="w-4 h-4"></i>
                                <span x-text="t.label"></span>
                                <!-- Active-session pulse-dot for the Braiins-Deposit tab. -->
                                <span x-show="t.id === 'braiins-deposit' && braiinsDepositListHasActiveSession"
                                      class="ml-1 w-1.5 h-1.5 rounded-full bg-neon-cyan animate-pulse"
                                      aria-label="Active deposit"></span>
                            </button>
                        </template>
                    </div>

                    <div class="mt-4">
                        <!-- CHANNELS TAB -->
                        <div x-show="activeTab === 'channels'" x-cloak>
                            <div class="flex items-center justify-between mb-4">
                                <h3 class="text-sm text-gray-400">
                                    <span x-text="(channels || []).length"></span> channel(s)

                                <div class="flex items-center gap-2">
                                    <button @click="openCloseChannels()"

                                            title="Close one or more channels and free their funds on-chain">
                                        <i data-lucide="unplug" class="w-3.5 h-3.5"></i> Close Channels…
                                    </button>
                                    <button @click="openChannelPlanner()" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium bg-neon-cyan/10 border border-neon-cyan/30 text-neon-cyan hover:bg-neon-cyan/20 hover:border-neon-cyan/50 transition-all"
                                            title="Plan and open several small channels at once, drawn from the verified peer catalog">
                                        <i data-lucide="layers" class="w-3.5 h-3.5"></i> Plan multiple channels…
                                    </button>
                                    <button @click="showOpenChannel = true" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium bg-blue-500/15 border border-blue-500/30 text-blue-400 hover:bg-blue-500/25 hover:border-blue-500/50 transition-all">
                                        <i data-lucide="plus" class="w-3.5 h-3.5"></i> Open Channel

                                </div>
                            </div>
                            <!-- Catalog-matched summary line.

                            <template x-if="shouldShowCatalogMatchedSummary">
                                <p class="text-[11px] text-gray-500 mb-3">
                                    <span x-text="catalogMatchedChannelCount"></span> of your
                                    <span x-text="totalChannelCount"></span>
                                    channels are with peers in our vetted catalog
                                    (<a href="/static/docs/small-channel-peers.html"
                                        target="_blank"
                                        rel="noopener"
                                        class="text-neon-cyan hover:underline">learn more</a>).
                                </p>
                            </template>
                            <template x-if="channelsError">
                                <div class="flex items-center justify-between gap-3 bg-neon-pink/5 border border-neon-pink/20 rounded-lg px-3 py-2 mb-3 text-sm">
                                    <span class="text-neon-pink/80" x-text="channelsError"></span>
                                    <button @click="fetchChannels()" class="px-2.5 py-1 rounded-md text-xs font-medium bg-navy-700 border border-navy-600 text-gray-300 hover:bg-navy-600 transition-all">Retry</button>
                                </div>
                            </template>
                            <template x-if="(!channels || channels.length === 0) && !channelsError">
                                <p class="text-gray-500 text-sm py-8 text-center">No active channels</p>
                            </template>
                            <div class="space-y-3">
                                <template x-for="ch in (channels || [])" :key="ch.chan_id || ch.channel_point">
                                    <div class="bg-navy-900 border border-navy-700 rounded-lg p-4 card-hover transition-opacity"
                                         :class="isChannelClosing(ch) ? 'opacity-40 pointer-events-none' : ''">
                                        <div class="flex items-center justify-between gap-3 mb-2">
                                            <!-- Alias grows to fill the available width and only
                                                 ellipsizes when it would collide with the capacity
                                                 text (``flex-1 min-w-0`` + ``truncate``). The fixed
                                                 cap is gone so wide windows show the full name; the
                                                 title attribute reveals it on hover when clipped. -->
                                            <div class="flex items-center gap-2 min-w-0 flex-1">
                                                <span class="w-2 h-2 rounded-full shrink-0" :class="channelStatusDotClass(ch)" :title="channelStatusTooltip(ch)"></span>
                                                <span class="text-white text-sm font-mono truncate min-w-0" :title="channelAlias(ch)" x-text="channelAlias(ch)"></span>
                                                <!-- Catalog badge. ⭐ when the peer is a
                                                     recommended-default catalog entry;
                                                     ⚠️ when the catalog flagged a routing
                                                     caveat. Silent miss when the peer
                                                     isn't in the catalog. -->
                                                <template x-if="channelPeerBadge(ch) === 'star'">
                                                    <span class="shrink-0 text-[10px] text-neon-green/90"
                                                          :title="'Recommended catalog peer'">⭐</span>
                                                </template>
                                                <template x-if="channelPeerBadge(ch) === 'warning'">
                                                    <span class="shrink-0 text-[10px] text-neon-yellow"
                                                          :title="'Catalog flagged a routing concern — open the info panel for details'">⚠️</span>
                                                </template>
                                                <!-- Catalog info icon — opens a per-card
                                                     popover with the peer's summary, fee
                                                     tier, outbound ratio, and snapshot
                                                     date. Shown only when the catalog has
                                                     an entry for the channel's peer. -->
                                                <template x-if="channelPeerCatalogInfo(ch)">
                                                    <div class="relative shrink-0"
                                                         @click.outside="closeChannelInfoIfOwned(ch)"
                                                         @keydown.escape.window="closeChannelInfo()">
                                                        <button type="button"
                                                                class="inline-flex items-center justify-center w-4 h-4 rounded-full text-gray-500 hover:text-neon-cyan transition-colors"
                                                                @click.stop="toggleChannelInfo(ch)"
                                                                :title="'Catalog notes about this peer'"
                                                                :aria-expanded="openChannelInfoTooltip === (ch.chan_id || ch.channel_point || '') ? 'true' : 'false'">
                                                            <i data-lucide="info" class="w-3 h-3"></i>
                                                        </button>
                                                        <template x-if="openChannelInfoTooltip === (ch.chan_id || ch.channel_point || '')">
                                                            <div class="absolute z-10 left-0 top-5 w-72 max-w-[calc(100vw-2rem)] p-3 rounded-md bg-navy-800 border border-navy-600 shadow-lg text-xs"
                                                                 role="dialog">
                                                                <div class="flex items-center justify-between gap-2 mb-1.5">
                                                                    <span class="font-medium text-white truncate" x-text="channelPeerCatalogInfo(ch).alias"></span>
                                                                    <button type="button"
                                                                            class="text-gray-500 hover:text-gray-200 shrink-0"
                                                                            @click.stop="closeChannelInfo()"
                                                                            title="Close">
                                                                        <i data-lucide="x" class="w-3 h-3"></i>
                                                                    </button>
                                                                </div>
                                                                <p class="text-gray-300 leading-relaxed text-[11px]"
                                                                   x-text="channelPeerCatalogInfo(ch).summary"></p>
                                                                <div class="mt-2 pt-2 border-t border-navy-700 space-y-1 text-[10px] text-gray-500">
                                                                    <div class="flex justify-between gap-2">
                                                                        <span>Fee tier</span>
                                                                        <span class="text-gray-300" x-text="channelPeerFeeTierLabel(channelPeerCatalogInfo(ch))"></span>
                                                                    </div>
                                                                    <div class="flex justify-between gap-2">
                                                                        <span>Connectivity</span>
                                                                        <span class="text-gray-300" x-text="channelPeerConnectivityLabel(channelPeerCatalogInfo(ch))"></span>
                                                                    </div>
                                                                    <template x-if="channelPeerOutboundPct(channelPeerCatalogInfo(ch))">
                                                                        <div class="flex justify-between gap-2">
                                                                            <span>Outbound enabled</span>
                                                                            <span class="text-gray-300" x-text="channelPeerOutboundPct(channelPeerCatalogInfo(ch))"></span>
                                                                        </div>
                                                                    </template>
                                                                    <template x-if="channelPeerCatalogInfo(ch).location">
                                                                        <div class="flex justify-between gap-2">
                                                                            <span>Location</span>
                                                                            <span class="text-gray-300 truncate" x-text="channelPeerCatalogInfo(ch).location"></span>
                                                                        </div>

                        <!-- PAYMENTS TAB -->

                            <!-- UTXOS sub-tab -->

                                                <th class="text-left pb-2 pl-4 font-normal">Address</th>
                                                <th class="text-right pb-2 font-normal">Confirmations</th>
                                                <th class="text-right pb-2 font-normal">Outpoint</th>

                                        <tbody>
                                            <template x-for="u in filteredUtxos" :key="u.key">

                                        <table x-show="recentlySpent.length > 0" class="w-full text-xs">

                                                <template x-for="r in recentlySpent" :key="r.key">
                                                    <tr class="border-b border-navy-700/30">
                                                        <td class="py-1 text-gray-400 truncate max-w-[200px]" x-text="r.label || '—'"></td>
                                                        <td class="py-1 text-gray-600 text-[10px]" x-text="r.label_source"></td>
                                                        <td class="py-1 text-right">
                                                            <a x-show="r.spent_txid" :href="mempoolTxUrl(r.spent_txid)" target="_blank" rel="noopener"
                                                                class="font-mono text-[10px] text-neon-cyan/60 hover:text-neon-cyan hover:underline"
                                                                x-text="r.spent_txid ? r.spent_txid.substring(0, 8) + '…' : ''"></a>
                                                        </td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- BOLT 12 TAB -->
                        <div x-show="activeTab === 'bolt12'" x-cloak>
                            <div class="space-y-4">
                                <!-- Sub-tabs -->
                                <div class="flex items-center gap-1 border-b border-navy-700">
                                    <button @click="bolt12SubTab = 'issue'"
                                        :class="bolt12SubTab === 'issue' ? 'text-neon-cyan border-neon-cyan' : 'text-gray-500 border-transparent hover:text-gray-300'"
                                        class="px-3 py-1.5 text-xs border-b-2 -mb-px">
                                        Issue
                                    </button>
                                    <button @click="bolt12SubTab = 'pay'"
                                        :class="bolt12SubTab === 'pay' ? 'text-neon-cyan border-neon-cyan' : 'text-gray-500 border-transparent hover:text-gray-300'"
                                        class="px-3 py-1.5 text-xs border-b-2 -mb-px">
                                        Pay
                                    </button>
                                </div>

                                <!-- ── ISSUE SUB-TAB ── -->
                                <div x-show="bolt12SubTab === 'issue'" x-cloak class="space-y-4">
                                    <!-- ╭─ Empty state CTA ─╮ -->
                                    <!--
                                        Shown when the user has not yet configured
                                        their first BOLT 12 offer. This includes
                                        the case where the backend has auto-minted
                                        a placeholder default-receive offer
                                        ("Receive offer (configure for your
                                        payer)") but the user has not yet replaced
                                        it with a real offer. See
                                        bolt12IsUnconfigured() in dashboard.js.
                                    -->
                                    <template x-if="bolt12IsUnconfigured() && !bolt12ReceiveLoading">
                                        <div class="bg-navy-900 border border-neon-cyan/30 rounded-lg p-8 text-center space-y-4">
                                            <div class="flex justify-center">
                                                <div class="w-12 h-12 rounded-full bg-neon-cyan/10 border border-neon-cyan/30 flex items-center justify-center">
                                                    <i data-lucide="arrow-down-left" class="w-6 h-6 text-neon-cyan"></i>
                                                </div>
                                            </div>
                                            <div>
                                                <h3 class="text-base font-medium text-white">Create your first offer!</h3>
                                                <p class="text-xs text-gray-400 mt-1 max-w-sm mx-auto">
                                                    A BOLT 12 offer is a single reusable Lightning address
                                                    you can share with whoever pays you (e.g. the Ocean
                                                    mining pool). Register it once — they pay it forever.
                                                </p>
                                            </div>
                                            <div class="flex justify-center">
                                                <button @click="openBolt12NewOffer()"
                                                    class="flex items-center gap-1.5 px-4 py-2 rounded-lg text-xs font-medium bg-neon-cyan/15 border border-neon-cyan/30 text-neon-cyan hover:bg-neon-cyan/25">
                                                    <i data-lucide="plus" class="w-3.5 h-3.5"></i>
                                                    Create offer
                                                </button>
                                            </div>
                                            <!-- Surface critical warnings (e.g. BOLT 12 disabled) even
                                                 in the empty state so the user knows why the button
                                                 might fail. -->
                                            <template x-if="bolt12Receive && bolt12Receive.warnings && bolt12Receive.warnings.length > 0">
                                                <div class="space-y-1.5 text-left">
                                                    <template x-for="w in bolt12Receive.warnings" :key="w.code">
                                                        <div>
                                                            <!-- no_publicly_routable_om_peer renders with an
                                                                 inline "Connect to a public node" CTA so the
                                                                 user can fix the problem in one click. -->

                                                                <div class="bg-neon-yellow/10 border border-neon-yellow/30 rounded px-2.5 py-2 space-y-1.5 text-neon-yellow">
                                                                    <div class="flex items-start gap-2 text-xs">
                                                                        <i data-lucide="alert-triangle" class="w-3.5 h-3.5 mt-0.5 shrink-0"></i>
                                                                        <span x-text="w.message"></span>
                                                                    </div>
                                                                    <div class="flex items-center gap-2 pl-5">

                                                                            x-on:click="bolt12AutoPeerForReceive()"
                                                                            x-bind:disabled="bolt12AutoPeerLoading"
                                                                            class="text-xs px-2.5 py-1 rounded bg-neon-yellow/20 border border-neon-yellow/40 text-neon-yellow hover:bg-neon-yellow/30 disabled:opacity-50 disabled:cursor-not-allowed"
                                                                            x-text="bolt12AutoPeerLoading ? 'Connecting…' : 'Connect to a public node'"></button>
                                                                    </div>
                                                                    <div x-show="bolt12AutoPeerError" class="pl-5 text-xs text-neon-pink"
                                                                        x-text="bolt12AutoPeerError"></div>
                                                                </div>
                                                            </template>
                                                            <!-- low_inbound_liquidity is rendered with our own
                                                                 grammar in the configured-offer panel; suppress
                                                                 the server-supplied copy here too so the empty
                                                                 state stays focused on the create-offer CTA. -->
                                                            <template x-if="w.code !== 'low_inbound_liquidity' && w.code !== 'no_publicly_routable_om_peer'">
                                                                <div class="flex items-start gap-2 text-xs px-2.5 py-2 rounded border"
                                                                    :class="w.code === 'gateway_offline' || w.code === 'bolt12_disabled' ? 'bg-neon-pink/10 border-neon-pink/30 text-neon-pink' : 'bg-neon-yellow/10 border-neon-yellow/30 text-neon-yellow'">
                                                                    <i data-lucide="alert-triangle" class="w-3.5 h-3.5 mt-0.5 shrink-0"></i>
                                                                    <span x-text="w.message"></span>
                                                                </div>
                                                            </template>
                                                        </div>
                                                    </template>
                                                </div>
                                            </template>
                                        </div>
                                    </template>

                                    <!-- The remainder of the issue tab (selected
                                         offer detail panel, advanced one-shot
                                         issue form, and "My offers" history) is
                                         only rendered once the user has
                                         configured their first real offer. -->
                                    <template x-if="!bolt12IsUnconfigured()">
                                    <div class="space-y-4">

                                    <!-- ╭─ Selected offer detail panel ─╮ -->
                                    <!--
                                        Renders the offer currently selected in the
                                        "My offers" list below. Defaults to the
                                        default-receive offer (or the first active
                                        offer) on first load.
                                    -->
                                    <template x-if="(bolt12IssuedOffers || []).length > 0 && bolt12SelectedOffer()">
                                        <div class="bg-navy-900 border border-neon-cyan/30 rounded-lg p-4 space-y-3">
                                            <div class="flex items-center justify-between">
                                                <div>
                                                    <h3 class="text-sm font-medium text-white flex items-center gap-2">
                                                        <i data-lucide="arrow-down-left" class="w-4 h-4 text-neon-cyan"></i>
                                                        <span>Offer details</span>
                                                        <template x-if="bolt12SelectedOffer().is_default_receive">
                                                            <span class="text-[10px] px-1.5 py-0.5 rounded bg-neon-cyan/15 text-neon-cyan">default</span>
                                                        </template>
                                                    </h3>
                                                    <div class="text-xs text-gray-400 mt-1">
                                                        Share this BOLT 12 offer with whoever pays you. It can be
                                                        paid an unlimited number of times — register it once.
                                                    </div>
                                                </div>
                                                <div class="flex items-center gap-1.5 shrink-0">
                                                    <button @click="openBolt12NewOffer()"
                                                        class="flex items-center gap-1.5 px-2.5 py-1 rounded text-xs bg-neon-cyan/10 border border-neon-cyan/30 text-neon-cyan hover:bg-neon-cyan/20"
                                                        title="Mint a new BOLT 12 offer">
                                                        <i data-lucide="plus" class="w-3 h-3"></i>
                                                        New offer
                                                    </button>
                                                    <button @click="bolt12RefreshReceive()"
                                                        :disabled="bolt12ReceiveLoading"
                                                        class="flex items-center gap-1.5 px-2.5 py-1 rounded text-xs text-gray-400 hover:text-white hover:bg-navy-800 disabled:opacity-50">
                                                        <i data-lucide="refresh-cw" class="w-3 h-3"
                                                            :class="bolt12ReceiveLoading ? 'animate-spin' : ''"></i>
                                                        Refresh
                                                    </button>
                                                </div>
                                            </div>

                                            <!-- Description -->
                                            <div class="bg-navy-800/50 border border-navy-700 rounded px-3 py-2 flex items-start gap-2">
                                                <i data-lucide="tag" class="w-3.5 h-3.5 text-gray-500 mt-0.5 shrink-0"></i>
                                                <div class="flex-1 min-w-0">
                                                    <div class="text-[10px] uppercase tracking-wide text-gray-500">Offer description</div>
                                                    <div class="text-xs text-white break-all" x-text="bolt12SelectedOffer().description || '(none)'"></div>
                                                </div>
                                            </div>

                                            <!-- Warnings (gateway offline, disabled, etc.) -->
                                            <template x-if="bolt12Receive && bolt12Receive.warnings && bolt12Receive.warnings.length > 0">
                                                <div class="space-y-1.5">
                                                    <template x-for="w in bolt12Receive.warnings" :key="w.code">
                                                        <div>
                                                            <!-- no_publicly_routable_om_peer renders with an
                                                                 inline "Connect to a public node" CTA so the
                                                                 user can fix the problem in one click. -->
                                                            <template x-if="w.code === 'no_publicly_routable_om_peer'">
                                                                <div class="bg-neon-yellow/10 border border-neon-yellow/30 rounded px-2.5 py-2 space-y-1.5 text-neon-yellow">
                                                                    <div class="flex items-start gap-2 text-xs">
                                                                        <i data-lucide="alert-triangle" class="w-3.5 h-3.5 mt-0.5 shrink-0"></i>
                                                                        <span x-text="w.message"></span>
                                                                    </div>
                                                                    <div class="flex items-center gap-2 pl-5">
                                                                        <button type="button"
                                                                            x-on:click="bolt12AutoPeerForReceive()"
                                                                            x-bind:disabled="bolt12AutoPeerLoading"
                                                                            class="text-xs px-2.5 py-1 rounded bg-neon-yellow/20 border border-neon-yellow/40 text-neon-yellow hover:bg-neon-yellow/30 disabled:opacity-50 disabled:cursor-not-allowed"
                                                                            x-text="bolt12AutoPeerLoading ? 'Connecting…' : 'Connect to a public node'"></button>
                                                                    </div>
                                                                    <div x-show="bolt12AutoPeerError" class="pl-5 text-xs text-neon-pink"
                                                                        x-text="bolt12AutoPeerError"></div>
                                                                </div>
                                                            </template>
                                                        <!-- low_inbound_liquidity is rendered below with our own
                                                             grammar/threshold; suppress the server-supplied copy. -->
                                                        <template x-if="w.code !== 'low_inbound_liquidity' && w.code !== 'no_publicly_routable_om_peer'">
                                                            <div class="flex items-start gap-2 text-xs px-2.5 py-2 rounded border"
                                                                :class="w.code === 'gateway_offline' || w.code === 'bolt12_disabled' ? 'bg-neon-pink/10 border-neon-pink/30 text-neon-pink' : 'bg-neon-yellow/10 border-neon-yellow/30 text-neon-yellow'">
                                                                <i data-lucide="alert-triangle" class="w-3.5 h-3.5 mt-0.5 shrink-0"></i>
                                                                <span x-text="w.message"></span>
                                                            </div>
                                                        </template>
                                                        </div>
                                                    </template>
                                                </div>
                                            </template>

                                            <!-- Loading + error -->
                                            <div x-show="bolt12ReceiveError" class="text-xs text-neon-pink"
                                                x-text="bolt12ReceiveError"></div>

                                            <!-- Offer body -->
                                            <div class="space-y-3">
                                                <div class="flex items-start gap-3">
                                                    <textarea readonly rows="3"
                                                        x-text="bolt12SelectedOffer().bolt12"
                                                        class="flex-1 bg-navy-800 border border-navy-700 rounded px-3 py-2 text-xs font-mono text-gray-200 break-all"></textarea>
                                                    <div class="flex flex-col gap-2">
                                                        <button @click="copyText(bolt12SelectedOffer().bolt12)"
                                                            class="flex items-center gap-1.5 px-3 py-1.5 rounded text-xs bg-neon-cyan/15 border border-neon-cyan/30 text-neon-cyan hover:bg-neon-cyan/25"
                                                            title="Copy offer string">
                                                            <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                                                            <span>Copy</span>
                                                        </button>
                                                        <!--
                                                            Streamlined sign-message shortcut. Only rendered for
                                                            OCEAN-prefixed offers whose payout address is owned
                                                            by this wallet — see ``bolt12CanSignPayoutMessage``.
                                                            The ownership probe runs once per offer id and
                                                            caches via ``bolt12OceanOwnership``.
                                                        -->
                                                        <template x-if="bolt12CanSignPayoutMessage(bolt12SelectedOffer())">
                                                            <button @click="openOceanSignDialog(bolt12ExtractOceanAddress(bolt12SelectedOffer().description), bolt12OceanOwnershipUnverified(bolt12SelectedOffer()))"
                                                                class="flex items-center gap-1.5 px-3 py-1.5 rounded text-xs bg-purple-500/15 border border-purple-500/30 text-purple-200 hover:bg-purple-500/25"
                                                                title="Sign an OCEAN payout-auth message with this address">
                                                                <i data-lucide="pen-tool" class="w-3.5 h-3.5"></i>
                                                                <span>Sign payout message</span>
                                                            </button>

                                                </div>

                                                <div class="flex items-center gap-4">

                                                        QR rendered as inline SVG (not canvas) so it

                                                        push the encoder to v40 (177 modules), where
                                                        rasterized output gives each module ~1px on
                                                        a 200px canvas — below most phone scanners'
                                                        resolution floor. The wrapper is a button
                                                        so a click opens a full-viewport copy via
                                                        ``openOfferQrModal``.
                                                    -->

                        <!-- ANONYMIZE TAB (wizard) -->

                        <div x-show="activeTab === 'anonymize'" x-cloak x-init="anonymizeInitTab()">
                            <!-- Liquid indexer reachability banner.

                                 ``liquid_indexer_reachable: false`` while the
                                 Liquid round-trip hop is enabled. Indicates
                                 the wallet-side electrs-liquid backend is
                                 unreachable or stale, which will park any
                                 ``awaiting_liquid_dwell`` sessions until the
                                 backend recovers. -->
                            <template x-if="anonymizePolicyLoaded && anonymizePolicy && anonymizePolicy.liquid_available && anonymizePolicy.liquid_indexer_reachable === false">
                                <div class="bg-neon-yellow/10 border border-neon-yellow/30 rounded-lg p-3 mb-4 flex items-start gap-2">
                                    <i data-lucide="alert-triangle" class="w-4 h-4 text-neon-yellow flex-shrink-0 mt-0.5"></i>
                                    <div class="flex-1 min-w-0">
                                        <p class="text-xs font-medium text-neon-yellow">Liquid backend not ready yet</p>
                                        <p class="text-[11px] text-gray-300 mt-1">
                                            The wallet cannot reach the Liquid chain indexer right now.
                                            Liquid round-trip sessions will be unavailable, and any
                                            in-flight sessions will pause at the dwell step until the
                                            indexer reports as healthy.
                                        </p>
                                        <p class="text-[11px] text-gray-300 mt-1">
                                            <span class="font-medium text-neon-yellow/90">First-time setup:</span>
                                            if you just enabled Liquid, this is expected. The
                                            <code class="text-[10px] bg-black/30 px-1 rounded">elementsd</code>
                                            container must complete its initial block download
                                            (typically several hours on first run) before
                                            <code class="text-[10px] bg-black/30 px-1 rounded">electrs-liquid</code>
                                            can start indexing (another hour or two). This banner will
                                            clear automatically once both are caught up — you can leave
                                            the stack running in the background.
                                        </p>
                                        <p class="text-[11px] text-gray-300 mt-1">
                                            If you operate the indexer container yourself and the wait
                                            has been longer than a day, check that
                                            <code class="text-[10px] bg-black/30 px-1 rounded">elementsd</code>
                                            and <code class="text-[10px] bg-black/30 px-1 rounded">electrs-liquid</code>
                                            are running.
                                        </p>
                                    </div>
                                </div>
                            </template>
                            <!-- Residual L-BTC recovery banner.
                                 Surfaced whenever the ``/anonymize/liquid-residuals``
                                 endpoint returns one or more pending
                                 rows: outputs that the post-completion
                                 scan has located on-chain but that
                                 have not yet been recovered or
                                 acknowledged as dust. Per-row controls
                                 invoke the dashboard endpoints to
                                 drive the lbtc→LN submarine swap
                                 (recoverable rows) or to acknowledge
                                 as dust (sub-threshold rows). -->
                            <template x-if="anonymizeLiquidResiduals && anonymizeLiquidResiduals.rows && anonymizeLiquidResiduals.rows.length > 0">
                                <div class="bg-neon-yellow/5 border border-neon-yellow/30 rounded-lg p-3 mb-4">
                                    <div class="flex items-start gap-2 mb-2">
                                        <i data-lucide="droplet" class="w-4 h-4 text-neon-yellow flex-shrink-0 mt-0.5"></i>
                                        <div class="flex-1 min-w-0">
                                            <p class="text-xs font-medium text-neon-yellow">
                                                Residual L-BTC awaiting recovery
                                            </p>
                                            <p class="text-[11px] text-gray-300 mt-1">
                                                One or more anonymize sessions left a Liquid output
                                                that was not swept into the destination payment.
                                                Recover above-threshold residuals via a Boltz
                                                submarine swap to Lightning; acknowledge sub-threshold
                                                rows as dust to hide them.
                                            </p>
                                            <p class="text-[11px] text-gray-400 mt-1">
                                                <span x-text="anonymizeLiquidResiduals.recoverable_count"></span>
                                                recoverable
                                                (<span x-text="anonymizeLiquidResiduals.recoverable_value_sat"></span> sat),
                                                dust threshold
                                                <span x-text="anonymizeLiquidResiduals.dust_threshold_sat"></span>
                                                sat.
                                            </p>
                                        </div>
                                    </div>
                                    <p x-show="anonymizeLiquidResidualsError"
                                       class="text-[11px] text-red-400 mt-1"
                                       x-text="anonymizeLiquidResidualsError"></p>
                                    <ul class="mt-2 divide-y divide-navy-700 border-t border-navy-700">
                                        <template x-for="r in anonymizeLiquidResiduals.rows" x-bind:key="r.id">
                                            <li class="flex items-center justify-between gap-3 py-2">
                                                <div class="min-w-0 flex-1">

                                                    <template x-if="!r.is_dust">
                                                        <button type="button"
                                                                class="px-2.5 py-1 rounded text-[11px] font-medium bg-neon-cyan/15 border border-neon-cyan/30 text-neon-cyan hover:bg-neon-cyan/25 disabled:opacity-50"
                                                                :disabled="anonymizeResidualRowBusy(r.id)"
                                                                x-on:click="anonymizeResidualSwapOut(r.id)">
                                                            Swap to Lightning
                                                        </button>
                                                    </template>
                                                    <template x-if="r.is_dust">
                                                        <button type="button"
                                                                class="px-2.5 py-1 rounded text-[11px] font-medium bg-navy-800 border border-navy-700 text-gray-300 hover:bg-navy-700 disabled:opacity-50"
                                                                :disabled="anonymizeResidualRowBusy(r.id)"
                                                                x-on:click="anonymizeResidualAcknowledgeDust(r.id)">
                                                            Acknowledge as dust
                                                        </button>
                                                    </template>
                                                </div>
                                            </li>
                                        </template>
                                    </ul>
                                </div>
                            </template>
                            <div class="bg-navy-900 border border-navy-700 rounded-lg p-4 mb-4">
                                <div class="flex items-center justify-between gap-3 mb-2">
                                    <h3 class="text-sm font-medium text-white flex items-center gap-2">
                                        <i data-lucide="shuffle" class="w-4 h-4 text-neon-cyan"></i>
                                        <span>Anonymize</span>
                                    </h3>
                                    <button type="button"
                                            class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium bg-neon-cyan/15 border border-neon-cyan/30 text-neon-cyan hover:bg-neon-cyan/25 hover:border-neon-cyan/50 transition-all"
                                            x-on:click="anonymizeWizardOpenAndReset()">
                                        <i data-lucide="plus" class="w-3.5 h-3.5"></i>
                                        New session
                                    </button>
                                </div>
                                <p class="text-xs text-gray-400">
                                    Produce a base-layer UTXO at a destination address you supply, with materially improved
                                    forward anonymity relative to the chosen input.
                                </p>
                            </div>

                            <!-- Active + recent sessions -->
                            <div class="bg-navy-900 border border-navy-700 rounded-lg p-4 mb-4">
                                <div class="flex items-center justify-between mb-3">
                                    <h3 class="text-sm font-medium text-white">Sessions</h3>
                                    <button type="button"
                                            class="flex items-center gap-1.5 px-2.5 py-1 rounded text-xs text-gray-400 hover:text-white hover:bg-navy-800"
                                            :disabled="anonymizeSessionsLoading"
                                            x-on:click="anonymizeFetchSessions()">
                                        <i data-lucide="refresh-cw" class="w-3 h-3"
                                           :class="anonymizeSessionsLoading ? 'animate-spin' : ''"></i>
                                        Refresh
                                    </button>
                                </div>
                                <p x-show="anonymizeSessionsLoading" class="text-xs text-gray-500">Loading…</p>
                                <p x-show="anonymizeSessionsError"
                                   class="text-xs text-red-400" x-text="anonymizeSessionsError"></p>
                                <template x-if="anonymizeSessions.length === 0 && !anonymizeSessionsLoading && !anonymizeSessionsError">
                                    <p class="text-xs text-gray-500 py-2">No anonymize sessions yet. Start one above.</p>
                                </template>
                                <ul class="divide-y divide-navy-700" x-show="anonymizeSessions.length > 0">
                                    <template x-for="s in anonymizeSessions" x-bind:key="s.id">
                                        <li class="py-2 text-sm">
                                            <!-- Row: status badge + amount/source + actions -->
                                            <div class="flex items-center justify-between gap-3">
                                                <div class="min-w-0 flex-1">
                                                    <div class="flex items-center gap-2 flex-wrap">
                                                        <span x-bind:class="anonymizeStatusBadgeClass(s)"
                                                              x-text="anonymizeStatusLabel(s)"></span>
                                                        <span class="text-xs text-gray-300"
                                                              x-text="anonymizeFormatAmount(s.bin_amount_sat)"></span>
                                                        <span class="text-xs text-gray-500"
                                                              x-text="'· ' + anonymizeSourceKindLabel(s.source_kind)"></span>
                                                    </div>
                                                    <div class="text-xs text-gray-400 mt-0.5"
                                                         x-text="anonymizeStatusDescription(s)"></div>
                                                    <!- — Next-try countdown caption.
                                                         Only renders for AR rows with an active
                                                         retry budget (Class A/B); empty otherwise. -->
                                                    <div class="text-[11px] text-gray-500 mt-0.5"
                                                         x-show="anonymizeNextRetryCaption(s)"
                                                         x-text="anonymizeNextRetryCaption(s)"></div>
                                                    <!- — On-chain-funding wait indicator.
                                                         States THAT the session is waiting on its
                                                         on-chain funding transaction, without ever
                                                         surfacing the txid / a copy / a mempool
                                                         link. The ⓘ explains why the txid is
                                                         withheld (privacy: surfacing it would let
                                                         the session be linked to an on-chain tx). -->
                                                    <template x-if="anonymizeAwaitingOnchainFunding(s)">
                                                        <div class="text-[11px] text-gray-500 mt-0.5 flex items-center gap-1 relative">
                                                            <i data-lucide="clock" class="w-3 h-3 text-amber-400/80 flex-none"></i>
                                                            <span>Waiting for your on-chain funding transaction to confirm</span>
                                                            <button type="button"
                                                                    class="text-gray-500 hover:text-neon-cyan focus:text-neon-cyan focus:outline-none flex-none"
                                                                    x-on:click.stop="anonymizeToggleOnchainTip(s)"
                                                                    aria-label="Why isn't the transaction ID shown?">
                                                                <i data-lucide="info" class="w-3 h-3"></i>
                                                            </button>
                                                            <div x-show="anonymizeOnchainTipOpen(s)" x-cloak
                                                                 x-on:click.stop
                                                                 class="absolute top-full left-0 mt-2 w-72 z-30 p-3 rounded-lg bg-navy-700 border border-navy-500 shadow-xl text-xs text-gray-200 leading-relaxed normal-case">
                                                                <p class="font-semibold text-white mb-1.5">Why no transaction ID?</p>
                                                                <p>This is a privacy session. Showing its funding transaction here would let anyone viewing this screen link the session to an on-chain transaction — the very connection the mix is designed to break.</p>
                                                                <p class="mt-1.5 text-gray-400">The funding payment leaves your own wallet, so if you need the txid you can still find it in the <span class="text-gray-200">On-chain</span> tab.</p>
                                                            </div>
                                                        </div>
                                                    </template>
                                                </div>
                                                <div class="flex items-center gap-2 shrink-0">
                                                    <!- secondary action (text-link) -->
                                                    <button type="button"
                                                            class="text-xs px-2 py-1 rounded text-gray-400 hover:text-gray-100 hover:bg-navy-800"
                                                            x-show="anonymizeHasSecondaryAction(s)"
                                                            x-on:click="anonymizeInvokeAction(s.id, anonymizeSecondaryActionKind(s))"
                                                            x-text="anonymizeSecondaryActionLabel(s)"></button>
                                                    <!- primary action (filled) -->
                                                    <button type="button"
                                                            class="text-xs px-2.5 py-1 rounded bg-neon-cyan/15 border border-neon-cyan/30 text-neon-cyan hover:bg-neon-cyan/25 hover:border-neon-cyan/50 transition-all"
                                                            x-show="anonymizeHasPrimaryAction(s)"
                                                            x-on:click="anonymizeInvokeAction(s.id, anonymizePrimaryActionKind(s))"
                                                            x-text="anonymizePrimaryActionLabel(s)"></button>
                                                    <!-- Details disclosure (always visible) -->
                                                    <button type="button"
                                                            class="text-xs px-2 py-1 rounded text-gray-400 hover:text-gray-100 hover:bg-navy-800"
                                                            x-on:click="anonymizeToggleDetail(s.id)"
                                                            x-text="anonymizeDetailExpanded(s) ? 'Hide' : 'Details'"></button>
                                                    <!-- Pre-flow cancel (CREATED/SOURCING/FUNDING) -->
                                                    <button type="button"
                                                            class="text-xs px-2.5 py-1 rounded bg-neon-pink/10 border border-neon-pink/30 text-neon-pink hover:bg-neon-pink/20 hover:border-neon-pink/50 transition-all"
                                                            x-show="['created','sourcing','funding'].includes(s.status)"
                                                            x-on:click="anonymizeCancelSession(s.id)">
                                                        Cancel
                                                    </button>
                                                </div>
                                            </div>
                                            <!- inline detail panel -->
                                            <div x-show="anonymizeDetailExpanded(s)" x-cloak
                                                 class="mt-2 ml-1 pl-3 border-l-2 border-navy-700 text-xs text-gray-400 space-y-1">
                                                <!- Per-session recovery banner.
                                                     Fed by the on-toggle fetch of the session
                                                     detail endpoint; aggregates the worst
                                                     severity across the LN↔on-chain and
                                                     Liquid hop swap legs plus any session-
                                                     level hint (e.g. liquid dwell stuck).
                                                     Hidden when the classifier says ok/info.
                                                -->
                                                <template x-if="anonymizeRecoveryVisible(s)">
                                                    <div class="mb-2 rounded-lg p-2 space-y-1"
                                                         :class="anonymizeRecoveryBannerClass(s)">
                                                        <div class="flex items-start gap-2">
                                                            <i :data-lucide="anonymizeRecoveryIconName(s)"
                                                               class="w-3.5 h-3.5 flex-shrink-0 mt-0.5"
                                                               :class="anonymizeRecoveryIconClass(s)"></i>
                                                            <div class="flex-1 min-w-0">
                                                                <p class="text-[11px] font-medium"
                                                                   :class="anonymizeRecoveryIconClass(s)"
                                                                   x-text="(anonymizeRecoveryFor(s) || {}).headline"></p>
                                                                <p class="text-[11px] text-gray-300 mt-0.5"
                                                                   x-text="(anonymizeRecoveryFor(s) || {}).detail"></p>
                                                                <!-- Liquid leg-2 lockup refund levers. Surfaced
                                                                     by the recovery classifier when the wallet's
                                                                     L-BTC submarine lockup is stuck. Cooperative
                                                                     first; unilateral (post-timeout) as fallback. -->
                                                                <template x-if="anonymizeRecoveryHasAction(s, 'liquid_cooperative_refund')">
                                                                    <div class="flex flex-wrap items-center gap-2 mt-1.5">
                                                                        <button type="button"
                                                                                class="text-[11px] px-2 py-1 rounded bg-neon-cyan/15 border border-neon-cyan/30 text-neon-cyan hover:bg-neon-cyan/25 transition-all"
                                                                                x-on:click="anonymizeInvokeAction(s.id, 'liquid_cooperative_refund')">
                                                                            Refund Liquid funds
                                                                        </button>
                                                                        <button type="button"
                                                                                class="text-[11px] px-2 py-1 rounded text-gray-400 hover:text-gray-100 hover:bg-navy-800"
                                                                                x-on:click="anonymizeInvokeAction(s.id, 'liquid_unilateral_refund')">
                                                                            Refund after timeout
                                                                        </button>
                                                                    </div>
                                                                </template>
                                                                <!-- Liquid leg-1 reverse-swap claim lever. Surfaced
                                                                     when the wallet's cooperative claim is stuck after
                                                                     revealing the preimage — the L-BTC must be landed. -->
                                                                <template x-if="anonymizeRecoveryHasAction(s, 'liquid_reverse_unilateral_claim')">
                                                                    <div class="flex flex-wrap items-center gap-2 mt-1.5">
                                                                        <button type="button"
                                                                                class="text-[11px] px-2 py-1 rounded bg-neon-cyan/15 border border-neon-cyan/30 text-neon-cyan hover:bg-neon-cyan/25 transition-all"
                                                                                x-on:click="anonymizeInvokeAction(s.id, 'liquid_reverse_unilateral_claim')">
                                                                            Claim Liquid funds
                                                                        </button>
                                                                    </div>
                                                                </template>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </template>
                                                <div>
                                                    <span class="text-gray-500">Session id:</span>
                                                    <span class="font-mono text-gray-300" x-text="s.id"></span>
                                                </div>
                                                <div x-show="s.status === 'awaiting_reconciliation' && s.awaiting_reconciliation_reason">
                                                    <span class="text-gray-500">Reason:</span>
                                                    <span class="font-mono text-gray-300"
                                                          x-text="s.awaiting_reconciliation_reason || ''"></span>
                                                </div>
                                                <div x-show="s.status === 'awaiting_reconciliation' && s.pre_reconciliation_status">
                                                    <span class="text-gray-500">Was:</span>
                                                    <span class="text-gray-300"
                                                          x-text="anonymizeStatusLabel({status: s.pre_reconciliation_status})"></span>
                                                </div>
                                                <div x-show="s.status === 'awaiting_reconciliation' && s.reconciliation_attempts > 0">
                                                    <span class="text-gray-500">Attempts:</span>
                                                    <span class="text-gray-300" x-text="s.reconciliation_attempts"></span>
                                                    <span class="text-gray-500" x-show="s.last_reconciliation_attempt_ts">·
                                                        last try
                                                        <span x-text="anonymizeRelativeTime(s.last_reconciliation_attempt_ts)"></span>
                                                    </span>
                                                </div>
                                                <div x-show="s.last_error_redacted">
                                                    <span class="text-gray-500">Last error:</span>
                                                    <span class="text-gray-300 break-all"
                                                          x-text="s.last_error_redacted || ''"></span>
                                                </div>
                                                <div class="text-gray-500" x-show="s.created_at">
                                                    Created <span x-text="anonymizeRelativeTime(s.created_at)"></span>
                                                </div>
                                                <!- fund-status reassurance for AR rows.
                                                     The classifier-cancellable set is the
                                                     no-funds-at-risk set (funds stayed in the
                                                     user's wallet — message is source-aware via
                                                     anonymizeNoFundsMessage); everything else is
                                                     funds-may-be-in-flight. -->
                                                <div class="mt-1"
                                                     x-show="s.status === 'awaiting_reconciliation' && anonymizeReasonNoFundsAtRisk(s)">
                                                    <span class="text-green-300" x-text="anonymizeNoFundsMessage(s)"></span>

                                                <!-- Progress timeline (phase & health). Renders

                                                     addresses. Live-refreshed while the session is

                                                        <div class="text-gray-500 mb-1">Progress</div>

                                                                <div class="flex items-baseline justify-between gap-2">

                            </div>

                            <!-- App-wide confirm modal lives at the top level of the
                                 dashboard root (search ``confirmOpen``) so its z-[60]
                                 stacks above the z-50 action dialogs; a copy here would
                                 be trapped in this section's stacking context. -->

                            <!-- Wizard modal -->
                            <div x-show="anonymizeWizardOpen" x-cloak
                                 class="fixed inset-0 z-40 flex items-center justify-center bg-black/60 p-4">
                                <!-- ``@click`` here closes any open info-icon tooltip. -->
                                <!-- Icons and popovers individually ``.stop`` propagation, -->
                                <!-- so a click on them never reaches this handler. -->
                                <!-- Document-level ``click.outside`` was avoided -->
                                <!-- because clicking icon B while A is open would close -->
                                <!-- B again via A's outside-handler firing at document. -->
                                <div class="bg-navy-800 border border-navy-700 rounded-lg w-full max-w-lg p-5"
                                     x-on:click="anonymizeCloseInfoTip()">

                                        <h3 class="text-base font-semibold text-white">
                                            New anonymize session<span x-show="anonymizeWizardSourceKind === 'ext-lightning' || anonymizeWizardSourceKind === 'ext-onchain'">

                                    <!- — Tor bootstrap banner (highest priority). -->

                                    <!-- expectation ("waiting on Tor", not "waiting on clock"). -->
                                    <div x-show="!anonymizeTorBootstrapReady" x-cloak
                                         class="mb-3 p-2 rounded bg-amber-900/30 border border-amber-700/40 text-[11px] text-amber-200 flex items-start gap-2">
                                        <svg class="w-3.5 h-3.5 mt-0.5 flex-none animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                                        </svg>
                                        <div>
                                            <p class="font-medium text-amber-100">Connecting through Tor…</p>
                                            <p class="mt-0.5">
                                                The wallet routes every anonymize call through Tor. This usually takes 10–60 seconds on a fresh boot. Try again once this clears.
                                            </p>

                                    </div>

                                    <!- — initial clock-skew calibration banner. -->
                                    <!-- Shown only when the probe has never produced a -->
                                    <!-- decisive measurement (status 'unknown' or 'warming_up'). -->
                                    <!-- Subsequent background refreshes use the smaller -->
                                    <!-- "refreshing" indicator below instead of this full banner. -->
                                    <!-- Gated on ``anonymizePolicyLoaded`` so we don't flash -->
                                    <!-- "Calibrating time sync… 0s" during the initial Tor-routed -->
                                    <!-- /anonymize/policy fetch (the default ``anonymizeClockStatus`` -->
                                    <!-- is ``'unknown'`` which would otherwise match this banner). -->
                                    <div x-show="anonymizePolicyLoaded && anonymizeTorBootstrapReady && (anonymizeClockStatus === 'unknown' || anonymizeClockStatus === 'warming_up')" x-cloak
                                         class="mb-3 p-2 rounded bg-amber-900/30 border border-amber-700/40 text-[11px] text-amber-200 flex items-start gap-2">
                                        <svg class="w-3.5 h-3.5 mt-0.5 flex-none animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                                        </svg>
                                        <div>
                                            <p class="font-medium text-amber-100">Calibrating time sync…</p>
                                            <p class="mt-0.5">
                                                The wallet checks its clock against trusted reference servers before admitting sessions. Ready in
                                                <span class="font-mono" x-text="anonymizeClockSecondsRemaining"></span>s.
                                            </p>
                                        </div>
                                    </div>

                                    <!- — clock skew out of range. Shown after a -->
                                    <!-- decisive 'unhealthy' measurement. Blocks Confirm; -->
                                    <!-- user must sync their system clock to recover. -->
                                    <div x-show="anonymizeTorBootstrapReady && anonymizeClockStatus === 'unhealthy' && anonymizeClockSkewMs != null" x-cloak
                                         class="mb-3 p-2 rounded bg-red-900/30 border border-red-700/40 text-[11px] text-red-200">
                                        <p class="font-medium text-red-100">Local clock is out of sync</p>
                                        <p class="mt-0.5">
                                            Your machine's clock differs from the reference servers by
                                            <!-- ``Math`` is not exposed in the @alpinejs/csp -->
                                            <!-- expression evaluator, so the absolute value -->
                                            <!-- is inlined as ``n < 0 ? -n : n``. -->
                                            <span class="font-mono" x-text="(anonymizeClockSkewMs == null ? 0 : (anonymizeClockSkewMs < 0 ? -anonymizeClockSkewMs : anonymizeClockSkewMs)) + ' ms'"></span>
                                            (threshold:
                                            <span class="font-mono" x-text="(anonymizeClockThresholdMs || 0) + ' ms'"></span>).
                                            Enable NTP on your system clock and try again.
                                        </p>
                                    </div>

                                    <!- — unhealthy for any other reason (e.g. probe -->
                                    <!-- failed to gather enough samples). Same blocking effect -->
                                    <!-- as the skew-out-of-range banner, with diagnostic copy. -->
                                    <div x-show="anonymizeTorBootstrapReady && anonymizeClockStatus === 'unhealthy' && anonymizeClockSkewMs == null" x-cloak
                                         class="mb-3 p-2 rounded bg-red-900/30 border border-red-700/40 text-[11px] text-red-200">
                                        <p class="font-medium text-red-100">Time-sync check failed</p>
                                        <p class="mt-0.5">
                                            The wallet couldn't reach enough reference servers to measure clock skew. Check your Tor connection; the next automatic retry runs in the background.

                                    <!-- measurement (so status is healthy / unhealthy but the -->

                                    <!-- wizard's Confirm button stays usable; this is purely -->
                                    <!-- informational so the user isn't confused if the page -->

                                    <div x-show="anonymizeTorBootstrapReady && anonymizeClockWarmupCompletesAt != null && (anonymizeClockStatus === 'healthy' || anonymizeClockStatus === 'unhealthy')" x-cloak

                                        <svg class="w-3 h-3 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                                        </svg>
                                        <span>refreshing time check</span>

                                    <!-- Step 1: form — merged source / amount / destination /

                                                                class="text-gray-500 hover:text-emerald-400 focus:text-emerald-400 transition-colors focus:outline-none"
                                                                x-on:click.stop="anonymizeToggleInfoTip('liquid-route')"
                                                                aria-label="What is the Liquid hop?">
                                                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                                            </svg>
                                                        </button>
                                                        <div x-show="anonymizeInfoTipOpen === 'liquid-route'" x-cloak
                                                             x-on:click.stop="anonymizeInfoTipOpen"
                                                             class="absolute top-full left-0 mt-2 w-72 z-30 p-3 rounded-lg bg-navy-700 border border-navy-500 shadow-xl text-xs text-gray-200 leading-relaxed normal-case">
                                                            <p class="font-semibold text-white mb-1.5">Route through Liquid</p>
                                                            <p>Liquid is a Bitcoin-pegged sidechain run by a consortium of exchanges. When this is checked, your funds briefly move to Liquid between the two Lightning legs.</p>
                                                            <p class="mt-1.5">On Liquid, the actual amount in every transaction is cryptographically hidden (only the sender and receiver see it) — so an observer can't match your incoming Lightning amount to your outgoing one.</p>
                                                            <p class="mt-1.5 text-gray-400"><strong class="text-gray-200">Tradeoff:</strong> sessions take 3–24 hours longer because of the deliberate dwell time.</p>

                                        <!-- Source picker — Braiins-Deposit-style button-card grid.

                                                                    class="text-gray-500 hover:text-emerald-400 focus:text-emerald-400 transition-colors focus:outline-none"

                                                                <p class="font-semibold text-white mb-1.5">Lightning (Agent Wallet)</p>

                                                        <i data-lucide="link" class="w-3.5 h-3.5"></i>
                                                        On-chain

                                                                    class="text-gray-500 hover:text-emerald-400 focus:text-emerald-400 transition-colors focus:outline-none"

                                                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>

                                                            </button>
                                                            <div x-show="anonymizeInfoTipOpen === 'src-onchain-self'" x-cloak

                                                                <p class="mt-1.5 text-gray-400">Slower than Lightning source (extra ~10-minute chain hop) and costs slightly more in fees, but works when your channels are empty.</p>

                                                    </span>
                                                </label>

                                                            </div>
                                                        </span>
                                                    </span>
                                                </span>
                                            </label>

                                            If it's already tied to your identity (KYC withdrawal, reused
                                            address, address clustering), observers can tell you ran a
