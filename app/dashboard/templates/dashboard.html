                <template x-if="chanResult">
                    <div class="mt-3 p-3 rounded-lg bg-neon-green/10 border border-neon-green/30 text-neon-green text-sm">
                        <div class="mb-1">Channel opened! Funding tx:</div>
                        <div class="font-mono text-xs break-all text-neon-green/90" x-text="chanResult.funding_txid"></div>
                    </div>
                </template>
                <template x-if="chanError">
                    <div class="mt-3 p-3 rounded-lg bg-neon-pink/10 border border-neon-pink/30 text-neon-pink text-sm" x-text="chanError"></div>
                </template>
            </div>
        </div>
    </template>

    <!-- Sign / Verify Message Modal -->
    <!--
        Streamlined "Sign payout message" dialog. Opens from the
        Offer Details card when the offer is OCEAN-prefixed AND the
        embedded payout address is one we own on-chain. Trims the
        full Sign/Verify dialog down to the minimum the user needs
        for an OCEAN payout auth challenge: paste the challenge,
        click Sign, copy the signature. Reuses ``POST /sign/address``
        on the backend so the audit / rate-limit / format-detection
        behaviour stays identical to the long-form flow.
    -->
    <!--
        Full-viewport BOLT 12 offer QR modal. Triggered from the
        offer-panel and issue-result thumbnails (which are too dense
        to scan reliably at thumbnail size when the offer carries
        blinded paths). Renders the same payload as inline SVG so
        the user can show it across a room and a phone camera can
        resolve every module.
    -->
    <template x-if="showOfferQrModal">
        <div class="fixed inset-0 z-50 flex items-center justify-center"
             @keydown.escape.window="closeOfferQrModal()">
            <div class="absolute inset-0 bg-black/80 backdrop-blur-sm"
                 @click="closeOfferQrModal()"></div>
            <div class="relative bg-navy-900 border border-neon-cyan/30 rounded-xl shadow-2xl mx-4 flex flex-col"
                 style="width: min(640px, 96vw); max-height: 96vh;">
                <div class="flex items-center justify-between px-5 py-3 border-b border-navy-700">
                    <div class="flex items-center gap-2">
                        <i data-lucide="qr-code" class="w-5 h-5 text-neon-cyan"></i>
                        <h2 class="text-base font-semibold text-white" x-text="offerQrModalLabel || 'Offer QR'"></h2>
                    </div>
                    <button @click="closeOfferQrModal()"
                            class="p-1.5 text-gray-500 hover:text-gray-300 hover:bg-navy-700 rounded-lg transition-colors"
                            title="Close (Esc)">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>
                <div class="p-5 flex flex-col items-center gap-4 overflow-y-auto">
                    <div class="bg-white rounded-lg p-4"
                         style="width: min(70vmin, 560px); height: min(70vmin, 560px);">
                        <div x-effect="renderQrSvg($el, offerQrModalText)"
                             class="w-full h-full"></div>
                    </div>
                    <div x-show="$el.previousElementSibling && $el.previousElementSibling.firstElementChild && $el.previousElementSibling.firstElementChild.dataset && $el.previousElementSibling.firstElementChild.dataset.qrTooLong === '1'"
                         class="text-xs text-neon-pink text-center">
                        Offer too long for a single QR frame — share the text below instead.
                    </div>
                    <div class="w-full flex items-start gap-2">
                        <textarea readonly rows="3"
                            x-text="offerQrModalText"
                            class="flex-1 bg-navy-800 border border-navy-700 rounded px-3 py-2 text-[11px] font-mono text-gray-200 break-all"></textarea>
                        <button @click="copyText(offerQrModalText)"
                            class="flex items-center gap-1.5 px-3 py-2 rounded text-xs bg-neon-cyan/15 border border-neon-cyan/30 text-neon-cyan hover:bg-neon-cyan/25"
                            title="Copy offer string">
                            <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                            <span>Copy</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <template x-if="showOceanSignDialog">
        <div class="fixed inset-0 z-50 flex items-center justify-center"
             @keydown.escape.window="closeOceanSignDialog()">
            <div class="absolute inset-0 bg-black/60 backdrop-blur-sm"
                 @click="closeOceanSignDialog()"></div>
            <div class="relative bg-navy-900 border border-purple-500/30 rounded-xl shadow-2xl w-full max-w-xl mx-4 max-h-[90vh] overflow-y-auto">
                <!-- Header -->
                <div class="sticky top-0 z-10 flex items-center justify-between px-6 py-4 border-b border-navy-700 bg-navy-900/95 backdrop-blur-sm">
                    <div class="flex items-center gap-2">
                        <i data-lucide="pen-tool" class="w-5 h-5 text-purple-400"></i>
                        <h2 class="text-lg font-semibold text-white">Sign payout message</h2>
                    </div>
                    <button @click="closeOceanSignDialog()"
                            class="p-1.5 text-gray-500 hover:text-gray-300 hover:bg-navy-700 rounded-lg transition-colors">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>

                <div class="p-6 pt-4 space-y-4">
                    <!-- Pre-filled address (read-only). Styled to match
                         the "Format" info-box from the full Sign dialog
                         so it reads as informational, not editable. The
                         caption differs when ownership couldn't be
                         auto-verified so the user has calibrated
                         expectations going in. -->
                    <div class="p-3 rounded-lg bg-purple-500/5 border border-purple-500/20">
                        <div class="text-[11px] text-purple-300/80 mb-1 flex items-center gap-1.5">
                            <i data-lucide="info" class="w-3 h-3"></i>
                            <span x-show="!oceanSignUnverified">Signing as on-chain address (owned by this wallet)</span>
                            <span x-show="oceanSignUnverified">Signing as on-chain address</span>
                        </div>
                        <div class="text-xs text-purple-100 font-mono break-all" x-text="oceanSignAddress"></div>
                    </div>

                    <!-- Disclaimer when ownership couldn't be checked
                         (LND build doesn't expose IsOurAddress /
                         ListAddresses). The button was shown
                         optimistically; we want the user to know the
                         attempt may fail. -->
                    <template x-if="oceanSignUnverified">
                        <div class="p-3 rounded-lg bg-amber-500/10 border border-amber-500/30 flex items-start gap-2">
                            <i data-lucide="alert-triangle" class="w-4 h-4 text-amber-400 shrink-0 mt-0.5"></i>
                            <div class="text-[11px] text-amber-200/90 leading-relaxed">
                                The wallet couldn't auto-verify that this address belongs to it on this LND build.
                                Signing will fail if the address isn't actually controlled by this wallet's keys.
                            </div>
                        </div>
                    </template>

                    <!-- Message input -->
                    <div>
                        <label class="block text-xs text-gray-400 mb-1.5">
                            Message to sign
                            <span class="text-gray-600">(paste the OCEAN auth challenge here)</span>
                        </label>
                        <textarea x-model="oceanSignMessage"
                                  rows="5"
                                  placeholder="Paste the challenge string OCEAN gave you…"
                                  class="w-full bg-navy-800 border border-navy-600 focus:border-purple-500/60 rounded-md px-3 py-2 text-sm text-white placeholder-gray-600 focus:outline-none font-mono resize-y"></textarea>
                        <p class="text-[11px] text-gray-500 mt-1">
                            <i data-lucide="info" class="w-3 h-3 inline -mt-0.5"></i>
                            The exact bytes shown will be signed. Whitespace and line endings matter.
                        </p>
                    </div>

                    <!-- Error banner -->
                    <template x-if="oceanSignError">
                        <div class="p-3 rounded-lg bg-neon-pink/10 border border-neon-pink/30 text-neon-pink text-xs"
                             x-text="oceanSignError"></div>
                    </template>

                    <!-- Signature output. Only rendered once we have
                         a signature — both the textarea + copy button
                         flow into the same block so the user's eye
                         lands on the result in one place. -->
                    <template x-if="oceanSignSignature">
                        <div class="p-3 rounded-lg bg-neon-green/5 border border-neon-green/30">
                            <div class="flex items-center justify-between mb-2">
                                <div class="flex items-center gap-2 text-xs text-neon-green">
                                    <i data-lucide="check-circle-2" class="w-4 h-4"></i>
                                    <span>Signed</span>
                                    <span class="text-gray-500" x-show="oceanSignFormat"
                                          x-text="'(' + oceanSignFormat + ')'"></span>
                                </div>
                                <button @click="copyOceanSignature()"
                                        class="flex items-center gap-1.5 px-2.5 py-1 rounded text-xs bg-neon-green/15 border border-neon-green/30 text-neon-green hover:bg-neon-green/25">
                                    <i :data-lucide="oceanSignCopied ? 'check' : 'copy'" class="w-3.5 h-3.5"></i>
                                    <span x-text="oceanSignCopied ? 'Copied!' : 'Copy signature'"></span>
                                </button>
                            </div>
                            <pre class="text-xs text-white font-mono whitespace-pre-wrap break-all bg-navy-800/60 rounded px-2 py-1.5"
                                 x-text="oceanSignSignature"></pre>
                        </div>
                    </template>

                    <!-- Footer actions -->
                    <div class="flex justify-end gap-2 pt-2">
                        <button @click="closeOceanSignDialog()"
                                class="px-3 py-1.5 text-xs text-gray-400 hover:text-gray-200">
                            <span x-text="oceanSignSignature ? 'Done' : 'Cancel'"></span>
                        </button>
                        <!-- Sign / Re-sign — same handler, different
                             label depending on whether we already have
                             a signature. Re-sign overwrites since
                             signatures for the same (addr, msg) pair
                             are deterministic anyway. -->
                        <button @click="submitOceanSign()"
                                :disabled="!oceanSignFormReady() || oceanSignLoading"
                                class="px-4 py-1.5 rounded-md text-xs font-medium bg-purple-500/30 border border-purple-500/50 text-purple-100 hover:bg-purple-500/40 disabled:opacity-40 disabled:cursor-not-allowed">
                            <span x-show="!oceanSignLoading && !oceanSignSignature">Sign</span>
                            <span x-show="!oceanSignLoading && oceanSignSignature">Re-sign</span>
                            <span x-show="oceanSignLoading">Signing…</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <template x-if="showSignDialog">
        <div class="fixed inset-0 z-50 flex items-center justify-center" @keydown.escape.window="closeSignDialog()">
            <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="closeSignDialog()"></div>
            <div class="relative bg-navy-900 border border-purple-500/30 rounded-xl shadow-2xl w-full max-w-2xl mx-4 max-h-[90vh] overflow-y-auto">
                <!-- Header -->
                <div class="sticky top-0 z-10 flex items-center justify-between px-6 py-4 border-b border-navy-700 bg-navy-900/95 backdrop-blur-sm">
                    <div class="flex items-center gap-2">
                        <i data-lucide="pen-tool" class="w-5 h-5 text-purple-400"></i>
                        <h2 class="text-lg font-semibold text-white">Sign / Verify Message</h2>
                    </div>
                    <button @click="closeSignDialog()" class="p-1.5 text-gray-500 hover:text-gray-300 hover:bg-navy-700 rounded-lg transition-colors">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>

                <!-- Tab toggle -->
                <div class="flex gap-1 px-6 pt-4">
                    <button @click="signTab = 'sign'"
                        class="flex items-center gap-1.5 px-3 py-1.5 rounded-md text-xs font-medium transition-all"
                        :class="signTab === 'sign' ? 'bg-purple-500/15 text-purple-300 border border-purple-500/30' : 'text-gray-500 hover:text-gray-300 border border-transparent'">
                        <i data-lucide="pen-tool" class="w-3.5 h-3.5"></i> Sign
                    </button>
                    <button @click="signTab = 'verify'"
                        class="flex items-center gap-1.5 px-3 py-1.5 rounded-md text-xs font-medium transition-all"
                        :class="signTab === 'verify' ? 'bg-purple-500/15 text-purple-300 border border-purple-500/30' : 'text-gray-500 hover:text-gray-300 border border-transparent'">
                        <i data-lucide="badge-check" class="w-3.5 h-3.5"></i> Verify
                    </button>
                </div>

                <!-- ═════ SIGN ═════ -->
                <div x-show="signTab === 'sign'" class="p-6 pt-4">

                    <!-- Step: form -->
                    <div x-show="signStep === 'form'">
                        <!-- Identity toggle -->
                        <div class="flex gap-1 mb-4">
                            <button @click="signIdentity = 'address'"
                                class="flex-1 px-3 py-2 rounded-md text-xs font-medium transition-all"
                                :class="signIdentity === 'address' ? 'bg-purple-500/10 text-purple-300 border border-purple-500/30' : 'text-gray-500 hover:text-gray-300 border border-navy-700'">
                                On-chain address
                            </button>
                            <button @click="signIdentity = 'node'"
                                class="flex-1 px-3 py-2 rounded-md text-xs font-medium transition-all"
                                :class="signIdentity === 'node' ? 'bg-purple-500/10 text-purple-300 border border-purple-500/30' : 'text-gray-500 hover:text-gray-300 border border-navy-700'">
                                Node identity
                            </button>
                        </div>

                        <!-- Address (only when identity=address) -->
                        <div x-show="signIdentity === 'address'" class="mb-4">
                            <label class="block text-xs text-gray-400 mb-1.5">Bitcoin address</label>
                            <input type="text" x-model="signAddress"
                                placeholder="bc1q…  /  bc1p…  /  3…  /  1…"
                                list="signAddressOptionsList"
                                class="w-full bg-navy-800 border border-navy-600 focus:border-purple-500/60 rounded-md px-3 py-2 text-sm font-mono text-white placeholder-gray-600 focus:outline-none">
                            <datalist id="signAddressOptionsList">
                                <template x-for="opt in signAddressOptions" :key="opt.address">
                                    <option :value="opt.address"></option>
                                </template>
                            </datalist>
                            <p class="text-[11px] text-gray-500 mt-1" x-show="signAddress" x-text="addressTypeLabel(signAddress)"></p>
                        </div>

                        <!-- Message -->
                        <div class="mb-4">
                            <label class="block text-xs text-gray-400 mb-1.5">
                                Message
                                <span :class="signMessage.length >= signMessageMaxChars() ? 'text-neon-pink' : 'text-gray-600'">(<span x-text="signMessage.length"></span>/<span x-text="signMessageMaxChars()"></span>)</span>
                            </label>
                            <textarea x-model="signMessage" rows="5"
                                :maxlength="signMessageMaxChars()"
                                placeholder="The exact text you want to sign…"
                                class="w-full bg-navy-800 border border-navy-600 focus:border-purple-500/60 rounded-md px-3 py-2 text-sm text-white placeholder-gray-600 focus:outline-none font-mono resize-y"></textarea>
                            <p class="text-[11px] text-gray-500 mt-1">
                                <i data-lucide="info" class="w-3 h-3 inline -mt-0.5"></i>
                                The exact bytes shown will be signed. Whitespace and line endings matter to verifiers.
                            </p>
                            <p class="text-[11px] text-neon-pink mt-1" x-show="signMessageHasControlBytes()">
                                <i data-lucide="alert-triangle" class="w-3 h-3 inline -mt-0.5"></i>
                                Message contains control bytes that will be rejected by the signer.
                            </p>
                        </div>

                        <p class="text-[11px] text-purple-300/70 mb-4">
                            <i data-lucide="info" class="w-3 h-3 inline -mt-0.5"></i>
                            Format: <span x-text="signFormatHint()"></span>. The signature proves control of the
                            <span x-text="signIdentity === 'node' ? 'Lightning node identity key' : 'address private key'"></span>.
                        </p>

                        <template x-if="signError">
                            <div class="mb-3 p-3 rounded-lg bg-neon-pink/10 border border-neon-pink/30 text-neon-pink text-xs" x-text="signError"></div>
                        </template>

                        <div class="flex justify-end gap-2">
                            <button @click="closeSignDialog()" class="px-3 py-1.5 text-xs text-gray-400 hover:text-gray-200">Cancel</button>
                            <button @click="gotoSignReview()"
                                :disabled="!signFormReady()"
                                class="px-4 py-1.5 rounded-md text-xs font-medium bg-purple-500/20 border border-purple-500/40 text-purple-200 hover:bg-purple-500/30 disabled:opacity-40 disabled:cursor-not-allowed">
                                Review →
                            </button>
                        </div>
                    </div>

                    <!-- Step: review -->
                    <div x-show="signStep === 'review'">
                        <div class="p-3 rounded-lg bg-navy-800/60 border border-navy-700 mb-3">
                            <div class="text-[11px] text-gray-500 mb-1">Identity</div>
                            <div class="text-sm text-white font-mono break-all" x-text="signIdentity === 'node' ? 'Node identity key' : signAddress"></div>
                            <div class="text-[11px] text-gray-500 mt-1" x-show="signIdentity === 'address'" x-text="addressTypeLabel(signAddress)"></div>
                        </div>
                        <div class="p-3 rounded-lg bg-navy-800/60 border border-navy-700 mb-3">
                            <div class="text-[11px] text-gray-500 mb-1">Message (<span x-text="signMessage.length"></span> chars)</div>
                            <pre class="text-xs text-white font-mono whitespace-pre-wrap break-all" x-text="signMessage"></pre>
                        </div>
                        <div class="p-3 rounded-lg bg-purple-500/5 border border-purple-500/20 mb-4">
                            <div class="text-[11px] text-purple-300/80 mb-1">Format</div>
                            <div class="text-xs text-purple-200" x-text="signFormatHint()"></div>
                        </div>

                        <!-- Informational note (not a warning). Styled to match the
                             Format info-box above so a new user doesn't read it as
                             "something is wrong" — the content just explains what
                             signing IS. -->
                        <div class="p-3 rounded-lg bg-purple-500/5 border border-purple-500/20 mb-4 flex items-start gap-2">
                            <i data-lucide="info" class="w-4 h-4 text-purple-300/80 shrink-0 mt-0.5"></i>
                            <div class="text-[11px] text-purple-200/90 leading-relaxed">
                                Signing publicly proves you control this <span x-text="signIdentity === 'node' ? 'node identity key' : 'address'"></span>.
                                Anyone with this signature can show you signed this message. This action is logged.
                            </div>
                        </div>

                        <template x-if="signError">
                            <div class="mb-3 p-3 rounded-lg bg-neon-pink/10 border border-neon-pink/30 text-neon-pink text-xs" x-text="signError"></div>
                        </template>

                        <div class="flex justify-between gap-2">
                            <button @click="signStep = 'form'" :disabled="signLoading"
                                class="px-3 py-1.5 text-xs text-gray-400 hover:text-gray-200 disabled:opacity-40">← Back</button>
                            <button @click="submitSign()" :disabled="signLoading"
                                class="px-4 py-1.5 rounded-md text-xs font-medium bg-purple-500/30 border border-purple-500/50 text-purple-100 hover:bg-purple-500/40 disabled:opacity-40">
                                <span x-show="!signLoading">Sign message</span>
                                <span x-show="signLoading">Signing…</span>
                            </button>
                        </div>
                    </div>

                    <!-- Step: result -->
                    <div x-show="signStep === 'result'">
                        <div class="p-3 rounded-lg bg-neon-green/5 border border-neon-green/30 mb-4 flex items-center gap-2">
                            <i data-lucide="check-circle-2" class="w-4 h-4 text-neon-green"></i>
                            <span class="text-sm text-neon-green">Signed successfully.</span>
                        </div>

                        <!-- Export format toggle -->
                        <div class="mb-3">
                            <label class="block text-[11px] text-gray-500 mb-1.5">Export as</label>
                            <div class="flex gap-1 flex-wrap" x-show="signIdentity === 'address'">
                                <button @click="signExportFormat = 'signature'"
                                    class="px-3 py-1.5 rounded-md text-[11px] font-medium border transition-all"
                                    :class="signExportFormat === 'signature' ? 'bg-purple-500/20 border-purple-500/40 text-purple-200' : 'bg-navy-800 border-navy-700 text-gray-500'"
                                    title="Bare base64 signature — paste into Ocean payout setup or any Electrum-compatible verifier">Signature</button>
                                <button @click="signExportFormat = 'json'"
                                    class="px-3 py-1.5 rounded-md text-[11px] font-medium border transition-all"
                                    :class="signExportFormat === 'json' ? 'bg-purple-500/20 border-purple-500/40 text-purple-200' : 'bg-navy-800 border-navy-700 text-gray-500'">JSON</button>
                                <button @click="signExportFormat = 'sparrow'"

                                <button @click="signExportFormat = 'ascii'"

                            </div>
                        </div>

                        <pre class="p-3 rounded-lg bg-navy-950 border border-navy-700 text-xs font-mono text-gray-200 whitespace-pre-wrap break-all max-h-64 overflow-y-auto" x-text="signedExport()"></pre>

                        <div class="flex justify-between items-center mt-4 gap-2">
                            <button @click="signNewMessage()" class="px-3 py-1.5 text-xs text-gray-400 hover:text-gray-200">Sign another</button>
                            <div class="flex gap-2">
                                <button @click="copySignedExport()" class="flex items-center gap-1 px-3 py-1.5 rounded-md text-xs font-medium bg-navy-800 border border-navy-600 text-gray-300 hover:bg-navy-700">
                                    <i data-lucide="copy" class="w-3.5 h-3.5"></i>

                <!-- ═════ VERIFY ═════ -->
                <div x-show="signTab === 'verify'" class="p-6 pt-4">
                    <!-- Paste autofill -->
                    <div class="mb-4">
                        <label class="block text-xs text-gray-400 mb-1.5">Paste a signed message (optional)</label>

                            <textarea x-model="verifyPaste" rows="2"

                            <button @click="parsePastedSignedMessage()" :disabled="!verifyPaste"
                                class="px-3 rounded-md text-xs font-medium bg-purple-500/20 border border-purple-500/40 text-purple-200 hover:bg-purple-500/30 disabled:opacity-40 self-stretch">

                    <!-- Identity toggle -->

                        <button @click="verifyIdentity = 'node'"

                            :class="verifyIdentity === 'node' ? 'bg-purple-500/10 text-purple-300 border border-purple-500/30' : 'text-gray-500 hover:text-gray-300 border border-navy-700'">

                    <div x-show="verifyIdentity === 'address'" class="mb-3">
                        <label class="block text-xs text-gray-400 mb-1.5">Bitcoin address</label>
                        <input type="text" x-model="verifyAddress"

                    </div>

                    <div class="mb-3">
                        <label class="block text-xs text-gray-400 mb-1.5">Message</label>
                        <textarea x-model="verifyMessage" rows="4"
                            :maxlength="signMessageMaxChars()"
                            class="w-full bg-navy-800 border border-navy-600 focus:border-purple-500/60 rounded-md px-3 py-2 text-sm text-white placeholder-gray-600 focus:outline-none font-mono resize-y"></textarea>
                    </div>

                    <div class="mb-4">
                        <label class="block text-xs text-gray-400 mb-1.5">Signature</label>

                    <template x-if="verifyResult">
                        <div class="mb-3 p-3 rounded-lg border text-sm flex items-center gap-2"

                            <i :data-lucide="verifyResult.valid ? 'check-circle-2' : 'x-circle'" class="w-4 h-4"></i>
                            <span x-text="verifyResult.valid ? 'Signature valid' : 'Signature does not verify'"></span>
                            <template x-if="verifyResult.valid && verifyResult.pubkey">
                                <span class="ml-2 text-[10px] font-mono text-gray-400 truncate" x-text="'pubkey ' + verifyResult.pubkey.slice(0, 10) + '…'"></span>

                        </div>

                    <template x-if="verifyError">

                    <p x-show="!verifyResult && !verifyError && !verifyMessage && !verifySignature"

                            <span x-show="verifyLoading">Verifying…</span>

                </div>
            </div>

    <!-- CONSOLIDATE UTXOS DIALOG ────────────────────────────────────────
         Sweeps a chosen set of UTXOs into a single fresh output. The
         resulting UTXO inherits a synthesised "Consolidated: N inputs"
         label so it remains identifiable in the UTXOs tab.
    -->
    <template x-if="consolidateOpen">
        <div class="fixed inset-0 z-50 flex items-center justify-center" @keydown.escape.window="closeConsolidate()">
            <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="closeConsolidate()"></div>
            <div class="relative w-full max-w-lg mx-4 bg-gradient-to-br from-navy-800 to-navy-900 border border-amber-500/30 rounded-xl p-6 shadow-2xl max-h-[90vh] overflow-y-auto">
                <div class="flex items-center justify-between mb-1">
                    <div class="flex items-center gap-2">
                        <i data-lucide="layers" class="w-5 h-5 text-amber-400"></i>
                        <h2 class="text-lg font-semibold text-white">Consolidate UTXOs</h2>
                    </div>
                    <button @click="closeConsolidate()" class="p-1.5 text-gray-500 hover:text-gray-300 hover:bg-navy-700 rounded-lg transition-colors">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>
                <p class="text-xs text-gray-500 mb-5">Sweep selected UTXOs into a single fresh on-chain output.</p>

                <div class="space-y-4">
                    <div class="bg-navy-900/50 border border-amber-500/20 rounded-lg p-3">
                        <div class="flex items-center gap-2 mb-2">
                            <i data-lucide="info" class="w-4 h-4 text-amber-400"></i>
                            <h3 class="text-sm font-medium text-white">Send Max</h3>
                        </div>
                        <p class="text-[11px] text-gray-400 leading-relaxed">
                            All selected UTXOs will be swept into one new output minus the network fee. This breaks
                            payment-graph linkability across the consolidated coins; do not consolidate UTXOs you want
                            to keep separate.
                        </p>
                    </div>

                    <!-- UTXO selector -->
                    <div>
                        <label class="text-xs text-gray-500 uppercase tracking-wide mb-1.5 block">Select UTXOs to consolidate</label>
                        <template x-if="utxosLoading">
                            <p class="text-[11px] text-gray-500 py-2">Loading UTXOs…</p>
                        </template>
                        <template x-if="!utxosLoading && utxos.length === 0">
                            <p class="text-[11px] text-gray-500 py-2">No UTXOs available.</p>
                        </template>
                        <div x-show="utxos.length > 0" class="max-h-56 overflow-y-auto border border-navy-700 rounded">
                            <table class="w-full text-[11px]">
                                <thead class="sticky top-0 bg-navy-900">
                                    <tr class="border-b border-navy-700/60 text-gray-500">
                                        <th class="py-1 px-2 w-6"></th>
                                        <th class="py-1 px-1 text-left font-normal">Label</th>
                                        <th class="py-1 px-1 text-right font-normal">Amount</th>
                                        <th class="py-1 px-1 text-right font-normal">Confirmations</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template x-for="u in utxos" :key="u.key">
                                        <tr class="border-b border-navy-700/40 hover:bg-navy-800/40">
                                            <td class="py-1 px-2 w-6">
                                                <input type="checkbox" :checked="consolidateOutpoints.includes(u.key)"
                                                    @change="toggleConsolidateSelection(u)" class="accent-amber-400">
                                            </td>
                                            <td class="py-1 px-1 text-gray-300 truncate max-w-[140px]" x-text="u.label || '—'"></td>
                                            <td class="py-1 px-1 text-right font-mono text-gray-200" x-text="formatSats(u.amount_sat)"></td>
                                            <td class="py-1 px-1 text-right text-gray-500 font-mono" x-text="u.confirmations"></td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                        <div class="mt-1 flex items-center justify-between text-[11px]">
                            <button @click="consolidateSelectAll()" class="text-amber-400 hover:text-amber-300">Select all</button>
                            <span class="text-gray-500" x-text="consolidateOutpoints.length + ' selected • ' + formatSats(consolidateSelectedTotal) + ' sats'"></span>
                        </div>
                    </div>

                    <!-- Destination address type -->
                    <div>
                        <label class="text-xs text-gray-500 uppercase tracking-wide mb-1.5 block">Destination Address Type</label>
                        <div class="grid grid-cols-3 gap-2">
                            <template x-for="t in [{id:'p2wkh',label:'Native SegWit'},{id:'p2tr',label:'Taproot'},{id:'np2wkh',label:'Nested SegWit'}]" :key="t.id">
                                <button @click="consolidateDestType = t.id" class="px-3 py-2 rounded-lg border text-left transition-all"
                                    :class="consolidateDestType === t.id ? 'border-amber-500/50 bg-amber-500/10 text-white' : 'border-navy-600 bg-navy-800/50 text-gray-400 hover:border-navy-500 hover:text-gray-300'">
                                    <span class="text-xs font-medium block" x-text="t.label"></span>
                                </button>
                            </template>
                        </div>
                    </div>

                    <!-- Fee rate -->
                    <div>
                        <label class="text-xs text-gray-500 uppercase tracking-wide mb-1.5 block">Fee rate (sat/vB)</label>
                        <input type="number" min="1" max="10000" x-model.number="consolidateSatPerVbyte"
                            class="w-full px-3 py-2 rounded-lg bg-navy-900 border border-navy-600 text-white font-mono text-sm focus:border-amber-500/50 focus:ring-1 focus:ring-amber-500/20 focus:outline-none transition-colors"
                            placeholder="Leave blank for LND default">
                    </div>

                    <!-- Action buttons -->
                    <div class="flex items-center gap-2 pt-2">
                        <button @click="closeConsolidate()"
                            class="flex-1 px-4 py-2.5 rounded-lg bg-navy-700 hover:bg-navy-600 text-gray-300 text-sm">
                            Cancel
                        </button>
                        <button @click="submitConsolidate()"
                            :disabled="consolidateLoading || consolidateOutpoints.length === 0"
                            class="flex-1 px-4 py-2.5 rounded-lg bg-amber-500/20 border border-amber-500/40 text-amber-300 hover:bg-amber-500/30 text-sm font-medium disabled:opacity-30 disabled:cursor-not-allowed">
                            <span x-show="!consolidateLoading">Sweep <span x-text="consolidateOutpoints.length"></span> input<span x-show="consolidateOutpoints.length !== 1">s</span></span>
                            <span x-show="consolidateLoading" class="flex items-center justify-center gap-2">
                                <span class="w-4 h-4 border-2 border-amber-400 border-t-transparent rounded-full animate-spin"></span>

                    <template x-if="consolidateError">
                        <div class="flex items-center gap-2 p-3 rounded-lg bg-neon-pink/10 border border-neon-pink/20">
                            <i data-lucide="alert-circle" class="w-4 h-4 text-neon-pink shrink-0"></i>
                            <p class="text-xs text-neon-pink" x-text="consolidateError"></p>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </template>

    <!-- BRAIINS DEPOSIT DIALOG ─────────────────────────────────────────
         Round-amount deposit to Braiins Hashpower. Four view modes driven
         by ``braiinsDepositStep``:
            * form     — pick amount + paste destination + see fees.
            * progress — three-stage status with both txids + copy +
                         mempool-explorer affordances.
            * success  — final view; both txids stay accessible.
            * failed   — recoverable error view with retry-send. -->
    <template x-if="braiinsDepositOpen">
        <!-- Scroll lives on the OUTER overlay (``overflow-y-auto``),
             not on the dialog body. Why: any non-``visible`` overflow
             on the body would clip info-tip popovers horizontally
             (CSS spec: a non-``visible`` value on one axis also
             clips the other axis). Putting the scroll on the overlay
             lets tall dialogs scroll on zoomed/short viewports *and*
             lets popovers extend past the dialog box.
             The overlay IS the backdrop (single element, no separate
             ``fixed`` backdrop child) so the browser's scrollbar is
             on the same element the user sees as the dim background.
             ``@click.self`` on the flex wrapper closes the dialog
             when the user clicks the dim area around the dialog
             box, without intercepting clicks that bubble up from
             inside the dialog. ``min-h-full items-center`` centers
             the dialog when it fits and lets the overlay scroll
             when it doesn't. -->
        <div class="fixed inset-0 z-50 overflow-y-auto bg-black/60 backdrop-blur-sm"
             @keydown.escape.window="closeBraiinsDeposit()">
            <div class="flex min-h-full items-center justify-center p-4"
                 @click.self="closeBraiinsDeposit()">
                <div class="relative w-full max-w-md bg-gradient-to-br from-navy-800 to-navy-900 border border-neon-cyan/30 rounded-xl p-6 shadow-2xl shadow-black/40">
                <!-- Header -->
                <div class="flex items-center justify-between mb-1">
                    <div class="flex items-center gap-2">
                        <i data-lucide="pickaxe" class="w-5 h-5 text-neon-cyan"></i>
                        <h2 class="text-lg font-semibold text-white">Braiins Deposit</h2>
                    </div>
                    <button @click="closeBraiinsDeposit()" class="p-1.5 text-gray-500 hover:text-gray-300 hover:bg-navy-700 rounded-lg transition-colors">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>
                <!-- NOTE: this MUST be a <div>, not a <p>. The info-
                     tip popover below is a <div>, and <p> cannot
                     legally contain a <div> — the HTML parser would
                     auto-close the <p> (and the position:relative
                     <span>) before the popover, which (a) reparents
                     the popover to a distant ancestor so it lands
                     near the bottom of the dialog instead of under
                     the info icon, and (b) leaves the trailing "."
                     as a stray text node that renders on its own
                     line above the next section. -->
                <div class="text-xs text-gray-400 mb-3">
                    Deposit to Braiins Hashpower without triggering manual review<span class="relative inline-flex items-center align-middle ml-1">
                        <button type="button" class="text-gray-500 hover:text-neon-cyan focus:text-neon-cyan transition-colors focus:outline-none"
                            x-on:click.stop="braiinsDepositToggleInfoTip('manual-review')"
                            aria-label="What is manual review?">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                        </button>
                        <div x-show="braiinsDepositInfoTipOpen === 'manual-review'" x-cloak
                             x-on:click.stop="braiinsDepositInfoTipOpen"
                             class="absolute top-full right-0 mt-2 w-72 z-30 p-3 rounded-lg bg-navy-700 border border-navy-500 shadow-xl text-xs text-gray-200 leading-relaxed normal-case">
                            <p class="font-semibold text-white mb-1.5" x-text="braiinsDepositGlossaryTitle('manual-review')"></p>
                            <p x-text="braiinsDepositGlossaryBody('manual-review')"></p>
                        </div>
                    </span>.
                </div>

                <!-- ──────── FORM ──────── -->
                <div x-show="braiinsDepositStep === 'form'" class="space-y-5 mt-3">
                    <!-- Source picker. Self-sourced (Agent
                         Wallet) and external-sourced (any other wallet)
                         options grouped under two headers, mirroring
                         the Anonymize wizard's source step. Auto-select
                         picks the affordable self option first.
                         Each external radio carries an ⓘ
                         info-icon that opens the matching
                         BRAIINS_DEPOSIT_GLOSSARY popover. The picker is
                         a label+radio pattern so the nested info-icon
                         <button> stays HTML-valid (button-in-button is
                         not allowed). The actual <input type=radio> is
                         visually hidden via ``sr-only``; selected
                         styling is driven off the bound source-kind. -->
                    <div>
                        <label class="text-xs uppercase tracking-wider text-gray-500 mb-1.5 block">
                            Where should the sats come from?
                        </label>

                        <!-- ─── Agent Wallet ─── -->
                        <p class="text-[11px] uppercase tracking-wide font-semibold text-gray-400 border-b border-navy-700/60 pb-1 mb-1.5">
                            Agent Wallet
                        </p>
                        <div class="grid grid-cols-2 gap-2">
                            <label class="px-3 py-2.5 rounded-md text-xs border transition-all flex items-center justify-between gap-2 cursor-pointer"
                                   :class="braiinsDepositSourceKind === 'lightning'
                                           ? 'border-emerald-500/60 bg-emerald-500/15 text-emerald-300'
                                           : 'border-navy-700 bg-navy-900 text-gray-300 hover:border-emerald-500/30'">
                                <input type="radio" name="braiins_deposit_source" value="lightning"
                                       :checked="braiinsDepositSourceKind === 'lightning'"
                                       @change="braiinsDepositSelectSource('lightning')"
                                       class="sr-only">
                                <span class="flex items-center gap-1.5">
                                    <i data-lucide="zap" class="w-3.5 h-3.5"></i>
                                    Lightning
                                    <span class="relative inline-flex items-center">
                                        <button type="button"
                                                class="text-gray-500 hover:text-emerald-400 focus:text-emerald-400 transition-colors focus:outline-none"
                                                x-on:click.stop="braiinsDepositToggleInfoTip('lightning')"
                                                aria-label="What is Lightning balance?">
                                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                            </svg>
                                        </button>
                                        <div x-show="braiinsDepositInfoTipOpen === 'lightning'" x-cloak
                                             x-on:click.stop="braiinsDepositInfoTipOpen"
                                             class="absolute top-full left-0 mt-2 w-64 z-30 p-3 rounded-lg bg-navy-700 border border-navy-500 shadow-xl text-xs text-gray-200 leading-relaxed normal-case">
                                            <p class="font-semibold text-white mb-1" x-text="braiinsDepositGlossaryTitle('lightning')"></p>
                                            <p x-text="braiinsDepositGlossaryBody('lightning')"></p>
                                        </div>
                                    </span>
                                </span>
                                <span class="font-mono text-[10px] text-gray-500" x-text="formatSats(braiinsDepositLnBalance) + ' sat'"></span>
                            </label>
                            <label class="px-3 py-2.5 rounded-md text-xs border transition-all flex items-center justify-between gap-2 cursor-pointer"
                                   :class="braiinsDepositSourceKind === 'onchain'
                                           ? 'border-emerald-500/60 bg-emerald-500/15 text-emerald-300'
                                           : 'border-navy-700 bg-navy-900 text-gray-300 hover:border-emerald-500/30'">
                                <input type="radio" name="braiins_deposit_source" value="onchain"
                                       :checked="braiinsDepositSourceKind === 'onchain'"
                                       @change="braiinsDepositSelectSource('onchain')"
                                       class="sr-only">
                                <span class="flex items-center gap-1.5">
                                    <i data-lucide="link" class="w-3.5 h-3.5"></i>
                                    On-chain
                                    <span class="relative inline-flex items-center">
                                        <button type="button"
                                                class="text-gray-500 hover:text-emerald-400 focus:text-emerald-400 transition-colors focus:outline-none"
                                                x-on:click.stop="braiinsDepositToggleInfoTip('on-chain')"
                                                aria-label="What is on-chain?">
                                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                            </svg>
                                        </button>
                                        <div x-show="braiinsDepositInfoTipOpen === 'on-chain'" x-cloak
                                             x-on:click.stop="braiinsDepositInfoTipOpen"
                                             class="absolute top-full left-0 mt-2 w-64 z-30 p-3 rounded-lg bg-navy-700 border border-navy-500 shadow-xl text-xs text-gray-200 leading-relaxed normal-case">
                                            <p class="font-semibold text-white mb-1" x-text="braiinsDepositGlossaryTitle('on-chain')"></p>
                                            <p x-text="braiinsDepositGlossaryBody('on-chain')"></p>
                                        </div>
                                    </span>
                                </span>
                                <span class="font-mono text-[10px] text-gray-500" x-text="formatSats(braiinsDepositOnchainBalance) + ' sat'"></span>
                            </label>
                        </div>

                        <!-- ─── External Source ─── -->
                        <template x-if="braiinsDepositExtEnabled">
                            <div class="mt-3">
                                <p class="text-[11px] uppercase tracking-wide font-semibold text-gray-400 border-b border-navy-700/60 pb-1 mb-1.5">
                                    External Source
                                </p>
                                <div class="grid grid-cols-2 gap-2">
                                    <label class="px-3 py-2.5 rounded-md text-xs border transition-all flex items-center justify-between gap-2 cursor-pointer"
                                           :class="braiinsDepositSourceKind === 'ext_lightning'
                                                   ? 'border-emerald-500/60 bg-emerald-500/15 text-emerald-300'
                                                   : 'border-navy-700 bg-navy-900 text-gray-300 hover:border-emerald-500/30'">
                                        <input type="radio" name="braiins_deposit_source" value="ext_lightning"
                                               :checked="braiinsDepositSourceKind === 'ext_lightning'"
                                               @change="braiinsDepositSelectSource('ext_lightning')"
                                               class="sr-only">
                                        <span class="flex items-center gap-1.5">
                                            <i data-lucide="zap" class="w-3.5 h-3.5"></i>
                                            Lightning
                                            <span class="relative inline-flex items-center">
                                                <button type="button"
                                                        class="text-gray-500 hover:text-emerald-400 focus:text-emerald-400 transition-colors focus:outline-none"
                                                        x-on:click.stop="braiinsDepositToggleInfoTip('external-lightning')"
                                                        aria-label="What is external Lightning?">
                                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                                    </svg>
                                                </button>
                                                <div x-show="braiinsDepositInfoTipOpen === 'external-lightning'" x-cloak
                                                     x-on:click.stop="braiinsDepositInfoTipOpen"
                                                     class="absolute top-full left-0 mt-2 w-64 z-30 p-3 rounded-lg bg-navy-700 border border-navy-500 shadow-xl text-xs text-gray-200 leading-relaxed normal-case">
                                                    <p class="font-semibold text-white mb-1" x-text="braiinsDepositGlossaryTitle('external-lightning')"></p>
                                                    <p x-text="braiinsDepositGlossaryBody('external-lightning')"></p>
                                                </div>
                                            </span>
                                        </span>
                                        <span class="text-[10px] text-gray-500">from elsewhere</span>
                                    </label>
                                    <label class="px-3 py-2.5 rounded-md text-xs border transition-all flex items-center justify-between gap-2 cursor-pointer"
                                           :class="braiinsDepositSourceKind === 'ext_onchain'
                                                   ? 'border-emerald-500/60 bg-emerald-500/15 text-emerald-300'
                                                   : 'border-navy-700 bg-navy-900 text-gray-300 hover:border-emerald-500/30'">
                                        <input type="radio" name="braiins_deposit_source" value="ext_onchain"
                                               :checked="braiinsDepositSourceKind === 'ext_onchain'"
                                               @change="braiinsDepositSelectSource('ext_onchain')"
                                               class="sr-only">
                                        <span class="flex items-center gap-1.5">
                                            <i data-lucide="link" class="w-3.5 h-3.5"></i>
                                            On-chain
                                            <span class="relative inline-flex items-center">
                                                <button type="button"
                                                        class="text-gray-500 hover:text-emerald-400 focus:text-emerald-400 transition-colors focus:outline-none"
                                                        x-on:click.stop="braiinsDepositToggleInfoTip('external-onchain')"
                                                        aria-label="What is external on-chain?">
                                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                                    </svg>
                                                </button>
                                                <div x-show="braiinsDepositInfoTipOpen === 'external-onchain'" x-cloak
                                                     x-on:click.stop="braiinsDepositInfoTipOpen"
                                                     class="absolute top-full right-0 mt-2 w-64 z-30 p-3 rounded-lg bg-navy-700 border border-navy-500 shadow-xl text-xs text-gray-200 leading-relaxed normal-case">
                                                    <p class="font-semibold text-white mb-1" x-text="braiinsDepositGlossaryTitle('external-onchain')"></p>
                                                    <p x-text="braiinsDepositGlossaryBody('external-onchain')"></p>
                                                </div>
                                            </span>
                                        </span>
                                        <span class="text-[10px] text-gray-500">from elsewhere</span>
                                    </label>
                                </div>
                            </div>
                        </template>

                        <!-- Plain-language helper copy keyed on selection. -->
                        <p class="text-[11px] text-gray-500 mt-1.5" x-text="braiinsDepositSourceCaption"></p>

                        <!-- The on-chain inbound-routing caveat (Tier 1b) lives in
                             the on-chain / external-onchain glossary tooltips (the
                             (i) buttons above) rather than an always-on banner, so
                             it's discoverable on demand without crowding the form.
                             The server-side Tier 1/Tier 2 gates do the real
                             protection and recommend Lightning on refusal. -->

                        <!-- "How does this work?" disclosure for first-time external users. -->
                        <details x-show="braiinsDepositSourceKind === 'ext_lightning' || braiinsDepositSourceKind === 'ext_onchain'"
                                 class="mt-1.5 text-[11px] text-gray-400">
                            <summary class="cursor-pointer hover:text-gray-200">How does this work?</summary>
                            <p class="mt-1.5 leading-relaxed">
                                We'll give you a one-time Lightning invoice or a Bitcoin address. You pay it from your other wallet. We then do the rest in the background and forward the deposit to Braiins. You can close this window any time — we'll keep working.
                            </p>
                        </details>

                        <!-- Advanced: open a channel instead of a swap (on-chain
                             sources only, operator-enabled). The escape hatch for
                             when a swap can't be routed to this node — surfaced in
                             the neon-yellow warning tone (matching the codebase's
                             "pay attention" cue) because Boltz routability dips are
                             common enough that users need to find this affordance
                             without scanning. -->
                        <details x-show="braiinsDepositChannelOptionAvailable" x-cloak
                                 class="mt-2 text-[11px] text-gray-400">
                            <summary class="cursor-pointer text-xs font-medium text-neon-yellow hover:text-neon-yellow/80">
                                <i data-lucide="alert-triangle" class="w-3.5 h-3.5 inline align-text-bottom mr-1"></i>Advanced / having trouble?
                            </summary>
                            <div class="mt-2 p-2.5 rounded-md bg-navy-900 border border-navy-700 space-y-2">
                                <p class="leading-relaxed">
                                    If a swap can't be routed to your node, you can fund this deposit by <span class="font-semibold">opening a Lightning channel</span> to a recommended routing peer instead. Slower (~30-60 min to confirm) and ~1% stays in the new channel as receive capacity you keep, but it doesn't depend on inbound routing.
                                    <button type="button"
                                            class="ml-1 text-gray-500 hover:text-emerald-400 focus:text-emerald-400 focus:outline-none align-middle"
                                            x-on:click.stop="braiinsDepositToggleInfoTip('open-a-channel')"
                                            aria-label="What is open a channel?">
                                        <svg class="w-3 h-3 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                        </svg>
                                    </button>
                                </p>
                                <div x-show="braiinsDepositInfoTipOpen === 'open-a-channel'" x-cloak
                                     class="p-2 rounded bg-navy-700 border border-navy-500 text-gray-200 leading-relaxed normal-case">
                                    <p x-text="braiinsDepositGlossaryBody('open-a-channel')"></p>
                                </div>
                                <label class="flex items-center gap-2 cursor-pointer">
                                    <input type="checkbox"
                                           :checked="braiinsDepositIsChannelStrategy"
                                           x-on:change="braiinsDepositSelectFundingStrategy(braiinsDepositIsChannelStrategy ? 'swap' : 'channel')"
                                           class="rounded border-navy-600 bg-navy-800 text-emerald-500 focus:ring-emerald-500/40">
                                    <span>Open a channel instead of a swap</span>
                                </label>
                                <!-- Connect-peer preflight result (D2/C). -->
                                <p x-show="braiinsDepositIsChannelStrategy && braiinsDepositChannelPeerChecking" x-cloak
                                   class="text-gray-500">Checking the channel peer…</p>
                                <p x-show="braiinsDepositIsChannelStrategy && braiinsDepositChannelPeerReachable === false" x-cloak
                                   class="text-neon-pink">
                                    Can't reach the channel peer right now<span x-show="braiinsDepositChannelPeerReason" x-text="' (' + braiinsDepositChannelPeerReason + ')'"></span>. Try again shortly, or use a swap / Lightning deposit.
                                </p>
                                <p x-show="braiinsDepositIsChannelStrategy && braiinsDepositChannelPeerReachable === true" x-cloak
                                   class="text-emerald-400">Channel peer reachable.</p>
                            </div>
                        </details>
                    </div>

                    <!-- Amount presets -->
                    <div>
                        <label class="text-xs uppercase tracking-wider text-gray-500 mb-1.5 block">
                            How much do you want to deposit?
                        </label>
                        <div class="grid grid-cols-3 gap-2">
                            <template x-for="amt in braiinsDepositPresets" :key="amt">
                                <button @click="braiinsDepositSelectAmount(amt)"
                                        :disabled="!braiinsDepositCanAfford(amt) || !braiinsDepositBinViableAtCurrentFees(amt)"
                                        :title="braiinsDepositBinTitle(amt)"
                                        :class="braiinsDepositAmountSats === amt
                                                ? 'border-emerald-500/60 bg-emerald-500/20 text-emerald-300'
                                                : (braiinsDepositBinRecommended(amt)
                                                    ? 'border-emerald-500/40 bg-navy-900 text-gray-300 hover:border-emerald-500/60'
                                                    : 'border-navy-700 bg-navy-900 text-gray-300 hover:border-emerald-500/30')"
                                        class="px-2 py-2 rounded-md text-xs font-mono border transition-all disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:border-navy-700">
                                    <span x-text="formatSats(amt)"></span>
                                    <!- — small "rec" badge on the
                                         smallest currently-viable bin. -->
                                    <span x-show="braiinsDepositBinRecommended(amt)"
                                          class="ml-1 text-[9px] uppercase tracking-wide text-emerald-400/80"
                                          aria-label="Recommended for current network fees">rec</span>
                                </button>
                            </template>
                        </div>
                        <!- — context line: shows the live fee rate
                             and what each bin's status means at this rate. -->
                        <template x-if="braiinsDepositBinFloorActive">
                            <p class="text-[10px] text-gray-500 mt-1.5 leading-relaxed">
                                Network fees ~<span class="font-mono" x-text="braiinsDepositCurrentFeeRateVb"></span> sat/vB. Greyed-out bins won't survive a no-change send at this fee level; they'll re-enable when fees fall.
                            </p>
                        </template>
                    </div>

                    <!-- Destination address -->
                    <div>
                        <label class="text-xs uppercase tracking-wider text-gray-500 mb-1.5 block">
                            Braiins deposit address
                        </label>
                        <input type="text" x-model="braiinsDepositAddress"
                               @input="braiinsDepositValidateAddress()"
                               placeholder="bc1q… paste here"
                               class="w-full px-3 py-2.5 rounded-lg text-sm font-mono bg-navy-900 border border-navy-700 text-gray-200 placeholder-gray-600 focus:outline-none focus:border-neon-cyan/40 focus:ring-1 focus:ring-neon-cyan/20 transition-all">
                        <template x-if="braiinsDepositAddressError">
                            <p class="text-[11px] text-neon-pink mt-1" x-text="braiinsDepositAddressError"></p>
                        </template>
                        <p class="text-[11px] text-gray-500 mt-1">
                            Copy this from your Braiins Hashpower deposit page.
                        </p>
                    </div>

                    <!-- Include-extras toggle —
                         lets the user choose between the dust-safe
                         no-change send (default) and an exact-amount
                         send that returns the remainder as wallet
                         change. The info bubble warns about the
                         dust risk of the exact mode. Applies to every
                         source identically (the final fresh-UTXO → Braiins
                         send is shared), including the channel-open path. -->
                    <div>
                        <label class="flex items-start gap-2 cursor-pointer">
                            <input type="checkbox"
                                   :checked="braiinsDepositIncludeExtras !== false"
                                   @change="braiinsDepositSetIncludeExtras($event.target.checked)"
                                   class="mt-0.5 w-4 h-4 rounded border-navy-600 bg-navy-900 text-emerald-500 focus:ring-emerald-500/40 focus:ring-offset-0">
                            <span class="flex-1">
                                <span class="text-xs text-gray-300 flex items-center gap-1.5">
                                    Include extras in the deposit
                                    <span class="relative inline-flex items-center">
                                        <button type="button"
                                                class="text-gray-500 hover:text-emerald-400 focus:text-emerald-400 transition-colors focus:outline-none"
                                                x-on:click.stop="braiinsDepositToggleInfoTip('include-extras')"
                                                aria-label="What does Include extras do?">
                                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                            </svg>
                                        </button>
                                        <div x-show="braiinsDepositInfoTipOpen === 'include-extras'" x-cloak
                                             x-on:click.stop="braiinsDepositInfoTipOpen"
                                             class="absolute top-full left-0 mt-2 w-72 z-30 p-3 rounded-lg bg-navy-700 border border-navy-500 shadow-xl text-xs text-gray-200 leading-relaxed normal-case">
                                            <p class="font-semibold text-white mb-1" x-text="braiinsDepositGlossaryTitle('include-extras')"></p>
                                            <p x-text="braiinsDepositGlossaryBody('include-extras')"></p>
                                        </div>
                                    </span>
                                </span>
                                <span class="block text-[10px] text-gray-500 mt-0.5"
                                      x-text="braiinsDepositIncludeExtras !== false
                                              ? 'Recommended. Slightly more reaches Braiins; no leftover dust.'
                                              : 'Sends exactly the bin amount and may leave a small change UTXO.'"></span>
                            </span>
                        </label>

                        <!-- Dust-risk advisory — surfaces a soft
                             warning when exact-amount mode is on AND
                             the projected change UTXO would cost
                             more to spend than it's worth at a
                             modeled fee-spike rate. -->
                        <template x-if="braiinsDepositChangeDustRisk">
                            <div class="mt-2 ml-6 flex items-start gap-2 p-2 rounded-lg bg-amber-900/20 border border-amber-500/30 text-[11px] text-amber-200 leading-relaxed">
                                <i data-lucide="alert-triangle" class="w-3.5 h-3.5 shrink-0 mt-0.5"></i>
                                <span>
                                    Heads up: the projected change (~<span class="font-mono" x-text="formatSats(braiinsDepositExpectedChangeSats)"></span> sats) is smaller than the likely future cost of spending it (~<span class="font-mono" x-text="formatSats(braiinsDepositChangeDustThresholdSats)"></span> sats at <span class="font-mono">2&times;</span> today's fee rate), so it may become uneconomical to spend if fees rise. Consider keeping <em>Include extras</em> on, or picking a larger bin amount.
                                </span>
                            </div>
                        </template>
                    </div>

                    <!- — Step 2 review copy. Renders one
                         list per source-kind so the user sees what's
                         about to happen in plain language.
                         Collapsed by default (``braiinsDepositWhatHappensNextOpen``)
                         to reduce dialog height; the user can expand
                         it via the chevron-style accordion header. -->
                    <template x-if="braiinsDepositQuote">
                        <div class="bg-navy-900/40 border-l-2 border-l-neon-cyan/40 rounded-r-lg px-3 py-2.5">
                            <button type="button"
                                    @click="braiinsDepositWhatHappensNextOpen = !braiinsDepositWhatHappensNextOpen"
                                    class="w-full flex items-center justify-between text-[11px] uppercase tracking-wider text-gray-500 hover:text-gray-300 transition-colors">
                                <span>What happens next</span>
                                <i :data-lucide="braiinsDepositWhatHappensNextOpen ? 'chevron-up' : 'chevron-down'" class="w-3.5 h-3.5"></i>
                            </button>
                            <ol x-show="braiinsDepositWhatHappensNextOpen" x-cloak
                                class="text-[11px] text-gray-300 space-y-1 list-decimal list-inside leading-relaxed mt-1.5">
                                <!-- Ext-LN: the user pays a
                                     Lightning invoice from their other
                                     wallet. -->
                                <template x-if="braiinsDepositSourceKind === 'ext_lightning'">
                                    <li>
                                        Pay a Lightning invoice for ~<span class="font-mono" x-text="formatSats(braiinsDepositRequiredExternalSats)"></span> sats from your other Lightning wallet.
                                    </li>
                                </template>
                                <!-- Ext-OC: the user sends to a
                                     fresh address from their other wallet. -->
                                <template x-if="braiinsDepositSourceKind === 'ext_onchain'">
                                    <li>
                                        Send ~<span class="font-mono" x-text="formatSats(braiinsDepositRequiredExternalSats)"></span> sats to a Bitcoin address we'll give you (~10-30 min to confirm).
                                    </li>
                                </template>
                                <!-- Self-OC: leading submarine swap. -->
                                <template x-if="braiinsDepositSourceKind === 'onchain'">
                                    <li>
                                        Send ~<span class="font-mono" x-text="formatSats(braiinsDepositSubmarineLockupSats)"></span> sats from your on-chain wallet to convert into Lightning balance (~10 min).
                                    </li>
                                </template>
                                <li>
                                    Convert ~<span class="font-mono" x-text="formatSats(braiinsDepositInvoiceAmountSats)"></span> sats of
                                    Lightning balance into a fresh Bitcoin transaction in your wallet (~10 min).
                                </li>
                                <!-- Step 4 — branches on the include-extras mode. -->
                                <template x-if="braiinsDepositIncludeExtras !== false">
                                    <li>
                                        Send the whole fresh UTXO to your Braiins address — Braiins gets ~<span class="font-mono" x-text="braiinsDepositArrivalDisplay"></span> (the bin amount plus any extras absorbed in lieu of leaving dust change).
                                    </li>
                                </template>
                                <template x-if="braiinsDepositIncludeExtras === false">
                                    <li>
                                        Send exactly <span class="font-mono" x-text="formatSats(braiinsDepositAmountSats || 0)"></span> sats from that new transaction to your Braiins address.
                                    </li>
                                </template>
                                <!-- Step 5 — only when extras are NOT included. -->
                                <template x-if="braiinsDepositIncludeExtras === false">
                                    <li>
                                        Return the small change (~<span class="font-mono" x-text="formatSats(braiinsDepositExpectedChangeSats)"></span> sats) to your wallet.
                                    </li>
                                </template>
                            </ol>
                        </div>
                    </template>

                    <!- dust-prevention infeasibility banner —
                         shown when network fees are too high right
                         now to broadcast a no-change send for this
                         bin. -->
                    <template x-if="braiinsDepositArrivalInfeasible">
                        <div class="bg-amber-900/30 border border-amber-500/40 rounded-lg p-3 text-xs text-amber-200 leading-relaxed">
                            <p class="font-semibold mb-1 flex items-center gap-1.5">
                                <i data-lucide="alert-triangle" class="w-3.5 h-3.5"></i>
                                Network fees too high right now
                            </p>
                            <p>
                                At <span class="font-mono" x-text="braiinsDepositCurrentFeeRateVb"></span> sat/vB, this bin amount wouldn't reach Braiins after fees. Try a larger bin amount or wait for fees to drop.
                            </p>
                        </div>
                    </template>

                    <!-- Fee preview -->
                    <template x-if="braiinsDepositQuote">
                        <div class="bg-navy-900 border border-navy-700 rounded-lg p-4 space-y-1.5">
                            <div class="flex items-center justify-between text-sm">
                                <span class="text-gray-400">Braiins receives</span>
                                <span class="font-mono text-emerald-300"
                                      x-text="braiinsDepositArrivalDisplay"></span>
                            </div>
                            <!- arrival-range disclosure. Shown only
                                 when min and max differ, which is the
                                 normal case once dust prevention is on. -->
                            <template x-if="braiinsDepositArrivalHasRange">
                                <p class="text-[11px] text-gray-500 leading-relaxed">
                                    Exact amount depends on Bitcoin network fees at the moment of broadcast. The wallet absorbs the fee into the deposit instead of leaving change UTXOs that could become unspendable at high fees.
                                </p>
                            </template>
                            <!-- Channel-open disclosure (D3 + channel-minimum):
                                 show the channel size we'll open, and when a
                                 small deposit was bumped up to the channel
                                 minimum, make the over-commit + what-becomes-LN
                                 obvious. Reserve/inbound nuance in the tooltip. -->
                            <template x-if="braiinsDepositShowChannelDisclosure">
                                <div class="text-[11px] leading-relaxed border-t border-navy-700 pt-1.5 space-y-1">
                                    <div class="flex items-center justify-between text-gray-400">
                                        <span class="inline-flex items-center gap-1 relative">
                                            Opens a Lightning channel
                                            <button type="button"
                                                    class="text-gray-500 hover:text-emerald-400 focus:text-emerald-400 focus:outline-none"
                                                    x-on:click.stop="braiinsDepositToggleInfoTip('channel-reserve')"
                                                    aria-label="What is the channel reserve?">
                                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                                </svg>
                                            </button>
                                            <div x-show="braiinsDepositInfoTipOpen === 'channel-reserve'" x-cloak
