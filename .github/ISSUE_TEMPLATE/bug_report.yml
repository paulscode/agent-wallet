name: Bug report
description: Report a defect or unexpected behavior in Agent Wallet.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please do **not**
        include private keys, macaroons, mnemonics, `.onion` hidden-service
        keys, or other secrets in this issue. For security vulnerabilities,
        use GitHub Security Advisories instead — see `SECURITY.md`.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear, one-paragraph description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps that reliably trigger the bug.
      placeholder: |
        1. Start the stack with `docker compose up -d`
        2. Navigate to '...'
        3. Click on '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the error message, stack trace, or screenshot if relevant. Redact any secrets.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Agent Wallet version / commit
      placeholder: "v0.1.0 or commit SHA"
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment mode
      options:
        - docker-compose (default)
        - docker-compose with Tor (`docker-compose.tor-split.yml`)
        - docker-compose with Liquid (`docker-compose.liquid.yml`)
        - standalone Python (`start.sh`)
        - other / not applicable
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Host OS / version
      placeholder: "e.g. Ubuntu 24.04, macOS 14.5, Debian 12"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        Output from `docker compose logs api` or `docker compose logs celery-worker`.
        **Redact** any tokens, macaroons, addresses, or other sensitive material before pasting.
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might be relevant (recent config changes, network setup, etc.).
