name: Feature request
description: Suggest an enhancement or new capability for Agent Wallet.
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please describe the problem you're trying
        to solve, not just the implementation you have in mind — this helps
        us evaluate alternatives.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What use case or pain point motivates this request?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: A sketch of what you'd like to see. UI/API/CLI shape, expected behavior, etc.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about and why they fall short.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, prior art, security/privacy considerations, etc.
