# Operator-supplied Tor configuration overrides.
#
# This file is the LAST torrc Tor reads. Anything in here overrides
# the wallet's defaults from /etc/tor/torrc.d/00-default.conf.
#
# The default image ships an empty file so Tor can boot. To customize,
# mount your own file into the container at:
#
#   /etc/tor/torrc.d/99-operator.conf
#
# Example docker-compose override (in your override file):
#
#   services:
#     tor-proxy:
#       volumes:
#         - ./my-tor-overrides.conf:/etc/tor/torrc.d/99-operator.conf:ro
#
# Canonical override examples (see the operator runbook for the
# full list and the rationale for each):
#
#   # Exclude specific exit countries (BCP-style jurisdiction policy)
#   ExcludeExitNodes {ru},{cn},{ir}
#   StrictNodes 1
#
#   # Bridge configuration for restricted-network operators
#   UseBridges 1
#   ClientTransportPlugin obfs4 exec /usr/bin/obfs4proxy
#   Bridge obfs4 ...
#
#   # Bump per-listener circuit-pending cap if IsolateSOCKSAuth
#   # creates more circuits than the default 32 under heavy load
#   MaxClientCircuitsPending 64
#
# Notes:
#   * Tor merges defaults + this file at startup. ``SocksPort`` and
#     other multi-value directives are REPLACED (not appended) by
#     any entry here — copy the full set from the defaults if you
#     only want to add one listener.
#   * Bad syntax here means Tor refuses to start. The healthcheck
#     will fail; ``docker compose logs tor-proxy`` shows why.
