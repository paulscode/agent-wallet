# Elements daemon config for the Liquid hop overlay.
#
# Anonymizing-proxy posture (NOT onion-only). All outbound P2P
# egress is routed through the wallet's tor-proxy container, but
# peers themselves may be clearnet — Tor is used as a SOCKS proxy
# to hide the wallet host's source IP, not to restrict the network
# to v3 onion peers.
#
# Why not onlynet=onion: Liquid mainnet has essentially no Tor-
# published peer population (verified May 2026 — a 30-minute
# clearnet warm-up of an elementsd addrman returned zero onion
# entries). Privacy on Liquid comes from Confidential Transactions
# (CT/blinding) at the protocol layer, not from P2P topology.
# Routing P2P through Tor still hides the operator's IP from
# Liquid peers; that is the privacy property we need.
#
# Operator notes:
#   - Set `chain=` to match your wallet's BITCOIN_NETWORK (the wallet
#     resolves Liquid network via the BITCOIN_NETWORK -> LiquidNetwork
#     mapping in `liquid_seed.resolve_liquid_network`).
#   - The RPC user/password below MUST match the credentials the
#     electrs-liquid container is configured with (see the
#     environment variables in docker-compose.liquid.yml).

# === Network ===
chain=liquidv1
# Use chain=liquidv1t for Liquid testnet, chain=elementsregtest for regtest.

# === Pegin validation ===
# The wallet moves funds between Bitcoin and Liquid via atomic
# Boltz swaps, not via the Liquid federation peg. We therefore do
# NOT run a Bitcoin mainnet RPC node alongside elementsd, and the
# daemon must not refuse to start because it cannot validate
# pegins. validatepegin=0 disables the peg-in validator entirely.
# This does not weaken the wallet's security model — we never sign
# or rely on pegin transactions.
validatepegin=0

# === Tor-proxy P2P routing ===
# All outbound P2P connections go through the tor-proxy container.
# Peers may be clearnet or onion — Tor handles both transports and
# what the Liquid network sees is a Tor exit IP, never the operator's
# host IP. listen=0 disables inbound P2P (we never accept incoming
# connections). listenonion=0 disables the hidden-service publisher
# (we don't need to be reachable AS an onion service, only to reach
# others over Tor).
proxy=tor-proxy:9050
listen=0
listenonion=0

# DNS seeds are reached over the SOCKS proxy too (Bitcoin Core / Elements
# routes seed lookups through `proxy` when set). Required for fresh-install
# bootstrap — without DNS seeds the daemon has no peer candidates.
dnsseed=1
forcednsseed=0

# === RPC ===
# Bound to the internal Docker network so only electrs-liquid (which
# sits behind the same network) can reach it. The overlay's compose
# file restricts rpcallowip to the overlay subnet only (in
#).
rpcbind=0.0.0.0
rpcport=7041
# Default-deny: the overlay's compose file passes -rpcallowip=<subnet>
# on the elementsd command line so this conf does not encode any
# RFC1918 ranges that would let unrelated sidecars authenticate.

# Credentials are NEVER baked into this file. The overlay's compose
# file passes `-rpcauth=<user>:<salt>$<hmac>` via the elementsd command
# line, so only a salted hash of the password reaches the process
# argument list — the cleartext secret never appears in the conf, in
# /proc/<pid>/cmdline, or in `docker inspect`. start.sh derives the
# rpcauth line and can rotate it without rewriting a mounted conf. The
# wallet host's start.sh refuses to boot the liquid overlay if the
# RPC user/password env vars are missing or match the legacy
# `change-me-in-production` placeholder (see `_validate_env_secrets`).

# === ZMQ (for electrs-liquid live-tip subscription) ===
zmqpubrawtx=tcp://0.0.0.0:7042
zmqpubrawblock=tcp://0.0.0.0:7043
zmqpubhashtx=tcp://0.0.0.0:7044
zmqpubhashblock=tcp://0.0.0.0:7045

# === Resource bounds ===
dbcache=512
maxmempool=300
prune=0     # MUST be 0 — electrs-liquid needs a full chain to index
maxconnections=20

# === Logging ===
logips=0
shrinkdebugfile=1
